const HASH = 'fa34e5bac87849343e48ccec9965e86629502a7f0c7c9f1e18abaa8a2240e673';
async function sha256(msg){const b=new TextEncoder().encode(msg);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function checkPw(){
  const v=document.getElementById('pw-input').value;
  const h=await sha256(v);
  if(h===HASH){localStorage.setItem('ehub_auth',h);document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';initApp();}
  else{document.getElementById('gate-error').style.display='block';}
}
window.addEventListener('DOMContentLoaded',async()=>{
  const s=localStorage.getItem('ehub_auth');
  if(s===HASH){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';initApp();}
});

let sortCol='close', sortDir=-1;

function fmtACV(acv,cur){if(acv===0)return'$0';const s=acv>=1e6?(acv/1e6).toFixed(2)+'M':acv>=1e3?(acv/1e3).toFixed(0)+'K':acv.toFixed(0);return(cur==='GBP'?'£':cur==='CAD'?'CA$':cur==='AUD'?'A$':'$')+s+' '+cur;}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p[1]+'/'+p[2]+'/'+p[0].slice(2);}
function hubBadge(h){if(h==='RT + Offline')return'<span class="badge badge-rtoff">RT + Offline</span>';if(h==='Offline')return'<span class="badge badge-offline">Offline</span>';return'<span class="badge badge-rt">Real-Time</span>';}
function intBadges(arr){return arr.map(i=>i==='SmartReach'?'<span class="badge badge-sr">SmartReach</span>':i==='Ticketing'?'<span class="badge badge-tk">Ticketing</span>':'<span class="badge badge-amc">AMC</span>').join(' ');}
function goLiveCell(d){const cls=d.goLiveStatus.toLowerCase().replace(/ /,'-');let txt=d.goLiveStatus;if(d.goLiveVal)txt+=d.goLiveStatus==='Delayed'||d.goLiveStatus==='ETA'?' '+fmtDate(d.goLiveVal):'';return`<span class="go-live ${cls}">${txt}</span>`;}

function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}document.querySelectorAll('.sort-arrow').forEach(e=>e.textContent='');const el=document.getElementById('sa-'+col);if(el)el.textContent=sortDir===1?'▲':'▼';render();}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const fr=document.getElementById('f-region').value;
  const fh=document.getElementById('f-hub').value;
  const fs=document.getElementById('f-status').value;

  let filtered=DEALS.filter(d=>{
    if(q&&!d.group.toLowerCase().includes(q)&&!d.name.toLowerCase().includes(q)&&!d.account.toLowerCase().includes(q))return false;
    if(fr&&(d.region||'—')!==fr)return false;
    if(fh&&d.hub!==fh)return false;
    if(fs&&d.goLiveStatus!==fs)return false;
    return true;
  });

  // sort within groups
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortCol==='close'){va=a.close;vb=b.close;}
    else if(sortCol==='name'){va=a.name;vb=b.name;}
    else if(sortCol==='group'){va=a.group;vb=b.group;}
    else if(sortCol==='type'){va=a.type||'';vb=b.type||'';}
    else if(sortCol==='hub'){va=a.hub;vb=b.hub;}
    else if(sortCol==='acv'){va=a.cur==='USD'?a.acv:0;vb=b.cur==='USD'?b.acv:0;return sortDir*(va-vb);}
    else if(sortCol==='agents'){va=a.agents??-1;vb=b.agents??-1;return sortDir*(va-vb);}
    else if(sortCol==='region'){va=a.region||'';vb=b.region||'';}
    else if(sortCol==='golive'){va=a.goLiveStatus;vb=b.goLiveStatus;}
    else if(sortCol==='owner'){va=a.owner;vb=b.owner;}
    else{va='';vb='';}
    return sortDir*(va<vb?-1:va>vb?1:0);
  });

  // group by group name
  const groupMap={};
  filtered.forEach(d=>{(groupMap[d.group]=groupMap[d.group]||[]).push(d);});
  // sort groups by most recent close desc
  const groups=Object.keys(groupMap).sort((a,b)=>{
    const ra=groupMap[a].map(d=>d.close).sort().reverse()[0];
    const rb=groupMap[b].map(d=>d.close).sort().reverse()[0];
    return ra<rb?1:ra>rb?-1:0;
  });

  const tbody=document.getElementById('tbody');
  let html='';
  let shown=0;
  groups.forEach(g=>{
    const rows=groupMap[g];
    shown+=rows.length;
    html+=`<tr class="group-header"><td colspan="11">${g} (${rows.length})</td></tr>`;
    rows.forEach(d=>{
      html+=`<tr class="data-row">
<td>${d.group===d.account?'':d.account||d.group}</td>
<td><a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${d.name}</a></td>
<td>${d.type||'—'}</td>
<td>${intBadges(d.integrations)||'—'}</td>
<td>${hubBadge(d.hub)}</td>
<td>${fmtDate(d.close)}</td>
<td class="acv">${fmtACV(d.acv,d.cur)}</td>
<td class="agents">${d.agents!=null?d.agents.toLocaleString():'—'}</td>
<td>${d.region||'—'}</td>
<td>${goLiveCell(d)}</td>
<td>${d.owner}</td>
</tr>`;
    });
  });
  if(shown===0)html='<tr class="no-results"><td colspan="11">No deals match your filters.</td></tr>';
  tbody.innerHTML=html;
  document.getElementById('count-lbl').textContent=`Showing ${shown} of ${DEALS.length} deals`;

  // KPIs
  document.getElementById('kpi-total').textContent=filtered.length;
  const usdAcv=filtered.filter(d=>d.cur==='USD').reduce((s,d)=>s+d.acv,0);
  document.getElementById('kpi-acv').textContent='$'+usdAcv.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('kpi-live').textContent=filtered.filter(d=>d.goLiveStatus==='Live').length;
  document.getElementById('kpi-delayed').textContent=filtered.filter(d=>d.goLiveStatus==='Delayed').length;
  document.getElementById('kpi-eta').textContent=filtered.filter(d=>d.goLiveStatus==='ETA').length;
  document.getElementById('kpi-tbd').textContent=filtered.filter(d=>d.goLiveStatus==='TBD').length;
}

function initApp(){
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('banner').textContent='Dashboard generated on '+today+' — data reflects Salesforce as of that date.';
  // populate region filter
  const regions=[...new Set(DEALS.map(d=>d.region||'—'))].sort();
  const sel=document.getElementById('f-region');
  regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});
  document.getElementById('sa-close').textContent='▼';
  render();
}
</script>
