  #app{display:none;max-width:1500px;margin:0 auto;padding:18px 24px 60px;}

  .sub{color:#6b7081;font-size:13px;margin-bottom:18px;}
  .kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}

  .kpi .v{font-size:26px;font-weight:700;}
  .kpi .l{font-size:12px;color:#6b7081;margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
  .kpi.live{border-left-color:var(--teal);}
  .kpi.delayed{border-left-color:var(--coral);}
  .kpi.eta{border-left-color:var(--indigo);}
  .kpi.tbd{border-left-color:#9aa0b4;}
  .filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .filters input,.filters select{padding:9px 12px;border-radius:8px;border:1px solid #d4d8e2;font-size:13px;background:#fff;color:var(--charcoal);}
  .filters input[type=text]{min-width:240px;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(33,33,43,.08);font-size:13px;}
  thead th{background:var(--charcoal);color:#fff;text-align:left;padding:11px 12px;font-weight:600;cursor:pointer;white-space:nowrap;user-select:none;}
  thead th:hover{background:#32323f;}
  tbody td{padding:10px 12px;border-bottom:1px solid #eef0f5;vertical-align:top;}
  tbody tr:hover{background:#f7f9fd;}
  .grp td{background:#eaf2fe;color:var(--charcoal);font-weight:700;padding:9px 12px;font-size:13px;}
  a.deal{color:var(--nice-blue);text-decoration:none;}
  a.deal:hover{text-decoration:underline;}
  .pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;margin:1px 3px 1px 0;color:#fff;}
  .pill.sr{background:#f59e0b;}
  .pill.tk{background:var(--indigo);}
  .pill.amc{background:#1f9d57;}
  .st{font-weight:600;white-space:nowrap;}
  .st.live{color:#1f9d57;}
  .st.delayed{color:var(--coral);}
  .st.eta{color:var(--indigo);}
  .st.tbd{color:#9aa0b4;}
  .ht{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#eef0f5;color:#4a4f63;white-space:nowrap;}
  .hub{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
  .hub.rt{background:var(--nice-blue);}
  .hub.off{background:var(--teal);color:#0c4f47;}
  .hub.both{background:var(--indigo);}
  .num{text-align:right;white-space:nowrap;}
  .none{text-align:center;color:#9aa0b4;padding:30px;}
</style>

/* ---------- password gate ---------- */
async function sha256hex(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function unlock(){ document.getElementById("gate").style.display="none"; document.getElementById("app").style.display="block"; render(); }
async function tryPw(){
  const v=document.getElementById("pw").value;
  const h=await sha256hex(v);
  if(h===PW_HASH){ try{localStorage.setItem("ehub_pw",h);}catch(e){} unlock(); }
  else { document.getElementById("pwerr").textContent="Incorrect password."; }
}
document.getElementById("pwbtn").addEventListener("click",tryPw);
document.getElementById("pw").addEventListener("keydown",e=>{ if(e.key==="Enter") tryPw(); });

/* ---------- helpers ---------- */
function hubType(id){
  const o=offlineSet.has(id), r=rtSet.has(id);
  if(o&&r) return "RT + Offline";
  if(o) return "Offline";
  return "Real-Time";
}
function parseD(s){ return s? new Date(s+"T00:00:00") : null; }
function daysFromNow(s){ const d=parseD(s); if(!d) return null; return (d-NOW)/(86400000); }
function fmtDate(s){ if(!s) return ""; const d=parseD(s); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }

/* go-live status waterfall -> {cat, label} cat in live/delayed/eta/tbd */
function goLive(deal){
  const id=deal.Id;
  const p=projectMap[id]||{};
  const ttt=deal.ttt;
  const endDays = p.estEnd!=null ? daysFromNow(p.estEnd) : null;
  // 1
  if(deal.omBooked===true && ttt!=null) return {cat:"live",label:"✓ Live"};
  // 2
  if(ttt!=null && !(endDays!=null && endDays>30)) return {cat:"live",label:"✓ Live"};
  // 3
  if(p.status==="2 - Closed" && p.actualGoLive && ttt!=null) return {cat:"live",label:"✓ Live"};
  // 4
  if(endDays!=null && endDays>30) return {cat:"delayed",label:"⚠ Delayed → "+fmtDate(p.estEnd)};
  // ETA source: PSEstimatedGoLive -> PM_Estimated_Go_Live -> Expected_Go_Live
  const eta = p.estGoLive || deal.pmEst || deal.expGoLive || null;
  if(eta){
    const ed=daysFromNow(eta);
    if(ed!=null && ed<0) return {cat:"delayed",label:"⚠ Delayed "+fmtDate(eta)};
    return {cat:"eta",label:"ETA "+fmtDate(eta)};
  }
  // 7
  return {cat:"tbd",label:"TBD"};
}

function fmtACV(deal){
  if(deal.acv==null) return "";
  const n=Math.round(deal.acv);
  const s=n.toLocaleString("en-US");
  return (deal.cur && deal.cur!=="USD") ? (deal.cur+" "+s) : ("$"+s);
}

/* ---------- build rows ---------- */
function buildRows(){
  return allDeals.map(d=>{
    const gl=goLive(d);
    return {
      Id:d.Id, account:d.account, parent:d.parent||d.account, name:d.name||d.Name,
      contract:d.contract||"", hub:hubType(d.Id), impl:getImplTypes(d.Id),
      close:d.CloseDate, acvNum:(d.acv==null?-1:d.acv), acvStr:fmtACV(d),
      agents:(d.agents==null?"":d.agents), region:d.region||"",
      glCat:gl.cat, glLabel:gl.label, owner:d.owner||""
    };
  });
}

/* ---------- KPIs ---------- */
function renderKPIs(rows){
  const totDeals=rows.length;
  let usd=0; rows.forEach(r=>{ const d=allDeals.find(x=>x.Id===r.Id); if(d && d.cur==="USD" && d.acv!=null) usd+=d.acv; });
  const live=rows.filter(r=>r.glCat==="live").length;
  const del=rows.filter(r=>r.glCat==="delayed").length;
  const eta=rows.filter(r=>r.glCat==="eta").length;
  const tbd=rows.filter(r=>r.glCat==="tbd").length;
  const k=document.getElementById("kpis");
  k.innerHTML=
   tile("",totDeals,"Total Deals")+
   tile("","$"+Math.round(usd).toLocaleString("en-US"),"USD ACV")+
   tile("live",live,"Live")+
   tile("delayed",del,"Delayed")+
   tile("eta",eta,"ETA")+
   tile("tbd",tbd,"TBD");
}
function tile(cls,v,l){ return '<div class="kpi '+cls+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }

let sortKey="close", sortDir=-1;

  th.addEventListener("click",()=>{ const k=th.dataset.k; if(sortKey===k) sortDir=-sortDir; else {sortKey=k;sortDir=1;} render(); });

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render(){
  const q=document.getElementById("f-search").value.toLowerCase();
  const fr=document.getElementById("f-region").value;
  const fh=document.getElementById("f-hub").value;
  const fs=document.getElementById("f-status").value;
  let rows=ROWS.filter(r=>{
    if(q && !((r.name||"").toLowerCase().includes(q) || (r.account||"").toLowerCase().includes(q))) return false;
    if(fr && r.region!==fr) return false;
    if(fh && r.hub!==fh) return false;
    if(fs && r.glCat!==fs) return false;
    return true;
  });
  renderKPIs(rows);

  // group by parent, order groups by first deal close date desc
  const groups={};
  rows.forEach(r=>{ (groups[r.parent]=groups[r.parent]||[]).push(r); });
  let gkeys=Object.keys(groups);
  // sort rows within group
  const cmp=(a,b)=>{
    let va,vb;
    switch(sortKey){
      case "acv": va=a.acvNum; vb=b.acvNum; break;
      case "agents": va=(a.agents===""?-1:+a.agents); vb=(b.agents===""?-1:+b.agents); break;
      case "close": va=a.close||""; vb=b.close||""; break;
      case "golive": va=a.glLabel; vb=b.glLabel; break;
      default: va=(a[sortKey]||"").toString().toLowerCase(); vb=(b[sortKey]||"").toString().toLowerCase();
    }
    if(va<vb) return -1*sortDir; if(va>vb) return 1*sortDir; return 0;
  };
  gkeys.forEach(k=>groups[k].sort(cmp));
  // group order by max close date desc
  gkeys.sort((a,b)=>{
    const ma=groups[a].reduce((m,r)=>r.close>m?r.close:m,""); const mb=groups[b].reduce((m,r)=>r.close>m?r.close:m,"");
    return ma<mb?1:(ma>mb?-1:0);
  });

  const tb=document.getElementById("tbody");
  if(rows.length===0){ tb.innerHTML='<tr><td class="none" colspan="11">No deals match the current filters.</td></tr>'; return; }
  let html="";
  gkeys.forEach(g=>{
    const gv=groups[g].reduce((s,r)=>s+(r.acvNum>0?r.acvNum:0),0);
    html+='<tr class="grp"><td colspan="11">'+esc(g)+' &nbsp;&middot;&nbsp; '+groups[g].length+' deal'+(groups[g].length>1?"s":"")+'</td></tr>';
    groups[g].forEach(r=>{
      const url="https://niceincontact.lightning.force.com/lightning/r/Opportunity/"+r.Id+"/view";
      const pills=r.impl.map(t=>{
        const c=t==="SmartReach"?"sr":(t==="Ticketing"?"tk":"amc");
        return '<span class="pill '+c+'">'+t+'</span>';
      }).join("");
      const hc=r.hub==="RT + Offline"?"both":(r.hub==="Offline"?"off":"rt");
      html+='<tr>'+
        '<td>'+esc(r.account)+'</td>'+
        '<td><a class="deal" href="'+url+'" target="_blank">'+esc(r.name)+'</a></td>'+
        '<td>'+esc(r.contract)+'</td>'+
        '<td>'+pills+'</td>'+
        '<td><span class="hub '+hc+'">'+r.hub+'</span></td>'+
        '<td>'+fmtDate(r.close)+'</td>'+
        '<td class="num">'+esc(r.acvStr)+'</td>'+
        '<td class="num">'+(r.agents===""?"":r.agents)+'</td>'+
        '<td>'+esc(r.region)+'</td>'+
        '<td><span class="st '+r.glCat+'">'+r.glLabel+'</span></td>'+
        '<td>'+esc(r.owner)+'</td>'+
      '</tr>';
    });
  });
  tb.innerHTML=html;
}

initFilters();

/* auto-unlock for returning visitors — runs AFTER ROWS and filters are initialized */
(function(){ try{ if(localStorage.getItem("ehub_pw")===PW_HASH){ unlock(); } }catch(e){} })();
</script>
