.kpi-label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

async function hashStr(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const val=document.getElementById('pw-input').value;
  const h=await hashStr(val);
  const exp=await hashStr('ehubdash1122');
  if(h===exp){localStorage.setItem('ehub_auth',h);showApp();}
  else{document.getElementById('gate-err').style.display='block';}
}
async function init(){
  const stored=localStorage.getItem('ehub_auth');
  const exp=await hashStr('ehubdash1122');
  if(stored===exp) showApp();
}
function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('date-banner').textContent=

// ─── SORT & FILTER ───────────────────────────────────────────────────────────
let sortCol=null, sortDir=1;
function sortBy(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;}
  document.querySelectorAll('th').forEach(th=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(th.getAttribute('onclick')===`sortBy('${col}')`){
      th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
    }
  });
  render();
}

function filtered(){
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const reg=document.getElementById('f-region').value;
  const hub=document.getElementById('f-hub').value;
  const gl=document.getElementById('f-gl').value;
  return deals.filter(d=>{
    if(q&&!d.name.toLowerCase().includes(q)&&!d.topParent.toLowerCase().includes(q)&&!d.account.toLowerCase().includes(q)) return false;
    if(reg&&d.region!==reg) return false;
    if(hub&&d.hub!==hub) return false;
    if(gl&&d.glStatus!==gl) return false;
    return true;
  });
}

function render(){
  const list=filtered();
  // Compute KPIs from full deals (not filtered)
  const usdAcv=deals.filter(d=>d.currency==='USD').reduce((s,d)=>s+d.acv,0);
  document.getElementById('kpi-total').textContent=deals.length;
  document.getElementById('kpi-acv').textContent='$'+usdAcv.toLocaleString('en-US',{maximumFractionDigits:0});
  document.getElementById('kpi-live').textContent=deals.filter(d=>d.glStatus==='Live').length;
  document.getElementById('kpi-delayed').textContent=deals.filter(d=>d.glStatus==='Delayed').length;
  document.getElementById('kpi-eta').textContent=deals.filter(d=>d.glStatus==='ETA').length;
  document.getElementById('kpi-tbd').textContent=deals.filter(d=>d.glStatus==='TBD').length;
  document.getElementById('rec-count').textContent=`${list.length} deal${list.length!==1?'s':''} shown`;

  // Group by topParent, order groups by most recent closeDate desc
  const groups={};
  list.forEach(d=>{
    if(!groups[d.topParent]) groups[d.topParent]={maxDate:'',deals:[]};
    if(d.closeDate>groups[d.topParent].maxDate) groups[d.topParent].maxDate=d.closeDate;
    groups[d.topParent].deals.push(d);
  });
  let groupList=Object.entries(groups).sort((a,b)=>b[1].maxDate.localeCompare(a[1].maxDate));

  // Sort within groups if sortCol
  if(sortCol){
    groupList=groupList.map(([g,obj])=>{
      obj.deals.sort((a,b)=>{
        let va=a[sortCol]??'',vb=b[sortCol]??'';
        if(typeof va==='number'&&typeof vb==='number') return (va-vb)*sortDir;
        return String(va).localeCompare(String(vb))*sortDir;
      });
      return [g,obj];
    });
  }

  const tb=document.getElementById('tbody');
  if(list.length===0){
    tb.innerHTML='<tr class="no-results"><td colspan="11">No deals match your filters.</td></tr>';
    return;
  }
  let html='';
  groupList.forEach(([gName,{deals:gDeals}])=>{
    html+=`<tr class="group-row"><td colspan="11">${esc(gName)} (${gDeals.length})</td></tr>`;
    gDeals.forEach(d=>{
      const sfUrl=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
      const hubBadge=d.hub==='RT + Offline'
        ?`<span class="badge hub-both">RT + Offline</span>`
        :d.hub==='Offline'?`<span class="badge hub-offline">Offline</span>`
        :`<span class="badge hub-rt">Real-Time</span>`;
      const intBadges=d.integrations.map(i=>
        i==='SmartReach'?`<span class="badge int-sr">SmartReach</span>`
        :i==='Ticketing'?`<span class="badge int-tk">Ticketing</span>`
        :`<span class="badge int-amc">AMC</span>`).join('');
      const glCls=d.glStatus==='Live'?'gl-live':d.glStatus==='Delayed'?'gl-delayed':d.glStatus==='ETA'?'gl-eta':'gl-tbd';
      const acvStr=d.acv>0?(d.currency==='USD'?'$':d.currency==='GBP'?'£':d.currency==='AUD'?'A$':'C$')+d.acv.toLocaleString('en-US',{maximumFractionDigits:0}):'$0';
      const currTag=d.currency!=='USD'&&d.acv>0?`<span class="currency">${d.currency}</span>`:'';
      html+=`<tr>
        <td>${esc(d.topParent)}</td>
        <td><a href="${sfUrl}" target="_blank">${esc(d.name)}</a></td>
        <td>${esc(d.type)}</td>
        <td>${intBadges}</td>
        <td>${hubBadge}</td>
        <td>${d.closeDate}</td>
        <td>${acvStr}${currTag}</td>
        <td>${d.agents??'—'}</td>
        <td>${d.region||'—'}</td>
        <td class="${glCls}">${d.glLabel}</td>
        <td>${esc(d.owner)}</td>
      </tr>`;
    });
  });
  tb.innerHTML=html;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
</body>
</html>
