  .kpi .val { font-size:22px; font-weight:700; color:#21212B; }

  thead th { background:#21212B; color:#fff; padding:9px 10px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; white-space:nowrap; user-select:none; }

// ─── SHA-256 password check ───────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

const CORRECT_HASH_KEY = 'ehub_pw_ok';

async function checkPw() {
  const pw = document.getElementById('pw-input').value;
  const hash = await sha256(pw);
  // SHA-256 of "ehubdash1122"
  if (hash === await sha256('ehubdash1122')) {
    localStorage.setItem(CORRECT_HASH_KEY, hash);
    unlockApp();
  } else {
    document.getElementById('gate-error').style.display = 'block';
  }
}

async function tryAutoUnlock() {
  const stored = localStorage.getItem(CORRECT_HASH_KEY);
  const correct = await sha256('ehubdash1122');
  if (stored === correct) unlockApp();
}

function unlockApp() {
  document.getElementById('gate').style.display = 'none';

}

// ─── GO-LIVE LOGIC ────────────────────────────────────────────────────────
function getETA(o) {
  const ps = psProjects[o.Id];
  if (ps && ps.estGL) return ps.estGL;
  if (o.PMEstGL) return o.PMEstGL;
  if (o.ExpGL) return o.ExpGL;
  return null;
}

function getGoLive(o) {
  const ps = psProjects[o.Id];
  const projEnd = ps && ps.projEnd ? new Date(ps.projEnd) : null;
  const today = TODAY;
  const thirtyDays = new Date(today); thirtyDays.setDate(thirtyDays.getDate() + 30);

  // Rule 1: OM booked + TTT
  if (o.OMBooked && o.TTT != null) return {status:'Live', label:'Live'};
  // Rule 2: TTT != null AND project end NOT >30 days away
  if (o.TTT != null) {
    if (!projEnd || projEnd <= thirtyDays) return {status:'Live', label:'Live'};
  }
  // Rule 3: PS Closed + actual GL + TTT
  if (ps && ps.status === '2 - Closed' && ps.actualGL && o.TTT != null) return {status:'Live', label:'Live'};

  const eta = getETA(o);
  if (projEnd && projEnd > thirtyDays) {
    return {status:'Delayed', label:'Delayed ' + projEnd.toISOString().slice(0,10)};
  }
  if (eta) {
    const etaDate = new Date(eta);
    if (etaDate < today) {
      return {status:'Delayed', label:'Delayed ' + eta};
    } else {
      return {status:'ETA', label:'ETA ' + eta};
    }
  }
  return {status:'TBD', label:'TBD'};
}

// ─── HUB CLASSIFICATION ───────────────────────────────────────────────────
function getHub(id) {
  const isOff = offlineIds.has(id);
  const isRT = rtIds.has(id);
  if (isOff && isRT) return 'RT + Offline';
  if (isOff) return 'Offline';
  return 'Real-Time';
}

// ─── FORMAT ───────────────────────────────────────────────────────────────
function fmtACV(val, cur) {
  if (!val && val !== 0) return '—';
  const sym = cur === 'GBP' ? '£' : cur === 'CAD' ? 'CA$' : cur === 'AUD' ? 'A$' : '$';
  return sym + val.toLocaleString('en-US', {maximumFractionDigits:0});
}

// ─── ENRICHED DEALS ───────────────────────────────────────────────────────
const deals = allOpps.map(o => {
  const gl = getGoLive(o);
  return {
    ...o,
    hub: getHub(o.Id),
    goLiveStatus: gl.status,
    goLiveLabel: gl.label,
    integBadges: integrations[o.Id] || [],
    groupKey: o.TopParent || o.Account,
  };
});

// ─── DASHBOARD INIT ───────────────────────────────────────────────────────
let currentSort = {col: null, dir: 1};
let currentDeals = [...deals];

function initDashboard() {
  document.getElementById('gen-banner').textContent =
    'Dashboard generated on 2026-06-18 — data reflects Salesforce as of that date.';

  // Populate region filter
  const regions = [...new Set(deals.map(d=>d.Region).filter(Boolean))].sort();
  const rSel = document.getElementById('f-region');
  regions.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    rSel.appendChild(opt);
  });

  renderKPIs(deals);
  renderTable(deals);
}

function renderKPIs(data) {
  const total = data.length;
  const usdACV = data.filter(d=>d.Currency==='USD').reduce((s,d)=>s+(d.ACV||0),0);
  const live = data.filter(d=>d.goLiveStatus==='Live').length;
  const delayed = data.filter(d=>d.goLiveStatus==='Delayed').length;
  const eta = data.filter(d=>d.goLiveStatus==='ETA').length;
  const tbd = data.filter(d=>d.goLiveStatus==='TBD').length;
  document.getElementById('deal-count-hdr').textContent = total + ' deals shown';
  document.getElementById('kpi-bar').innerHTML = `
    <div class="kpi"><div class="val">${total}</div><div class="lbl">Total Deals</div></div>
    <div class="kpi"><div class="val">$${(usdACV/1e6).toFixed(1)}M</div><div class="lbl">USD ACV</div></div>
    <div class="kpi live"><div class="val">${live}</div><div class="lbl">Live</div></div>
    <div class="kpi delayed"><div class="val">${delayed}</div><div class="lbl">Delayed</div></div>
    <div class="kpi eta"><div class="val">${eta}</div><div class="lbl">ETA</div></div>
    <div class="kpi tbd"><div class="val">${tbd}</div><div class="lbl">TBD</div></div>
  `;
}

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const region = document.getElementById('f-region').value;
  const hub = document.getElementById('f-hub').value;
  const golive = document.getElementById('f-golive').value;

  let filtered = deals.filter(d => {
    if (search && !d.Account.toLowerCase().includes(search) && !d.Name.toLowerCase().includes(search) && !d.groupKey.toLowerCase().includes(search)) return false;
    if (region && d.Region !== region) return false;
    if (hub && d.hub !== hub) return false;
    if (golive && d.goLiveStatus !== golive) return false;
    return true;
  });

  currentDeals = filtered;
  renderKPIs(filtered);
  renderTable(filtered);
}

function sortBy(col) {
  if (currentSort.col === col) {
    currentSort.dir *= -1;
  } else {
    currentSort.col = col;
    currentSort.dir = 1;
  }
  // Update header classes
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
  });
  const thMap = {account:0,name:1,type:2,hub:4,closeDate:5,acv:6,agents:7,region:8,golive:9,owner:10};
  const idx = thMap[col];
  if (idx !== undefined) {
    const ths = document.querySelectorAll('thead th');
    ths[idx].classList.add(currentSort.dir===1?'sorted-asc':'sorted-desc');
  }
  renderTable(currentDeals);
}

function getSortVal(d, col) {
  switch(col) {
    case 'account': return d.groupKey.toLowerCase();
    case 'name': return d.Name.toLowerCase();
    case 'type': return (d.ContractType||'').toLowerCase();
    case 'hub': return d.hub;
    case 'closeDate': return d.CloseDate;
    case 'acv': return d.ACV || 0;
    case 'agents': return d.Agents || 0;
    case 'region': return (d.Region||'').toLowerCase();
    case 'golive': return d.goLiveStatus;
    case 'owner': return (d.Owner||'').toLowerCase();
    default: return '';
  }
}

function renderTable(data) {
  const tbody = document.getElementById('table-body');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="11" class="no-results">No deals match current filters.</td></tr>`;
    return;
  }

  // Sort if needed
  let sorted = [...data];
  if (currentSort.col) {
    sorted.sort((a,b) => {
      const av = getSortVal(a, currentSort.col);
      const bv = getSortVal(b, currentSort.col);
      if (av < bv) return -currentSort.dir;
      if (av > bv) return currentSort.dir;
      return 0;
    });
  } else {
    // Default: group by TopParent, order groups by most recent close date
    const groupMap = {};
    sorted.forEach(d => {
      const k = d.groupKey;
      if (!groupMap[k]) groupMap[k] = [];
      groupMap[k].push(d);
    });
    // Sort each group by close date desc
    Object.values(groupMap).forEach(g => g.sort((a,b) => b.CloseDate.localeCompare(a.CloseDate)));
    // Sort groups by most recent close date
    const groupKeys = Object.keys(groupMap).sort((a,b) => {
      const aDate = groupMap[a][0].CloseDate;
      const bDate = groupMap[b][0].CloseDate;
      return bDate.localeCompare(aDate);
    });
    // Flatten with group rows
    const rows = [];
    groupKeys.forEach(k => {
      rows.push({isGroup: true, label: k, count: groupMap[k].length});
      groupMap[k].forEach(d => rows.push({isGroup: false, deal: d}));
    });

    let html = '';
    rows.forEach(row => {
      if (row.isGroup) {
        html += `<tr class="group-row"><td colspan="11">${row.label}<span>(${row.count} deal${row.count>1?'s':''})</span></td></tr>`;
      } else {
        html += dealRow(row.deal);
      }
    });
    tbody.innerHTML = html;
    return;
  }

  // Sorted view (flat, no groups)
  tbody.innerHTML = sorted.map(dealRow).join('');
}

function dealRow(d) {
  const hubHtml = d.hub === 'RT + Offline'
    ? `<span class="hub-both">RT + Offline</span>`
    : d.hub === 'Offline'
    ? `<span class="hub-off">Offline</span>`
    : `<span class="hub-rt">Real-Time</span>`;

  const integHtml = (d.integBadges||[]).map(b => {
    if (b === 'SmartReach') return '<span class="badge badge-sr">SmartReach</span>';
    if (b === 'Ticketing') return '<span class="badge badge-tk">Ticketing</span>';
    if (b === 'AMC') return '<span class="badge badge-amc">AMC</span>';
    return '';
  }).join('');

  const glClass = {Live:'gl-live',Delayed:'gl-delayed',ETA:'gl-eta',TBD:'gl-tbd'}[d.goLiveStatus]||'gl-tbd';
  const sfUrl = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.Id}/view`;

  return `<tr>
    <td>${d.Account}</td>
    <td><a class="deal-link" href="${sfUrl}" target="_blank">${d.Name}</a></td>
    <td>${d.ContractType||'—'}</td>
    <td>${integHtml}</td>
    <td>${hubHtml}</td>
    <td>${d.CloseDate||'—'}</td>
    <td class="acv">${fmtACV(d.ACV, d.Currency)}</td>
    <td>${d.Agents != null ? d.Agents.toLocaleString() : '—'}</td>
    <td>${d.Region||'—'}</td>
    <td><span class="${glClass}">${d.goLiveLabel}</span></td>
    <td>${d.Owner||'—'}</td>
  </tr>`;
}
