<style>
:root{--blue:#3694FC;--charcoal:#21212B;--teal:#36EAD0;--indigo:#6100FF;--coral:#FF5B8A;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f5f6f8;color:var(--charcoal);}
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate .card{background:#fff;padding:40px 44px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;width:340px;}
#gate h1{color:var(--blue);font-size:22px;margin:0 0 6px;}
#gate p{color:#666;font-size:13px;margin:0 0 22px;}
#gate input{width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:14px;}
#gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate .err{color:var(--coral);font-size:12px;height:16px;margin-top:8px;}
#app{display:none;max-width:1500px;margin:0 auto;padding:22px 26px 60px;}
header h1{font-size:24px;margin:0 0 2px;color:var(--charcoal);}
header .sub{color:#888;font-size:13px;margin-bottom:14px;}
.banner{background:#FFF4CE;border:1px solid #F2D98D;color:#7a5b00;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:18px;}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.kpi{flex:1;min-width:150px;background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kpi .lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.4px;}
.kpi .val{font-size:26px;font-weight:700;margin-top:4px;color:var(--charcoal);}
.kpi.blue .val{color:var(--blue);}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filters input,.filters select{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;}
.filters input{min-width:260px;}
.count{color:#888;font-size:13px;margin-left:auto;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:13px;}
th{background:var(--charcoal);color:#fff;text-align:left;padding:11px 12px;font-weight:600;cursor:pointer;white-space:nowrap;user-select:none;}
th:hover{background:#2d2d3a;}
th .arr{opacity:.5;font-size:10px;margin-left:3px;}
td{padding:10px 12px;border-top:1px solid #eee;vertical-align:top;}
tr.grp td{background:#eef4fe;font-weight:700;color:var(--charcoal);border-top:2px solid var(--blue);}
tbody tr:hover td{background:#fafbfd;}
a.deal{color:var(--blue);text-decoration:none;font-weight:500;}
a.deal:hover{text-decoration:underline;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.hub-rt{background:var(--blue);}.hub-off{background:var(--teal);color:#0a3d38;}.hub-both{background:var(--indigo);}
.int{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;color:#fff;margin:1px 2px 1px 0;}
.int-sr{background:#F5871F;}.int-tk{background:#8E44AD;}.int-amc{background:#27AE60;}
.st{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.st-live{background:#E3F9E5;color:#1B7A2B;}.st-delayed{background:#FDE8EC;color:#B02A45;}
.st-eta{background:#E7F0FF;color:#1E5FBF;}.st-tbd{background:#EEE;color:#777;}
.acv{font-variant-numeric:tabular-nums;white-space:nowrap;}
.muted{color:#bbb;}
</style></head><body>

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function checkPw(){const v=document.getElementById('pw').value;const h=await sha256(v);
  if(h===HASH){localStorage.setItem('ehub_ok','1');show();}
  else{document.getElementById('err').textContent='Incorrect password';}}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
function show(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';render();}
if(localStorage.getItem('ehub_ok')==='1'){show();}

const fmt=n=>'$'+Math.round(n).toLocaleString('en-US');
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let sortKey=null, sortDir=1;

function hubBadge(h){const c=h==='RT + Offline'?'hub-both':h==='Offline'?'hub-off':'hub-rt';return `<span class="badge ${c}">${h}</span>`;}
function intBadges(a){if(!a||!a.length)return '';return a.map(x=>{const c=x==='SmartReach'?'int-sr':x==='Ticketing'?'int-tk':'int-amc';return `<span class="int ${c}">${x}</span>`;}).join('');}
function stBadge(s,d){const c={Live:'st-live',Delayed:'st-delayed',ETA:'st-eta',TBD:'st-tbd'}[s];
  let t=s; if(s==='Delayed'&&d)t='Delayed → '+d; else if(s==='ETA'&&d)t='ETA '+d;
  return `<span class="st ${c}">${t}</span>`;}
function cell(r,k){switch(k){
  case 'account':return esc(r.account);
  case 'name':return `<a class="deal" target="_blank" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${r.id}/view">${esc(r.name)}</a>`;
  case 'type':return esc(r.type);
  case 'integration':return intBadges(r.integration)||'<span class="muted">—</span>';
  case 'hub':return hubBadge(r.hub);
  case 'close':return r.close||'<span class="muted">—</span>';
  case 'acv':return `<span class="acv">${r.cur==='USD'?fmt(r.acv):(r.cur+' '+Math.round(r.acv).toLocaleString())}</span>`;
  case 'agents':return r.agents!=null?r.agents:'<span class="muted">—</span>';
  case 'region':return esc(r.region);
  case 'status':return stBadge(r.status,r.status_date);
  case 'owner':return esc(r.owner);}}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  const reg=document.getElementById('fRegion').value;
  const hub=document.getElementById('fHub').value;
  const st=document.getElementById('fStatus').value;
  return DATA.rows.filter(r=>{
    if(q&&!(r.account.toLowerCase().includes(q)||r.name.toLowerCase().includes(q)))return false;
    if(reg&&r.region!==reg)return false;
    if(hub&&r.hub!==hub)return false;
    if(st&&r.status!==st)return false;
    return true;});
}
function render(){
  const tb=document.getElementById('tb');
  let rows=filtered();
  const cols=['account','name','type','integration','hub','close','acv','agents','region','status','owner'];
  let html='';
  if(sortKey){
    rows=rows.slice().sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'||sortKey==='agents'){x=+x||0;y=+y||0;return (x-y)*sortDir;}
      x=(x==null?'':(''+x)).toLowerCase();y=(y==null?'':(''+y)).toLowerCase();
      return x<y?-sortDir:x>y?sortDir:0;});
    if(!rows.length)html=`<tr><td colspan="11" style="text-align:center;color:#999;padding:26px;">No matching deals</td></tr>`;
    rows.forEach(r=>{html+='<tr>'+cols.map(k=>`<td>${cell(r,k)}</td>`).join('')+'</tr>';});
  }else{
    // grouped view
    const byGroup={};DATA.groups.forEach(g=>byGroup[g]=[]);
    rows.forEach(r=>{(byGroup[r.group]=byGroup[r.group]||[]).push(r);});
    let any=false;
    DATA.groups.forEach(g=>{const items=byGroup[g];if(!items||!items.length)return;any=true;
      html+=`<tr class="grp"><td colspan="11">${esc(g)} · ${items.length} deal${items.length>1?'s':''}</td></tr>`;
      items.forEach(r=>{html+='<tr>'+cols.map(k=>`<td>${cell(r,k)}</td>`).join('')+'</tr>';});});
    if(!any)html=`<tr><td colspan="11" style="text-align:center;color:#999;padding:26px;">No matching deals</td></tr>`;
  }
  tb.innerHTML=html;
  document.getElementById('count').textContent=rows.length+' deal'+(rows.length!==1?'s':'');
  document.querySelectorAll('th').forEach(th=>{const a=th.querySelector('.arr');
    a.textContent=(th.dataset.k===sortKey)?(sortDir>0?'▲':'▼'):'';});
}
function init(){
  document.getElementById('banner').textContent=`Dashboard generated on ${DATA.generated} — data reflects Salesforce as of that date.`;
  const k=DATA.kpi;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="lbl">Total Deals</div><div class="val">${k.total}</div></div>
    <div class="kpi blue"><div class="lbl">USD ACV</div><div class="val">${fmt(k.usd_acv)}</div></div>
    <div class="kpi"><div class="lbl">Live</div><div class="val">${k.live}</div></div>
    <div class="kpi"><div class="lbl">Delayed</div><div class="val">${k.delayed}</div></div>
    <div class="kpi"><div class="lbl">ETA</div><div class="val">${k.eta}</div></div>
    <div class="kpi"><div class="lbl">TBD</div><div class="val">${k.tbd}</div></div>`;
  const fr=document.getElementById('fRegion');DATA.regions.forEach(r=>{const o=document.createElement('option');o.textContent=r;fr.appendChild(o);});
  ['search','fRegion','fHub','fStatus'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  document.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
    const k=th.dataset.k;
    if(sortKey!==k){sortKey=k;sortDir=1;}
    else if(sortDir===1){sortDir=-1;}
    else{sortKey=null;sortDir=1;}  // third click -> grouped
    render();}));
}
init();
</script></body></html>
