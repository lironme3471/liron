const STORED_HASH = "fa34e5bac87849343e48ccec9965e86629502a7f0c7c9f1e18abaa8a2240e673";
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function checkPw(){const v=document.getElementById('pw').value;const h=await sha256(v);
  if(h===STORED_HASH){localStorage.setItem('ehub_ok','1');show();}else{document.getElementById('err').textContent='Incorrect password';}}
function show(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';render();}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(localStorage.getItem('ehub_ok')==='1'){show();}

const fmt=n=>n?('$'+Math.round(n).toLocaleString()):'$0';
let sortKey=null,sortDir=1;
function uniq(k){return [...new Set(DATA.map(d=>d[k]).filter(Boolean))].sort();}
function initFilters(){
  const reg=document.getElementById('f-region');reg.innerHTML='<option value="">All Regions</option>'+uniq('region').map(r=>`<option>${r}</option>`).join('');
  const hub=document.getElementById('f-hub');hub.innerHTML='<option value="">All Hub Types</option>'+uniq('hub').map(r=>`<option>${r}</option>`).join('');
  const gl=document.getElementById('f-gl');gl.innerHTML='<option value="">All Go-Live</option>'+['Live','Delayed','ETA','TBD'].map(r=>`<option>${r}</option>`).join('');
  ['f-search','f-region','f-hub','f-gl'].forEach(id=>document.getElementById(id).addEventListener('input',render));
}
document.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k;if(sortKey===k){sortDir*=-1;}else{sortKey=k;sortDir=1;}render();
}));
function ib(tags){const c={SmartReach:'#E8730C',Ticketing:'#8A2BE2',AMC:'#1Fa463'};
  return tags.map(t=>`<span class="ib" style="background:${c[t]||'#888'}">${t}</span>`).join('');}
function dealRow(d){
  const url=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
  return `<tr>
   <td>${d.account||'<span class=muted>&mdash;</span>'}</td>
   <td><a class="deal" target="_blank" href="${url}">${d.name}</a></td>
   <td>${d.type||'<span class=muted>&mdash;</span>'}</td>
   <td>${ib(d.integ)}</td>
   <td><span class="badge" style="background:${d.hub_color}">${d.hub}</span></td>
   <td>${d.close}</td>
   <td class="acv">${fmt(d.acv)} ${d.ccy!=='USD'?'<span class=muted>'+d.ccy+'</span>':''}</td>
   <td>${d.agents!=null?d.agents:'<span class=muted>&mdash;</span>'}</td>
   <td>${d.region||'<span class=muted>&mdash;</span>'}</td>
   <td><span class="gl ${d.golive_cat}">${d.golive}</span></td>
   <td>${d.owner||'<span class=muted>&mdash;</span>'}</td>

}
function render(){
  const q=document.getElementById('f-search').value.toLowerCase();
  const fr=document.getElementById('f-region').value,fh=document.getElementById('f-hub').value,fg=document.getElementById('f-gl').value;
  let rows=DATA.filter(d=>(!q||d.account.toLowerCase().includes(q)||d.name.toLowerCase().includes(q))
    &&(!fr||d.region===fr)&&(!fh||d.hub===fh)&&(!fg||d.golive_cat===fg));
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="11" style="text-align:center;padding:24px;color:#888">No matching deals</td></tr>';return;}
  if(sortKey){
    rows=[...rows].sort((a,b)=>{let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'||sortKey==='agents'){x=+x||0;y=+y||0;return (x-y)*sortDir;}
      if(sortKey==='integ'){x=(x||[]).join();y=(y||[]).join();}
      return String(x).localeCompare(String(y))*sortDir;});
    tb.innerHTML=rows.map(dealRow).join('');
    return;
  }
  // grouped by top parent, groups ordered by most recent close date desc
  const groups={};
  rows.forEach(d=>{(groups[d.group]=groups[d.group]||[]).push(d);});
  const order=Object.keys(groups).sort((a,b)=>{
    const ma=Math.max(...groups[a].map(d=>Date.parse(d.close)||0));
    const mb=Math.max(...groups[b].map(d=>Date.parse(d.close)||0));
    return mb-ma;});
  let h='';

    h+=ds.map(dealRow).join('');
  });
  tb.innerHTML=h;
}
