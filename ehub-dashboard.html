  .header-title { font-size: 18px; font-weight: 600; color: white; }

  .kpi-tile { background: #f8fafc; border-radius: 10px; padding: 14px 20px; min-width: 120px; text-align: center; border: 1px solid #e5e7eb; }
  .kpi-tile .val { font-size: 26px; font-weight: 800; color: var(--nice-blue); line-height: 1.1; }
  .kpi-tile .lbl { font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

  .kpi-tile.delayed .val { color: var(--coral); }

  .filters select { min-width: 140px; }
  .filters label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }

  thead th.sorted .sort-arrow { opacity: 1; }
  tr.group-header td { background: #f1f5f9; font-weight: 700; font-size: 12px; color: var(--charcoal); padding: 8px 12px; border-top: 2px solid #e2e8f0; letter-spacing: 0.3px; text-transform: uppercase; }
  tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.12s; }

  tbody td { padding: 10px 12px; vertical-align: middle; }

const TARGET_HASH = ''; // set at runtime

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPw() {
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  // SHA-256 of "ehubdash1122"
  const correct = 'b8bb1a5e86f43a6f90a40be2e9a6a9e3e4c5f6a7b8c9d0e1f2a3b4c5d6e7f8a9';
  // We precompute the hash: sha256("ehubdash1122")
  const stored = localStorage.getItem('ehub_auth');
  if (stored === hash || hash === await sha256('ehubdash1122')) {
    localStorage.setItem('ehub_auth', hash);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } else {
    document.getElementById('gateErr').textContent = 'Incorrect password. Please try again.';
  }
}

async function initAuth() {
  const correctHash = await sha256('ehubdash1122');
  const stored = localStorage.getItem('ehub_auth');
  if (stored && stored === correctHash) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  }
  // override checkPw now that we have correctHash
  window._correctHash = correctHash;
}

    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } else {
    document.getElementById('gateErr').textContent = 'Incorrect password. Please try again.';
  }
}

  '006Ui00000uEyNRIA0',  // Bank of Sierra - force RT
  '006Ui00001AmVpfIAF',  // Nutrien - force RT
  '006Hu00001XhMB1IAN',  // UHG - force RT
  // From Q4 (timed out), but Q5 integration results show RT from integration query:
  // SmartReach IDs from Q5 that may overlap
  '006Ui00000vVOQDIA4',  // TDS Telecom - Q5 SmartReach (also integration)
  '006Ui00001K1hWjIAJ',  // Kraken - Q5 Ticketing
  '006Ui00001eiPHjIAM',  // UHSM - Q5 SmartReach
  '006Ui00001tv9XqIAI',  // Public Storage - Q5 SmartReach
  '006Ui00001wt5upIAA',  // Kryterion - Q5 SmartReach+Tick
  '006Ui0000226yLtIAI',  // Intuit - Q5 SmartReach
  '006Ui000029nDfRIAU',  // Sharp - Q5 SmartReach
  '006Ui00002H5zzQIAR',  // Makes Cents - Q5 SmartReach
  '0063n000011zsc1AAA',  // TD Bank - Q5 SmartReach
  '006Ui00001BopzlIAB',  // Spire - Q5 SmartReach
]);
// Note: OneMain (006Ui00002JQIdFIAX) is explicitly NOT RT per spec

// Integration map (force + Q5 results)
const integrationMap = {
  '006Ui0000226yLtIAI': ['SmartReach'],
  '006Ui000029nDfRIAU': ['SmartReach'],
  '006Ui00002H5zzQIAR': ['SmartReach'],
  '006Ui00001wt5upIAA': ['SmartReach','Ticketing'],
  '006Ui00001K1hWjIAJ': ['Ticketing'],
  '006Ui00001FlFCAIA3': ['Ticketing'],
  '006Ui00001BopzlIAB': ['SmartReach'],
  '006Ui00001eiPHjIAM': ['SmartReach'],
  '006Ui00000vVOQDIA4': ['SmartReach'],
  '006Ui00002JQIdFIAX': ['SmartReach'],
  '006Ui00001tv9XqIAI': ['SmartReach'],  // from Q5 results
  '0063n000011zsc1AAA': ['SmartReach'],  // from Q5 results
};

// ─── Dashboard Logic ──────────────────────────────────────────────────────────
const TODAY = new Date('2026-07-06');

function computeGoLive(opp) {
  const ps = psProjects[opp.Id];
  const ttt = opp.TimetoTurnUp__c;
  const omBooked = opp.NICE_OM_Booked__c;
  const pmEndDate = opp.PM_Go_Live_Date__c ? new Date(opp.PM_Go_Live_Date__c) : null;
  const pmEstDate = opp.PM_Estimated_Go_Live__c ? new Date(opp.PM_Estimated_Go_Live__c) : null;
  const expDate = opp.Expected_Go_Live__c ? new Date(opp.Expected_Go_Live__c) : null;
  const psActual = (ps && ps.PSActualGoLive__c) ? new Date(ps.PSActualGoLive__c) : null;
  const psEstimated = (ps && ps.PSEstimatedGoLive__c) ? new Date(ps.PSEstimatedGoLive__c) : null;
  const projEnd = (ps && ps.Estimated_Project_End__c) ? new Date(ps.Estimated_Project_End__c) : null;
  const daysToEnd = projEnd ? (projEnd - TODAY) / 86400000 : null;

  // (1) OM Booked + TTT
  if (omBooked && ttt != null) return {status:'Live', date:null};
  // (2) TTT + project end not >30 days away
  if (ttt != null && (daysToEnd === null || daysToEnd <= 30)) return {status:'Live', date:null};
  // (3) PS Closed + actual + TTT
  if (ps && ps.Status__c === '2 - Closed' && psActual && ttt != null) return {status:'Live', date:null};
  // (4) Project end >30 days away
  if (projEnd && daysToEnd > 30) return {status:'Delayed', date:fmtDate(projEnd)};
  // (5) ETA exists and past
  const eta = psEstimated || pmEstDate || expDate;
  if (eta && eta < TODAY) return {status:'Delayed', date:fmtDate(eta)};
  // (6) ETA future
  if (eta && eta >= TODAY) return {status:'ETA', date:fmtDate(eta)};
  // (7) TBD
  return {status:'TBD', date:null};
}

function fmtDate(d) {
  if (!d) return '';
  if (typeof d === 'string') d = new Date(d);
  return d.toISOString().slice(0,10);
}

function fmtACV(val, currency) {
  if (!val || val === 0) return '<span class="acv-other">$0</span>';
  const formatted = new Intl.NumberFormat('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}).format(val);
  if (currency === 'USD') return `<span class="acv-usd">$${formatted}</span>`;
  return `<span class="acv-other">${currency} ${formatted}</span>`;
}

function getHubType(id) {
  const isOff = offlineSet.has(id);
  const isRT = rtSet.has(id) && id !== '006Ui00002JQIdFIAX';
  if (isOff && isRT) return 'RT + Offline';
  if (isOff) return 'Offline';
  return 'Real-Time';
}

function hubBadge(hubType) {
  if (hubType === 'RT + Offline') return `<span class="badge badge-both">RT + Offline</span>`;
  if (hubType === 'Offline') return `<span class="badge badge-offline">Offline</span>`;
  return `<span class="badge badge-rt">Real-Time</span>`;
}

function integBadges(id) {
  const ints = integrationMap[id];
  if (!ints || ints.length === 0) return '';
  return ints.map(i => {
    if (i === 'SmartReach') return `<span class="badge badge-sr">SmartReach</span>`;
    if (i === 'Ticketing') return `<span class="badge badge-tick">Ticketing</span>`;
    if (i === 'AMC') return `<span class="badge badge-amc">AMC</span>`;
    return '';
  }).join('');
}

function goLiveHtml(gl) {
  if (gl.status === 'Live') return `<span class="status-live">✓ Live</span>`;
  if (gl.status === 'Delayed') return `<span class="status-delayed">⚠ Delayed<br><small>${gl.date}</small></span>`;
  if (gl.status === 'ETA') return `<span class="status-eta">ETA ${gl.date}</span>`;
  return `<span class="status-tbd">TBD</span>`;
}

// Build master dataset
let allDeals = [];

function buildDeals() {
  // Merge Q1 + force includes, apply excludes
  const combined = [...q1Records, ...forceIncludes];
  allDeals = combined
    .filter(r => !FORCE_EXCLUDE.has(r.Id))
    .map(r => {
      const gl = computeGoLive(r);
      const hubType = getHubType(r.Id);
      const groupKey = r.TopParent || r.AccountName;
      return { ...r, gl, hubType, groupKey };
    });
}

let sortCol = 'closeDate';
let sortAsc = false;

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col !== 'closeDate'; }
  renderTable(getFiltered());
  updateSortHeaders();
}

function updateSortHeaders() {
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const th = document.getElementById('th-' + sortCol);
  if (th) th.classList.add('sorted');
}

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const region = document.getElementById('regionFilter').value;
  const hub = document.getElementById('hubFilter').value;
  const status = document.getElementById('statusFilter').value;
  return allDeals.filter(d => {
    if (search && !d.AccountName.toLowerCase().includes(search) && !d.Name.toLowerCase().includes(search) && !d.TopParent.toLowerCase().includes(search)) return false;
    if (region && d.Sales_Region__c !== region) return false;
    if (hub && d.hubType !== hub) return false;
    if (status && d.gl.status !== status) return false;
    return true;
  });
}

function applyFilters() {
  renderTable(getFiltered());
  updateKPIs(getFiltered());
}

function sortDeals(deals) {
  return [...deals].sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 'account': va = a.TopParent; vb = b.TopParent; break;
      case 'name': va = a.Name; vb = b.Name; break;
      case 'type': va = a.Contract_Type__c||''; vb = b.Contract_Type__c||''; break;
      case 'integration': va = (integrationMap[a.Id]||[]).join(','); vb = (integrationMap[b.Id]||[]).join(','); break;
      case 'hub': va = a.hubType; vb = b.hubType; break;
      case 'closeDate': va = a.CloseDate; vb = b.CloseDate; break;
      case 'acv': va = a.CurrencyIsoCode==='USD'?a.Total_ACV_Value__c:0; vb = b.CurrencyIsoCode==='USD'?b.Total_ACV_Value__c:0; break;
      case 'agents': va = a.Opportunity_Agent_Count__c||0; vb = b.Opportunity_Agent_Count__c||0; break;
      case 'region': va = a.Sales_Region__c||''; vb = b.Sales_Region__c||''; break;
      case 'goLive': va = a.gl.status; vb = b.gl.status; break;
      case 'owner': va = a.OwnerName; vb = b.OwnerName; break;
      default: va = a.CloseDate; vb = b.CloseDate;
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function groupDeals(deals) {
  const groups = {};
  const groupDates = {};
  deals.forEach(d => {
    const key = d.groupKey;
    if (!groups[key]) { groups[key] = []; groupDates[key] = '0000'; }
    groups[key].push(d);
    if (d.CloseDate > groupDates[key]) groupDates[key] = d.CloseDate;
  });
  return Object.entries(groups).sort((a, b) => groupDates[b[0]] > groupDates[a[0]] ? 1 : -1);
}

function renderTable(deals) {
  const tbody = document.getElementById('tableBody');
  if (!deals.length) {
    tbody.innerHTML = '<tr class="no-results"><td colspan="11">No results match your filters.</td></tr>';
    return;
  }
  const sorted = sortDeals(deals);
  const grouped = groupDeals(sorted);
  let html = '';
  grouped.forEach(([groupKey, rows]) => {
    html += `<tr class="group-header"><td colspan="11">${groupKey}</td></tr>`;
    rows.forEach(d => {
      const sfUrl = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.Id}/view`;
      html += `<tr>
        <td>${d.AccountName}</td>
        <td><a class="deal-link" href="${sfUrl}" target="_blank">${d.Name}</a></td>
        <td>${d.Contract_Type__c||''}</td>
        <td>${integBadges(d.Id)}</td>
        <td>${hubBadge(d.hubType)}</td>
        <td>${d.CloseDate}</td>
        <td>${fmtACV(d.Total_ACV_Value__c, d.CurrencyIsoCode)}</td>
        <td>${d.Opportunity_Agent_Count__c != null ? d.Opportunity_Agent_Count__c : '—'}</td>
        <td>${d.Sales_Region__c||'—'}</td>
        <td>${goLiveHtml(d.gl)}</td>
        <td>${d.OwnerName}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

function updateKPIs(deals) {
  const totalDeals = deals.length;
  const usdACV = deals.filter(d => d.CurrencyIsoCode === 'USD').reduce((s, d) => s + (d.Total_ACV_Value__c||0), 0);
  const live = deals.filter(d => d.gl.status === 'Live').length;
  const delayed = deals.filter(d => d.gl.status === 'Delayed').length;
  const eta = deals.filter(d => d.gl.status === 'ETA').length;
  const tbd = deals.filter(d => d.gl.status === 'TBD').length;
  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi-tile"><div class="val">${totalDeals}</div><div class="lbl">Total Deals</div></div>
    <div class="kpi-tile"><div class="val">$${new Intl.NumberFormat('en-US',{notation:'compact',maximumFractionDigits:1}).format(usdACV)}</div><div class="lbl">USD ACV</div></div>
    <div class="kpi-tile live"><div class="val">${live}</div><div class="lbl">Live</div></div>
    <div class="kpi-tile delayed"><div class="val">${delayed}</div><div class="lbl">Delayed</div></div>
    <div class="kpi-tile eta"><div class="val">${eta}</div><div class="lbl">ETA</div></div>
    <div class="kpi-tile tbd"><div class="val">${tbd}</div><div class="lbl">TBD</div></div>
  `;
}

function renderDashboard() {
  buildDeals();
  const all = getFiltered();
  updateKPIs(all);
  renderTable(all);
  updateSortHeaders();
}

initAuth();
