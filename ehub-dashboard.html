<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Closed Won Dashboard</title>
<style>
  :root{--blue:#3694FC;--charcoal:#21212B;--indigo:#6100FF;--teal:#36EAD0;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--charcoal);background:#f4f6fa;}
  /* gate */
  #gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000;}
  #gate .card{background:#fff;border-radius:14px;padding:40px 44px;width:340px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.35);}
  #gate h1{font-size:20px;margin:0 0 6px;color:var(--charcoal);}
  #gate p{font-size:13px;color:#6a6a78;margin:0 0 22px;}
  #gate input{width:100%;padding:11px 12px;border:1px solid #d4d7e0;border-radius:8px;font-size:14px;margin-bottom:14px;}
  #gate button{width:100%;padding:11px;border:0;border-radius:8px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
  #gate button:hover{background:#2a7fe0;}
  #gate .err{color:#e0245e;font-size:12px;height:16px;margin-top:8px;}
  #app{display:none;max-width:1500px;margin:0 auto;padding:22px 26px 60px;}
  header.top{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  header.top .logo{font-weight:800;font-size:22px;letter-spacing:.5px;}
  header.top .logo .ce{color:var(--blue);}
  header.top h2{font-size:17px;font-weight:600;margin:0;color:#3a3a47;}
  .banner{background:#fff7d6;border:1px solid #f1e3a0;color:#7a6a1f;border-radius:8px;padding:10px 14px;font-size:13px;margin:12px 0 18px;}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
  .kpi{background:#fff;border-radius:10px;padding:16px 14px;box-shadow:0 1px 3px rgba(20,20,40,.08);}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8a8a98;margin-bottom:6px;}
  .kpi .val{font-size:23px;font-weight:700;color:var(--charcoal);}
  .kpi.live .val{color:#22A06B;} .kpi.delayed .val{color:#e0245e;}
  .kpi.eta .val{color:var(--blue);} .kpi.tbd .val{color:#8a8a98;}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:center;}
  .controls input,.controls select{padding:9px 11px;border:1px solid #d4d7e0;border-radius:8px;font-size:13px;background:#fff;}
  .controls input[type=text]{min-width:240px;flex:1;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(20,20,40,.08);font-size:13px;}
  thead th{background:var(--charcoal);color:#fff;text-align:left;padding:11px 10px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;user-select:none;}
  thead th:hover{background:#2c2c3a;}
  thead th .arr{opacity:.55;font-size:10px;margin-left:3px;}
  tbody td{padding:9px 10px;border-bottom:1px solid #eef0f5;vertical-align:top;}
  tbody tr:hover{background:#f7f9fd;}
  tr.group td{background:#eef2fb;font-weight:700;color:var(--charcoal);font-size:13px;border-top:2px solid #dde4f5;}
  tr.group .gcount{font-weight:500;color:#6a6a78;font-size:12px;margin-left:8px;}
  a.deal{color:var(--blue);text-decoration:none;font-weight:500;}
  a.deal:hover{text-decoration:underline;}
  .badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
  .ibadge{display:inline-block;padding:2px 8px;border-radius:11px;font-size:10px;font-weight:600;color:#fff;margin-right:4px;}
  .gl{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap;}
  .gl.live{background:#e3f6ec;color:#1c8a5b;}
  .gl.delayed{background:#fde4ec;color:#c81e54;}
  .gl.eta{background:#e7f1ff;color:#2a7fe0;}
  .gl.tbd{background:#eceef3;color:#7a7a88;}
  .acv{font-variant-numeric:tabular-nums;white-space:nowrap;}
  .muted{color:#9a9aa8;}
  .nores td{text-align:center;padding:30px;color:#9a9aa8;}
  td.right{text-align:right;}
  .count{font-size:12px;color:#6a6a78;margin:10px 2px 0;}
</style>
</head>

  <div class="count" id="count"></div>
  <table>
    <thead><tr id="head"></tr></thead>
    <tbody id="body"></tbody>
  </table>
</div>

// ---- password gate (SHA-256 + localStorage) ----
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function tryUnlock(v){const h=await sha256(v);if(h===PW_HASH){localStorage.setItem('ehub_ok',PW_HASH);showApp();return true;}return false;}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';render();}
document.getElementById('pwbtn').onclick=async()=>{const ok=await tryUnlock(document.getElementById('pw').value);if(!ok)document.getElementById('pwerr').textContent='Incorrect password';};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwbtn').click();});
if(localStorage.getItem('ehub_ok')===PW_HASH){showApp();}

// ---- columns ----
const COLS=[
 {k:'account',t:'Account'},{k:'deal',t:'Deal Name'},{k:'type',t:'Type'},
 {k:'integ',t:'Integration'},{k:'hub',t:'Hub'},{k:'close',t:'Close Date'},
 {k:'acv',t:'ACV'},{k:'agents',t:'Agents'},{k:'region',t:'Region'},
 {k:'golive',t:'Go-Live'},{k:'owner',t:'Owner'}
];
let sortKey=null,sortDir=1;

function fmtACV(r){if(r.acv==null)return '';const n=Math.round(r.acv).toLocaleString('en-US');return (r.ccy||'')+' '+n;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function buildHead(){
  const h=document.getElementById('head');h.innerHTML='';
  COLS.forEach(c=>{const th=document.createElement('th');th.textContent=c.t;
    const a=document.createElement('span');a.className='arr';a.textContent=(sortKey===c.k)?(sortDir>0?'▲':'▼'):'';
    th.appendChild(a);
    th.onclick=()=>{if(sortKey===c.k){sortDir=-sortDir;}else{sortKey=c.k;sortDir=1;}render();};
    h.appendChild(th);});
}

function dealCells(r){
  const integ=(r.integ||[]).map(n=>`<span class="ibadge" style="background:${DATA.integColors[n]||'#888'}">${esc(n)}</span>`).join('')||'<span class="muted">—</span>';
  const hub=`<span class="badge" style="background:${r.hub_color}">${esc(r.hub)}</span>`;
  const link=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${r.id}/view`;
  const agents=(r.agents==null||r.agents==='')?'<span class="muted">—</span>':Number(r.agents).toLocaleString('en-US');
  return [
    esc(r.account),
    `<a class="deal" href="${link}" target="_blank" rel="noopener">${esc(r.deal)}</a>`,
    esc(r.type)||'<span class="muted">—</span>',
    integ, hub, esc(r.close),
    `<span class="acv">${esc(fmtACV(r))}</span>`,
    `<span class="acv">${agents}</span>`,
    esc(r.region),
    `<span class="gl ${r.golive_class}">${esc(r.golive)}</span>`,
    esc(r.owner)
  ];
}

function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const fr=document.getElementById('fRegion').value;
  const fh=document.getElementById('fHub').value;
  const fg=document.getElementById('fGL').value;
  return DATA.rows.filter(r=>{
    if(q && !((r.account||'').toLowerCase().includes(q)||(r.deal||'').toLowerCase().includes(q)))return false;
    if(fr && r.region!==fr)return false;
    if(fh && r.hub!==fh)return false;
    if(fg){const lab=(r.golive||'');const cls=r.golive_class;
      const m={'Live':'live','Delayed':'delayed','ETA':'eta','TBD':'tbd'}[fg];
      if(cls!==m)return false;}
    return true;
  });
}

function render(){
  buildHead();
  const body=document.getElementById('body');body.innerHTML='';
  let data=applyFilters();
  const accounts=new Set(data.map(r=>r.group));

  if(sortKey){
    const dir=sortDir;
    data=data.slice().sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'||sortKey==='agents'){x=Number(x)||0;y=Number(y)||0;return (x-y)*dir;}
      if(sortKey==='integ'){x=(a.integ||[]).join(',');y=(b.integ||[]).join(',');}
      x=(x==null?'':String(x)).toLowerCase();y=(y==null?'':String(y)).toLowerCase();
      return x<y?-1*dir:x>y?1*dir:0;
    });
    if(data.length===0){body.innerHTML=`<tr class="nores"><td colspan="11">No deals match the current filters.</td></tr>`;updateCount(0,0);return;}
    data.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=dealCells(r).map(c=>`<td>${c}</td>`).join('');body.appendChild(tr);});
  }else{
    // grouped view, group order by most-recent close desc
    const groups=DATA.groupOrder.filter(g=>accounts.has(g));
    if(groups.length===0){body.innerHTML=`<tr class="nores"><td colspan="11">No deals match the current filters.</td></tr>`;updateCount(0,0);return;}
    groups.forEach(g=>{
      const gr=data.filter(r=>r.group===g).sort((a,b)=>b.close<a.close?-1:b.close>a.close?1:0);
      if(!gr.length)return;
      const tot=gr.reduce((s,r)=>s+(r.ccy==='USD'?(r.acv||0):0),0);
      const totLabel=tot?(' · USD '+Math.round(tot).toLocaleString('en-US')):'';
      const hr=document.createElement('tr');hr.className='group';
      hr.innerHTML=`<td colspan="11">${esc(g)}<span class="gcount">${gr.length} deal${gr.length>1?'s':''}${totLabel}</span></td>`;
      body.appendChild(hr);
      gr.forEach(r=>{const tr=document.createElement('tr');tr.innerHTML=dealCells(r).map(c=>`<td>${c}</td>`).join('');body.appendChild(tr);});
    });
  }
  updateCount(data.length,accounts.size);
}

function updateCount(n,m){document.getElementById('count').textContent=`${n} deal${n!==1?'s':''} · ${m} account${m!==1?'s':''}`;}

function initKPIs(){
  const k=DATA.kpis;
  const tiles=[
    {l:'Total Deals',v:k.total,c:''},
    {l:'USD ACV',v:'$'+Math.round(k.usd).toLocaleString('en-US'),c:''},
    {l:'Live',v:k.live,c:'live'},
    {l:'Delayed',v:k.delayed,c:'delayed'},
    {l:'ETA',v:k.eta,c:'eta'},
    {l:'TBD',v:k.tbd,c:'tbd'},
  ];
  document.getElementById('kpis').innerHTML=tiles.map(t=>`<div class="kpi ${t.c}"><div class="label">${t.l}</div><div class="val">${t.v}</div></div>`).join('');
}
function initFilters(){
  const fr=document.getElementById('fRegion');DATA.regions.forEach(r=>fr.innerHTML+=`<option>${esc(r)}</option>`);
  const fh=document.getElementById('fHub');DATA.hubTypes.forEach(r=>fh.innerHTML+=`<option>${esc(r)}</option>`);
  const fg=document.getElementById('fGL');DATA.glStatuses.forEach(r=>fg.innerHTML+=`<option>${esc(r)}</option>`);
  ['search','fRegion','fHub','fGL'].forEach(id=>document.getElementById(id).addEventListener('input',render));
}
document.getElementById('banner').textContent=`Dashboard generated on ${DATA.today} — data reflects Salesforce as of that date.`;
initKPIs();initFilters();
</script>
