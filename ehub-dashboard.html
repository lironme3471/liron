<style>
:root{--blue:#3694FC;--charcoal:#21212B;--indigo:#6100FF;--teal:#36EAD0;--coral:#FF5B8A;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Be Vietnam Pro',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--charcoal);background:#f4f6fa;}
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000;}
#gate .card{background:#fff;border-radius:16px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
#gate h1{font-size:20px;margin:0 0 6px;color:var(--charcoal);}
#gate p{font-size:13px;color:#666;margin:0 0 22px;}
#gate input{width:100%;padding:11px 13px;border:1px solid #ccd;border-radius:8px;font-size:14px;margin-bottom:14px;}
#gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
#gate .err{color:var(--coral);font-size:12px;height:14px;margin-bottom:6px;}
header{background:var(--charcoal);color:#fff;padding:18px 26px;display:flex;align-items:center;gap:14px;}
header .logo{font-weight:800;font-size:22px;letter-spacing:.5px;color:var(--blue);}
header .sub{font-size:13px;opacity:.8;}
.banner{background:#FFF4C2;color:#6b5800;padding:9px 26px;font-size:13px;border-bottom:1px solid #f0e08a;}
.kpis{display:flex;gap:14px;padding:18px 26px;flex-wrap:wrap;}
.kpi{background:#fff;border-radius:12px;padding:14px 18px;min-width:120px;flex:1;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.kpi .v{font-size:24px;font-weight:700;}
.kpi .l{font-size:12px;color:#777;margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.controls{display:flex;gap:12px;padding:0 26px 14px;flex-wrap:wrap;align-items:center;}
.controls input,.controls select{padding:9px 12px;border:1px solid #cfd6e4;border-radius:8px;font-size:13px;background:#fff;}
.controls input[type=text]{min-width:230px;}
.count{font-size:13px;color:#555;margin-left:auto;}
.wrap{padding:0 26px 40px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #eef1f6;}
th{background:var(--charcoal);color:#fff;cursor:pointer;user-select:none;white-space:nowrap;font-weight:600;}
th:hover{background:#2c2c3a;}
th .ar{font-size:10px;margin-left:3px;opacity:.85;}
tr.group td{background:#eef3fb;font-weight:700;color:var(--charcoal);font-size:13px;}
td.acv{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
td.ag{text-align:right;}
a.deal{color:var(--blue);text-decoration:none;font-weight:500;}
a.deal:hover{text-decoration:underline;}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.ib{display:inline-block;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:700;color:#fff;margin-right:3px;}
.gl{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap;}
.gl.Live{background:#e3f7ec;color:#107a3e;}
.gl.Delayed{background:#fde3ea;color:#b3133e;}
.gl.ETA{background:#e5effe;color:#1763c7;}
.gl.TBD{background:#eceef3;color:#666;}
.nores td{text-align:center;color:#888;padding:24px;}
</style></head>

const PW_HASH = "fa34e5bac87849343e48ccec9965e86629502a7f0c7c9f1e18abaa8a2240e673";
const COLS = [
 {k:"acct",t:"Account"},{k:"name",t:"Deal Name"},{k:"ctype",t:"Type"},{k:"integ",t:"Integration"},
 {k:"hub",t:"Hub"},{k:"close",t:"Close Date"},{k:"acv",t:"ACV"},{k:"agents",t:"Agents"},
 {k:"region",t:"Region"},{k:"glLabel",t:"Go-Live"},{k:"owner",t:"Owner"}
];
let sortKey=null, sortDir=1;

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
 return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function checkPw(){const v=document.getElementById('gpw').value;const h=await sha256(v);
 if(h===PW_HASH){localStorage.setItem('ehub_ok','1');showApp();}else{document.getElementById('gerr').textContent='Incorrect password';}}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('gpw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(localStorage.getItem('ehub_ok')==='1'){showApp();}

function fmtMoney(v,c){return (c||'USD')+' '+Math.round(v).toLocaleString('en-US');}
function integBadges(arr){const col={SmartReach:'#FF8A00',Ticketing:'#8B5CF6',AMC:'#22A55B'};
 return (arr||[]).map(x=>`<span class="ib" style="background:${col[x]||'#999'}">${x}</span>`).join('')||'';}

function init(){
 document.getElementById('banner').textContent=`Dashboard generated on ${DATA.generated} — data reflects Salesforce as of that date.`;
 const k=DATA.kpi;
 document.getElementById('kpis').innerHTML=[
  ['Total Deals',k.total],['USD ACV','USD '+Math.round(k.usdAcv).toLocaleString('en-US')],
  ['Live',k.live],['Delayed',k.delayed],['ETA',k.eta],['TBD',k.tbd]
 ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
 const fr=document.getElementById('fRegion');
 DATA.regions.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;fr.appendChild(o);});
 const hdr=document.getElementById('hdr');
 hdr.innerHTML=COLS.map(c=>`<th data-k="${c.k}">${c.t}<span class="ar" id="ar-${c.k}"></span></th>`).join('');
 hdr.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{const kk=th.dataset.k;
  if(sortKey===kk){sortDir*=-1;}else{sortKey=kk;sortDir=1;}render();}));
 render();
}

function passFilter(d){
 const q=document.getElementById('search').value.toLowerCase();
 const reg=document.getElementById('fRegion').value, hb=document.getElementById('fHub').value, gl=document.getElementById('fGL').value;
 if(q && !(d.acct.toLowerCase().includes(q)||d.name.toLowerCase().includes(q))) return false;
 if(reg && d.region!==reg) return false;
 if(hb && d.hub!==hb) return false;
 if(gl && d.glStatus!==gl) return false;
 return true;
}
function cell(d,k){
 if(k==='name') return `<a class="deal" target="_blank" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view">${esc(d.name)}</a>`;
 if(k==='acv') return fmtMoney(d.acv,d.cur);
 if(k==='hub') return `<span class="badge" style="background:${d.hubColor}">${d.hub}</span>`;
 if(k==='integ') return integBadges(d.integ);
 if(k==='glLabel') return `<span class="gl ${d.glStatus}">${esc(d.glLabel)}</span>`;
 if(k==='agents') return d.agents==null?'—':d.agents.toLocaleString('en-US');
 return esc(d[k]==null?'':String(d[k]));
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
 const tb=document.getElementById('tbody');tb.innerHTML='';
 COLS.forEach(c=>document.getElementById('ar-'+c.k).textContent = sortKey===c.k?(sortDir>0?'▲':'▼'):'');
 let nDeals=0, nGroups=0;
 if(sortKey){
  let flat=[];DATA.groups.forEach(g=>g.deals.forEach(d=>flat.push(d)));
  flat=flat.filter(passFilter);
  flat.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];
   if(sortKey==='acv'||sortKey==='agents'){x=x==null?-1:x;y=y==null?-1:y;return (x-y)*sortDir;}
   x=(x==null?'':String(x)).toLowerCase();y=(y==null?'':String(y)).toLowerCase();
   return x<y?-1*sortDir:x>y?1*sortDir:0;});
  nDeals=flat.length;nGroups=new Set(flat.map(d=>d.group)).size;
  flat.forEach(d=>tb.appendChild(rowFor(d,true)));
  if(!flat.length) tb.innerHTML=`<tr class="nores"><td colspan="11">No matching deals</td></tr>`;
 } else {
  DATA.groups.forEach(g=>{
   const rows=g.deals.filter(passFilter);
   if(!rows.length) return;
   nGroups++;nDeals+=rows.length;
   const tot=rows.reduce((s,d)=>s+(d.cur==='USD'?d.acv:0),0);
   const gtr=document.createElement('tr');gtr.className='group';
   gtr.innerHTML=`<td colspan="11">${esc(g.group)} &nbsp;&middot;&nbsp; ${rows.length} deal${rows.length>1?'s':''} &nbsp;&middot;&nbsp; USD ${Math.round(tot).toLocaleString('en-US')}</td>`;
   tb.appendChild(gtr);
   rows.forEach(d=>tb.appendChild(rowFor(d,false)));
  });
  if(!nDeals) tb.innerHTML=`<tr class="nores"><td colspan="11">No matching deals</td></tr>`;
 }
 document.getElementById('count').textContent=`${nDeals} deal${nDeals!==1?'s':''} · ${nGroups} account${nGroups!==1?'s':''}`;
}
function rowFor(d,showAcct){
 const tr=document.createElement('tr');
 tr.innerHTML=COLS.map(c=>{
   const cls=c.k==='acv'?' class="acv"':(c.k==='agents'?' class="ag"':'');
   return `<td${cls}>${cell(d,c.k)}</td>`;
 }).join('');
 return tr;
}
