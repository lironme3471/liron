:root{--blue:#3694FC;--charcoal:#21212B;--indigo:#6100FF;--teal:#36EAD0;--coral:#FF5B8A;}

#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000;}

#app{display:none;}
header{background:var(--charcoal);color:#fff;padding:18px 26px;}
header h1{margin:0;font-size:22px;}
header h1 span{color:var(--blue);}
.banner{background:#FFF6D6;border-left:5px solid #E8C300;color:#7a6500;padding:10px 18px;font-size:13px;}
.kpis{display:flex;flex-wrap:wrap;gap:14px;padding:20px 26px;}
.kpi{background:#fff;border-radius:12px;padding:14px 20px;min-width:120px;box-shadow:0 2px 8px rgba(0,0,0,.06);flex:1;}
.kpi .v{font-size:26px;font-weight:700;color:var(--charcoal);}
.kpi .l{font-size:12px;color:#777;text-transform:uppercase;letter-spacing:.5px;}
.kpi.live .v{color:#1a9e54;}.kpi.delayed .v{color:var(--coral);}.kpi.eta .v{color:var(--blue);}.kpi.tbd .v{color:#888;}
.controls{display:flex;flex-wrap:wrap;gap:12px;padding:0 26px 16px;}
.controls input,.controls select{padding:9px 12px;border:1px solid #ccd;border-radius:8px;font-size:13px;}
.controls input{flex:1;min-width:200px;}
.tablewrap{padding:0 26px 40px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #eef;}
th{background:var(--charcoal);color:#fff;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;}
th:hover{background:#33333f;}
tr.group td{background:#eaf2ff;font-weight:700;color:var(--charcoal);font-size:13px;}
td.acv{text-align:right;font-variant-numeric:tabular-nums;}
a.deal{color:var(--blue);text-decoration:none;}a.deal:hover{text-decoration:underline;}
.badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;}
.hub-rtoff{background:var(--indigo);}.hub-off{background:var(--teal);color:#0a3b35;}.hub-rt{background:var(--blue);}
.int{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;margin-right:3px;}
.int-sr{background:#FF8A00;}.int-tk{background:#9B51E0;}.int-amc{background:#27AE60;}
.gl{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;}
.gl-Live{background:#dff5e8;color:#1a9e54;}.gl-Delayed{background:#ffe1ea;color:#c81e5b;}
.gl-ETA{background:#e3f0ff;color:#1d6fd6;}.gl-TBD{background:#eee;color:#777;}
.sort-ind{font-size:10px;margin-left:3px;}

var PW_HASH = "fa34e5bac87849343e48ccec9965e86629502a7f0c7c9f1e18abaa8a2240e673";
var sortCol = null, sortDir = 1;

async function sha256(s){
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  var v = document.getElementById('pw').value;
  var h = await sha256(v);
  if(h === PW_HASH){
    localStorage.setItem('ehub_ok','1');
    showApp();
  } else {
    document.getElementById('gerr').textContent = 'Incorrect password';
  }
}
function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  initFilters(); render();
}
if(localStorage.getItem('ehub_ok')==='1'){ window.addEventListener('DOMContentLoaded', showApp); }

function fmtMoney(v,c){
  return (c||'') + ' ' + Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
}
function hubClass(h){ return h==='RT + Offline'?'hub-rtoff':(h==='Offline'?'hub-off':'hub-rt'); }
function intBadges(arr){
  if(!arr||!arr.length) return '';
  return arr.map(function(n){
    var cls = n==='SmartReach'?'int-sr':(n==='Ticketing'?'int-tk':'int-amc');
    return '<span class="int '+cls+'">'+n+'</span>';
  }).join('');
}
function initFilters(){
  var regs={}, hubs={}, gls={};
  DEALS.forEach(function(d){ if(d.region)regs[d.region]=1; hubs[d.hub]=1; gls[d.golive_cat]=1; });
  fill('fRegion',Object.keys(regs).sort());
  fill('fHub',Object.keys(hubs).sort());
  fill('fGL',Object.keys(gls).sort());
}
function fill(id,arr){
  var s=document.getElementById(id);
  arr.forEach(function(v){ var o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
}
function sortBy(c){
  if(sortCol===c){ sortDir*=-1; } else { sortCol=c; sortDir=1; }
  render();
}
function getFiltered(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var fr=document.getElementById('fRegion').value;
  var fh=document.getElementById('fHub').value;
  var fg=document.getElementById('fGL').value;
  return DEALS.filter(function(d){
    if(q && (d.account.toLowerCase().indexOf(q)<0 && d.name.toLowerCase().indexOf(q)<0)) return false;
    if(fr && d.region!==fr) return false;
    if(fh && d.hub!==fh) return false;
    if(fg && d.golive_cat!==fg) return false;
    return true;
  });
}
function dealRow(d, showAcct){
  var link='https://niceincontact.lightning.force.com/lightning/r/Opportunity/'+d.id+'/view';
  return '<tr>'+
    '<td>'+(showAcct?esc(d.account):'')+'</td>'+
    '<td><a class="deal" target="_blank" href="'+link+'">'+esc(d.name)+'</a></td>'+
    '<td>'+esc(d.type)+'</td>'+
    '<td>'+intBadges(d.integration)+'</td>'+
    '<td><span class="badge '+hubClass(d.hub)+'">'+d.hub+'</span></td>'+
    '<td>'+d.close+'</td>'+
    '<td class="acv">'+fmtMoney(d.acv,d.currency)+'</td>'+
    '<td>'+(d.agents==null?'':d.agents)+'</td>'+
    '<td>'+esc(d.region)+'</td>'+
    '<td><span class="gl gl-'+d.golive_cat+'">'+esc(d.golive_label)+'</span></td>'+
    '<td>'+esc(d.owner)+'</td>'+
  '</tr>';
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

function render(){
  var rows=getFiltered();
  var tb=document.getElementById('tbody');
  document.querySelectorAll('.sort-ind').forEach(function(e){e.textContent='';});
  if(sortCol){
    var ind=document.querySelector('.sort-ind[data-c="'+sortCol+'"]');
    if(ind) ind.textContent = sortDir>0?'▲':'▼';
    var sc=sortCol;
    rows=rows.slice().sort(function(a,b){
      var va=a[sc], vb=b[sc];
      if(sc==='integration'){ va=(va||[]).join(','); vb=(vb||[]).join(','); }
      if(sc==='acv'||sc==='agents'){ va=Number(va)||0; vb=Number(vb)||0; return (va-vb)*sortDir; }
      va=(va==null?'':String(va)).toLowerCase(); vb=(vb==null?'':String(vb)).toLowerCase();
      return (va<vb?-1:va>vb?1:0)*sortDir;
    });
    if(!rows.length){ tb.innerHTML='<tr><td colspan="11" style="text-align:center;padding:24px;color:#999;">No deals match your filters.</td></tr>'; return; }
    tb.innerHTML=rows.map(function(d){return dealRow(d,true);}).join('');
    return;
  }
  // grouped view
  var groups={};
  rows.forEach(function(d){ (groups[d.group]=groups[d.group]||[]).push(d); });
  var gnames=Object.keys(groups);
  // order groups by most recent close date desc
  gnames.sort(function(a,b){
    var ma=Math.max.apply(null,groups[a].map(function(d){return new Date(d.close).getTime()||0;}));
    var mb=Math.max.apply(null,groups[b].map(function(d){return new Date(d.close).getTime()||0;}));
    return mb-ma;
  });
  if(!gnames.length){ tb.innerHTML='<tr><td colspan="11" style="text-align:center;padding:24px;color:#999;">No deals match your filters.</td></tr>'; return; }
  var html='';
  gnames.forEach(function(g){
    var ds=groups[g].slice().sort(function(a,b){return new Date(b.close)-new Date(a.close);});
    var usd=ds.filter(function(d){return d.currency==='USD';}).reduce(function(s,d){return s+d.acv;},0);
    html+='<tr class="group"><td colspan="11">'+esc(g)+' &nbsp;&middot;&nbsp; '+ds.length+' deal'+(ds.length>1?'s':'')+
          ' &nbsp;&middot;&nbsp; USD '+Number(usd).toLocaleString('en-US',{maximumFractionDigits:0})+'</td></tr>';
    html+=ds.map(function(d){return dealRow(d,false);}).join('');
  });
  tb.innerHTML=html;
}
