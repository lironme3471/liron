<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Closed Won Dashboard</title>
<style>
  :root {
    --nice-blue: #3694FC;
    --charcoal: #21212B;
    --indigo: #6100FF;
    --teal: #36EAD0;
    --coral: #FF5B8A;
    --bg: #f4f6fb;
    --card-bg: #fff;
    --border: #dde2ee;
    --text: #21212B;
    --muted: #6b7280;
    --yellow-banner: #FFF3CD;
    --yellow-border: #FFC107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  #gate-overlay {
    position: fixed; inset: 0; background: var(--charcoal);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .gate-box {
    background: #fff; border-radius: 12px; padding: 40px; max-width: 360px; width: 100%;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .gate-box h2 { color: var(--charcoal); margin-bottom: 8px; font-size: 1.4rem; }
  .gate-box p { color: var(--muted); margin-bottom: 24px; font-size: 0.9rem; }
  .gate-box input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 1rem; margin-bottom: 12px; outline: none;
  }
  .gate-box input:focus { border-color: var(--nice-blue); }
  .gate-box button {
    width: 100%; padding: 10px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600;
  }
  .gate-box button:hover { background: #2680e0; }
  .gate-error { color: #dc2626; font-size: 0.85rem; margin-top: 8px; }
  .gate-logo { font-size: 1.8rem; font-weight: 800; color: var(--nice-blue); margin-bottom: 16px; letter-spacing: -1px; }

  #app { display: none; }

  header {
    background: var(--charcoal); color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
  .header-logo span { color: var(--nice-blue); }
  .header-sub { font-size: 0.85rem; color: #9ca3af; }

  .banner {
    background: var(--yellow-banner); border-bottom: 2px solid var(--yellow-border);
    padding: 10px 24px; font-size: 0.88rem; color: #856404; font-weight: 500;
  }

  .kpi-bar {
    display: flex; gap: 12px; padding: 16px 24px; background: var(--card-bg);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .kpi-tile {
    flex: 1; min-width: 100px; background: var(--bg); border-radius: 8px;
    padding: 12px 16px; text-align: center; border: 1px solid var(--border);
  }
  .kpi-tile .val { font-size: 1.6rem; font-weight: 800; color: var(--charcoal); }
  .kpi-tile .lbl { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .kpi-tile.live .val { color: #16a34a; }
  .kpi-tile.delayed .val { color: #dc2626; }
  .kpi-tile.eta .val { color: #d97706; }
  .kpi-tile.tbd .val { color: var(--muted); }

  .filters {
    padding: 12px 24px; background: var(--card-bg);
    border-bottom: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .filters input, .filters select {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 0.88rem; outline: none; background: #fff; color: var(--text);
  }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); }
  .filters input { flex: 1; min-width: 200px; }
  .filter-label { font-size: 0.8rem; color: var(--muted); margin-right: 4px; }

  .table-wrap { padding: 16px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 1000px; }
  th {
    background: var(--charcoal); color: #fff; padding: 10px 8px; text-align: left;
    white-space: nowrap; cursor: pointer; user-select: none; font-weight: 600; font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  th:hover { background: #333340; }
  th .sort-arrow { opacity: 0.4; margin-left: 4px; font-size: 0.7rem; }
  th.sorted .sort-arrow { opacity: 1; }
  td { padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #f8faff; }
  .group-header td {
    background: #eef3fb; font-weight: 700; color: var(--charcoal);
    font-size: 0.82rem; padding: 7px 8px; letter-spacing: 0.3px;
    border-top: 2px solid var(--border);
  }
  .group-header td .deal-count {
    font-weight: 400; color: var(--muted); font-size: 0.78rem; margin-left: 6px;
  }
  .deal-link { color: var(--nice-blue); text-decoration: none; font-weight: 600; }
  .deal-link:hover { text-decoration: underline; }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700; white-space: nowrap; margin: 1px;
  }
  .hub-rt { background: rgba(54,148,252,0.15); color: var(--nice-blue); }
  .hub-offline { background: rgba(54,234,208,0.2); color: #0d7a6e; }
  .hub-both { background: rgba(97,0,255,0.12); color: var(--indigo); }
  .int-sr { background: rgba(251,146,60,0.15); color: #c2410c; }
  .int-tk { background: rgba(139,92,246,0.15); color: #7c3aed; }
  .int-amc { background: rgba(22,163,74,0.15); color: #15803d; }

  .go-live-live { color: #16a34a; font-weight: 700; }
  .go-live-delayed { color: #dc2626; font-weight: 600; }
  .go-live-eta { color: #d97706; font-weight: 600; }
  .go-live-tbd { color: var(--muted); }

  .acv-cell { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .agents-cell { text-align: right; }

  .no-results { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.9rem; }
  .result-count { font-size: 0.8rem; color: var(--muted); margin-left: auto; padding: 8px 24px; }

  @media (max-width: 768px) {
    .kpi-bar { gap: 8px; }
    .table-wrap { padding: 8px 8px; }
  }
</style>
</head>

<!-- Password Gate -->
<div id="gate-overlay">
  <div class="gate-box">
    <div class="gate-logo">NiCE</div>
    <h2>eHub Dashboard</h2>
    <p>Enter password to access this dashboard</p>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Access Dashboard</button>
    <div class="gate-error" id="gate-err"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div>
      <div class="header-logo"><span>NiCE</span> eHub Closed Won</div>
      <div class="header-sub">Engagement Hub — Salesforce Pipeline</div>
    </div>
  </header>

  <div class="banner" id="gen-banner"></div>

  <div class="kpi-bar" id="kpi-bar"></div>

  <div class="filters">
    <span class="filter-label">Filter:</span>
    <input type="text" id="search-input" placeholder="Search account or deal name…" oninput="renderTable()">
    <select id="region-filter" onchange="renderTable()">
      <option value="">All Regions</option>
      <option value="Americas">Americas</option>
      <option value="International">International</option>
      <option value="EMEA">EMEA</option>
    </select>
    <select id="hub-filter" onchange="renderTable()">
      <option value="">All Hub Types</option>
      <option value="Real-Time">Real-Time</option>
      <option value="Offline">Offline</option>
      <option value="RT + Offline">RT + Offline</option>
    </select>
    <select id="status-filter" onchange="renderTable()">
      <option value="">All Go-Live Status</option>
      <option value="Live">Live</option>
      <option value="Delayed">Delayed</option>
      <option value="ETA">ETA</option>
      <option value="TBD">TBD</option>
    </select>
  </div>

  <div class="result-count" id="result-count"></div>
  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th onclick="sortBy('parent')" id="th-parent">Account <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('name')" id="th-name">Deal Name <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('contractType')" id="th-contractType">Type <span class="sort-arrow">↕</span></th>
          <th>Integration</th>
          <th onclick="sortBy('hub')" id="th-hub">Hub <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('closeDate')" id="th-closeDate">Close Date <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('acv')" id="th-acv">ACV <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('agents')" id="th-agents">Agents <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('region')" id="th-region">Region <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('goLiveSort')" id="th-goLiveSort">Go-Live <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('owner')" id="th-owner">Owner <span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

const LS_AUTH = 'ehub_auth_v2';

async function tryLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const enc = new TextEncoder().encode(pwd);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hash === STORED_HASH) {
    localStorage.setItem(LS_AUTH, '1');
    document.getElementById('gate-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('gate-err').textContent = 'Incorrect password. Please try again.';
  }
}

window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem(LS_AUTH) === '1') {
    document.getElementById('gate-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
});

// ── COMPUTE DERIVED FIELDS ─────────────────────────────────────────────────
function computeGoLive(d) {
  const [id,name,acct,parent,country,owner,region,closeDate,acv,cur,agents,ctype,
         omBooked,ttt,expectedGL,pmGL,pmEstGL,
         psStatus,psActualGL,psEstGL,psProjectEnd,
         isOffline,isRT,integrations] = d;

  // Step 1
  if (omBooked && ttt !== null) return 'Live';
  // Step 2
  if (ttt !== null) {
    const endDiff = daysDiff(psProjectEnd);
    if (endDiff === null || endDiff <= 30) return 'Live';
  }
  // Step 3
  if (psStatus === '2 - Closed' && psActualGL && ttt !== null) return 'Live';

  // ETA
  const eta = psEstGL || pmEstGL || expectedGL;
  const etaDiff = daysDiff(eta);

  // Step 4
  const endDiff2 = daysDiff(psProjectEnd);
  if (endDiff2 !== null && endDiff2 > 30) return 'Delayed ' + fmtDate(psProjectEnd);

  // Step 5
  if (eta && etaDiff !== null && etaDiff <= 0) return 'Delayed ' + fmtDate(eta);
  // Step 6
  if (eta && etaDiff !== null && etaDiff > 0) return 'ETA ' + fmtDate(eta);
  // Step 7
  return 'TBD';
}

function computeHub(isOffline, isRT) {
  if (isOffline && isRT) return 'RT + Offline';
  if (isOffline) return 'Offline';
  return 'Real-Time';
}

function fmtACV(acv, cur) {
  if (acv === 0) return '—';
  const sym = {USD:'$', GBP:'£', CAD:'CA$', AUD:'A$'}[cur] || cur + ' ';
  const val = acv >= 1000000
    ? sym + (acv/1000000).toFixed(2) + 'M'
    : sym + Math.round(acv).toLocaleString();
  return val;
}

// Build enriched deals
const deals = RAW.map(r => {
  const [id,name,acct,parent,country,owner,region,closeDate,acv,cur,agents,ctype,
         omBooked,ttt,expectedGL,pmGL,pmEstGL,
         psStatus,psActualGL,psEstGL,psProjectEnd,
         isOffline,isRT,integrations] = r;
  const goLiveRaw = computeGoLive(r);
  const hub = computeHub(isOffline, isRT);
  const goLiveStatus = goLiveRaw.startsWith('Live') ? 'Live'
    : goLiveRaw.startsWith('Delayed') ? 'Delayed'
    : goLiveRaw.startsWith('ETA') ? 'ETA' : 'TBD';
  // Sort key for go-live
  let goLiveSort = goLiveRaw === 'TBD' ? '9999-99-99'
    : goLiveRaw.startsWith('Live') ? '0000-00-00'
    : goLiveRaw.replace('Delayed ','').replace('ETA ','');
  return { id, name, acct, parent, country, owner, region, closeDate, acv, cur,
    agents, ctype, hub, goLive: goLiveRaw, goLiveStatus, goLiveSort, integrations,
    avcFmt: fmtACV(acv, cur) };
});

// ── KPIs ───────────────────────────────────────────────────────────────────
function initKPIs() {
  const usdACV = deals.filter(d=>d.cur==='USD').reduce((s,d)=>s+d.acv,0);
  const live = deals.filter(d=>d.goLiveStatus==='Live').length;
  const delayed = deals.filter(d=>d.goLiveStatus==='Delayed').length;
  const eta = deals.filter(d=>d.goLiveStatus==='ETA').length;
  const tbd = deals.filter(d=>d.goLiveStatus==='TBD').length;

  function fmt(v) {
    if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
    return '$' + Math.round(v/1000) + 'K';
  }
  const kpis = [
    {val: deals.length, lbl: 'Total Deals', cls:''},
    {val: fmt(usdACV), lbl: 'USD ACV', cls:''},
    {val: live, lbl: 'Live', cls:'live'},
    {val: delayed, lbl: 'Delayed', cls:'delayed'},
    {val: eta, lbl: 'ETA', cls:'eta'},
    {val: tbd, lbl: 'TBD', cls:'tbd'},
  ];
  document.getElementById('kpi-bar').innerHTML = kpis.map(k =>
    `<div class="kpi-tile ${k.cls}"><div class="val">${k.val}</div><div class="lbl">${k.lbl}</div></div>`
  ).join('');
}

// ── TABLE ──────────────────────────────────────────────────────────────────
let sortCol = 'closeDate', sortDir = -1;

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  // Update headers
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  const thEl = document.getElementById('th-' + col);
  if (thEl) {
    thEl.classList.add('sorted');
    thEl.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
  }
  renderTable();
}

function getFilteredDeals() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const region = document.getElementById('region-filter').value;
  const hub = document.getElementById('hub-filter').value;
  const status = document.getElementById('status-filter').value;

  return deals.filter(d => {
    if (search && !d.acct.toLowerCase().includes(search) && !d.name.toLowerCase().includes(search)
        && !d.parent.toLowerCase().includes(search)) return false;
    if (region && d.region !== region) return false;
    if (hub && d.hub !== hub) return false;
    if (status && d.goLiveStatus !== status) return false;
    return true;
  });
}

function renderTable() {
  const filtered = getFilteredDeals();
  document.getElementById('result-count').textContent = `Showing ${filtered.length} of ${deals.length} deals`;

  // Sort
  const sorted = [...filtered].sort((a,b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    if (sortCol === 'acv' || sortCol === 'agents') {
      va = va === null ? -1 : va;
      vb = vb === null ? -1 : vb;
      return sortDir * (va - vb);
    }
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return sortDir * va.localeCompare(vb);
  });

  // Group by parent
  const groupMap = {};
  sorted.forEach(d => {
    const g = d.parent || d.acct;
    if (!groupMap[g]) groupMap[g] = [];
    groupMap[g].push(d);
  });
  // Sort groups by most recent close date desc
  const groups = Object.entries(groupMap).map(([g, ds]) => ({
    name: g, deals: ds,
    maxDate: ds.reduce((m,d) => d.closeDate > m ? d.closeDate : m, '0000')
  })).sort((a,b) => b.maxDate.localeCompare(a.maxDate));

  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11" class="no-results">No deals match current filters.</td></tr>`;
    return;
  }

  let html = '';
  groups.forEach(({name, deals: gDeals}) => {
    html += `<tr class="group-header"><td colspan="11">
      ${name}<span class="deal-count">(${gDeals.length} deal${gDeals.length>1?'s':''})</span>
    </td></tr>`;
    gDeals.forEach(d => {
      // Hub badge
      const hubCls = d.hub === 'RT + Offline' ? 'hub-both' : d.hub === 'Offline' ? 'hub-offline' : 'hub-rt';
      const hubBadge = `<span class="badge ${hubCls}">${d.hub}</span>`;
      // Integration badges
      const intBadges = d.integrations.map(i => {
        const cls = i === 'SmartReach' ? 'int-sr' : i === 'Ticketing' ? 'int-tk' : 'int-amc';
        return `<span class="badge ${cls}">${i}</span>`;
      }).join('');
      // Go-Live
      const glCls = d.goLiveStatus === 'Live' ? 'go-live-live'
        : d.goLiveStatus === 'Delayed' ? 'go-live-delayed'
        : d.goLiveStatus === 'ETA' ? 'go-live-eta' : 'go-live-tbd';
      const sfUrl = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
      html += `<tr>
        <td>${d.acct}</td>
        <td><a href="${sfUrl}" class="deal-link" target="_blank">${d.name}</a></td>
        <td>${d.ctype || '—'}</td>
        <td>${intBadges || '—'}</td>
        <td>${hubBadge}</td>
        <td>${d.closeDate}</td>
        <td class="acv-cell">${d.avcFmt}</td>
        <td class="agents-cell">${d.agents !== null ? d.agents.toLocaleString() : '—'}</td>
        <td>${d.region || '—'}</td>
        <td class="${glCls}">${d.goLive}</td>
        <td>${d.owner}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

function init() {
  document.getElementById('gen-banner').textContent =
    '⚠ Dashboard generated on 2026-07-16 — data reflects Salesforce as of that date.';
  initKPIs();
  sortBy('closeDate');
}
</script>
