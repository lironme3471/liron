const STATS = {"total": 42, "usdAcv": 9497858.380000003, "live": 19, "delayed": 16, "eta": 3, "tbd": 4, "genDate": "2026-06-13"};
const COLS = [
 {k:"account",t:"Account"},{k:"name",t:"Deal Name"},{k:"type",t:"Type"},
 {k:"integration",t:"Integration"},{k:"hub",t:"Hub"},{k:"closeDate",t:"Close Date"},
 {k:"acv",t:"ACV"},{k:"agents",t:"Agents"},{k:"region",t:"Region"},
 {k:"goLive",t:"Go-Live"},{k:"owner",t:"Owner"}
];
const INTEG_COLOR={SmartReach:"#FF8A3D",Ticketing:"#8B5CF6",AMC:"#22A06B"};
let sortKey="closeDate",sortDir=-1;

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
 return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
const HASH="fa34e5bac87849343e48ccec9965e86629502a7f0c7c9f1e18abaa8a2240e673";
async function checkPw(){const v=document.getElementById('gpw').value;
 const h=await sha256(v); if(h===HASH){localStorage.setItem('ehub_auth',h);show();}
 else{document.getElementById('gerr').textContent='Incorrect password';}}
function show(){document.getElementById('gate').classList.add('hidden');
 document.getElementById('app').classList.remove('hidden');init();}
document.getElementById('gpw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(localStorage.getItem('ehub_auth')===HASH){show();}

function fmtAcv(r){if(r.acv==null)return'';const n=Math.round(r.acv).toLocaleString('en-US');
 return (r.currency==='USD'?'$':'')+n+(r.currency!=='USD'?' '+r.currency:'');}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function init(){
 document.getElementById('banner').textContent=
  'Dashboard generated on '+STATS.genDate+' — data reflects Salesforce as of that date.';
 document.getElementById('kpis').innerHTML=[
  ['Total Deals',STATS.total],
  ['USD ACV','$'+Math.round(STATS.usdAcv).toLocaleString('en-US')],
  ['Live',STATS.live],['Delayed',STATS.delayed],['ETA',STATS.eta],['TBD',STATS.tbd]
 ].map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');
 fillSel('fRegion','Region',[...new Set(DATA.map(d=>d.region).filter(Boolean))].sort());
 fillSel('fHub','Hub',[...new Set(DATA.map(d=>d.hub))].sort());
 fillSel('fGL','Go-Live',[...new Set(DATA.map(d=>d.goLiveStatus))].sort());
 document.getElementById('head').innerHTML=COLS.map(c=>`<th onclick="setSort('${c.k}')">${c.t}</th>`).join('');
 render();
}
function fillSel(id,label,opts){document.getElementById(id).innerHTML=
 `<option value="">All ${label}</option>`+opts.map(o=>`<option>${esc(o)}</option>`).join('');}
function setSort(k){if(sortKey===k)sortDir=-sortDir;else{sortKey=k;sortDir=1;}render();}

function render(){
 const q=document.getElementById('search').value.toLowerCase();
 const fr=document.getElementById('fRegion').value;
 const fh=document.getElementById('fHub').value;
 const fg=document.getElementById('fGL').value;
 let rows=DATA.filter(d=>{
  if(q&&!(d.account.toLowerCase().includes(q)||d.name.toLowerCase().includes(q)))return false;
  if(fr&&d.region!==fr)return false;
  if(fh&&d.hub!==fh)return false;
  if(fg&&d.goLiveStatus!==fg)return false;
  return true;});
 // group ordering by latest close date desc
 const latest={};rows.forEach(d=>{if(!(d.group in latest)||d.closeDate>latest[d.group])latest[d.group]=d.closeDate;});
 const groups=[...new Set(rows.map(d=>d.group))].sort((a,b)=>latest[b]<latest[a]?-1:1);
 const cmp=(a,b)=>{let x=a[sortKey],y=b[sortKey];
  if(sortKey==='acv'||sortKey==='agents'){x=x==null?-Infinity:x;y=y==null?-Infinity:y;return (x-y)*sortDir;}
  x=(x==null?'':String(x)).toLowerCase();y=(y==null?'':String(y)).toLowerCase();
  return (x<y?-1:x>y?1:0)*sortDir;};
 const body=document.getElementById('body');
 if(!rows.length){body.innerHTML=`<tr><td colspan="11" style="text-align:center;color:#999;padding:30px">No matching deals</td></tr>`;return;}
 let h='';
 for(const g of groups){
  const grp=rows.filter(d=>d.group===g).sort(cmp);
  h+=`<tr class="group"><td colspan="11">${esc(g)} &nbsp;<span style="font-weight:400;color:#666">(${grp.length})</span></td></tr>`;
  for(const d of grp){
   const ib=d.integration.map(i=>`<span class="badge ib" style="background:${INTEG_COLOR[i]||'#999'}">${esc(i)}</span>`).join('');
   h+=`<tr>
    <td>${esc(d.account)}</td>
    <td><a href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${esc(d.name)}</a></td>
    <td>${esc(d.type)}</td>
    <td>${ib}</td>
    <td><span class="badge" style="background:${d.hubColor}">${esc(d.hub)}</span></td>
    <td>${esc(d.closeDate)}</td>
    <td class="num">${fmtAcv(d)}</td>
    <td class="num">${d.agents==null?'':d.agents}</td>
    <td>${esc(d.region)}</td>
    <td class="gl ${d.goLiveStatus}">${esc(d.goLive)}</td>
    <td>${esc(d.owner)}</td></tr>`;
  }
 }
 body.innerHTML=h;
}
