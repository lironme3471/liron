<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Closed Won Dashboard</title>
<style>
  :root{
    --blue:#3694FC; --charcoal:#21212B; --indigo:#6100FF; --teal:#36EAD0;
    --orange:#FF8A3D; --purple:#8B5CF6; --green:#22B07D; --coral:#FF5B8A;
    --bg:#F4F6FA; --card:#FFFFFF; --line:#E3E8F0; --muted:#6B7280;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Be Vietnam Pro","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
       background:var(--bg);color:var(--charcoal);}
  /* ---- password gate ---- */
  #gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;
        justify-content:center;z-index:1000;}
  #gate .card{background:#fff;padding:40px 36px;border-radius:14px;width:340px;text-align:center;
              box-shadow:0 20px 60px rgba(0,0,0,.35);}
  #gate h1{margin:0 0 4px;font-size:20px;color:var(--charcoal);}
  #gate p{margin:0 0 20px;font-size:13px;color:var(--muted);}
  #gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;
              font-size:14px;margin-bottom:12px;}
  #gate button{width:100%;padding:11px;border:0;border-radius:8px;background:var(--blue);
               color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
  #gate button:hover{background:#2079e0;}
  #gate .err{color:var(--coral);font-size:12px;height:16px;margin-bottom:6px;}
  .logo{font-weight:800;font-size:26px;letter-spacing:-1px;color:var(--blue);margin-bottom:14px;}
  .logo span{color:var(--charcoal);}
  /* ---- layout ---- */
  #app{display:none;max-width:1500px;margin:0 auto;padding:22px 26px 60px;}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
  header.top h2{margin:0;font-size:22px;}
  header.top .sub{font-size:13px;color:var(--muted);}
  .banner{background:#FFF7DB;border:1px solid #F2DE8A;color:#7A5C00;padding:10px 14px;
          border-radius:8px;font-size:13px;margin:12px 0 18px;}
  /* ---- KPI tiles ---- */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .kpi .val{font-size:24px;font-weight:700;margin-top:4px;}
  .kpi.live .val{color:var(--green);}
  .kpi.delayed .val{color:var(--coral);}
  .kpi.eta .val{color:var(--blue);}
  .kpi.tbd .val{color:var(--muted);}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr);}}
  /* ---- filters ---- */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .filters input,.filters select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;
                                  font-size:13px;background:#fff;}
  .filters input{min-width:240px;flex:1;}
  .filters .count{font-size:13px;color:var(--muted);margin-left:auto;}
  /* ---- table ---- */
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:#F0F3F9;text-align:left;padding:11px 12px;font-size:11px;text-transform:uppercase;
           letter-spacing:.4px;color:#43506b;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--line);}
  thead th:hover{background:#E6ECF7;}
  thead th .arr{color:var(--blue);font-size:10px;}
  td{padding:10px 12px;border-bottom:1px solid #EEF1F6;vertical-align:top;}
  tr.group td{background:var(--charcoal);color:#fff;font-weight:600;font-size:12px;text-transform:uppercase;
              letter-spacing:.5px;padding:9px 12px;}
  tr.group td .gc{font-weight:400;color:#A9B2C9;text-transform:none;margin-left:8px;}
  tr.deal:hover{background:#F7F9FD;}
  a.deal-link{color:var(--blue);text-decoration:none;font-weight:600;}
  a.deal-link:hover{text-decoration:underline;}
  .acct-cell{color:var(--charcoal);font-weight:600;}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
  .ib{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;color:#fff;margin-right:4px;}
  .ib.sr{background:var(--orange);} .ib.tk{background:var(--purple);} .ib.amc{background:var(--green);}
  .gl{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
  .gl.live{background:#E3F6EE;color:#117a52;} .gl.delayed{background:#FFE6EC;color:#b4234a;}
  .gl.eta{background:#E5F0FE;color:#1565c0;} .gl.tbd{background:#EEF1F6;color:#5a6478;}
  .noresult td{padding:26px;text-align:center;color:var(--muted);}
  footer{margin-top:18px;font-size:11px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <div class="logo">Ni<span>CE</span></div>
    <h1>eHub Dashboard</h1>
    <p>Engagement Hub — Closed Won</p>
    <div class="err" id="err"></div>
    <input id="pw" type="password" placeholder="Password" autofocus
           onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Access Dashboard</button>
  </div>
</div>

<div id="app">
  <header class="top">
    <div>
      <h2>eHub Closed Won Dashboard</h2>
      <div class="sub">Engagement Hub opportunities · grouped by parent account</div>
    </div>
    <div class="logo" style="margin:0;font-size:22px;">Ni<span>CE</span></div>
  </header>
  <div class="banner" id="banner"></div>

  <div class="kpis" id="kpis"></div>

  <div class="filters">
    <input id="search" placeholder="Search account or deal name…" oninput="apply()">
    <select id="region" onchange="apply()"></select>
    <select id="hub" onchange="apply()"></select>
    <select id="status" onchange="apply()"></select>
    <div class="count" id="count"></div>
  </div>

  <div class="tablewrap">
    <table>
      <thead><tr id="hrow"></tr></thead>
      <tbody id="body"></tbody>
    </table>
  </div>
  <footer id="foot"></footer>
</div>

async function checkPw(){
  const v = document.getElementById('pw').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hex === PWHASH){
    localStorage.setItem('ehub_auth', PWHASH);
    showApp();
  } else {
    document.getElementById('err').textContent = 'Incorrect password';
    document.getElementById('pw').value = '';
  }
}

function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}

// columns: Account | Deal Name | Type | Integration | Hub | Close Date | ACV | Agents | Region | Go-Live | Owner
const COLS = [
  {key:'account', label:'Account'},
  {key:'name', label:'Deal Name'},
  {key:'type', label:'Type'},
  {key:'integration', label:'Integration'},
  {key:'hub_label', label:'Hub'},
  {key:'close', label:'Close Date'},
  {key:'acv', label:'ACV', num:true},
  {key:'agents', label:'Agents', num:true},
  {key:'region', label:'Region'},
  {key:'golive', label:'Go-Live'},
  {key:'owner', label:'Owner'},
];
let sortKey=null, sortDir=1;

function fmtMoney(v,cur){
  if(v==null) return '';
  const s = Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
  return (cur && cur!=='USD' ? cur+' ' : '$') + s;
}

function integHtml(arr){
  if(!arr || !arr.length) return '';
  const map={SmartReach:'sr',Ticketing:'tk',AMC:'amc'};
  const sh={SmartReach:'SmartReach',Ticketing:'Ticketing',AMC:'AMC'};
  return arr.map(x=>`<span class="ib ${map[x]||''}">${sh[x]||x}</span>`).join('');
}

function init(){
  document.getElementById('banner').textContent =
    `Dashboard generated on ${DATA.gen_date} — data reflects Salesforce as of that date.`;
  // KPI tiles
  const k = DATA.kpis;
  const tiles = [
    {label:'Total Deals', val:k.total, cls:''},
    {label:'USD ACV', val:'$'+Number(k.usd_acv).toLocaleString('en-US',{maximumFractionDigits:0}), cls:''},
    {label:'Live', val:k.live, cls:'live'},
    {label:'Delayed', val:k.delayed, cls:'delayed'},
    {label:'ETA', val:k.eta, cls:'eta'},
    {label:'TBD', val:k.tbd, cls:'tbd'},
  ];
  document.getElementById('kpis').innerHTML = tiles.map(t=>
    `<div class="kpi ${t.cls}"><div class="label">${t.label}</div><div class="val">${t.val}</div></div>`).join('');
  // header row
  document.getElementById('hrow').innerHTML = COLS.map(c=>
    `<th onclick="sortBy('${c.key}')" class="${c.num?'num':''}">${c.label} <span class="arr" id="arr_${c.key}"></span></th>`).join('');
  // filter dropdowns
  fill('region','Region', uniq(r=>r.region));
  fill('hub','Hub Type', uniq(r=>r.hub_label));
  fill('status','Go-Live', uniq(r=>r.golive_class).map(c=>({v:c,t:({live:'Live',delayed:'Delayed',eta:'ETA',tbd:'TBD'})[c]||c})));
  document.getElementById('foot').textContent =
    `${DATA.rows.length} eHub Closed Won opportunities · NiCE Professional Services`;
  apply();
}

function uniq(fn){
  const s=new Set(); DATA.rows.forEach(r=>{const v=fn(r); if(v) s.add(v);});
  return Array.from(s).sort();
}
function fill(id,label,vals){
  const el=document.getElementById(id);
  let opts=`<option value="">All ${label}</option>`;
  vals.forEach(v=>{ if(typeof v==='object') opts+=`<option value="${v.v}">${v.t}</option>`;
                    else opts+=`<option value="${v}">${v}</option>`; });
  el.innerHTML=opts;
}

function sortBy(key){
  if(sortKey===key){ sortDir*=-1; } else { sortKey=key; sortDir=1; }
  COLS.forEach(c=>document.getElementById('arr_'+c.key).textContent='');
  document.getElementById('arr_'+key).textContent = sortDir>0?'▲':'▼';
  apply();
}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  const reg=document.getElementById('region').value;
  const hub=document.getElementById('hub').value;
  const st=document.getElementById('status').value;
  return DATA.rows.filter(r=>{
    if(q && !((r.account||'').toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q))) return false;
    if(reg && r.region!==reg) return false;
    if(hub && r.hub_label!==hub) return false;
    if(st && r.golive_class!==st) return false;
    return true;
  });
}

function cmp(a,b,key){
  let x=a[key], y=b[key];
  if(key==='acv'||key==='agents'){ x=x==null?-1:Number(x); y=y==null?-1:Number(y); return (x-y)*sortDir; }
  if(key==='integration'){ x=(x||[]).join(','); y=(y||[]).join(','); }
  x=(x==null?'':String(x)).toLowerCase(); y=(y==null?'':String(y)).toLowerCase();
  return (x<y?-1:x>y?1:0)*sortDir;
}

function rowHtml(r, showAcct){
  const tds=[];
  tds.push(`<td class="acct-cell">${showAcct? esc(r.account):''}</td>`);
  tds.push(`<td><a class="deal-link" target="_blank" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${r.id}/view">${esc(r.name)}</a></td>`);
  tds.push(`<td>${esc(r.type)}</td>`);
  tds.push(`<td>${integHtml(r.integration)}</td>`);
  tds.push(`<td><span class="badge" style="background:${r.hub_color}">${r.hub_label}</span></td>`);
  tds.push(`<td>${r.close}</td>`);
  tds.push(`<td class="num">${fmtMoney(r.acv,r.currency)}</td>`);
  tds.push(`<td class="num">${r.agents==null?'':Number(r.agents).toLocaleString('en-US')}</td>`);
  tds.push(`<td>${esc(r.region)}</td>`);
  tds.push(`<td><span class="gl ${r.golive_class}">${esc(r.golive)}</span></td>`);
  tds.push(`<td>${esc(r.owner)}</td>`);
  return `<tr class="deal">${tds.join('')}</tr>`;
}

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function apply(){
  const rows=filtered();
  const body=document.getElementById('body');
  const nAcct=new Set(rows.map(r=>r.group)).size;
  document.getElementById('count').textContent = `${rows.length} deals · ${nAcct} accounts`;

  if(!rows.length){
    body.innerHTML = `<tr class="noresult"><td colspan="11">No deals match the current filters.</td></tr>`;
    return;
  }

  if(sortKey){
    // flat sorted list, show account on every row
    const sorted=rows.slice().sort((a,b)=>cmp(a,b,sortKey));
    body.innerHTML = sorted.map(r=>rowHtml(r,true)).join('');
    return;
  }

  // grouped view: order groups by most recent close date desc
  const groups={};
  rows.forEach(r=>{ (groups[r.group]=groups[r.group]||[]).push(r); });
  const order=Object.keys(groups).sort((a,b)=>{
    const ma=Math.max(...groups[a].map(r=>Date.parse(r.close||'1970-01-01')));
    const mb=Math.max(...groups[b].map(r=>Date.parse(r.close||'1970-01-01')));
    return mb-ma;
  });
  let html='';
  order.forEach(g=>{
    const gr=groups[g].slice().sort((a,b)=>Date.parse(b.close||'1970-01-01')-Date.parse(a.close||'1970-01-01'));
    const usd=gr.filter(r=>r.currency==='USD').reduce((s,r)=>s+(r.acv||0),0);
    html += `<tr class="group"><td colspan="11">${esc(g)}<span class="gc">${gr.length} deal${gr.length>1?'s':''} · USD ACV $${usd.toLocaleString('en-US',{maximumFractionDigits:0})}</span></td></tr>`;
    gr.forEach(r=>{ html += rowHtml(r,false); });
  });
  body.innerHTML=html;
}

// auto-unlock if previously authenticated
if(localStorage.getItem('ehub_auth')===PWHASH){ showApp(); }
