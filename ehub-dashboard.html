        function checkPassword() {
            const pwd = document.getElementById('passwordInput').value;
            const hash = CryptoJS.SHA256(pwd).toString().toUpperCase();
            if (hash === PASSWORD_HASH) {
                localStorage.setItem('ehubAccess', 'true');
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                renderDashboard();
            } else {
                alert('Incorrect password');
                document.getElementById('passwordInput').value = '';
            }
        }
        
        function getGoLiveStatus(deal) {
            const now = new Date();
            
            if (deal.nice_om_booked || deal.time_to_turnup) {
                return {label: 'Live', type: 'Live'};
            }
            
            if (!deal.eta) {
                return {label: 'TBD', type: 'TBD'};
            }
            
            const etaDate = new Date(deal.eta);
            const daysUntil = Math.floor((etaDate - now) / (1000 * 60 * 60 * 24));
            
            if (daysUntil > 30) {
                return {label: 'ETA ' + formatDate(deal.eta), type: 'ETA'};
            } else {
                return {label: 'Delayed ' + formatDate(deal.eta), type: 'Delayed'};
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00Z');
            const m = d.getUTCMonth() + 1;
            const day = d.getUTCDate();
            const y = d.getUTCFullYear().toString().slice(-2);
            return m + '/' + day + '/' + y;
        }
        
        function renderDashboard() {

            populateFilters();
        }

                    if (status.type === 'Live') live++;

            const kpis = [
                {label: 'Total Deals', value: totalDeals},
                {label: 'USD ACV', value: '$' + usdAcv.toLocaleString('en-US', {maximumFractionDigits: 0})},
                {label: 'Live', value: live},
                {label: 'Delayed', value: delayed},
                {label: 'ETA', value: eta},
                {label: 'TBD', value: tbd}
            ];
            
            document.getElementById('kpiSection').innerHTML = kpis.map(k =>
                `<div class="kpi-tile"><div class="label">${k.label}</div><div class="value">${k.value}</div></div>`
            ).join('');
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            let html = '';
            
            for (const [parent, deals] of Object.entries(DATA)) {
                html += `<tr class="group-header"><td colspan="11">${parent}</td></tr>`;
                
                deals.forEach(deal => {
                    const hub = HUB_TYPES[deal.id] || 'Real-Time';
                    const integ = INTEGRATIONS[deal.id] || [];
                    const badges = integ.map(i =>
                        `<span class="integration integration-${i.toLowerCase()}">${i}</span>`
                    ).join('');
                    
                    const hubClass = hub === 'RT + Offline' ? 'badge-hybrid' :
                                    hub === 'Offline' ? 'badge-offline' : 'badge-rt';
                    
                    const status = getGoLiveStatus(deal);
                    
                    html += `
                    <tr>
                        <td>${deal.account}</td>
                        <td><a href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${deal.id}/view" target="_blank">${deal.name}</a></td>
                        <td>${deal.type || '—'}</td>
                        <td>${badges || '—'}</td>
                        <td><span class="badge ${hubClass}">${hub}</span></td>
                        <td>${formatDate(deal.close_date)}</td>
                        <td>${deal.currency === 'USD' ? '$' + deal.acv.toLocaleString('en-US', {maximumFractionDigits: 0}) : deal.acv || '—'}</td>
                        <td>${deal.agents !== null && deal.agents !== undefined ? deal.agents : '—'}</td>
                        <td>${deal.region || '—'}</td>
                        <td>${status.label}</td>
                        <td>${deal.owner || '—'}</td>
                    </tr>`;
                });
            }
            
            tbody.innerHTML = html || '<tr><td colspan="11" class="no-results">No deals found</td></tr>';
        }
        
        function populateFilters() {
            const regions = new Set();
            for (const [parent, deals] of Object.entries(DATA)) {
                deals.forEach(deal => {
                    if (deal.region) regions.add(deal.region);
                });
            }
            const regionSelect = document.getElementById('regionFilter');
            [...regions].sort().forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                regionSelect.appendChild(opt);
            });
        }
        
        window.addEventListener('load', () => {
            if (localStorage.getItem('ehubAccess') === 'true') {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('dashboard').classList.add('active');
                renderDashboard();
            }
            
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkPassword();
            });
        });
    </script>
</body>
</html>
