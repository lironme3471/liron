.kpi{background:#f4f6fa;border-radius:8px;padding:12px 18px;text-align:center;min-width:110px;flex:1}
.kpi-val{font-size:1.6rem;font-weight:700;color:#21212B}

th.sorted-asc::after{content:' ↑'}
th.sorted-desc::after{content:' ↓'}

tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8f9ff}

</div>

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

}

function computeGoLive(d){
  const today=new Date(TODAY);
  const plus30=new Date(today);plus30.setDate(today.getDate()+30);
  const projEnd=d.ps.projEnd?new Date(d.ps.projEnd):null;
  // ETA = PSEstimatedGoLive → PM_Estimated_Go_Live__c → Expected_Go_Live__c
  const etaStr=d.ps.estGl||d.pmEst||d.expectedGl;
  const eta=etaStr?new Date(etaStr):null;
  // Rule 1
  if(d.omBooked && d.ttt!=null) return {status:'Live',label:'Live'};
  // Rule 2
  if(d.ttt!=null){
    const notBeyond30=!projEnd||(projEnd<=plus30);
    if(notBeyond30) return {status:'Live',label:'Live'};
  }
  // Rule 3
  if(d.ps.status==='2 - Closed' && d.ps.actualGl && d.ttt!=null) return {status:'Live',label:'Live'};
  // Rule 4
  if(projEnd && projEnd>plus30) return {status:'Delayed',label:'Delayed '+d.ps.projEnd};
  // Rule 5
  if(eta && eta<=today) return {status:'Delayed',label:'Delayed '+etaStr};
  // Rule 6
  if(eta && eta>today) return {status:'ETA',label:'ETA '+etaStr};
  // Rule 7
  return {status:'TBD',label:'TBD'};
}

function fmtACV(d){
  if(d.acv===0) return '<span style="color:#999">$0</span>';
  const s=d.currency==='USD'?'$':d.currency==='GBP'?'£':d.currency==='CAD'?'CA$':'A$';
  return s+d.acv.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}

function hubBadge(h){
  if(h==='RT + Offline') return '<span class="hub-badge hub-both">RT + Offline</span>';
  if(h==='Offline') return '<span class="hub-badge hub-offline">Offline</span>';
  return '<span class="hub-badge hub-rt">Real-Time</span>';
}

function intBadges(arr){
  return arr.map(i=>{
    const cls=i==='SmartReach'?'badge-smartreach':i==='Ticketing'?'badge-ticketing':'badge-amc';
    return `<span class="badge ${cls}">${i}</span>`;
  }).join('');
}

let sortCol=-1,sortDir=1;

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=1;}
  document.querySelectorAll('th').forEach((t,i)=>{
    t.classList.remove('sorted-asc','sorted-desc');
    if(i===col) t.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  });
  renderTable();
}

function applyFilters(){renderTable();}

function getFiltered(){
  const search=document.getElementById('f-search').value.toLowerCase();
  const region=document.getElementById('f-region').value;
  const hub=document.getElementById('f-hub').value;
  const golive=document.getElementById('f-golive').value;
  return DEALS.filter(d=>{
    const gl=computeGoLive(d);
    if(search && !d.account.toLowerCase().includes(search) && !d.name.toLowerCase().includes(search) && !d.parent.toLowerCase().includes(search)) return false;
    if(region && d.region!==region) return false;
    if(hub && d.hub!==hub) return false;
    if(golive && gl.status!==golive) return false;
    return true;
  });
}

function renderTable(){
  const filtered=getFiltered();
  // Group by parent
  const groups={};
  filtered.forEach(d=>{
    const g=d.parent||d.account;
    if(!groups[g]) groups[g]={deals:[],maxDate:''};
    groups[g].deals.push(d);
    if(d.closeDate>groups[g].maxDate) groups[g].maxDate=d.closeDate;
  });
  // Sort groups by maxDate desc
  let groupKeys=Object.keys(groups).sort((a,b)=>groups[b].maxDate.localeCompare(groups[a].maxDate));
  // Sort within groups if sortCol set
  groupKeys.forEach(g=>{
    if(sortCol>=0){
      groups[g].deals.sort((a,b)=>{
        let va,vb;
        const ga=computeGoLive(a),gb=computeGoLive(b);
        switch(sortCol){
          case 0:va=a.account;vb=b.account;break;
          case 1:va=a.name;vb=b.name;break;
          case 2:va=a.type||'';vb=b.type||'';break;
          case 3:va=a.integration.join('');vb=b.integration.join('');break;
          case 4:va=a.hub;vb=b.hub;break;
          case 5:va=a.closeDate;vb=b.closeDate;break;
          case 6:va=a.currency==='USD'?a.acv:0;vb=b.currency==='USD'?b.acv:0;break;
          case 7:va=a.agents||0;vb=b.agents||0;break;
          case 8:va=a.region||'';vb=b.region||'';break;
          case 9:va=ga.status;vb=gb.status;break;
          case 10:va=a.owner;vb=b.owner;break;
        }
        if(va<vb) return -sortDir; if(va>vb) return sortDir; return 0;
      });
    }
  });
  const tbody=document.getElementById('tbody');
  if(filtered.length===0){
    tbody.innerHTML='<tr class="no-results"><td colspan="11">No deals match the current filters.</td></tr>';
    return;
  }
  let html='';
  groupKeys.forEach(g=>{
    const grp=groups[g];
    html+=`<tr class="group-row"><td colspan="11">${g} <span style="font-weight:400;font-size:.8rem;color:#555">(${grp.deals.length} deal${grp.deals.length>1?'s':''})</span></td></tr>`;
    grp.deals.forEach(d=>{
      const gl=computeGoLive(d);
      const glCls=gl.status.toLowerCase();
      html+=`<tr>
        <td>${d.account}</td>
        <td><a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${d.name}</a></td>
        <td style="white-space:nowrap;font-size:.8rem">${d.type||'—'}</td>
        <td>${intBadges(d.integration)||'—'}</td>
        <td>${hubBadge(d.hub)}</td>
        <td style="white-space:nowrap">${d.closeDate}</td>
        <td class="acv-cell">${fmtACV(d)}<span style="font-size:.7rem;color:#999;margin-left:3px">${d.currency!=='USD'?d.currency:''}</span></td>
        <td>${d.agents!=null?d.agents:'—'}</td>
        <td>${d.region||'—'}</td>
        <td class="go-live ${glCls}">${gl.label}</td>
        <td style="white-space:nowrap;font-size:.82rem">${d.owner}</td>
      </tr>`;
    });
  });
  tbody.innerHTML=html;
}

function updateKPIs(deals){
  const total=deals.length;
  let usdACV=0,live=0,delayed=0,eta=0,tbd=0;
  deals.forEach(d=>{
    const gl=computeGoLive(d);
    if(d.currency==='USD') usdACV+=d.acv;
    if(gl.status==='Live') live++;
    else if(gl.status==='Delayed') delayed++;
    else if(gl.status==='ETA') eta++;
    else tbd++;
  });
  const fmt=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v.toFixed(0);
  document.getElementById('kpi-bar').innerHTML=`
    <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-label">Total Deals</div></div>
    <div class="kpi acv"><div class="kpi-val">$${fmt(usdACV)}</div><div class="kpi-label">USD ACV</div></div>
    <div class="kpi live"><div class="kpi-val">${live}</div><div class="kpi-label">Live</div></div>
    <div class="kpi delayed"><div class="kpi-val">${delayed}</div><div class="kpi-label">Delayed</div></div>
    <div class="kpi eta"><div class="kpi-val">${eta}</div><div class="kpi-label">ETA</div></div>
    <div class="kpi tbd"><div class="kpi-val">${tbd}</div><div class="kpi-label">TBD</div></div>
  `;
}

function populateRegionFilter(){
  const regions=[...new Set(DEALS.map(d=>d.region).filter(Boolean))].sort();
  const sel=document.getElementById('f-region');
  regions.forEach(r=>{ const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o); });
}

function initDashboard(){
  document.getElementById('banner').textContent='Dashboard generated on 2026-07-13 — data reflects Salesforce as of that date.';
  populateRegionFilter();
  updateKPIs(DEALS);
  renderTable();
}
