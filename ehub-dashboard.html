async function sha256(msg){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(){
  const val = document.getElementById('pw-input').value;
  const h = await sha256(val);
  if(h === PW_HASH){
    localStorage.setItem('ehub_pw', h);
    document.getElementById('pw-overlay').style.display='none';
    document.getElementById('main').style.display='block';
    init();
  } else {
    document.getElementById('pw-err').textContent='Incorrect password.';
  }
}

window.onload = async function(){
  const stored = localStorage.getItem('ehub_pw');
  if(stored === PW_HASH){
    document.getElementById('pw-overlay').style.display='none';
    document.getElementById('main').style.display='block';
    init();
  }
};

function parseDate(s){ return s ? new Date(s) : null; }
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function daysFromToday(s){ if(!s) return null; return Math.round((new Date(s)-TODAY)/(1000*86400)); }

function getGoLive(deal){
  const proj = projectMap[deal.Id] || {};
  const ttu = deal.TimetoTurnUp__c;
  const omBooked = deal.NICE_OM_Booked__c;
  const projStatus = proj.Status__c;
  const psActual = proj.PSActualGoLive__c;
  const projEnd = proj.Estimated_Project_End__c;
  const daysEnd = daysFromToday(projEnd);

  // Rule 1: OM booked and TTU set
  if(omBooked && ttu != null){ return {label:'✓ Live', cls:'status-live', sort:0}; }
  // Rule 2: TTU set and project end NOT > 30 days away
  if(ttu != null && (daysEnd === null || daysEnd <= 30)){ return {label:'✓ Live', cls:'status-live', sort:0}; }
  // Rule 3: PS Closed and actual go-live and TTU
  if(projStatus==='2 - Closed' && psActual && ttu != null){ return {label:'✓ Live', cls:'status-live', sort:0}; }

  // ETA candidates
  const etaDate = deal.PM_Estimated_Go_Live__c || deal.PM_Go_Live_Date__c || proj.PSEstimatedGoLive__c || deal.Expected_Go_Live__c;
  const daysEta = daysFromToday(etaDate);

  // Rule 4: project end > 30 days away
  if(daysEnd !== null && daysEnd > 30){ return {label:'⚠ Delayed → '+fmtDate(projEnd), cls:'status-delayed', sort:2}; }
  // Rule 5: ETA is past
  if(etaDate && daysEta !== null && daysEta < 0){ return {label:'⚠ Delayed '+fmtDate(etaDate), cls:'status-delayed', sort:2}; }
  // Rule 6: ETA exists and future
  if(etaDate && daysEta !== null && daysEta >= 0){ return {label:'ETA '+fmtDate(etaDate), cls:'status-eta', sort:1}; }
  // Rule 7: TBD
  return {label:'TBD', cls:'status-tbd', sort:3};
}

function getHubType(deal){
  const off = offlineSet.has(deal.Id);
  const rt = rtSet.has(deal.Id);
  if(off && rt) return 'RT + Offline';
  if(off) return 'Offline';
  return 'Real-Time';
}

function fmtACV(val, cur){
  const sym = cur==='USD'?'$':cur==='GBP'?'£':cur==='CAD'?'CA$':cur==='AUD'?'AU$':'';
  return sym + Math.round(val).toLocaleString();
}

function getIntegrationBadges(id){
  const types = implMap[id] || [];
  if(!types.length) return '';
  return types.map(t=>{
    const cls = t==='SmartReach'?'impl-sr':t==='Ticketing'?'impl-tick':'impl-amc';
    return '<span class="badge '+cls+'">'+t+'</span>';
  }).join('');
}

let sortCol = 'CloseDate', sortDir = -1;
function sortBy(col){
  if(sortCol===col) sortDir*=-1;
  else { sortCol=col; sortDir=-1; }
  render();
}

function enrichDeals(){
  return allDeals.map(d=>{
    const gl = getGoLive(d);
    return {...d, hubType:getHubType(d), goLive:gl, goLiveSort:gl.sort};
  });
}

function init(){
  // Populate region dropdown
  const regions = [...new Set(allDeals.map(d=>d.Sales_Region__c||'Unknown'))].sort();
  const sel = document.getElementById('f-region');
  regions.forEach(r=>{ const o=document.createElement('option'); o.value=r; o.textContent=r; sel.appendChild(o); });
  render();
}

function render(){
  const search = document.getElementById('f-search').value.toLowerCase();
  const region = document.getElementById('f-region').value;
  const type = document.getElementById('f-type').value;
  const status = document.getElementById('f-status').value;

  let deals = enrichDeals();

  // Filter
  deals = deals.filter(d=>{
    if(search && !d.AccountName.toLowerCase().includes(search) && !d.Name.toLowerCase().includes(search)) return false;
    if(region && (d.Sales_Region__c||'Unknown')!==region) return false;
    if(type && d.hubType!==type) return false;
    if(status){
      const lbl = d.goLive.label;
      if(status==='Live' && !lbl.startsWith('✓')) return false;
      if(status==='Delayed' && !lbl.startsWith('⚠')) return false;
      if(status==='TBD' && lbl!=='TBD') return false;
      if(status==='Upcoming' && !lbl.startsWith('ETA')) return false;
    }
    return true;
  });

  // Sort
  deals.sort((a,b)=>{
    let va = a[sortCol], vb = b[sortCol];
    if(va===null||va===undefined) va = sortDir>0?Infinity:'';
    if(vb===null||vb===undefined) vb = sortDir>0?Infinity:'';
    if(typeof va==='string') return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });

  // Update KPIs
  const live = deals.filter(d=>d.goLive.label.startsWith('✓')).length;
  const delayed = deals.filter(d=>d.goLive.label.startsWith('⚠')).length;
  const eta = deals.filter(d=>d.goLive.label.startsWith('ETA')).length;
  const tbd = deals.filter(d=>d.goLive.label==='TBD').length;
  const totalAcv = deals.reduce((s,d)=>s+d.Total_ACV_Value__c,0);
  document.getElementById('kpis').innerHTML =
    kpiTile('Total Deals', deals.length, '') +
    kpiTile('USD ACV (local)', '$'+Math.round(totalAcv/1e6*10)/10+'M', 'blue') +
    kpiTile('Live', live, 'green') +
    kpiTile('Delayed', delayed, 'red') +
    kpiTile('ETA', eta, 'yellow') +
    kpiTile('TBD', tbd, '');

  // Update sort headers
  document.querySelectorAll('th').forEach(th=>{
    th.classList.remove('sorted-asc','sorted-desc');
  });

  // Group by top parent
  const groups = {};
  deals.forEach(d=>{
    const g = d.TopParent || d.AccountName;
    if(!groups[g]) groups[g]=[];
    groups[g].push(d);
  });

  let rows = '';
  Object.entries(groups).forEach(([gname, gdeals])=>{
    rows += '<tr class="group-header"><td colspan="10">'+escH(gname)+' &nbsp;<small style="color:#6b7280;font-weight:400">('+gdeals.length+' deal'+(gdeals.length>1?'s':'')+')</small></td></tr>';
    gdeals.forEach(d=>{
      const gl = d.goLive;
      rows += '<tr class="data-row">' +
        '<td>'+escH(d.AccountName)+'</td>' +
        '<td><a class="deal-link" href="https://nice.lightning.force.com/lightning/r/Opportunity/'+d.Id+'/view" target="_blank">'+escH(d.Name)+'</a></td>' +
        '<td>'+escH(d.hubType)+'</td>' +
        '<td>'+getIntegrationBadges(d.Id)+'</td>' +
        '<td>'+fmtDate(d.CloseDate)+'</td>' +
        '<td>'+fmtACV(d.Total_ACV_Value__c, d.CurrencyIsoCode)+'</td>' +
        '<td>'+(d.Opportunity_Agent_Count__c!=null?d.Opportunity_Agent_Count__c:'—')+'</td>' +
        '<td>'+(d.Sales_Region__c||'—')+'</td>' +
        '<td class="'+gl.cls+'">'+gl.label+'</td>' +
        '<td>'+escH(d.OwnerName)+'</td>' +
        '</tr>';
    });
  });

  document.getElementById('tbody').innerHTML = rows;
}

function kpiTile(label, val, cls){
  return '<div class="kpi"><div class="kpi-label">'+label+'</div><div class="kpi-val '+cls+'">'+val+'</div></div>';
}
function escH(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
