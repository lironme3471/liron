  #gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000;}

  #gate p{color:#666;font-size:13px;margin:0 0 22px;}

  #gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
  #gate button:hover{background:#1f7ce8;}
  #gate .err{color:#d33;font-size:12px;height:16px;margin-top:2px;}
  #app{display:none;max-width:1500px;margin:0 auto;padding:22px;}
  .banner{background:#FFF6D6;border:1px solid #F2D98A;color:#7a5d00;padding:11px 16px;border-radius:9px;font-size:13px;margin-bottom:18px;}
  h1.title{font-size:24px;margin:0 0 4px;color:var(--charcoal);}
  .sub{color:#7a8197;font-size:13px;margin-bottom:20px;}
  .kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
  .kpi{background:#fff;border-radius:12px;padding:16px 20px;flex:1;min-width:130px;box-shadow:0 2px 8px rgba(30,40,80,.06);border-top:3px solid var(--blue);}
  .kpi .n{font-size:26px;font-weight:700;color:var(--charcoal);}
  .kpi .l{font-size:12px;color:#7a8197;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  .kpi.live{border-top-color:#2EAE6B;}.kpi.delayed{border-top-color:#E8553B;}
  .kpi.eta{border-top-color:#F2A93B;}.kpi.tbd{border-top-color:#9aa3b5;}
  .filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .filters input,.filters select{padding:9px 11px;border:1.5px solid #d6dbe5;border-radius:8px;font-size:13px;background:#fff;}
  .filters input{flex:1;min-width:220px;}
  .count{font-size:13px;color:#7a8197;margin-left:auto;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(30,40,80,.07);}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #eef1f6;vertical-align:top;}
  th{background:var(--charcoal);color:#fff;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;}
  th:hover{background:#2d2d3c;}
  th .arrow{font-size:10px;opacity:.85;margin-left:3px;}
  tr.group td{background:#eef3fb;font-weight:700;color:var(--charcoal);font-size:13px;border-top:2px solid #d4e2f7;}
  td.acv{font-variant-numeric:tabular-nums;white-space:nowrap;}
  a.deal{color:var(--blue);text-decoration:none;font-weight:600;}
  a.deal:hover{text-decoration:underline;}
  .pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
  .ibadge{display:inline-block;padding:2px 8px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;margin-right:4px;}
  .st{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap;}
  .st.live{background:#E3F6EC;color:#1B7F4B;}
  .st.delayed{background:#FCE6E1;color:#B23A22;}
  .st.eta{background:#FEF1DC;color:#9A6516;}
  .st.tbd{background:#EEF0F4;color:#6A7385;}
  .nores td{text-align:center;color:#9aa3b5;padding:26px;}
</style>
</head>

</div>

// ---- password gate (SHA-256, localStorage) ----
async function sha256hex(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryUnlock(val){
  const h = await sha256hex(val);
  if(h === PW_HASH){
    try{localStorage.setItem('ehub_ok', PW_HASH);}catch(e){}
    showApp(); return true;
  }
  return false;
}
function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
document.getElementById('go').onclick = async ()=>{
  const ok = await tryUnlock(document.getElementById('pw').value);
  if(!ok) document.getElementById('err').textContent = 'Incorrect password';
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
try{ if(localStorage.getItem('ehub_ok')===PW_HASH){ showApp(); } }catch(e){}

// ---- rendering ----
const COLS = [
  {k:'account', label:'Account'},
  {k:'name', label:'Deal Name'},
  {k:'type', label:'Type'},
  {k:'integration', label:'Integration'},
  {k:'hub_label', label:'Hub'},
  {k:'close', label:'Close Date'},
  {k:'acv', label:'ACV'},
  {k:'agents', label:'Agents'},
  {k:'region', label:'Region'},
  {k:'status_label', label:'Go-Live'},
  {k:'owner', label:'Owner'},
];
let sortKey=null, sortDir=1; // dir 1 asc, -1 desc; null=grouped view

function fmtMoney(v,ccy){
  if(v===null||v===undefined) return '&mdash;';
  const s = Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
  return (ccy==='USD'?'$':'') + s + (ccy!=='USD'? ' '+ccy : '');
}
function fmtDate(s){
  if(!s) return '&mdash;';
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'});
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function intBadges(arr){
  if(!arr||!arr.length) return '';
  const col={SmartReach:'#FF8C2B',Ticketing:'#8A4FFF',AMC:'#2EAE6B'};
  return arr.map(n=>`<span class="ibadge" style="background:${col[n]||'#888'}">${esc(n)}</span>`).join('');
}

function dealCells(r, showAccount){
  const link=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${r.id}/view`;
  return `
   <td>${showAccount?esc(r.account):''}</td>
   <td><a class="deal" href="${link}" target="_blank" rel="noopener">${esc(r.name)}</a></td>
   <td>${esc(r.type)}</td>
   <td>${intBadges(r.integration)}</td>
   <td><span class="pill" style="background:${r.hub_color}">${esc(r.hub_label)}</span></td>
   <td>${fmtDate(r.close)}</td>
   <td class="acv">${fmtMoney(r.acv,r.ccy)}</td>
   <td>${r.agents==null?'&mdash;':esc(r.agents)}</td>
   <td>${esc(r.region)}</td>
   <td><span class="st ${r.status_cls}">${esc(r.status_label)}</span></td>
   <td>${esc(r.owner)}</td>`;
}

function buildHead(){
  const tr=document.getElementById('head');
  tr.innerHTML = COLS.map(c=>{
    let ar='';
    if(sortKey===c.k) ar=`<span class="arrow">${sortDir>0?'▲':'▼'}</span>`;
    return `<th data-k="${c.k}">${c.label}${ar}</th>`;
  }).join('');
  tr.querySelectorAll('th').forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.k;
      if(sortKey!==k){sortKey=k;sortDir=1;}
      else if(sortDir===1){sortDir=-1;}
      else {sortKey=null;sortDir=1;} // third click -> grouped
      buildHead(); render();
    };
  });
}

function applyFilters(list){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const reg=document.getElementById('fRegion').value;
  const hub=document.getElementById('fHub').value;
  const st=document.getElementById('fStatus').value;
  return list.filter(r=>{
    if(q && !((r.account||'').toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q))) return false;
    if(reg && r.region!==reg) return false;
    if(hub && r.hub_label!==hub) return false;
    if(st && r.status_cls!==st) return false;
    return true;
  });
}

function cmp(a,b,k){
  let x=a[k], y=b[k];
  if(k==='acv'||k==='agents'){x=x==null?-Infinity:Number(x);y=y==null?-Infinity:Number(y);return x-y;}
  if(k==='close'){x=x||'';y=y||'';return x<y?-1:x>y?1:0;}
  if(k==='integration'){x=(x||[]).join(',');y=(y||[]).join(',');}
  x=(x==null?'':String(x)).toLowerCase();y=(y==null?'':String(y)).toLowerCase();
  return x<y?-1:x>y?1:0;
}

function render(){
  const body=document.getElementById('body');
  const filtered=applyFilters(DATA.rows);
  let htmlOut='', dealCount=0, acctSet=new Set();

  if(sortKey){ // flat sorted view
    const arr=[...filtered].sort((a,b)=>sortDir*cmp(a,b,sortKey));
    arr.forEach(r=>{htmlOut+=`<tr>${dealCells(r,true)}</tr>`;dealCount++;acctSet.add(r.group);});
  } else { // grouped view
    DATA.groups.forEach(g=>{
      const gr=filtered.filter(r=>r.group===g);
      if(!gr.length) return;
      gr.sort((a,b)=>(b.close||'').localeCompare(a.close||''));
      const gacv=gr.reduce((s,r)=>s+(r.ccy==='USD'?(r.acv||0):0),0);
      htmlOut+=`<tr class="group"><td colspan="11">${esc(g)} &nbsp;&middot;&nbsp; ${gr.length} deal${gr.length>1?'s':''} &nbsp;&middot;&nbsp; ${gacv>0?'$'+gacv.toLocaleString('en-US',{maximumFractionDigits:0})+' USD':''}</td></tr>`;
      gr.forEach(r=>{htmlOut+=`<tr>${dealCells(r,false)}</tr>`;dealCount++;});
      acctSet.add(g);
    });
  }
  if(!dealCount) htmlOut=`<tr class="nores"><td colspan="11">No deals match the current filters.</td></tr>`;
  body.innerHTML=htmlOut;
  document.getElementById('count').textContent=`${dealCount} deal${dealCount!==1?'s':''} · ${acctSet.size} account${acctSet.size!==1?'s':''}`;
}

function initFilters(){
  const regions=[...new Set(DATA.rows.map(r=>r.region))].filter(x=>x&&x!=='—').sort();
  const hubs=[...new Set(DATA.rows.map(r=>r.hub_label))].sort();
  const stMap={live:'Live',delayed:'Delayed',eta:'ETA',tbd:'TBD'};
  const fR=document.getElementById('fRegion'),fH=document.getElementById('fHub'),fS=document.getElementById('fStatus');
  regions.forEach(r=>fR.innerHTML+=`<option value="${esc(r)}">${esc(r)}</option>`);
  hubs.forEach(h=>fH.innerHTML+=`<option value="${esc(h)}">${esc(h)}</option>`);
  Object.entries(stMap).forEach(([k,v])=>fS.innerHTML+=`<option value="${k}">${v}</option>`);
  ['search','fRegion','fHub','fStatus'].forEach(id=>document.getElementById(id).addEventListener('input',render));
}

function initKpis(){
  const k=DATA.kpis;
  const tiles=[
    {n:k.total,l:'Total Deals',c:''},
    {n:'$'+Number(k.usd_acv).toLocaleString('en-US',{maximumFractionDigits:0}),l:'USD ACV',c:''},
    {n:k.live,l:'Live',c:'live'},
    {n:k.delayed,l:'Delayed',c:'delayed'},
    {n:k.eta,l:'ETA',c:'eta'},
    {n:k.tbd,l:'TBD',c:'tbd'},
  ];
  document.getElementById('kpis').innerHTML=tiles.map(t=>`<div class="kpi ${t.c}"><div class="n">${t.n}</div><div class="l">${t.l}</div></div>`).join('');
  document.getElementById('banner').textContent=`Dashboard generated on ${DATA.generated} — data reflects Salesforce as of that date.`;
}

initKpis(); initFilters(); buildHead();
</script>
