function check(){const val=document.getElementById('pwd').value;sha256(val).then(h=>{if(h===PWD){sessionStorage.auth=1;document.getElementById('gate').classList.add('hidden');document.getElementById('dash').classList.add('show');render()}else{document.getElementById('err').style.display='block'}})}
document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')check()});
if(sessionStorage.auth){document.getElementById('gate').classList.add('hidden');document.getElementById('dash').classList.add('show')}
async function sha256(msg){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function render(){document.getElementById('stats').innerHTML=`<div class="stat"><div class="label">Open Deals</div><div class="val">${DATA.total_opps}</div></div><div class="stat"><div class="label">Accounts</div><div class="val">${DATA.total_accounts}</div></div><div class="stat"><div class="label">Pipeline ACV</div><div class="val">$${(DATA.total_acv/1e6).toFixed(1)}M</div></div>`;renderTable();document.getElementById('search').addEventListener('input',renderTable);document.getElementById('type').addEventListener('change',renderTable)}
function renderTable(){const search=document.getElementById('search').value.toLowerCase();const type=document.getElementById('type').value;const filtered=DATA.opps.filter(o=>(!search||o.name.toLowerCase().includes(search)||o.account.toLowerCase().includes(search))&&(!type||o.type.includes(type)));const byAcct={};filtered.forEach(o=>{if(!byAcct[o.account])byAcct[o.account]=[];byAcct[o.account].push(o)});const accounts=Object.keys(byAcct).sort((a,b)=>{const sumB=byAcct[b].reduce((s,o)=>s+o.usd_acv,0);const sumA=byAcct[a].reduce((s,o)=>s+o.usd_acv,0);return sumB-sumA});let html='';accounts.forEach(acc=>{const list=byAcct[acc];const total=list.reduce((s,o)=>s+o.usd_acv,0);html+=`<tr class="acct"><td colspan="5"><b>${acc}</b><br><span style="font-weight:normal;color:#666;font-size:11px">${list.length} deals · $${(total/1e6).toFixed(1)}M</span></td><td style="text-align:right;font-weight:600">$${(total/1e6).toFixed(1)}M</td><td colspan="2"></td></tr>`;list.forEach(o=>{const stageNum=o.stage[0];const stageLabel=o.stage.split(' - ')[1]||'';const typeHtml=o.type==='—'?'<span class="pill">—</span>':o.type.split(', ').map(t=>{const cls=t==='AMC'?'pill-amc':t==='Ticketing'?'pill-tick':t==='Generic'?'pill-gen':'pill-smart';return `<span class="pill ${cls}">${t}</span>`}).join('');const acvDisplay=o.curr!=='USD'?`$${(o.usd_acv/1e3).toFixed(0)}K<br><span style="font-size:10px;color:#666">${o.native_acv}</span>`:` $${(o.usd_acv/1e3).toFixed(0)}K`;const region=(o.region&&o.territory)?`${o.region} / ${o.territory}`:(o.region||o.territory||'');html+=`<tr class="deal"><td><a href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${o.id}/view" target="_blank">${o.name}</a></td><td></td><td>${typeHtml}</td><td><span class="stage stage-${stageNum}">${stageNum} • ${stageLabel}</span></td><td>${o.close}</td><td style="text-align:right">${acvDisplay}</td><td>${region}</td><td>${o.owner}</td></tr>`})});document.getElementById('tbody').innerHTML=html;document.getElementById('count').textContent=`${filtered.length} deals`}
