<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eHub Offline Dashboard</title>
<style>
  :root {
    --blue:#3694fc; --charcoal:#21212b; --indigo:#6100FF;
    --teal:#36EAD0; --coral:#FF5B8A;
    --amc:#f59e0b; --tick:#3694fc; --gen:#10b981; --sr:#8b5cf6;
    --none-c:#9ca3af;
    --bg:#f1f5f9; --card:#fff; --border:#e2e8f0;
    --text:#1e293b; --muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  /* PASSWORD OVERLAY */
  #pw-overlay{position:fixed;inset:0;background:var(--charcoal);z-index:9999;display:flex;align-items:center;justify-content:center}
  #pw-card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  #pw-card .logo{font-size:28px;font-weight:800;color:var(--blue);letter-spacing:-1px;margin-bottom:4px}
  #pw-card .sub{font-size:13px;color:var(--muted);margin-bottom:24px}
  #pw-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:15px;outline:none;transition:border .2s}
  #pw-input:focus{border-color:var(--blue)}
  #pw-btn{margin-top:14px;width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
  #pw-btn:hover{opacity:.88}
  #pw-err{color:#ef4444;font-size:13px;margin-top:10px;min-height:18px}
  /* MAIN */
  #main{display:none}
  header{background:var(--charcoal);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:16px}
  .logo-text{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-0.5px}
  .header-info{flex:1}
  .header-title{font-size:18px;font-weight:700}
  .header-sub{font-size:12px;color:#94a3b8;margin-top:2px}
  .layout{display:flex;gap:0;height:calc(100vh - 60px)}
  /* SIDEBAR */
  aside{width:220px;min-width:220px;background:var(--charcoal);color:#e2e8f0;padding:16px;overflow-y:auto;border-right:1px solid #334155}
  aside h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #334155}
  aside h3:first-child{margin-top:0}
  .sb-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
  .sb-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600}
  /* CONTENT */
  .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
  /* STATS */
  .stats{display:flex;gap:12px;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border)}
  .stat-tile{flex:1;background:var(--bg);border-radius:10px;padding:12px 16px;min-width:120px}
  .stat-val{font-size:24px;font-weight:800;color:var(--blue)}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
  /* FILTERS */
  .filters{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .filters input,.filters select{padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;transition:border .2s}
  .filters input:focus,.filters select:focus{border-color:var(--blue)}
  .count-lbl{font-size:12px;color:var(--muted);margin-left:auto}
  /* TABLE */
  .table-wrap{flex:1;overflow:auto;padding:0 20px 20px}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
  th{background:var(--charcoal);color:#e2e8f0;padding:9px 10px;text-align:left;position:sticky;top:0;z-index:10;white-space:nowrap;cursor:pointer;user-select:none}
  th:hover{background:#2d3748}
  th.sorted-asc::after{content:" ▲";font-size:10px}
  th.sorted-desc::after{content:" ▼";font-size:10px}
  td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:hover td{background:#f8fafc}
  .acct-row{background:#f1f5f9;cursor:pointer}
  .acct-row td{font-weight:700;font-size:13px;color:var(--charcoal);padding:9px 10px}
  .acct-row:hover td{background:#e2e8f0}
  .acct-toggle{color:var(--blue);font-size:11px;margin-left:6px}
  .deal-row td:first-child{padding-left:24px}
  .opp-link{color:var(--blue);text-decoration:none;font-weight:500}
  .opp-link:hover{text-decoration:underline}
  /* PILLS */
  .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin:1px}
  .pill-amc{background:#fef3c7;color:#92400e}
  .pill-tick{background:#dbeafe;color:#1e40af}
  .pill-gen{background:#d1fae5;color:#065f46}
  .pill-sr{background:#ede9fe;color:#4c1d95}
  .pill-none{color:var(--muted);font-style:italic}
  /* STAGE BADGES */
  .stage-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .s0,.s1{background:#dbeafe;color:#1e40af}
  .s2,.s3{background:#fef9c3;color:#92400e}
  .s4{background:#ede9fe;color:#4c1d95}
  .s5{background:#d1fae5;color:#065f46}
  .s-unk{background:#f1f5f9;color:var(--muted)}
  /* FEDRAMP */
  .fedramp-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:#ede9fe;color:#4c1d95;margin-left:4px;white-space:nowrap}
  .acv-native{display:block;font-size:10px;color:var(--muted)}
  /* Responsive */
  @media(max-width:900px){aside{display:none}.layout{flex-direction:column}}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-overlay">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="sub">eHub Offline Dashboard · Restricted Access</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password">
    <button id="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div id="pw-err"></div>
  </div>
</div>

<div id="main">
<header>
  <div class="logo-text">NiCE</div>
  <div class="header-info">
    <div class="header-title">eHub Offline Dashboard</div>
    <div class="header-sub">Engagement Hub Offline · Open opportunities (excl. Closed) · Salesforce CPQ · SKU 1464-3063 · ACV shown in USD (corporate currency)</div>
  </div>
</header>

<div class="layout">
<aside id="sidebar"></aside>
<div class="content">
  <div class="stats" id="stats-bar"></div>
  <div class="filters">
    <input type="text" id="f-search" placeholder="🔍 Search opportunities…" style="min-width:220px" oninput="applyFilters()">
    <select id="f-type" onchange="applyFilters()">
      <option value="">All Types</option>
      <option value="AMC">AMC</option>
      <option value="Ticketing">Ticketing</option>
      <option value="Generic">Generic</option>
      <option value="SmartReach">SmartReach</option>
    </select>
    <select id="f-stage" onchange="applyFilters()">
      <option value="">All Stages</option>
      <option value="0">0 · Prospecting</option>
      <option value="1">1 · Identification / Qualification</option>
      <option value="2">2 · Determining Problem</option>
      <option value="3">3 · Aligning Benefits & Value</option>
      <option value="4">4 · Confirm Value & Agreement</option>
      <option value="5">5 · Proposal / Negotiation</option>
    </select>
    <select id="f-region" onchange="applyFilters()">
      <option value="">All Regions</option>
    </select>
    <span class="count-lbl" id="count-lbl"></span>
  </div>
  <div class="table-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')" id="th-name">Opportunity</th>
          <th onclick="sortBy('account_name')" id="th-account_name">Account</th>
          <th onclick="sortBy('type_str')" id="th-type_str">Type</th>
          <th onclick="sortBy('stage_num')" id="th-stage_num">Stage</th>
          <th onclick="sortBy('close_date')" id="th-close_date">Close Date</th>
          <th onclick="sortBy('usd_acv')" id="th-usd_acv">ACV</th>
          <th onclick="sortBy('region')" id="th-region">Region / Territory</th>
          <th onclick="sortBy('owner')" id="th-owner">Owner</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
</div>
</div>

const SF_BASE = "https://niceincontact.lightning.force.com/lightning/r/Opportunity";

// ─── PASSWORD ─────────────────────────────────────────────────────────────────
const PW_HASH = "0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621";
async function checkPw() {
  const val = document.getElementById("pw-input").value;
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  if (hex === PW_HASH) {
    sessionStorage.setItem("dash_auth","1");
    document.getElementById("pw-overlay").style.display="none";
    document.getElementById("main").style.display="block";
    init();
  } else {
    document.getElementById("pw-err").textContent="Incorrect password. Please try again.";
  }
}
document.getElementById("pw-input").addEventListener("keydown", e=>{ if(e.key==="Enter") checkPw(); });
if (sessionStorage.getItem("dash_auth")==="1") {
  document.getElementById("pw-overlay").style.display="none";
  document.getElementById("main").style.display="block";
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmtACV(v) {
  if (v===null||v===undefined) return "$0";
  if (v>=1e6) return "$"+( v/1e6).toFixed(2)+"M";
  if (v>=1e3) return "$"+(v/1e3).toFixed(0)+"K";
  return "$"+v.toLocaleString("en-US",{maximumFractionDigits:0});
}
function stageClass(n) {
  const m={"0":"s0","1":"s1","2":"s2","3":"s3","4":"s4","5":"s5"};
  return m[n]||"s-unk";
}
function typePills(types) {
  if(!types||types.length===0) return '<span class="pill-none">—</span>';
  return types.map(t=>{
    const cls={AMC:"pill-amc",Ticketing:"pill-tick",Generic:"pill-gen",SmartReach:"pill-sr"}[t]||"";
    return `<span class="pill ${cls}">${t}</span>`;
  }).join("");
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let sortCol=null, sortDir=0; // 0=grouped,1=asc,2=desc
let filteredDeals=[];
const collapsed=new Set();

// ─── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  // Populate region filter
  const regions=[...new Set(DEALS.map(d=>d.region))].filter(Boolean).sort();
  const sel=document.getElementById("f-region");
  regions.forEach(r=>{ const o=document.createElement("option"); o.value=r; o.textContent=r; sel.appendChild(o); });
  applyFilters();
  renderSidebar(DEALS);
  renderStats(DEALS);
}
if (sessionStorage.getItem("dash_auth")==="1") init();

// ─── FILTERS ──────────────────────────────────────────────────────────────────
function applyFilters() {
  const q=(document.getElementById("f-search").value||"").toLowerCase();
  const fType=document.getElementById("f-type").value;
  const fStage=document.getElementById("f-stage").value;
  const fRegion=document.getElementById("f-region").value;
  filteredDeals = DEALS.filter(d=>{
    if(q && !d.name.toLowerCase().includes(q) && !d.account_name.toLowerCase().includes(q) && !d.owner.toLowerCase().includes(q)) return false;
    if(fType && !d.types.includes(fType)) return false;
    if(fStage && d.stage_num !== fStage) return false;
    if(fRegion && d.region !== fRegion) return false;
    return true;
  });
  renderTable();
  renderStats(filteredDeals);
  const accts=new Set(filteredDeals.map(d=>d.account_name)).size;
  document.getElementById("count-lbl").textContent=`${filteredDeals.length} deals · ${accts} accounts`;
}

// ─── SORT ─────────────────────────────────────────────────────────────────────
function sortBy(col) {
  document.querySelectorAll("th").forEach(t=>t.classList.remove("sorted-asc","sorted-desc"));
  if(sortCol===col) {
    sortDir=(sortDir+1)%3;
  } else {
    sortCol=col; sortDir=1;
  }
  if(sortDir===0) sortCol=null;
  const th=document.getElementById("th-"+col);
  if(th&&sortDir===1) th.classList.add("sorted-asc");
  if(th&&sortDir===2) th.classList.add("sorted-desc");
  renderTable();
}

// ─── TABLE ────────────────────────────────────────────────────────────────────
function renderTable() {
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  if(sortCol && sortDir>0) {
    // Flat sorted view
    const sorted=[...filteredDeals].sort((a,b)=>{
      let av=a[sortCol], bv=b[sortCol];
      if(typeof av==="number") return sortDir===1? av-bv : bv-av;
      av=(av||"").toString().toLowerCase(); bv=(bv||"").toString().toLowerCase();
      return sortDir===1? av.localeCompare(bv) : bv.localeCompare(av);
    });
    sorted.forEach(d=>tbody.appendChild(makeDealRow(d,true)));
  } else {
    // Grouped by account
    const groups={};
    filteredDeals.forEach(d=>{
      if(!groups[d.account_name]) groups[d.account_name]={deals:[],totalACV:0};
      groups[d.account_name].deals.push(d);
      groups[d.account_name].totalACV+=d.usd_acv;
    });
    const sortedAccts=Object.keys(groups).sort((a,b)=>groups[b].totalACV-groups[a].totalACV);
    sortedAccts.forEach(acct=>{
      const g=groups[acct];
      const isCollapsed=collapsed.has(acct);
      // Header row
      const hr=document.createElement("tr");
      hr.className="acct-row";
      hr.setAttribute("data-acct",acct);
      hr.onclick=()=>toggleAcct(acct);
      hr.innerHTML=`
        <td colspan="5">${acct} <span style="color:var(--muted);font-weight:400;font-size:12px">(${g.deals.length} deal${g.deals.length!==1?"s":""})</span>
          <span class="acct-toggle">${isCollapsed?"▶":"▼"}</span></td>
        <td style="font-weight:700">${fmtACV(g.totalACV)}</td>
        <td colspan="2"></td>`;
      tbody.appendChild(hr);
      if(!isCollapsed) {
        const sorted=[...g.deals].sort((a,b)=>a.close_date.localeCompare(b.close_date));
        sorted.forEach(d=>tbody.appendChild(makeDealRow(d,false)));
      }
    });
  }
}

function toggleAcct(acct) {
  if(collapsed.has(acct)) collapsed.delete(acct);
  else collapsed.add(acct);
  renderTable();
}

function makeDealRow(d,showAcct) {
  const tr=document.createElement("tr");
  tr.className="deal-row";
  const ownerCell=d.fedramp==="Yes"
    ? `${d.owner} <span class="fedramp-badge">FedRAMP</span>`
    : d.owner;
  const acvNative=d.native_label?`<span class="acv-native">${d.native_label}</span>`:"";
  tr.innerHTML=`
    <td><a class="opp-link" href="${SF_BASE}/${d.id}/view" target="_blank">${d.name}</a></td>
    <td>${showAcct?d.account_name:""}</td>
    <td>${typePills(d.types)}</td>
    <td><span class="stage-badge ${stageClass(d.stage_num)}">${d.stage_display}</span></td>
    <td>${d.close_date}</td>
    <td>${fmtACV(d.usd_acv)}${acvNative}</td>
    <td>${d.region}</td>
    <td>${ownerCell}</td>`;
  return tr;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats(deals) {
  const totalACV=deals.reduce((s,d)=>s+d.usd_acv,0);
  const accts=new Set(deals.map(d=>d.account_name)).size;
  const fedramp=deals.filter(d=>d.fedramp==="Yes").length;
  document.getElementById("stats-bar").innerHTML=`
    <div class="stat-tile"><div class="stat-val">${deals.length}</div><div class="stat-lbl">Open Deals</div></div>
    <div class="stat-tile"><div class="stat-val">${accts}</div><div class="stat-lbl">Accounts</div></div>
    <div class="stat-tile"><div class="stat-val">${fmtACV(totalACV)}</div><div class="stat-lbl">Total Pipeline ACV (USD)</div></div>
    <div class="stat-tile"><div class="stat-val">${fedramp}</div><div class="stat-lbl">FedRAMP Deals</div></div>`;
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(deals) {
  const stageOrder=["0","1","2","3","4","5"];
  const stageNames={
    "0":"Prospecting","1":"Identification / Qual.","2":"Determining Problem",
    "3":"Aligning Benefits","4":"Confirm & Agreement","5":"Proposal / Negotiation"
  };
  const stageCounts={};
  const stageACV={};
  stageOrder.forEach(s=>{ stageCounts[s]=0; stageACV[s]=0; });
  deals.forEach(d=>{
    const s=d.stage_num||"?";
    if(stageCounts[s]!==undefined){stageCounts[s]++;stageACV[s]+=d.usd_acv;}
    else{stageCounts[s]=(stageCounts[s]||0)+1;stageACV[s]=(stageACV[s]||0)+d.usd_acv;}
  });

  const typeOrder=["AMC","Ticketing","Generic","SmartReach","None"];
  const typeColors={AMC:"var(--amc)",Ticketing:"var(--tick)",Generic:"var(--gen)",SmartReach:"var(--sr)",None:"var(--none-c)"};
  const typeCounts={};
  const typeACVs={};
  typeOrder.forEach(t=>{typeCounts[t]=0;typeACVs[t]=0;});
  deals.forEach(d=>{
    if(!d.types||d.types.length===0){typeCounts["None"]++;typeACVs["None"]+=d.usd_acv;}
    else d.types.forEach(t=>{typeCounts[t]=(typeCounts[t]||0)+1;typeACVs[t]=(typeACVs[t]||0)+d.usd_acv;});
  });

  const regionCounts={};
  deals.forEach(d=>{
    const r=(d.region||"—").split(" / ")[0].trim();
    regionCounts[r]=(regionCounts[r]||0)+1;
  });
  const sortedRegions=Object.entries(regionCounts).sort((a,b)=>b[1]-a[1]);

  let html="";
  html+="<h3>By Stage</h3>";
  stageOrder.forEach(s=>{
    if(stageCounts[s]>0){
      const sc=stageClass(s);
      html+=`<div class="sb-row"><span class="sb-badge" style="font-size:11px;padding:2px 6px;border-radius:4px;background:inherit">Stage ${s}</span><span>${stageCounts[s]} · ${fmtACV(stageACV[s])}</span></div>`;
    }
  });
  html+="<h3>By Type</h3>";
  typeOrder.forEach(t=>{
    if(typeCounts[t]>0){
      html+=`<div class="sb-row"><span style="color:${typeColors[t]};font-weight:600">${t}</span><span>${typeCounts[t]} · ${fmtACV(typeACVs[t])}</span></div>`;
    }
  });
  html+="<h3>By Region</h3>";
  sortedRegions.forEach(([r,c])=>{
    html+=`<div class="sb-row"><span>${r||"—"}</span><span style="font-weight:600">${c}</span></div>`;
  });
  document.getElementById("sidebar").innerHTML=html;
}
</script>
