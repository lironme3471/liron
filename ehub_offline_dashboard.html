<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eHub Offline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--teal:#36EAD0;--coral:#FF5B8A;--bg:#f4f6fb;--surface:#fff;--border:#e2e8f0;--text:#21212b;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--text);}
/* ── Password Gate ─────────────────────────────────────────── */
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate-card{background:#fff;border-radius:16px;padding:48px 40px;max-width:380px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#gate-card .logo{font-size:24px;font-weight:800;color:var(--blue);letter-spacing:-1px;margin-bottom:8px;}
#gate-card h2{font-size:18px;font-weight:600;color:var(--charcoal);margin-bottom:24px;}
#gate-card input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:16px;outline:none;transition:border-color .2s;}
#gate-card input:focus{border-color:var(--blue);}
#gate-card button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;}
#gate-card button:hover{background:#2478d4;}
#gate-err{color:var(--coral);font-size:13px;margin-top:8px;min-height:18px;}
/* ── Main Layout ───────────────────────────────────────────── */
#app{display:none;min-height:100vh;}
header{background:var(--charcoal);color:#fff;padding:18px 32px;display:flex;align-items:center;gap:20px;}
.header-logo{font-size:20px;font-weight:800;color:var(--blue);letter-spacing:-0.5px;}
.header-info{flex:1;}
.header-info h1{font-size:20px;font-weight:700;}
.header-info p{font-size:12px;color:#a0aec0;margin-top:2px;}
.header-date{font-size:12px;color:#a0aec0;white-space:nowrap;}
/* Stats bar */
.stats-bar{display:flex;gap:16px;padding:20px 32px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.stat-tile{background:var(--bg);border-radius:10px;padding:14px 20px;min-width:150px;flex:1;}
.stat-tile .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px;}
.stat-tile .value{font-size:22px;font-weight:800;color:var(--charcoal);}
.stat-tile .sub{font-size:11px;color:var(--muted);margin-top:2px;}
/* Content */
.content{display:flex;gap:0;}
.main-panel{flex:1;min-width:0;padding:24px 32px;}
.sidebar{width:280px;min-width:240px;background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;max-height:calc(100vh - 160px);position:sticky;top:0;}
/* Filters */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);outline:none;}
.filter-bar input{flex:1;min-width:160px;}
.deal-count{font-size:12px;color:var(--muted);white-space:nowrap;margin-left:auto;}
/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--charcoal);color:#fff;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{background:#2d2d3a;}
th .sort-arrow{margin-left:4px;opacity:.5;}
th.sorted .sort-arrow{opacity:1;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:#f8faff;}
/* Account header row */
.acct-row td{background:#eef2f8;font-weight:700;font-size:13px;cursor:pointer;}
.acct-row:hover td{background:#e2eaf6;}
.acct-row .acct-name{display:flex;align-items:center;gap:8px;}
.acct-row .chevron{font-size:10px;transition:transform .2s;}
.acct-row.collapsed .chevron{transform:rotate(-90deg);}
.deal-row.hidden{display:none;}
.deal-row td:first-child{padding-left:24px;}
/* Badges */
.stage-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;}
.stage-0,.stage-1{background:#dbeafe;color:#1e40af;}
.stage-2,.stage-3{background:#fef3c7;color:#92400e;}
.stage-4{background:#ede9fe;color:#5b21b6;}
.stage-5{background:#d1fae5;color:#065f46;}
.fedramp-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:#7c3aed;color:#fff;white-space:nowrap;}
/* Type pills */
.type-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;margin:1px;}
.pill-amc{background:#dbeafe;color:#1e40af;}
.pill-ticketing{background:#fef3c7;color:#92400e;}
.pill-generic{background:#d1fae5;color:#065f46;}
.pill-smartreach{background:#ede9fe;color:#5b21b6;}
.type-none{color:var(--muted);font-size:12px;}
/* ACV */
.acv-usd{font-weight:600;}
.acv-native{font-size:10px;color:var(--muted);margin-top:1px;}
/* Links */
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}
/* Sidebar sections */
.sidebar h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.sb-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:4px 0;border-bottom:1px solid #f1f5f9;}
.sb-row:last-child{border-bottom:none;}
.sb-label{color:var(--text);}
.sb-meta{display:flex;gap:8px;}
.sb-cnt{font-weight:700;color:var(--charcoal);min-width:20px;text-align:right;}
.sb-acv{color:var(--muted);font-size:11px;min-width:70px;text-align:right;}
</style>
</head>
<body>
<!-- ─── Password Gate ─────────────────────────────────────── -->
<div id="gate">
  <div id="gate-card">
    <div class="logo">NiCE</div>
    <h2>eHub Offline Dashboard</h2>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()"/>
    <button onclick="checkPw()">Access Dashboard</button>
    <div id="gate-err"></div>
  </div>
</div>
<!-- ─── App ──────────────────────────────────────────────── -->
<div id="app">
  <header>
    <div class="header-logo">NiCE</div>
    <div class="header-info">
      <h1>eHub Offline Dashboard</h1>
      <p>Engagement Hub Offline · Open Opportunities (excl. Closed) · SKU 1464-3063 · ACV shown in USD (corporate currency)</p>
    </div>
    <div class="header-date" id="run-date"></div>
  </header>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="content">
    <div class="main-panel">
      <div class="filter-bar">
        <input type="text" id="search" placeholder="Search opportunities…" oninput="applyFilters()"/>
        <select id="ftype" onchange="applyFilters()"><option value="">All Types</option><option>AMC</option><option>Ticketing</option><option>Generic</option><option>SmartReach</option></select>
        <select id="fstage" onchange="applyFilters()"><option value="">All Stages</option><option value="0">0 · Prospecting</option><option value="1">1 · Identification / Qualification</option><option value="2">2 · Determining Problem</option><option value="3">3 · Aligning Benefits & Value</option><option value="4">4 · Confirm Value & Agreement</option><option value="5">5 · Proposal / Negotiation</option></select>
        <select id="fregion" onchange="applyFilters()"><option value="">All Regions</option></select>
        <span class="deal-count" id="deal-count"></span>
      </div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th onclick="sortBy('name')">Opportunity <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('account')">Account <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('typesStr')">Type <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('stageNum')">Stage <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('closeDate')">Close Date <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('usdACV')">ACV <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('region')">Region / Territory <span class="sort-arrow">↕</span></th>
              <th onclick="sortBy('owner')">Owner <span class="sort-arrow">↕</span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script>
// ── Password gate ─────────────────────────────────────────────────────────────
const STORED_HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const h = await sha256hex(val);
  if (h === STORED_HASH) {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    document.getElementById('gate-err').textContent = 'Incorrect password.';
  }
}
if (sessionStorage.getItem('ehub_auth')==='1') {
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── State ─────────────────────────────────────────────────────────────────────
let sortCol = null, sortDir = 1, collapsedAccounts = {};
let filteredDeals = [...ALL_DEALS];

// ── Helpers ───────────────────────────────────────────────────────────────────
const SF_BASE = 'https://niceincontact.lightning.force.com/lightning/r/Opportunity';
function fmtACV(v) {
  if (v == null) return '—';
  return '$' + v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
}
function typePills(types) {
  if (!types || types.length===0) return '<span class="type-none">—</span>';
  const colors = {AMC:'pill-amc',Ticketing:'pill-ticketing',Generic:'pill-generic',SmartReach:'pill-smartreach'};
  return types.map(t=>`<span class="type-pill ${colors[t]||''}">${t}</span>`).join('');
}
function stageBadge(d) {
  return `<span class="stage-badge stage-${d.stageNum}">${d.stageLabel}</span>`;
}
function oppLink(d) {
  return `<a href="${SF_BASE}/${d.id}/view" target="_blank" title="${d.name}">${d.name}</a>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('run-date').textContent = 'Refreshed ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  // populate region filter
  const regions = [...new Set(ALL_DEALS.map(d=>d.region).filter(Boolean))].sort();
  const rs = document.getElementById('fregion');
  regions.forEach(r=>{ const o=document.createElement('option'); o.value=r; o.textContent=r; rs.appendChild(o); });
  applyFilters();
  renderSidebar(ALL_DEALS);
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const ft = document.getElementById('ftype').value;
  const fs = document.getElementById('fstage').value;
  const fr = document.getElementById('fregion').value;
  filteredDeals = ALL_DEALS.filter(d => {
    if (q && !d.name.toLowerCase().includes(q) && !d.account.toLowerCase().includes(q) && !d.owner.toLowerCase().includes(q)) return false;
    if (ft && !d.types.includes(ft)) return false;
    if (fs && d.stageNum != parseInt(fs)) return false;
    if (fr && d.region !== fr) return false;
    return true;
  });
  renderStats(filteredDeals);
  renderTable();
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) {
    if (sortDir === 1) sortDir = -1;
    else { sortCol = null; sortDir = 1; applyFilters(); return; }
  } else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th=>th.classList.remove('sorted'));
  const ths = document.querySelectorAll('#main-table th');
  const cols = ['name','account','typesStr','stageNum','closeDate','usdACV','region','owner'];
  const idx = cols.indexOf(col);
  if (idx>=0) ths[idx].classList.add('sorted');
  renderTable();
}

// ── Render table ──────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  const accounts = [...new Set(filteredDeals.map(d=>d.account))];
  const accountACV = {};
  accounts.forEach(a => {
    accountACV[a] = filteredDeals.filter(d=>d.account===a).reduce((s,d)=>s+d.usdACV,0);
  });
  const dealCount = filteredDeals.length;
  const acctCount = accounts.length;
  document.getElementById('deal-count').textContent = `${dealCount} deal${dealCount!==1?'s':''} · ${acctCount} account${acctCount!==1?'s':''}`;

  if (sortCol) {
    // Flat sorted view
    const sorted = [...filteredDeals].sort((a,b)=>{
      let va=a[sortCol], vb=b[sortCol];
      if (typeof va==='string') va=va.toLowerCase(), vb=vb.toLowerCase();
      return va<vb?-sortDir:va>vb?sortDir:0;
    });
    sorted.forEach(d=>{
      const tr = document.createElement('tr');
      tr.className='deal-row';
      tr.innerHTML=`
        <td>${oppLink(d)}</td>
        <td>${d.account}</td>
        <td>${typePills(d.types)}</td>
        <td>${stageBadge(d)}</td>
        <td>${d.closeDate}</td>
        <td><div class="acv-usd">${fmtACV(d.usdACV)}</div>${d.nativeLabel?`<div class="acv-native">${d.nativeLabel}</div>`:''}</td>
        <td>${d.region}</td>
        <td>${d.owner}${d.fedramp?' <span class="fedramp-badge">FedRAMP</span>':''}</td>`;
      tbody.appendChild(tr);
    });
  } else {
    // Grouped by account, sorted by total ACV desc
    accounts.sort((a,b)=>accountACV[b]-accountACV[a]);
    accounts.forEach(acct=>{
      const acctDeals = filteredDeals.filter(d=>d.account===acct).sort((a,b)=>a.closeDate.localeCompare(b.closeDate));
      const totalACV = accountACV[acct];
      const isCollapsed = collapsedAccounts[acct];
      // Header row
      const htr = document.createElement('tr');
      htr.className='acct-row'+(isCollapsed?' collapsed':'');
      htr.dataset.acct=acct;
      htr.onclick=()=>toggleAccount(acct);
      htr.innerHTML=`
        <td colspan="5"><div class="acct-name"><span class="chevron">▼</span><strong>${acct}</strong>&nbsp;<span style="font-weight:400;color:var(--muted);font-size:12px;">${acctDeals.length} deal${acctDeals.length!==1?'s':''}</span></div></td>
        <td><strong>${fmtACV(totalACV)}</strong></td>
        <td colspan="2"></td>`;
      tbody.appendChild(htr);
      // Deal rows
      acctDeals.forEach(d=>{
        const tr = document.createElement('tr');
        tr.className='deal-row'+(isCollapsed?' hidden':'');
        tr.dataset.acct=acct;
        tr.innerHTML=`
          <td>${oppLink(d)}</td>
          <td></td>
          <td>${typePills(d.types)}</td>
          <td>${stageBadge(d)}</td>
          <td>${d.closeDate}</td>
          <td><div class="acv-usd">${fmtACV(d.usdACV)}</div>${d.nativeLabel?`<div class="acv-native">${d.nativeLabel}</div>`:''}</td>
          <td>${d.region}</td>
          <td>${d.owner}${d.fedramp?' <span class="fedramp-badge">FedRAMP</span>':''}</td>`;
        tbody.appendChild(tr);
      });
    });
  }
}

function toggleAccount(acct) {
  collapsedAccounts[acct] = !collapsedAccounts[acct];
  document.querySelectorAll(`[data-acct="${acct}"]`).forEach(row=>{
    if (row.classList.contains('acct-row')) row.classList.toggle('collapsed',collapsedAccounts[acct]);
    else row.classList.toggle('hidden',!!collapsedAccounts[acct]);
  });
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function renderStats(deals) {
  const acctCount = new Set(deals.map(d=>d.account)).size;
  const totalACV = deals.reduce((s,d)=>s+d.usdACV,0);
  const frCount = deals.filter(d=>d.fedramp).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-tile"><div class="label">Open Deals</div><div class="value">${deals.length}</div></div>
    <div class="stat-tile"><div class="label">Accounts</div><div class="value">${acctCount}</div></div>
    <div class="stat-tile"><div class="label">Total Pipeline ACV</div><div class="value">${fmtACV(totalACV)}</div><div class="sub">USD (corporate currency)</div></div>
    <div class="stat-tile"><div class="label">FedRAMP</div><div class="value">${frCount}</div></div>
  `;
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(deals) {
  // By Stage
  const stages = [{n:0,l:'Prospecting'},{n:1,l:'Identification / Qualification'},{n:2,l:'Determining Problem'},{n:3,l:'Aligning Benefits & Value'},{n:4,l:'Confirm Value & Agreement'},{n:5,l:'Proposal / Negotiation'}];
  let stageHtml = '<h3>By Stage</h3>';
  stages.forEach(s=>{
    const sd = deals.filter(d=>d.stageNum===s.n);
    if(!sd.length) return;
    const sacv = sd.reduce((x,d)=>x+d.usdACV,0);
    stageHtml+=`<div class="sb-row"><span class="sb-label">${s.n} · ${s.l}</span><span class="sb-meta"><span class="sb-cnt">${sd.length}</span><span class="sb-acv">${fmtACV(sacv)}</span></span></div>`;
  });
  
  // By Type
  const typeOrder=['AMC','Ticketing','Generic','SmartReach'];
  let typeHtml='<h3>By Type</h3>';
  typeOrder.forEach(t=>{
    const td=deals.filter(d=>d.types.includes(t));
    if(!td.length) return;
    const tacv=td.reduce((x,d)=>x+d.usdACV,0);
    typeHtml+=`<div class="sb-row"><span class="sb-label">${t}</span><span class="sb-meta"><span class="sb-cnt">${td.length}</span><span class="sb-acv">${fmtACV(tacv)}</span></span></div>`;
  });
  const noned=deals.filter(d=>!d.types||d.types.length===0);
  if(noned.length){
    const nacv=noned.reduce((x,d)=>x+d.usdACV,0);
    typeHtml+=`<div class="sb-row"><span class="sb-label" style="color:var(--muted)">None</span><span class="sb-meta"><span class="sb-cnt">${noned.length}</span><span class="sb-acv">${fmtACV(nacv)}</span></span></div>`;
  }

  // By Region
  const regions=[...new Set(deals.map(d=>d.region).filter(Boolean))].sort();
  let regionHtml='<h3>By Region</h3>';
  regions.forEach(r=>{
    const rd=deals.filter(d=>d.region===r);
    regionHtml+=`<div class="sb-row"><span class="sb-label">${r}</span><span class="sb-meta"><span class="sb-cnt">${rd.length}</span></span></div>`;
  });

  document.getElementById('sidebar').innerHTML=stageHtml+typeHtml+regionHtml;
}

// ── Auto-start if already authed ──────────────────────────────────────────────
if(sessionStorage.getItem('ehub_auth')==='1') init();
</script>
