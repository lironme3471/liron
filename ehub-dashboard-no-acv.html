// ── Password gate ──────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('ehub-auth','1');
    document.getElementById('pw-overlay').style.display='none';
    document.getElementById('main').style.display='block';
  } else {
    document.getElementById('pw-error').style.display='block';
  }
}
if (sessionStorage.getItem('ehub-auth')==='1') {
  document.getElementById('pw-overlay').style.display='none';
  document.getElementById('main').style.display='block';
}

// ── Sort state ─────────────────────────────────────────────────
let sortCol = 'closeDate', sortDir = -1;

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderTable();
}

// ── Filters ────────────────────────────────────────────────────
function getRegions() {
  const s = new Set();
  deals.forEach(d => { if (d.region && d.region !== '—') s.add(d.region); });
  return [...s].sort();
}
function populateRegions() {
  const sel = document.getElementById('filter-region');
  getRegions().forEach(r => { const o = document.createElement('option'); o.value = r; o.text = r; sel.appendChild(o); });
}

function hubBadge(hub) {
  if (hub === 'RT + Offline') return '<span class="badge badge-rt-offline">RT + Offline</span>';
  if (hub === 'Offline') return '<span class="badge badge-offline">Offline</span>';
  return '<span class="badge badge-rt">Real-Time</span>';
}
function integrationBadges(arr) {
  return arr.map(i => {
    if (i === 'SmartReach') return '<span class="badge badge-smartreach">SmartReach</span>';
    if (i === 'Ticketing') return '<span class="badge badge-ticketing">Ticketing</span>';
    if (i === 'AMC') return '<span class="badge badge-amc">AMC</span>';
    return '';
  }).join('');
}
function goliveBadge(golive, status) {
  if (status === 'Live') return '<span class="badge badge-live">Live</span>';
  if (status === 'Delayed') return `<span class="badge badge-delayed">Delayed</span> <span style="font-size:11px;color:#888">${golive.replace('Delayed ','')}</span>`;
  if (status === 'ETA') return `<span class="badge badge-eta">ETA</span> <span style="font-size:11px;color:#888">${golive.replace('ETA ','')}</span>`;
  return '<span class="badge badge-tbd">TBD</span>';
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const fRegion = document.getElementById('filter-region').value;
  const fHub = document.getElementById('filter-hub').value;
  const fGolive = document.getElementById('filter-golive').value;
  const fIntegration = document.getElementById('filter-integration').value;

  let filtered = deals.filter(d => {
    if (search && !d.account.toLowerCase().includes(search) && !d.name.toLowerCase().includes(search) && !d.parent.toLowerCase().includes(search)) return false;
    if (fRegion && d.region !== fRegion) return false;
    if (fHub && d.hub !== fHub) return false;
    if (fGolive && d.goliveStatus !== fGolive) return false;
    if (fIntegration && !d.integration.includes(fIntegration)) return false;
    return true;
  });

  // sort
  filtered.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'agents') { av = av ?? -1; bv = bv ?? -1; }
    if (av == null) av = '';
    if (bv == null) bv = '';
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });

  // update KPIs
  const vis = filtered;
  document.getElementById('kpi-total').textContent = vis.length;
  document.getElementById('kpi-live').textContent = vis.filter(d=>d.goliveStatus==='Live').length;
  document.getElementById('kpi-delayed').textContent = vis.filter(d=>d.goliveStatus==='Delayed').length;
  document.getElementById('kpi-eta').textContent = vis.filter(d=>d.goliveStatus==='ETA').length;
  document.getElementById('kpi-tbd').textContent = vis.filter(d=>d.goliveStatus==='TBD').length;

  // group by parent, order groups by max closeDate desc
  const groups = {};
  filtered.forEach(d => {
    if (!groups[d.parent]) groups[d.parent] = [];
    groups[d.parent].push(d);
  });
  const groupOrder = Object.keys(groups).sort((a, b) => {
    const maxA = groups[a].map(d=>d.closeDate).sort().reverse()[0];
    const maxB = groups[b].map(d=>d.closeDate).sort().reverse()[0];
    return maxA < maxB ? 1 : maxA > maxB ? -1 : 0;
  });

  // update sort headers
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    const col = th.getAttribute('onclick')?.match(/sortBy\('(\w+)'\)/)?.[1];
    if (col === sortCol) th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  });

  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10" class="no-results">No deals match the current filters.</td></tr>`;
    return;
  }

  let html = '';
  groupOrder.forEach(parent => {
    const rows = groups[parent];
    const cnt = rows.length;
    html += `<tr class="group-header"><td colspan="10">▸ ${parent} &nbsp;<span style="font-weight:400;color:#555">(${cnt} deal${cnt>1?'s':''})</span></td></tr>`;
    rows.forEach(d => {
      const agentsTxt = d.agents != null ? d.agents.toLocaleString() : '—';
      const regionTxt = d.region && d.region !== '—' ? d.region : '—';
      html += `<tr class="data-row">
        <td style="font-weight:500">${d.account}</td>
        <td><a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${d.name}</a></td>
        <td style="white-space:nowrap;font-size:12px">${d.type}</td>
        <td>${integrationBadges(d.integration)}</td>
        <td>${hubBadge(d.hub)}</td>
        <td style="white-space:nowrap">${d.closeDate}</td>
        <td style="text-align:right">${agentsTxt}</td>
        <td>${regionTxt}</td>
        <td style="white-space:nowrap">${goliveBadge(d.golive, d.goliveStatus)}</td>
        <td style="white-space:nowrap;font-size:12px">${d.owner}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

// ── Init ───────────────────────────────────────────────────────
document.getElementById('date-banner').textContent = 'Dashboard generated on 2026-07-10 — data reflects Salesforce as of that date.';
document.getElementById('total-label').textContent = `${deals.length} deals`;
populateRegions();
renderTable();
</script>
</body>
