const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw() {
  const v = document.getElementById('gate-input').value;
  const h = await sha256(v);
  if (h === HASH) {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('gate-overlay').style.display='none';
    document.getElementById('main').style.display='block';
    initDashboard();
  } else {
    document.getElementById('gate-err').style.display='block';
  }
}
if (sessionStorage.getItem('ehub_auth')==='1') {

function populateRegionFilter() {

  const sel = document.getElementById('f-region');
  regions.forEach(r => { const o=document.createElement('option'); o.value=r; o.textContent=r; sel.appendChild(o); });
}

  const total = data.length;
  const live = data.filter(d=>d.goLive.status==='Live').length;
  const delayed = data.filter(d=>d.goLive.status==='Delayed').length;
  const eta = data.filter(d=>d.goLive.status==='ETA').length;
  const tbd = data.filter(d=>d.goLive.status==='TBD').length;
  document.getElementById('kpi-bar').innerHTML = `
    <div class="kpi"><div class="kpi-label">Total Deals</div><div class="kpi-val">${total}</div></div>
    <div class="kpi live"><div class="kpi-label">Live</div><div class="kpi-val" style="color:#276749">${live}</div></div>
    <div class="kpi delayed"><div class="kpi-label">Delayed</div><div class="kpi-val" style="color:#e53e3e">${delayed}</div></div>
    <div class="kpi eta"><div class="kpi-label">ETA</div><div class="kpi-val" style="color:#d69e2e">${eta}</div></div>
    <div class="kpi tbd"><div class="kpi-label">TBD</div><div class="kpi-val" style="color:#a0aec0">${tbd}</div></div>`;
}

function goLiveSortKey(d) {
  const s = d.goLive.status;
  if (s==='Live') return '0';
  if (s==='Delayed') return '1_'+(d.goLive.date||'9999');
  if (s==='ETA') return '2_'+(d.goLive.date||'9999');
  return '3';
}

function sortBy(col) {
  if (sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  applyFilters();
}

function applyFilters() {
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const reg=document.getElementById('f-region').value;
  const hub=document.getElementById('f-hub').value;
  const gl=document.getElementById('f-golive').value;
  const intg=document.getElementById('f-int').value;
  filtered = RAW.filter(d=>{
    if(q && !d.account.toLowerCase().includes(q) && !d.name.toLowerCase().includes(q) && !d.topParent.toLowerCase().includes(q)) return false;
    if(reg && d.region!==reg) return false;
    if(hub && d.hub!==hub) return false;
    if(gl && d.goLive.status!==gl) return false;
    if(intg && !d.integrations.includes(intg)) return false;
    return true;
  });
  renderKPI(filtered);
  render(filtered);
}

function render(data) {
  // Group by topParent
  const groups = {};
  data.forEach(d=>{
    const g = d.topParent||d.account;
    if(!groups[g]) groups[g]={deals:[],maxDate:''};
    groups[g].deals.push(d);
    if(d.closeDate > groups[g].maxDate) groups[g].maxDate=d.closeDate;
  });
  // Sort groups by maxDate desc
  const sortedGroups = Object.entries(groups).sort((a,b)=>b[1].maxDate.localeCompare(a[1].maxDate));

  const tbody = document.getElementById('deals-tbody');
  if(data.length===0){ tbody.innerHTML='<tr><td colspan="10" class="no-results">No deals match the current filters.</td></tr>'; return; }

  let html='';
  sortedGroups.forEach(([gName,gData])=>{
    const cnt=gData.deals.length;
    html+=`<tr class="group-row"><td colspan="10">${gName} &nbsp;<span style="font-weight:400;color:#555">(${cnt} deal${cnt>1?'s':''})</span></td></tr>`;
    // Sort deals within group by closeDate desc
    gData.deals.sort((a,b)=>b.closeDate.localeCompare(a.closeDate));
    gData.deals.forEach(d=>{
      const intBadges = d.integrations.map(i=>{
        const cls = i==='SmartReach'?'int-smartreach':i==='Ticketing'?'int-ticketing':'int-amc';
        return `<span class="badge ${cls}">${i}</span>`;
      }).join('');
      const hubBadge = d.hub==='RT + Offline'?`<span class="badge hub-rtoffline">RT + Offline</span>`:
                       d.hub==='Offline'?`<span class="badge hub-offline">Offline</span>`:
                       `<span class="badge hub-rt">Real-Time</span>`;
      let glHtml='';
      if(d.goLive.status==='Live') glHtml=`<span class="go-live gl-live">✓ Live</span>`;
      else if(d.goLive.status==='Delayed') glHtml=`<span class="go-live gl-delayed">⚠ Delayed${d.goLive.date?' '+d.goLive.date:''}</span>`;
      else if(d.goLive.status==='ETA') glHtml=`<span class="go-live gl-eta">→ ETA ${d.goLive.date||''}</span>`;
      else glHtml=`<span class="go-live gl-tbd">TBD</span>`;
      const sfUrl=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
      html+=`<tr>
        <td>${d.account}</td>
        <td><a class="deal-link" href="${sfUrl}" target="_blank">${d.name}</a></td>
        <td style="white-space:nowrap;font-size:0.75rem">${d.type||''}</td>
        <td>${intBadges}</td>
        <td>${hubBadge}</td>
        <td style="white-space:nowrap">${d.closeDate}</td>
        <td style="text-align:right">${d.agents!=null?d.agents.toLocaleString():'—'}</td>
        <td>${d.region||'—'}</td>
        <td>${glHtml}</td>
        <td style="white-space:nowrap;font-size:0.78rem">${d.owner}</td>
      </tr>`;
    });
  });
  tbody.innerHTML=html;
}
</script>
</body>
</html>
