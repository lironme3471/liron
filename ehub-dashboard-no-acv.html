// ─── Password Gate ───────────────────────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function checkPwd() {
  const val = document.getElementById('gate-input').value;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('gate-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    init();
  } else {
    document.getElementById('gate-error').style.display = 'block';
  }
}

if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('gate-overlay').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

// ─── Helper functions ─────────────────────────────────────────────────────────
function daysDiff(dateStr) {
  if (!dateStr) return null;
  return Math.round((new Date(dateStr) - TODAY) / 86400000);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function getHubType(id) {
  const isOff = OFFLINE_IDS.has(id);
  const isRT  = RT_IDS.has(id);
  if (isOff && isRT) return 'RT + Offline';
  if (isOff) return 'Offline';
  return 'Real-Time';
}

function getGoLive(d) {
  const ps = PS_MAP[d.id];
  const projEnd = ps ? ps.projEnd : null;
  const daysToEnd = daysDiff(projEnd);

  // (1) omBooked=true AND ttt!=null
  if (d.omBooked && d.ttt != null) return {status:'Live', label:'✓ Live'};

  // (2) ttt!=null AND project end NOT >30 days away
  if (d.ttt != null) {
    if (!projEnd || daysToEnd <= 30) return {status:'Live', label:'✓ Live'};
  }

  // (3) PS Project Closed AND actualGoLive AND ttt
  if (ps && ps.status === '2 - Closed' && ps.actualGoLive && d.ttt != null) {
    return {status:'Live', label:'✓ Live'};
  }

  // (4) projEnd >30 days away
  if (projEnd && daysToEnd > 30) {
    return {status:'Delayed', label:`⚠ Delayed ${fmtDate(projEnd)}`};
  }

  // Get best ETA: PSEstimatedGoLive → pmEstGoLive → expectedGoLive
  const eta = (ps ? ps.estGoLive : null) || d.pmEstGoLive || d.expectedGoLive;
  const etaDays = daysDiff(eta);

  // (5) ETA exists and past
  if (eta && etaDays <= 0) return {status:'Delayed', label:`⚠ Delayed ${fmtDate(eta)}`};

  // (6) ETA exists and future
  if (eta && etaDays > 0) return {status:'ETA', label:`→ ETA ${fmtDate(eta)}`};

  // (7) no ETA
  return {status:'TBD', label:'TBD'};
}

// ─── Sort state ───────────────────────────────────────────────────────────────
let sortCol = -1, sortDir = 1;

function sortTable(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  renderTable(getFiltered());
  // Update header indicators
  document.querySelectorAll('thead th').forEach((th,i) => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (i === col) th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  });
}

function getCellText(d, col) {
  switch(col) {
    case 0: return d.parent || d.account || '';
    case 1: return d.name || '';
    case 2: return d.type || '';
    case 3: return (d.integrations||[]).join(',');
    case 4: return d.hub || '';
    case 5: return d.closeDate || '';
    case 6: return d.agents != null ? d.agents : -1;
    case 7: return d.region || '';
    case 8: return d.goLive.status;
    case 9: return d.owner || '';
    default: return '';
  }
}

// ─── Filter & render ─────────────────────────────────────────────────────────
function getFiltered() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const region = document.getElementById('f-region').value;
  const hub = document.getElementById('f-hub').value;
  const golive = document.getElementById('f-golive').value;
  const integration = document.getElementById('f-integration').value;

  return DEALS.filter(d => {
    if (search && !(d.account.toLowerCase().includes(search) || d.name.toLowerCase().includes(search) || (d.parent||'').toLowerCase().includes(search))) return false;
    if (region && d.region !== region) return false;
    if (hub && d.hub !== hub) return false;
    if (golive && d.goLive.status !== golive) return false;
    if (integration && !d.integrations.includes(integration)) return false;
    return true;
  });
}

function applyFilters() {
  renderTable(getFiltered());
}

function renderTable(filtered) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  // Update KPI tiles based on filtered set
  const glCounts = {Live:0, Delayed:0, ETA:0, TBD:0};
  filtered.forEach(d => { if (glCounts[d.goLive.status] !== undefined) glCounts[d.goLive.status]++; });
  document.getElementById('kpi-total').textContent = filtered.length;
  document.getElementById('kpi-live').textContent = glCounts.Live;
  document.getElementById('kpi-delayed').textContent = glCounts.Delayed;
  document.getElementById('kpi-eta').textContent = glCounts.ETA;
  document.getElementById('kpi-tbd').textContent = glCounts.TBD;
  document.getElementById('count-label').textContent = `Showing ${filtered.length} deal${filtered.length!==1?'s':''}`;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-results">No deals match your filters.</td></tr>';
    return;
  }

  // Sort
  let sorted = [...filtered];
  if (sortCol >= 0) {
    sorted.sort((a,b) => {
      const av = getCellText(a, sortCol);
      const bv = getCellText(b, sortCol);
      if (typeof av === 'number' && typeof bv === 'number') return sortDir*(av-bv);
      return sortDir * String(av).localeCompare(String(bv));
    });
  } else {
    // Default: group by parent, sorted by most recent close date desc
    sorted.sort((a,b) => b.closeDate.localeCompare(a.closeDate));
  }

  // Group by parent account
  const groups = {};
  const groupOrder = [];
  sorted.forEach(d => {
    const grp = d.parent || d.account;
    if (!groups[grp]) { groups[grp] = []; groupOrder.push(grp); }
    groups[grp].push(d);
  });

  // Sort groups by most recent closeDate in group (desc)
  if (sortCol < 0) {
    groupOrder.sort((a,b) => {
      const maxA = groups[a].reduce((m,d) => d.closeDate > m ? d.closeDate : m, '');
      const maxB = groups[b].reduce((m,d) => d.closeDate > m ? d.closeDate : m, '');
      return maxB.localeCompare(maxA);
    });
  }

  groupOrder.forEach(grp => {
    const deals = groups[grp];
    const tr = document.createElement('tr');
    tr.className = 'group-header';
    tr.innerHTML = `<td colspan="10">${escHtml(grp)} &nbsp;<span style="font-weight:400;font-size:0.82rem;opacity:0.85">(${deals.length} deal${deals.length!==1?'s':''})</span></td>`;
    tbody.appendChild(tr);

    deals.forEach(d => {
      const row = document.createElement('tr');

      // Hub badge
      let hubHtml = '';
      if (d.hub === 'RT + Offline') hubHtml = `<span class="hub-badge hub-rt-offline">RT + Offline</span>`;
      else if (d.hub === 'Offline') hubHtml = `<span class="hub-badge hub-offline">Offline</span>`;
      else hubHtml = `<span class="hub-badge hub-rt">Real-Time</span>`;

      // Integration badges
      const intHtml = d.integrations.length === 0 ? '' :
        d.integrations.map(i => {
          if (i === 'SmartReach') return `<span class="int-badge int-smartreach">SmartReach</span>`;
          if (i === 'Ticketing') return `<span class="int-badge int-ticketing">Ticketing</span>`;
          if (i === 'AMC') return `<span class="int-badge int-amc">AMC</span>`;
          return '';
        }).join(' ');

      // Go-Live class
      let glClass = '';
      if (d.goLive.status === 'Live') glClass = 'gl-live';
      else if (d.goLive.status === 'Delayed') glClass = 'gl-delayed';
      else if (d.goLive.status === 'ETA') glClass = 'gl-eta';
      else glClass = 'gl-tbd';

      row.innerHTML = `
        <td>${escHtml(d.account)}</td>
        <td><a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${escHtml(d.name)}</a></td>
        <td>${escHtml(d.type||'—')}</td>
        <td>${intHtml}</td>
        <td>${hubHtml}</td>
        <td>${fmtDate(d.closeDate)}</td>
        <td>${d.agents != null ? d.agents.toLocaleString() : '—'}</td>
        <td>${escHtml(d.region||'—')}</td>
        <td class="${glClass}">${d.goLive.label}</td>
        <td>${escHtml(d.owner||'—')}</td>
      `;
      tbody.appendChild(row);
    });
  });
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('banner').textContent =
    'Dashboard generated on 2026-07-05 — data reflects Salesforce as of that date.';
  renderTable(DEALS);
}

if (sessionStorage.getItem('ehub_auth') === '1') {
  window.addEventListener('DOMContentLoaded', init);
