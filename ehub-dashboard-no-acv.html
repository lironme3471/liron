  header .title { font-size: 15px; color: #ccc; }

  .banner {

    padding: 8px 28px; font-size: 13px; color: #7a6000; font-weight: 500;
  }

  .kpi-bar {
    display: flex; gap: 16px; padding: 20px 28px 0;
    flex-wrap: wrap;
  }
  .kpi-tile {
    background: #fff; border-radius: 10px; padding: 16px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); min-width: 130px; text-align: center;

  .kpi-tile.live { border-top-color: #36EAD0; }
  .kpi-tile.delayed { border-top-color: #FF5B8A; }
  .kpi-tile.eta { border-top-color: #f0c040; }
  .kpi-tile.tbd { border-top-color: #aaa; }

  .filters {

  }
  .filters input, .filters select {
    padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px;

  .filters input:focus, .filters select:focus { border-color: #3694FC; }

// ─── Password Gate ───────────────────────────────────────────
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('gate-overlay').style.display='none';
    document.getElementById('main').style.display='block';
    init();
  } else {
    document.getElementById('gate-error').textContent = 'Incorrect password. Please try again.';
  }
}

// ─── Helper functions ────────────────────────────────────────
function getHub(id) {
  const isOff = OFFLINE_IDS.has(id);
  const isRT = RT_IDS.has(id);
  if (isOff && isRT) return "RT + Offline";
  if (isOff) return "Offline";
  return "Real-Time";
}

function daysFromNow(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return Math.round((d - TODAY) / (1000*60*60*24));
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

function getGoLiveStatus(deal) {
  const proj = PS_PROJECTS[deal.id] || {};
  // (1) NICE_OM_Booked + TTT
  if (deal.omBooked && deal.ttt != null) return {status:"Live",label:"Live"};
  // (2) TTT != null and project end NOT >30 days away
  if (deal.ttt != null) {
    const endDays = daysFromNow(proj.endDate);
    if (endDays == null || endDays <= 30) return {status:"Live",label:"Live"};
  }
  // (3) PS Status=Closed AND PSActualGoLive AND TTT
  if (proj.status==="2 - Closed" && proj.actualGoLive && deal.ttt != null) return {status:"Live",label:"Live"};
  // (4) Estimated_Project_End >30 days away
  const endDays2 = daysFromNow(proj.endDate);
  if (endDays2 != null && endDays2 > 30) return {status:"Delayed",label:`Delayed → ${formatDate(proj.endDate)}`};
  // (5) ETA past
  const eta = proj.estGoLive || deal.pmEstGoLive || deal.expectedGoLive;
  if (eta) {
    const etaDays = daysFromNow(eta);
    if (etaDays <= 0) return {status:"Delayed",label:`Delayed ${formatDate(eta)}`};
    // (6) ETA future
    return {status:"ETA",label:`ETA ${formatDate(eta)}`};
  }
  return {status:"TBD",label:"TBD"};
}

// ─── Build processed deals ───────────────────────────────────
const DEALS = ALL_DEALS.map(d => {

  return {...d, hubType:hub, goLiveObj:gl, integrations:ints};
});

// ─── Sort + Filter State ────────────────────────────────────
let sortField = 'closeDate';
let sortDir = -1; // -1 = desc
let filteredDeals = [];

function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const region = document.getElementById('filterRegion').value;
  const hub = document.getElementById('filterHub').value;
  const status = document.getElementById('filterStatus').value;
  const integ = document.getElementById('filterIntegration').value;

  filteredDeals = DEALS.filter(d => {
    if (search && !d.account.toLowerCase().includes(search) && !d.name.toLowerCase().includes(search) && !(d.topParent||'').toLowerCase().includes(search)) return false;
    if (region && d.region !== region) return false;
    if (hub && d.hubType !== hub) return false;
    if (status && d.goLiveObj.status !== status) return false;
    if (integ && !d.integrations.includes(integ)) return false;
    return true;
  });

  sortDeals();
  renderTable();
  renderKPIs();
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = -1; }
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const el = document.getElementById('th-'+field);
  if (el) {
    el.classList.add('sorted');
    el.querySelector('.sort-arrow').textContent = sortDir === 1 ? '↑' : '↓';
  }
  sortDeals();
  renderTable();
}

const fieldMap = {
  account: d=>d.topParent||d.account,
  name: d=>d.name,
  type: d=>d.contractType||'',
  hub: d=>d.hubType,
  closeDate: d=>d.closeDate,
  agents: d=>d.agents||0,
  region: d=>d.region||'',
  goLive: d=>d.goLiveObj.status,
  owner: d=>d.owner||''
};

function sortDeals() {
  const fn = fieldMap[sortField] || (d=>d.closeDate);
  filteredDeals.sort((a,b)=>{
    const va=fn(a), vb=fn(b);
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

function renderKPIs() {
  const counts = {Live:0,Delayed:0,ETA:0,TBD:0};
  filteredDeals.forEach(d => counts[d.goLiveObj.status]++);
  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi-tile"><div class="val">${filteredDeals.length}</div><div class="lbl">Total Deals</div></div>
    <div class="kpi-tile live"><div class="val">${counts.Live}</div><div class="lbl">Live</div></div>
    <div class="kpi-tile delayed"><div class="val">${counts.Delayed}</div><div class="lbl">Delayed</div></div>
    <div class="kpi-tile eta"><div class="val">${counts.ETA}</div><div class="lbl">ETA</div></div>
    <div class="kpi-tile tbd"><div class="val">${counts.TBD}</div><div class="lbl">TBD</div></div>
  `;
}

function hubBadge(hub) {
  if (hub==="RT + Offline") return `<span class="hub-badge hub-both">RT + Offline</span>`;
  if (hub==="Offline") return `<span class="hub-badge hub-offline">Offline</span>`;
  return `<span class="hub-badge hub-rt">Real-Time</span>`;
}

function intBadges(ints) {
  if (!ints || !ints.length) return '';
  return ints.map(i => {
    const cls = i==='SmartReach'?'int-smartreach':i==='Ticketing'?'int-ticketing':'int-amc';
    return `<span class="int-badge ${cls}">${i}</span>`;
  }).join('');
}

function glCell(gl) {
  const cls = gl.status==='Live'?'go-live-live':gl.status==='Delayed'?'go-live-delayed':gl.status==='ETA'?'go-live-eta':'go-live-tbd';
  return `<span class="${cls}">${gl.label}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filteredDeals.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="no-results">No deals match the current filters.</td></tr>`;
    return;
  }

  // Group by topParent, preserving sort order within each group
  // Determine group order by first appearance (most recent close date if sorted by default)
  const groupOrder = [];
  const groupMap = {};
  filteredDeals.forEach(d => {
    const g = d.topParent || d.account;
    if (!groupMap[g]) { groupMap[g] = []; groupOrder.push(g); }
    groupMap[g].push(d);
  });

  let html = '';
  groupOrder.forEach(group => {
    const rows = groupMap[group];
    html += `<tr class="group-row"><td colspan="10">${escHtml(group)} &nbsp;<span style="font-weight:400;color:#888;font-size:12px;">(${rows.length} deal${rows.length>1?'s':''})</span></td></tr>`;
    rows.forEach(d => {
      const sfLink = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
      html += `<tr>
        <td>${escHtml(d.account)}</td>
        <td><a href="${sfLink}" target="_blank">${escHtml(d.name)}</a></td>
        <td>${escHtml(d.contractType||'—')}</td>
        <td>${intBadges(d.integrations)||'—'}</td>
        <td>${hubBadge(d.hubType)}</td>
        <td style="white-space:nowrap">${formatDate(d.closeDate)||'—'}</td>
        <td style="text-align:right">${d.agents!=null?d.agents.toLocaleString():'—'}</td>
        <td>${escHtml(d.region||'—')}</td>
        <td>${glCell(d.goLiveObj)}</td>
        <td>${escHtml(d.owner||'—')}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  document.getElementById('dateBanner').textContent = `Dashboard generated on ${TODAY_STR} — data reflects Salesforce as of that date.`;
  filteredDeals = [...DEALS];
  sortDeals();
  renderKPIs();
  renderTable();
}
