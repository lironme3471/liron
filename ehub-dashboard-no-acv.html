async function checkPassword(){
  const val=document.getElementById('pwInput').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hex==='0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621'){
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('overlay').style.display='none';
    document.getElementById('main').style.display='block';
    renderDashboard();
  }else{
    document.getElementById('pwError').textContent='Incorrect password';
  }
}

DEALS.forEach(d=>{
  const glOrder={Live:0,ETA:1,Delayed:2,TBD:3};
  d.goLiveSort=(glOrder[d.goLive.status]||3)+'_'+(d.goLive.date||'9999-99-99');
  d.agentsNum=d.agents||0;
});

let sortCol='closeDate',sortDir=-1,filteredDeals=[];

function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function hubBadge(h){
  if(h==='Offline')return`<span class="badge hub-offline">Offline</span>`;
  if(h==='RT + Offline')return`<span class="badge hub-rtoffline">RT + Offline</span>`;
  return`<span class="badge hub-rt">Real-Time</span>`;
}
function intBadges(arr){
  if(!arr||!arr.length)return'—';
  return arr.map(i=>{
    if(i==='SmartReach')return`<span class="badge int-sr">SmartReach</span>`;
    if(i==='Ticketing')return`<span class="badge int-tk">Ticketing</span>`;
    if(i==='AMC')return`<span class="badge int-amc">AMC</span>`;
    return i;
  }).join(' ');
}
function glHtml(gl){
  if(gl.status==='Live')return`<span class="gl-live">✓ Live</span>`;
  if(gl.status==='Delayed')return`<span class="gl-delayed">⚠ Delayed${gl.date?' '+fmtDate(gl.date):''}</span>`;
  if(gl.status==='ETA')return`<span class="gl-eta">⏱ ETA ${fmtDate(gl.date)}</span>`;
  return`<span class="gl-tbd">— TBD</span>`;
}

function applyFilters(){
  const q=(document.getElementById('fSearch').value||'').toLowerCase();
  const rg=document.getElementById('fRegion').value;
  const hub=document.getElementById('fHub').value;
  const gl=document.getElementById('fGolive').value;
  const intF=document.getElementById('fInt').value;
  filteredDeals=DEALS.filter(d=>{
    if(q&&!d.accountName.toLowerCase().includes(q)&&!d.name.toLowerCase().includes(q))return false;
    if(rg){if(rg==='none'){if(d.region)return false;}else{if(d.region!==rg)return false;}}
    if(hub&&d.hub!==hub)return false;
    if(gl&&d.goLive.status!==gl)return false;
    if(intF&&(!d.integrations||!d.integrations.includes(intF)))return false;
    return true;
  });
  renderTable();
}

function sortBy(col){
  if(sortCol===col){sortDir*=-1;}else{sortCol=col;sortDir=col==='closeDate'?-1:1;}
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col===col);
    const ic=th.querySelector('.sort-icon');
    if(ic)ic.textContent=th.dataset.col===col?(sortDir===1?'↑':'↓'):'↕';
  });
  renderTable();
}

function renderTable(){
  const sorted=[...filteredDeals].sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av===null||av===undefined)av='';if(bv===null||bv===undefined)bv='';
    if(typeof av==='number'&&typeof bv==='number')return(av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });

  const groupMap=new Map();
  sorted.forEach(d=>{
    if(!groupMap.has(d.topParent))groupMap.set(d.topParent,[]);
    groupMap.get(d.topParent).push(d);
  });
  const groups=[...groupMap.entries()].sort((a,b)=>{
    const aMax=a[1].reduce((m,d)=>d.closeDate>m?d.closeDate:m,'');
    const bMax=b[1].reduce((m,d)=>d.closeDate>m?d.closeDate:m,'');
    return bMax.localeCompare(aMax);
  });

  const tot=filteredDeals.length;
  const live=filteredDeals.filter(d=>d.goLive.status==='Live').length;
  const delayed=filteredDeals.filter(d=>d.goLive.status==='Delayed').length;
  const eta=filteredDeals.filter(d=>d.goLive.status==='ETA').length;
  const tbd=filteredDeals.filter(d=>d.goLive.status==='TBD').length;
  document.getElementById('kTotal').textContent=tot;
  document.getElementById('kLive').textContent=live;
  document.getElementById('kDelayed').textContent=delayed;
  document.getElementById('kEta').textContent=eta;
  document.getElementById('kTbd').textContent=tbd;
  document.getElementById('dealCount').textContent=tot===DEALS.length?`${tot} deals`:`${tot} of ${DEALS.length} deals`;

  const tbody=document.getElementById('tableBody');
  if(!tot){tbody.innerHTML=`<tr><td colspan="10" class="no-results">No deals match the current filters.</td></tr>`;return;}

  let html='';
  groups.forEach(([grp,gdeals])=>{
    html+=`<tr class="group-header"><td colspan="10">▸ ${escHtml(grp)} &nbsp;·&nbsp; ${gdeals.length} deal${gdeals.length>1?'s':''}</td></tr>`;
    gdeals.forEach(d=>{
      html+=`<tr>
        <td>${escHtml(d.accountName)}</td>
        <td><a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view" target="_blank">${escHtml(d.name)}</a></td>
        <td>${escHtml(d.type||'—')}</td>
        <td><div class="int-wrap">${intBadges(d.integrations)}</div></td>
        <td>${hubBadge(d.hub)}</td>
        <td>${fmtDate(d.closeDate)}</td>
        <td>${d.agents!=null?d.agents.toLocaleString():'—'}</td>
        <td>${escHtml(d.region||'—')}</td>
        <td>${glHtml(d.goLive)}</td>
        <td>${escHtml(d.owner)}</td>
      </tr>`;
    });
  });
  tbody.innerHTML=html;
}

function escHtml(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDashboard(){
  const today=new Date();
  const dd=String(today.getDate()).padStart(2,'0');
  const mm=String(today.getMonth()+1).padStart(2,'0');
  const yyyy=today.getFullYear();
  document.getElementById('banner').textContent=
    `Dashboard generated on ${dd}/${mm}/${yyyy} — data reflects Salesforce as of that date.`;
  applyFilters();
  document.querySelectorAll('thead th').forEach(th=>{
    if(th.dataset.col===sortCol){th.classList.add('sorted');const ic=th.querySelector('.sort-icon');if(ic)ic.textContent='↓';}
  });
}

if(sessionStorage.getItem('ehub_auth')==='1'){
  document.getElementById('overlay').style.display='none';
  document.getElementById('main').style.display='block';
  renderDashboard();
}
</script>
</body>
</html>
