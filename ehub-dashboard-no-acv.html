const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const pw = document.getElementById('pw-input').value;
  const h = await sha256(pw);
  if (h === HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('gate-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    init();
  } else {
    document.getElementById('gate-error').textContent = 'Incorrect password. Please try again.';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });

function getHubType(id) {
  const isOff = offlineIds.has(id);
  const isRT = rtIds.has(id);
  if (isOff && isRT) return 'RT + Offline';
  if (isOff) return 'Offline';
  return 'Real-Time';
}

function dateDiff(dateStr) {
  // Returns days from today to dateStr (positive = future)
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(TODAY + 'T00:00:00');
  return Math.round((d - t) / 86400000);
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function getGoLiveStatus(deal) {
  const ps = psProjects[deal.id] || {};
  const ttt = deal.ttt;
  const omBooked = deal.omBooked;
  const psEndDate = ps.endDate || null;
  const psActual = ps.actualGoLive || null;
  const psEst = ps.estGoLive || null;
  const pmEst = deal.pmEstGoLive || null;
  const expected = deal.expectedGoLive || null;

  // (1) OM Booked + TTT
  if (omBooked && ttt != null) return {label:'Live', cls:'status-live'};
  // (2) TTT exists and project end NOT >30 days away
  if (ttt != null) {
    if (!psEndDate || dateDiff(psEndDate) <= 30) return {label:'Live', cls:'status-live'};
  }
  // (3) PS Status=Closed + PSActualGoLive + TTT
  if (ps.status === '2 - Closed' && psActual && ttt != null) return {label:'Live', cls:'status-live'};
  // (4) Project end > 30 days away
  if (psEndDate && dateDiff(psEndDate) > 30) return {label:`Delayed → ${fmtDate(psEndDate)}`, cls:'status-delayed'};
  // (5)+(6) ETA: use PSEstimatedGoLive → pmEstGoLive → expectedGoLive
  const eta = psEst || pmEst || expected;
  if (eta) {
    if (dateDiff(eta) <= 0) return {label:`Delayed ${fmtDate(eta)}`, cls:'status-delayed'};
    return {label:`ETA ${fmtDate(eta)}`, cls:'status-eta'};
  }
  // (7) TBD
  return {label:'TBD', cls:'status-tbd'};
}

// ─── Render ──────────────────────────────────────────────────
let allDeals = [];
let sortCol = null, sortDir = 1;
let filteredDeals = [];

function init() {
  // Banner
  document.getElementById('gen-banner').textContent =
    `Dashboard generated on ${TODAY} — data reflects Salesforce as of that date.`;

  // Build augmented deals
  allDeals = rawDeals.map(d => {
    const hub = getHubType(d.id);
    const integrations = integrationMap[d.id] || [];
    const goLive = getGoLiveStatus(d);
    return { ...d, hub, integrations, goLive };
  });

  // Sort by close date desc by default
  allDeals.sort((a, b) => b.closeDate.localeCompare(a.closeDate));

  // Populate region filter
  const regions = [...new Set(allDeals.map(d => d.region).filter(Boolean))].sort();
  const rSel = document.getElementById('f-region');
  regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; rSel.appendChild(o); });

  applyFilters();

  // Sort headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
      applyFilters();
    });
  });
}

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const region = document.getElementById('f-region').value;
  const hub = document.getElementById('f-hub').value;
  const status = document.getElementById('f-status').value;
  const integration = document.getElementById('f-integration').value;

  filteredDeals = allDeals.filter(d => {
    if (search && !d.account.toLowerCase().includes(search) && !d.name.toLowerCase().includes(search)) return false;
    if (region && d.region !== region) return false;
    if (hub && d.hub !== hub) return false;
    if (status) {
      const lbl = d.goLive.label;
      if (status === 'Live' && !lbl.startsWith('Live')) return false;
      if (status === 'Delayed' && !lbl.startsWith('Delayed')) return false;
      if (status === 'ETA' && !lbl.startsWith('ETA')) return false;
      if (status === 'TBD' && lbl !== 'TBD') return false;
    }
    if (integration) {
      if (integration === 'None' && d.integrations.length > 0) return false;
      if (integration !== 'None' && !d.integrations.includes(integration)) return false;
    }
    return true;
  });

  if (sortCol) {
    filteredDeals.sort((a, b) => {
      let va, vb;
      if (sortCol === 'account') { va = a.parentAccount; vb = b.parentAccount; }
      else if (sortCol === 'name') { va = a.name; vb = b.name; }
      else if (sortCol === 'type') { va = a.contractType||''; vb = b.contractType||''; }
      else if (sortCol === 'integration') { va = a.integrations.join(','); vb = b.integrations.join(','); }
      else if (sortCol === 'hub') { va = a.hub; vb = b.hub; }
      else if (sortCol === 'closeDate') { va = a.closeDate; vb = b.closeDate; }
      else if (sortCol === 'agents') { va = a.agents||0; vb = b.agents||0; return (va-vb)*sortDir; }
      else if (sortCol === 'region') { va = a.region||''; vb = b.region||''; }
      else if (sortCol === 'golive') { va = a.goLive.label; vb = b.goLive.label; }
      else if (sortCol === 'owner') { va = a.owner||''; vb = b.owner||''; }
      if (va < vb) return -sortDir;
      if (va > vb) return sortDir;
      return 0;
    });
  }

  renderKPIs(filteredDeals);
  renderTable(filteredDeals);
  document.getElementById('row-count').textContent = `Showing ${filteredDeals.length} of ${allDeals.length} deals`;
}

function renderKPIs(deals) {
  const total = deals.length;
  let live=0,delayed=0,eta=0,tbd=0;
  deals.forEach(d => {
    const lbl = d.goLive.label;
    if (lbl.startsWith('Live')) live++;
    else if (lbl.startsWith('Delayed')) delayed++;
    else if (lbl.startsWith('ETA')) eta++;
    else tbd++;
  });
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-live').textContent = live;
  document.getElementById('kpi-delayed').textContent = delayed;
  document.getElementById('kpi-eta').textContent = eta;
  document.getElementById('kpi-tbd').textContent = tbd;
}

function hubBadgeHtml(hub) {
  if (hub === 'RT + Offline') return '<span class="badge badge-rtoffline">RT + Offline</span>';
  if (hub === 'Offline') return '<span class="badge badge-offline">Offline</span>';
  return '<span class="badge badge-rt">Real-Time</span>';
}

function integrationBadgesHtml(integrations) {
  if (!integrations.length) return '';
  return integrations.map(i => {
    if (i === 'SmartReach') return '<span class="badge badge-smartreach">SmartReach</span>';
    if (i === 'Ticketing') return '<span class="badge badge-ticketing">Ticketing</span>';
    if (i === 'AMC') return '<span class="badge badge-amc">AMC</span>';
    return '';
  }).join('');
}

function renderTable(deals) {
  const tbody = document.getElementById('table-body');

  // Group by parentAccount, ordered by most recent close date in group desc
  const groups = {};
  deals.forEach(d => {
    const grp = d.parentAccount || d.account;
    if (!groups[grp]) groups[grp] = [];
    groups[grp].push(d);
  });

  // Sort groups by most recent close date desc
  const groupEntries = Object.entries(groups).sort((a, b) => {
    const maxA = a[1].reduce((m, d) => d.closeDate > m ? d.closeDate : m, '');
    const maxB = b[1].reduce((m, d) => d.closeDate > m ? d.closeDate : m, '');
    return maxB.localeCompare(maxA);
  });

  let html = '';
  groupEntries.forEach(([grpName, grpDeals]) => {
    const count = grpDeals.length;
    html += `<tr class="group-header"><td colspan="10">▸ ${escHtml(grpName)} <span class="count">${count} deal${count>1?'s':''}</span></td></tr>`;
    grpDeals.forEach(d => {
      const sfLink = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
      html += `<tr>
        <td>${escHtml(d.account)}</td>
        <td><a class="deal-link" href="${sfLink}" target="_blank">${escHtml(d.name)}</a></td>
        <td>${escHtml(d.contractType||'')}</td>
        <td>${integrationBadgesHtml(d.integrations)}</td>
        <td>${hubBadgeHtml(d.hub)}</td>
        <td>${fmtDate(d.closeDate)}</td>
        <td>${d.agents != null ? d.agents.toLocaleString() : '—'}</td>
        <td>${escHtml(d.region||'—')}</td>
        <td><span class="${d.goLive.cls}">${escHtml(d.goLive.label)}</span></td>
        <td>${escHtml(d.owner||'')}</td>
      </tr>`;
    });
  });
  tbody.innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function resetFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-region').value = '';
  document.getElementById('f-hub').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-integration').value = '';
  applyFilters();
}
