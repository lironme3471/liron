<style>
  :root {

  * { box-sizing:border-box; }

  /* Password gate */

  #gate .logo { font-size:30px; font-weight:800; letter-spacing:-1px; margin-bottom:6px; }

  #gate .sub { color:var(--muted); font-size:13px; margin-bottom:24px; }

                font-size:15px; margin-bottom:14px; }
  #gate button { width:100%; padding:12px; background:var(--nice-blue); color:#fff; border:none;
                 border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
  #gate button:hover { background:#1f7ce8; }
  #gate .err { color:var(--coral); font-size:13px; height:16px; margin-top:8px; }
  #app { display:none; max-width:1500px; margin:0 auto; padding:24px; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; flex-wrap:wrap; gap:10px; }
  .header .logo { font-size:24px; font-weight:800; letter-spacing:-.5px; }
  .header .logo span { color:var(--nice-blue); }
  .header .title { font-size:15px; color:var(--muted); font-weight:500; }
  .banner { background:#FFF6D6; border:1px solid #F2DE9B; color:#7a5d00; padding:10px 16px;
            border-radius:10px; font-size:13px; margin:14px 0; }
  .kpis { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:20px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .kpi .num { font-size:30px; font-weight:800; line-height:1; }
  .kpi .lab { font-size:12px; color:var(--muted); margin-top:6px; text-transform:uppercase; letter-spacing:.5px; }
  .kpi.live .num{color:#1ca35a;} .kpi.delayed .num{color:var(--coral);}
  .kpi.eta .num{color:var(--nice-blue);} .kpi.tbd .num{color:var(--muted);}
  .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
  .filters input, .filters select { padding:9px 12px; border:1px solid var(--border); border-radius:9px;
                                     font-size:13px; background:#fff; }
  .filters input[type=text]{ min-width:240px; }
  .count { font-size:13px; color:var(--muted); margin-left:auto; font-weight:500; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden;
          box-shadow:0 1px 3px rgba(0,0,0,.05); }
  thead th { background:var(--charcoal); color:#fff; text-align:left; padding:11px 12px; font-size:12px;
             font-weight:600; text-transform:uppercase; letter-spacing:.4px; cursor:pointer; white-space:nowrap; user-select:none; }
  thead th:hover { background:#2f2f3d; }
  thead th .arr { font-size:10px; margin-left:3px; opacity:.85; }
  tbody td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; vertical-align:top; }
  tbody tr:hover { background:#f8fafc; }
  .grp td { background:#eef2f9; font-weight:700; font-size:13px; color:var(--charcoal); padding:9px 12px; }
  .grp .cnt { font-weight:500; color:var(--muted); font-size:12px; margin-left:8px; }
  a.deal { color:var(--nice-blue); text-decoration:none; font-weight:500; }
  a.deal:hover { text-decoration:underline; }
  .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;
           color:#fff; white-space:nowrap; }
  .ibadge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600;
            color:#fff; margin-right:4px; margin-bottom:2px; }
  .i-SmartReach{background:#F2872E;} .i-Ticketing{background:#8B5CF6;} .i-AMC{background:#2FA84F;}
  .st-live{background:#1ca35a;} .st-delayed{background:var(--coral);} .st-eta{background:var(--nice-blue);}
  .st-tbd{background:#9aa0ad;}
  .gl-detail{ font-size:11px; color:var(--muted); display:block; margin-top:2px; }
  .muted{ color:var(--muted); }
</style>

const SF = "https://niceincontact.lightning.force.com/lightning/r/Opportunity/";
const COLS = [
  {key:"Account", label:"Account"},
  {key:"DealName", label:"Deal Name"},
  {key:"Type", label:"Type"},
  {key:"Integration", label:"Integration"},
  {key:"HubLabel", label:"Hub"},
  {key:"CloseDate", label:"Close Date"},
  {key:"Agents", label:"Agents"},
  {key:"Region", label:"Region"},
  {key:"GoLive", label:"Go-Live"},
  {key:"Owner", label:"Owner"},
];

let sortKey=null, sortDir=1;

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(s){ if(!s) return '<span class="muted">&mdash;</span>'; const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'}); }

// Password gate (SHA-256)
const STORED="0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621";
async function sha256hex(t){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
async function checkPw(){
  const v=document.getElementById('pw').value;
  const h=await sha256hex(v);
  if(h===STORED){ sessionStorage.setItem('ehub_auth','1'); unlock(); }
  else { document.getElementById('pwerr').textContent="Incorrect password"; }
}
function unlock(){ document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block'; render(); }
document.getElementById('pwbtn').onclick=checkPw;
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
if(sessionStorage.getItem('ehub_auth')==='1'){ unlock(); }

// KPI
function setKPI(){ document.getElementById('k-total').textContent=DATA.kpi.total;
  document.getElementById('k-live').textContent=DATA.kpi.live;
  document.getElementById('k-delayed').textContent=DATA.kpi.delayed;
  document.getElementById('k-eta').textContent=DATA.kpi.eta;
  document.getElementById('k-tbd').textContent=DATA.kpi.tbd; }

// Populate filter dropdowns
function uniq(arr){ return [...new Set(arr)].filter(x=>x&&x!=='—').sort(); }
function fillFilters(){
  const regs=uniq(DATA.rows.map(r=>r.Region));
  regs.forEach(r=>{ let o=document.createElement('option'); o.value=r; o.textContent=r;
    document.getElementById('f-region').appendChild(o); });
  ['Real-Time','Offline','RT + Offline'].forEach(h=>{ let o=document.createElement('option'); o.value=h; o.textContent=h;
    document.getElementById('f-hub').appendChild(o); });
  ['Live','Delayed','ETA','TBD'].forEach(s=>{ let o=document.createElement('option'); o.value=s; o.textContent=s;
    document.getElementById('f-status').appendChild(o); });
  ['SmartReach','Ticketing','AMC'].forEach(i=>{ let o=document.createElement('option'); o.value=i; o.textContent=i;
    document.getElementById('f-integ').appendChild(o); });
}

// Header
function renderHead(){
  const h=document.getElementById('head'); h.innerHTML='';
  COLS.forEach(c=>{ const th=document.createElement('th'); th.textContent=c.label;
    if(sortKey===c.key){ const s=document.createElement('span'); s.className='arr';
      s.textContent=sortDir>0?'▲':'▼'; th.appendChild(s); }
    th.onclick=()=>{ if(sortKey===c.key){ sortDir*=-1; } else { sortKey=c.key; sortDir=1; } render(); };
    h.appendChild(th); });
}

function hubBadge(r){ return '<span class="badge" style="background:'+r.HubColor+'">'+esc(r.HubLabel)+'</span>'; }
function integBadges(r){ if(!r.Integration||!r.Integration.length) return '';
  return r.Integration.map(i=>'<span class="ibadge i-'+i+'">'+esc(i)+'</span>').join(''); }
function golive(r){ let html='<span class="badge st-'+r.GoLiveCss+'">'+esc(r.GoLive)+'</span>';
  if(r.GoLiveDetail) html+='<span class="gl-detail">'+esc(r.GoLiveDetail)+'</span>'; return html; }
function dealLink(r){ return '<a class="deal" href="'+SF+r.Id+'/view" target="_blank" rel="noopener">'+esc(r.DealName)+'</a>'; }

function cell(r,key){
  switch(key){
    case "Account": return esc(r.Account);
    case "DealName": return dealLink(r);
    case "Type": return esc(r.Type);
    case "Integration": return integBadges(r);
    case "HubLabel": return hubBadge(r);
    case "CloseDate": return fmtDate(r.CloseDate);
    case "Agents": return (r.Agents==null?'<span class="muted">&mdash;</span>':r.Agents);
    case "Region": return esc(r.Region);
    case "GoLive": return golive(r);
    case "Owner": return esc(r.Owner);
  }
  return '';
}

function applyFilters(rows){
  const q=document.getElementById('f-search').value.toLowerCase();
  const reg=document.getElementById('f-region').value;
  const hub=document.getElementById('f-hub').value;
  const st=document.getElementById('f-status').value;
  const ig=document.getElementById('f-integ').value;
  return rows.filter(r=>{
    if(q && !((r.Account||'').toLowerCase().includes(q)||(r.DealName||'').toLowerCase().includes(q))) return false;
    if(reg && r.Region!==reg) return false;
    if(hub && r.HubLabel!==hub) return false;
    if(st && r.GoLive!==st) return false;
    if(ig && !(r.Integration||[]).includes(ig)) return false;
    return true;
  });
}

function rowHTML(r){
  return '<tr>'+COLS.map(c=>'<td>'+cell(r,c.key)+'</td>').join('')+'</tr>';
}

function render(){
  setKPI(); renderHead();
  const body=document.getElementById('body'); body.innerHTML='';
  let rows=applyFilters(DATA.rows);
  const NCOL=COLS.length;

  if(sortKey){
    // Flatten + global sort
    const sorted=[...rows].sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='Integration'){ x=(x||[]).join(','); y=(y||[]).join(','); }
      if(sortKey==='Agents'){ x=(x==null?-1:x); y=(y==null?-1:y); return (x-y)*sortDir; }
      if(sortKey==='CloseDate'){ x=x||''; y=y||''; return (x<y?-1:x>y?1:0)*sortDir; }
      x=(x==null?'':String(x)).toLowerCase(); y=(y==null?'':String(y)).toLowerCase();
      return (x<y?-1:x>y?1:0)*sortDir;
    });
    sorted.forEach(r=>body.insertAdjacentHTML('beforeend',rowHTML(r)));
    document.getElementById('count').textContent=sorted.length+' deals';
  } else {
    // Grouped by Top Parent, ordered by orderedGroups
    const byGroup={};
    rows.forEach(r=>{ (byGroup[r.Group]=byGroup[r.Group]||[]).push(r); });
    let shownGroups=0, shownDeals=0;
    DATA.orderedGroups.forEach(g=>{
      const gr=byGroup[g]; if(!gr||!gr.length) return;
      shownGroups++; shownDeals+=gr.length;
      body.insertAdjacentHTML('beforeend',
        '<tr class="grp"><td colspan="'+NCOL+'">'+esc(g)+
        '<span class="cnt">'+gr.length+' deal'+(gr.length>1?'s':'')+'</span></td></tr>');
      // sort deals within group by close date desc
      gr.sort((a,b)=>(b.CloseDate||'').localeCompare(a.CloseDate||''));
      gr.forEach(r=>body.insertAdjacentHTML('beforeend',rowHTML(r)));
    });
    document.getElementById('count').textContent=shownDeals+' deals · '+shownGroups+' accounts';
  }
}

fillFilters();
['f-search','f-region','f-hub','f-status','f-integ'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});
</script>
