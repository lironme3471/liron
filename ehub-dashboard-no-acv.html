  /* ── Password gate ── */
  #gate{position:fixed;inset:0;background:#21212Bee;display:flex;align-items:center;justify-content:center;z-index:9999;}
  #gate-card{background:#fff;border-radius:12px;padding:40px 48px;width:360px;text-align:center;box-shadow:0 8px 32px #0004;}
  #gate-card h2{color:var(--blue);font-size:22px;margin-bottom:8px;}
  #gate-card p{color:var(--muted);font-size:13px;margin-bottom:24px;}
  #gate-card input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;outline:none;transition:border .2s;}
  #gate-card input:focus{border-color:var(--blue);}
  #gate-card button{margin-top:14px;width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;}
  #gate-card button:hover{background:#2480e8;}
  #gate-err{color:var(--coral);font-size:12px;margin-top:8px;min-height:16px;}

  /* ── Main layout ── */
  #app{display:none;}
  .topbar{background:var(--charcoal);color:#fff;padding:12px 28px;display:flex;align-items:center;gap:16px;}
  .topbar .logo{font-weight:700;font-size:18px;letter-spacing:-0.5px;color:var(--blue);}
  .topbar .logo span{color:#fff;}
  .topbar .title{font-size:15px;font-weight:500;color:#ccc;}
  .banner{background:#FFF8DC;border-bottom:2px solid #F0C040;padding:9px 28px;font-size:12.5px;color:#7A5F00;font-weight:500;}
  .main{padding:24px 28px;}

  /* ── KPI tiles ── */
  .kpi-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;}
  .kpi{background:#fff;border-radius:10px;padding:16px 22px;flex:1;min-width:130px;border:1.5px solid var(--border);text-align:center;}
  .kpi .num{font-size:32px;font-weight:700;line-height:1;}
  .kpi .lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
  .kpi.total .num{color:var(--blue);}
  .kpi.live .num{color:#16A34A;}
  .kpi.delayed .num{color:var(--coral);}
  .kpi.eta .num{color:#D97706;}
  .kpi.tbd .num{color:var(--muted);}

  /* ── Filters ── */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
  .filters input,.filters select{border:1.5px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12.5px;background:#fff;color:var(--text);outline:none;}
  .filters input{min-width:220px;}
  .filters input:focus,.filters select:focus{border-color:var(--blue);}
  .filters label{font-size:12px;color:var(--muted);margin-right:-4px;}

  /* ── Table ── */
  .tbl-wrap{background:#fff;border-radius:10px;border:1.5px solid var(--border);overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  th{background:#F8FAFC;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;border-bottom:1.5px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;}
  th:hover{color:var(--blue);}
  th .sort-arrow{margin-left:3px;opacity:.4;}
  th.sorted .sort-arrow{opacity:1;color:var(--blue);}
  td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.data-row:hover td{background:#F0F7FF;}

  /* ── Group header ── */
  tr.group-hdr td{background:#EEF4FF;font-weight:700;font-size:12px;color:var(--charcoal);padding:7px 12px;border-top:2px solid var(--border);}

  /* ── Badges ── */
  .badge{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap;}
  .hub-rt{background:#EBF4FF;color:var(--blue);}
  .hub-off{background:#E0FAF6;color:#0D9488;}
  .hub-both{background:#EDE9FF;color:var(--indigo);}
  .int-sr{background:#FEF3C7;color:#B45309;}
  .int-tk{background:#F3E8FF;color:#7C3AED;}
  .int-amc{background:#DCFCE7;color:#15803D;}
  .int-wrap{display:flex;gap:4px;flex-wrap:wrap;}
  .gl-live{color:#16A34A;font-weight:600;}

  .gl-eta{color:#D97706;font-weight:600;}
  .gl-tbd{color:var(--muted);font-style:italic;}
  a.sf-link{color:var(--blue);text-decoration:none;font-weight:500;}
  a.sf-link:hover{text-decoration:underline;}

  .no-results{padding:40px;text-align:center;color:var(--muted);}
</style>

// ── SHA-256 password check ──
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
const HASH='0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function checkPwd(){
  const v=document.getElementById('pwd-input').value;
  const h=await sha256(v);
  if(h===HASH){
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    document.getElementById('gate-err').textContent='Incorrect password. Try again.';
  }
}
if(sessionStorage.getItem('ehub_auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── Sort state ──
let sortCol = 'closeDate', sortDir = -1;

function sortBy(col){
  if(sortCol===col) sortDir=-sortDir; else {sortCol=col;sortDir=-1;}
  document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
  const th=document.querySelector(`th[data-col="${col}"]`);
  if(th) th.classList.add('sorted');
  render();
}

function badgeHub(h){
  if(h==='RT + Offline') return `<span class="badge hub-both">RT + Offline</span>`;
  if(h==='Offline') return `<span class="badge hub-off">Offline</span>`;
  return `<span class="badge hub-rt">Real-Time</span>`;
}
function badgeInt(arr){
  if(!arr||!arr.length) return '—';
  return `<div class="int-wrap">`+arr.map(i=>{
    if(i==='SmartReach') return `<span class="badge int-sr">SmartReach</span>`;
    if(i==='Ticketing') return `<span class="badge int-tk">Ticketing</span>`;
    if(i==='AMC') return `<span class="badge int-amc">AMC</span>`;
    return `<span class="badge">${i}</span>`;
  }).join('')+`</div>`;
}
function badgeGoLive(d){
  if(d.goLive==='Live') return `<span class="gl-live">✓ Live</span>`;
  if(d.goLive==='Delayed') return `<span class="gl-delayed">⚠ Delayed${d.goLiveDate?' '+fmtDate(d.goLiveDate):''}</span>`;
  if(d.goLive==='ETA') return `<span class="gl-eta">ETA ${fmtDate(d.goLiveDate)}</span>`;
  return `<span class="gl-tbd">TBD</span>`;
}
function fmtDate(s){
  if(!s) return '';
  const [y,m,d]=s.split('-');
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[+m-1]} ${+d}, ${y}`;
}
function glSort(d){
  if(d.goLive==='Live') return 0;
  if(d.goLive==='Delayed') return 1;
  if(d.goLive==='ETA') return 2;
  return 3;
}

function render(){
  const q=(document.getElementById('f-search').value||'').toLowerCase();
  const fReg=document.getElementById('f-region').value;
  const fHub=document.getElementById('f-hub').value;
  const fGL=document.getElementById('f-golive').value;
  const fInt=document.getElementById('f-integration').value;

  let filtered=DEALS.filter(d=>{
    if(q && !d.account.toLowerCase().includes(q) && !d.name.toLowerCase().includes(q) && !d.parent.toLowerCase().includes(q)) return false;
    if(fReg && d.region!==fReg) return false;
    if(fHub && d.hub!==fHub) return false;
    if(fGL && d.goLive!==fGL) return false;
    if(fInt){
      if(fInt==='None' && d.integrations.length>0) return false;
      if(fInt!=='None' && !d.integrations.includes(fInt)) return false;
    }
    return true;
  });

  // KPIs (on filtered set)
  document.getElementById('kpi-total').textContent=filtered.length;
  document.getElementById('kpi-live').textContent=filtered.filter(d=>d.goLive==='Live').length;
  document.getElementById('kpi-delayed').textContent=filtered.filter(d=>d.goLive==='Delayed').length;
  document.getElementById('kpi-eta').textContent=filtered.filter(d=>d.goLive==='ETA').length;
  document.getElementById('kpi-tbd').textContent=filtered.filter(d=>d.goLive==='TBD').length;

  // Sort
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortCol==='account'){va=a.parent;vb=b.parent;}
    else if(sortCol==='name'){va=a.name;vb=b.name;}
    else if(sortCol==='type'){va=a.type||'';vb=b.type||'';}
    else if(sortCol==='hub'){va=a.hub;vb=b.hub;}
    else if(sortCol==='closeDate'){va=a.closeDate;vb=b.closeDate;}
    else if(sortCol==='agents'){va=a.agents??-1;vb=b.agents??-1;}
    else if(sortCol==='region'){va=a.region||'';vb=b.region||'';}
    else if(sortCol==='goLive'){va=glSort(a);vb=glSort(b);}
    else if(sortCol==='owner'){va=a.owner;vb=b.owner;}
    else {va=a.closeDate;vb=b.closeDate;}
    if(va<vb) return sortDir;
    if(va>vb) return -sortDir;
    return 0;
  });

  // Group by parent, order groups by most recent close date
  const groupMap={};
  filtered.forEach(d=>{
    if(!groupMap[d.parent]) groupMap[d.parent]={maxDate:'',deals:[]};
    if(d.closeDate>groupMap[d.parent].maxDate) groupMap[d.parent].maxDate=d.closeDate;
    groupMap[d.parent].deals.push(d);
  });
  const groups=Object.entries(groupMap).sort((a,b)=>b[1].maxDate.localeCompare(a[1].maxDate));

  const tbody=document.getElementById('tbody');
  const noRes=document.getElementById('no-results');
  if(!filtered.length){tbody.innerHTML='';noRes.style.display='';return;}
  noRes.style.display='none';

  // If sorted by column, flatten and skip grouping
  let html='';
  if(sortCol!=='closeDate'){
    filtered.forEach(d=>{html+=rowHtml(d);});
  } else {
    groups.forEach(([parentName,gd])=>{
      html+=`<tr class="group-hdr"><td colspan="10">${parentName} <span style="font-weight:400;color:#6B7280">(${gd.deals.length} deal${gd.deals.length>1?'s':''})</span></td></tr>`;
      // Sort deals within group by close date desc
      gd.deals.sort((a,b)=>b.closeDate.localeCompare(a.closeDate));
      gd.deals.forEach(d=>{html+=rowHtml(d);});
    });
  }
  tbody.innerHTML=html;
}

function rowHtml(d){
  const sfLink=`https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
  return `<tr class="data-row">
    <td>${d.account}</td>
    <td><a class="sf-link" href="${sfLink}" target="_blank">${d.name}</a></td>
    <td>${d.type||'—'}</td>
    <td>${badgeInt(d.integrations)}</td>
    <td>${badgeHub(d.hub)}</td>
    <td>${fmtDate(d.closeDate)}</td>
    <td>${d.agents!=null?d.agents.toLocaleString():'—'}</td>
    <td>${d.region||'—'}</td>
    <td>${badgeGoLive(d)}</td>
    <td>${d.owner}</td>
  </tr>`;
}

function init(){
  document.getElementById('banner-date').textContent=
    '⚠  Dashboard generated on July 7, 2026 — data reflects Salesforce as of that date.';
  render();
}

if(sessionStorage.getItem('ehub_auth')==='1') init();
