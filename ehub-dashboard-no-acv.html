// ─── PASSWORD GATE ───────────────────────────────────────────────────────────
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

document.getElementById('pw-btn').onclick = async () => {
  const val = document.getElementById('pw-input').value;
  const h = await sha256(val);
  if (h === HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('gate-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pw-btn').click();
});
if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('gate-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // init after DOM ready
  window.addEventListener('DOMContentLoaded', init);
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let sortCol = null;
let sortDir = 'asc';
let activeFilters = { search: '', region: '', hub: '', golive: '', integration: '' };

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const today = new Date(GEN_DATE + 'T00:00:00');
  const opts = { year:'numeric', month:'long', day:'numeric' };
  document.getElementById('header-date').textContent = today.toLocaleDateString('en-US', opts);
  document.getElementById('data-banner').textContent =
    `Dashboard generated on ${today.toLocaleDateString('en-US', opts)} — data reflects Salesforce as of that date.`;

  // KPIs
  document.getElementById('kpi-total').textContent = DEALS.length;
  document.getElementById('kpi-live').textContent = DEALS.filter(d => d.glStatus === 'Live').length;
  document.getElementById('kpi-delayed').textContent = DEALS.filter(d => d.glStatus === 'Delayed').length;
  document.getElementById('kpi-eta').textContent = DEALS.filter(d => d.glStatus === 'ETA').length;
  document.getElementById('kpi-tbd').textContent = DEALS.filter(d => d.glStatus === 'TBD').length;

  // Filter listeners
  document.getElementById('search-input').addEventListener('input', e => { activeFilters.search = e.target.value.toLowerCase(); renderTable(); });
  document.getElementById('filter-region').addEventListener('change', e => { activeFilters.region = e.target.value; renderTable(); });
  document.getElementById('filter-hub').addEventListener('change', e => { activeFilters.hub = e.target.value; renderTable(); });
  document.getElementById('filter-golive').addEventListener('change', e => { activeFilters.golive = e.target.value; renderTable(); });
  document.getElementById('filter-integration').addEventListener('change', e => { activeFilters.integration = e.target.value; renderTable(); });

  renderTable();
}

function clearFilters() {
  activeFilters = { search: '', region: '', hub: '', golive: '', integration: '' };
  document.getElementById('search-input').value = '';
  document.getElementById('filter-region').value = '';
  document.getElementById('filter-hub').value = '';
  document.getElementById('filter-golive').value = '';
  document.getElementById('filter-integration').value = '';
  renderTable();
}

// ─── FILTERING ───────────────────────────────────────────────────────────────
function applyFilters(deals) {
  return deals.filter(d => {
    if (activeFilters.search) {
      const q = activeFilters.search;
      if (!d.topParent.toLowerCase().includes(q) &&
          !d.accountName.toLowerCase().includes(q) &&
          !d.name.toLowerCase().includes(q)) return false;
    }
    if (activeFilters.region && (d.region || '') !== activeFilters.region) return false;
    if (activeFilters.hub && d.hub !== activeFilters.hub) return false;
    if (activeFilters.golive && d.glStatus !== activeFilters.golive) return false;
    if (activeFilters.integration) {
      if (activeFilters.integration === 'None') {
        if (d.integrations.length > 0) return false;
      } else {
        if (!d.integrations.includes(activeFilters.integration)) return false;
      }
    }
    return true;
  });
}

// ─── SORTING ─────────────────────────────────────────────────────────────────
function sortTable(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'asc';
  }
  // Update header classes
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) {
      th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
  renderTable();
}

function getSortVal(d, col) {
  switch(col) {
    case 'account': return d.topParent.toLowerCase();
    case 'name': return d.name.toLowerCase();
    case 'type': return (d.type || '').toLowerCase();
    case 'integration': return d.integrations.join(',').toLowerCase();
    case 'hub': return d.hub.toLowerCase();
    case 'closeDate': return d.closeDate;
    case 'agents': return d.agents ?? -1;
    case 'region': return (d.region || 'zzzz').toLowerCase();
    case 'goLive': return d.glStatus + (d.glDate || '9999');
    case 'owner': return (d.owner || '').toLowerCase();
    default: return '';
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1];
  return `${mo} ${parseInt(d)}, ${y}`;
}

function hubBadge(hub) {
  if (hub === 'RT + Offline') return `<span class="hub-badge hub-rt-offline">RT + Offline</span>`;
  if (hub === 'Offline') return `<span class="hub-badge hub-offline">Offline</span>`;
  return `<span class="hub-badge hub-rt">Real-Time</span>`;
}

function intBadges(arr) {
  if (!arr || arr.length === 0) return '—';
  return arr.map(i => {
    if (i === 'SmartReach') return `<span class="int-badge int-smartreach">SmartReach</span>`;
    if (i === 'Ticketing') return `<span class="int-badge int-ticketing">Ticketing</span>`;
    if (i === 'AMC') return `<span class="int-badge int-amc">AMC</span>`;
    return '';
  }).join('');
}

function glBadge(d) {
  if (d.glStatus === 'Live') return `<span class="gl-badge gl-live">✓ Live</span>`;
  if (d.glStatus === 'Delayed') return `<span class="gl-badge gl-delayed">⚠ Delayed<br><small>${fmtDate(d.glDate)}</small></span>`;
  if (d.glStatus === 'ETA') return `<span class="gl-badge gl-eta">◷ ETA ${fmtDate(d.glDate)}</span>`;
  return `<span class="gl-badge gl-tbd">TBD</span>`;
}

function sfLink(id, name) {
  return `<a class="deal-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${id}/view" target="_blank" title="${name.replace(/"/g,'&quot;')}">${truncate(name,55)}</a>`;
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function renderTable() {
  const filtered = applyFilters(DEALS);
  document.getElementById('filter-count').textContent =
    filtered.length === DEALS.length ? `${DEALS.length} deals` : `${filtered.length} of ${DEALS.length} deals`;

  const tbody = document.getElementById('table-body');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="10">No deals match the current filters.</td></tr>';
    return;
  }

  let rows;
  if (sortCol) {
    // Flat sorted view
    const sorted = [...filtered].sort((a,b) => {
      const va = getSortVal(a, sortCol), vb = getSortVal(b, sortCol);
      if (va < vb) return sortDir === 'asc' ? -1 : 1;
      if (va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    rows = sorted.map(d => dealRow(d)).join('');
  } else {
    // Grouped view by topParent, groups ordered by most recent close date desc
    const groups = {};
    filtered.forEach(d => {
      if (!groups[d.topParent]) groups[d.topParent] = [];
      groups[d.topParent].push(d);
    });
    // Sort within each group by closeDate desc
    Object.values(groups).forEach(arr => arr.sort((a,b) => b.closeDate.localeCompare(a.closeDate)));
    // Sort groups by most recent closeDate desc
    const groupKeys = Object.keys(groups).sort((a,b) => {
      const da = groups[a][0].closeDate, db = groups[b][0].closeDate;
      return db.localeCompare(da);
    });
    rows = groupKeys.map(key => {
      const arr = groups[key];
      const header = `<tr class="group-header"><td colspan="10">${key} &nbsp;<span style="font-weight:400;color:#555;font-size:11px;">(${arr.length} deal${arr.length>1?'s':''})</span></td></tr>`;
      return header + arr.map(d => dealRow(d)).join('');
    }).join('');
  }

  tbody.innerHTML = rows;
}

function dealRow(d) {
  return `<tr>
    <td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${d.accountName}">${d.accountName}</td>
    <td style="max-width:230px;">${sfLink(d.id, d.name)}</td>
    <td style="white-space:nowrap;font-size:11px;color:#555;">${d.type || '—'}</td>
    <td>${intBadges(d.integrations)}</td>
    <td>${hubBadge(d.hub)}</td>
    <td style="white-space:nowrap;">${fmtDate(d.closeDate)}</td>
    <td style="text-align:right;font-variant-numeric:tabular-nums;">${d.agents != null ? d.agents.toLocaleString() : '—'}</td>
    <td style="white-space:nowrap;">${d.region || '—'}</td>
    <td>${glBadge(d)}</td>
    <td style="white-space:nowrap;font-size:12px;">${d.owner || '—'}</td>
  </tr>`;
}

// Auto-init if already authenticated
if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('gate-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}
</script>
