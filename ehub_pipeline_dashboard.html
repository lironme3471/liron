<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Be Vietnam Pro',-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f6fa;color:#21212b}
a{color:#3694fc;text-decoration:none} a:hover{text-decoration:underline}
#gate{position:fixed;inset:0;background:#21212b;display:flex;align-items:center;justify-content:center;z-index:1000}
#gate .card{background:#fff;border-radius:14px;padding:40px 44px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
#gate .logo{font-size:30px;font-weight:800;letter-spacing:-1px;color:#21212b}
#gate .logo span{color:#3694fc}
#gate .sub{color:#666;margin:6px 0 24px;font-size:13px}
#gate input{width:100%;padding:12px 14px;border:1px solid #d3d8e0;border-radius:8px;font-size:15px;margin-bottom:14px}
#gate input:focus{outline:none;border-color:#3694fc}
#gate button{width:100%;padding:12px;background:#3694fc;color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
#gate button:hover{background:#1f7ae0}
#gate .err{color:#cc0033;font-size:12px;height:14px;margin-bottom:8px}
#app{display:none;max-width:1500px;margin:0 auto;padding:22px}
.head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
.head h1{font-size:24px;margin:0;font-weight:800} .head h1 span{color:#3694fc}
.gen{color:#888;font-size:12px}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin:18px 0}
.stat{background:#fff;border-radius:12px;padding:14px 20px;flex:1;min-width:150px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .v{font-size:24px;font-weight:800} .stat .l{font-size:12px;color:#777;margin-top:2px}
.stat.acc{border-top:3px solid #3694fc} .stat.acv{border-top:3px solid #6100FF}
.layout{display:flex;gap:18px;align-items:flex-start}
.main{flex:1;min-width:0} .side{width:280px;flex-shrink:0}
.panel{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}
.panel h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#6100FF}
.srow{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f0f2f6;gap:8px}
.srow:last-child{border-bottom:0}
.srow .sk{color:#333;display:flex;align-items:center;gap:7px} .srow .sv{color:#777;white-space:nowrap}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters input,.filters select{padding:9px 12px;border:1px solid #d3d8e0;border-radius:8px;font-size:13px;background:#fff}
.filters input{flex:1;min-width:200px}
.filters input:focus,.filters select:focus{outline:none;border-color:#3694fc}
.count{font-size:13px;color:#777;margin-bottom:10px}
.count .hint{color:#aaa;margin-left:8px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#888;padding:11px 10px;border-bottom:2px solid #eef0f4;background:#fafbfd;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:#3694fc} th .ind{color:#3694fc;font-size:10px;margin-left:3px}
th.nosort{cursor:default} th.nosort:hover{color:#888}
td{padding:9px 10px;font-size:13px;border-bottom:1px solid #f0f2f6;vertical-align:top}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap} th.num{text-align:right}
.nowrap{white-space:nowrap} .dim{color:#ccc}
.acct-row{background:#f7f9fc;cursor:pointer} .acct-row:hover{background:#eef3fb}
.acct-name{font-weight:700;font-size:14px}
.dcount{font-weight:500;color:#888;font-size:12px;margin-left:6px}
.acct-acv{font-weight:800}
.caret{width:24px;color:#3694fc;font-size:10px}
.car{display:inline-block;transition:transform .15s} .acct-row.collapsed .car{transform:rotate(-90deg)}
.opp{max-width:340px}
.pill{display:inline-block;color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;margin:1px 2px;white-space:nowrap}
.stage{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
.stage b{font-weight:800;margin-right:4px}
.st-blue{background:#e3f0ff;color:#1f6fd6} .dot.st-blue{background:#3694fc}
.st-yellow{background:#fff5d6;color:#9a7700} .dot.st-yellow{background:#f4c020}
.st-purple{background:#ece0ff;color:#6100FF} .dot.st-purple{background:#6100FF}
.st-green{background:#d9f7e6;color:#11894e} .dot.st-green{background:#1bbd6a}
.fedramp{display:inline-block;background:#6100FF;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}
@media(max-width:1100px){.layout{flex-direction:column}.side{width:100%}}
</style></head>

</div>

const SF_BASE="https://nice.lightning.force.com/lightning/r/Opportunity/";

async function sha256hex(val){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const val=document.getElementById('pw').value;
  const h=await sha256hex(val);
  if(h===PW_HASH){ sessionStorage.setItem('ehub_ok','1'); unlock(); }
  else{ document.getElementById('err').textContent='Incorrect password'; }
}
function unlock(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function money(v){return '$'+Math.round(v||0).toLocaleString('en-US');}
const ACD_COLORS={'NICE CXone Mpower':'#3694fc','Cisco Systems':'#1ba0d7','Avaya':'#cc0000','Genesys':'#ff4f1f','Amazon Connect':'#ff9900','MS Teams':'#6264a7','Unknown':'#888'};
function acdColor(a){return ACD_COLORS[a]||'#6100FF';}
function stageClass(n){if(n==='0'||n==='1')return 'st-blue';if(n==='2'||n==='3')return 'st-yellow';if(n==='4')return 'st-purple';if(n==='5')return 'st-green';return 'st-blue';}
function regDisp(d){if(d.region&&d.territory)return d.region+' / '+d.territory;if(d.region)return d.region;if(d.territory)return d.territory;return '—';}
function stageBadge(d){return '<span class="stage '+stageClass(d.snum)+'"><b>'+esc(d.snum)+'</b>'+esc(d.sshort)+'</span>';}
function acdPill(a){return '<span class="pill" style="background:'+acdColor(a)+'">'+esc(a)+'</span>';}
function fedBadge(d){return d.fedramp==='Yes'?'<span class="fedramp">FedRAMP</span>':'';}

// columns: key, label, sortable, accessor for sort value
const COLS=[
 {key:'_caret',label:'',sortable:false},
 {key:'name',label:'Opportunity',sortable:true,get:d=>d.name.toLowerCase()},
 {key:'account',label:'Account',sortable:true,get:d=>d.account.toLowerCase()},
 {key:'stage',label:'Stage',sortable:true,get:d=>d.snum},
 {key:'close',label:'Close Date',sortable:true,get:d=>d.close},
 {key:'acv',label:'ACV',sortable:true,num:true,get:d=>d.acv},
 {key:'acd',label:'ACD',sortable:true,get:d=>d.acd.toLowerCase()},
 {key:'region',label:'Region / Territory',sortable:true,get:d=>regDisp(d).toLowerCase()},
 {key:'owner',label:'Owner',sortable:true,get:d=>d.owner.toLowerCase()},
];

let sortKey=null, sortDir=1; // dir 1 asc, -1 desc; null => grouped view
const collapsed={};

function headerClick(key,sortable){
  if(!sortable)return;
  if(sortKey!==key){ sortKey=key; sortDir=1; }
  else if(sortDir===1){ sortDir=-1; }
  else { sortKey=null; sortDir=1; } // third click -> back to grouped
  render();
}

function buildHeader(){
  const hr=document.getElementById('hrow');
  hr.innerHTML=COLS.map(c=>{
    let ind='';
    if(c.sortable && sortKey===c.key) ind='<span class="ind">'+(sortDir===1?'▲':'▼')+'</span>';
    const cls=(c.num?'num ':'')+(c.sortable?'':'nosort');
    return '<th class="'+cls+'" onclick="headerClick(\''+c.key+'\','+(c.sortable?'true':'false')+')">'+esc(c.label)+ind+'</th>';
  }).join('');
}

function filtered(){
  const q=document.getElementById('f-search').value.toLowerCase().trim();
  const st=document.getElementById('f-stage').value;
  const rg=document.getElementById('f-region').value;
  const ad=document.getElementById('f-acd').value;
  return DEALS.filter(d=>{
    if(st && d.stage!==st)return false;
    if(rg && d.regionKey!==rg)return false;
    if(ad && d.acd!==ad)return false;
    if(q){const blob=(d.name+' '+d.account+' '+d.owner+' '+d.acd+' '+regDisp(d)).toLowerCase();if(!blob.includes(q))return false;}
    return true;
  });
}

function dealCells(d,showAccount){
  return '<td></td>'+
    '<td class="opp"><a href="'+SF_BASE+esc(d.id)+'/view" target="_blank">'+esc(d.name)+'</a> '+fedBadge(d)+'</td>'+
    '<td>'+(showAccount?esc(d.account):'<span class="dim">—</span>')+'</td>'+
    '<td>'+stageBadge(d)+'</td>'+
    '<td class="nowrap">'+esc(d.close)+'</td>'+
    '<td class="num">'+money(d.acv)+'</td>'+
    '<td>'+acdPill(d.acd)+'</td>'+
    '<td>'+esc(regDisp(d))+'</td>'+
    '<td>'+esc(d.owner)+'</td>';
}

function render(){
  const data=filtered();
  const tb=document.getElementById('tbody');
  let html='', acctCount;
  if(sortKey){
    // flat sorted list
    const col=COLS.find(c=>c.key===sortKey);
    const arr=data.slice().sort((a,b)=>{const x=col.get(a),y=col.get(b);if(x<y)return -1*sortDir;if(x>y)return 1*sortDir;return 0;});
    html=arr.map(d=>'<tr>'+dealCells(d,true)+'</tr>').join('');
    acctCount=new Set(arr.map(d=>d.account)).size;
  } else {
    // grouped by account, accounts by total ACV desc, deals by close asc
    const groups={};
    data.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>{
      const av=groups[a].reduce((s,d)=>s+d.acv,0), bv=groups[b].reduce((s,d)=>s+d.acv,0);
      return bv-av;
    });
    acctCount=order.length;
    order.forEach(acct=>{
      const ds=groups[acct].slice().sort((a,b)=>a.close<b.close?-1:a.close>b.close?1:0);
      const aacv=ds.reduce((s,d)=>s+d.acv,0);
      const acds=[...new Set(ds.map(d=>d.acd))];
      const badges=acds.map(acdPill).join('');
      const isC=collapsed[acct];
      html+='<tr class="acct-row'+(isC?' collapsed':'')+'" onclick="toggleAcct(this,\''+encodeURIComponent(acct)+'\')">'+
        '<td class="caret"><span class="car">▼</span></td>'+
        '<td class="acct-name" colspan="2">'+esc(acct)+' <span class="dcount">'+ds.length+' deal'+(ds.length!==1?'s':'')+'</span></td>'+
        '<td colspan="4">'+badges+'</td>'+
        '<td class="acct-acv num">'+money(aacv)+'</td>'+
        '<td></td></tr>';
      if(!isC){
        ds.forEach(d=>{html+='<tr class="deal-row">'+dealCells(d,false)+'</tr>';});
      }
    });
  }
  tb.innerHTML=html;
  const hint=sortKey?'<span class="hint">sorted — click header again to toggle / reset to grouped</span>':'';
  document.getElementById('count').innerHTML=data.length+' deals · '+acctCount+' accounts'+hint;
  buildHeader();
  renderSidebar(data);
}

function toggleAcct(row,enc){const acct=decodeURIComponent(enc);collapsed[acct]=!collapsed[acct];render();}

function renderSidebar(data){
  const byStage={},byAcd={},byRegion={};
  data.forEach(d=>{
    byStage[d.stage]=byStage[d.stage]||[0,0];byStage[d.stage][0]++;byStage[d.stage][1]+=d.acv;
    byAcd[d.acd]=byAcd[d.acd]||[0,0];byAcd[d.acd][0]++;byAcd[d.acd][1]+=d.acv;
    byRegion[d.regionKey]=(byRegion[d.regionKey]||0)+1;
  });
  const stOrder=Object.keys(byStage).sort();
  document.getElementById('side-stage').innerHTML=stOrder.map(s=>{
    const n=s.trim()[0];
    return '<div class="srow"><span class="sk"><span class="dot '+stageClass(n)+'"></span>'+esc(s)+'</span><span class="sv">'+byStage[s][0]+' · '+money(byStage[s][1])+'</span></div>';
  }).join('');
  document.getElementById('side-acd').innerHTML=Object.keys(byAcd).sort((a,b)=>byAcd[b][1]-byAcd[a][1]).map(a=>
    '<div class="srow"><span class="sk"><span class="dot" style="background:'+acdColor(a)+'"></span>'+esc(a)+'</span><span class="sv">'+byAcd[a][0]+' · '+money(byAcd[a][1])+'</span></div>').join('');
  document.getElementById('side-region').innerHTML=Object.keys(byRegion).sort((a,b)=>byRegion[b]-byRegion[a]).map(r=>
    '<div class="srow"><span class="sk">'+esc(r)+'</span><span class="sv">'+byRegion[r]+'</span></div>').join('');
}

function init(){
  document.getElementById('st-acv').textContent=money(DEALS.reduce((s,d)=>s+d.acv,0));
  const stages=[...new Set(DEALS.map(d=>d.stage))].sort();
  const regions=[...new Set(DEALS.map(d=>d.regionKey))].sort();
  const acds=[...new Set(DEALS.map(d=>d.acd))].sort();
  const fill=(id,arr)=>{const el=document.getElementById(id);arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o);});};
  fill('f-stage',stages);fill('f-region',regions);fill('f-acd',acds);
  render();
}

if(sessionStorage.getItem('ehub_ok')==='1'){ unlock(); }
else{ window.addEventListener('load',()=>document.getElementById('pw').focus()); }
</script>
