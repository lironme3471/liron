<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>eHub Pipeline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--teal:#36EAD0;--coral:#FF5B8A;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f4f6fa;color:var(--charcoal);}
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate .card{background:#fff;border-radius:14px;padding:40px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);width:340px;}
#gate h1{color:var(--blue);font-size:26px;margin:0 0 6px;letter-spacing:-.5px;}
#gate p{color:#666;font-size:13px;margin:0 0 22px;}
#gate input{width:100%;padding:12px 14px;border:1px solid #d4d9e2;border-radius:8px;font-size:15px;margin-bottom:14px;}
#gate button{width:100%;padding:12px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#2378d8;}
#gate .err{color:var(--coral);font-size:12px;height:16px;margin-top:8px;}
#app{display:none;max-width:1500px;margin:0 auto;padding:22px;}
header.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
header.top h1{font-size:24px;margin:0;color:var(--charcoal);}
header.top h1 span{color:var(--blue);}
header.top .meta{font-size:12px;color:#888;text-align:right;}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.stat{background:#fff;border-radius:12px;padding:16px 20px;flex:1;min-width:150px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid var(--blue);}
.stat .v{font-size:24px;font-weight:700;color:var(--charcoal);}
.stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-top:3px;}
.stat.fed{border-left-color:var(--indigo);}
.stat.acd{border-left-color:var(--teal);}
.layout{display:flex;gap:18px;align-items:flex-start;}
.main{flex:1;min-width:0;}
.sidebar{width:280px;flex-shrink:0;}
.panel{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden;}
.panel h3{margin:0;padding:12px 16px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--charcoal);}
.panel table{width:100%;border-collapse:collapse;font-size:12px;}
.panel td{padding:7px 16px;border-bottom:1px solid #f0f0f4;}
.panel td:last-child{text-align:right;color:#666;}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.filters input,.filters select{padding:9px 12px;border:1px solid #d4d9e2;border-radius:8px;font-size:13px;background:#fff;}
.filters input[type=text]{flex:1;min-width:200px;}
.count{font-size:13px;color:#666;margin-left:auto;font-weight:600;}
table.deals{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:12.5px;}
table.deals thead th{background:var(--charcoal);color:#fff;text-align:left;padding:11px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;}
table.deals thead th:hover{background:#33333f;}
table.deals tbody td{padding:9px 12px;border-bottom:1px solid #eef0f4;vertical-align:middle;}
tr.acct-row{background:#eef3fb;cursor:pointer;font-weight:600;}
tr.acct-row:hover{background:#e2ebf8;}
tr.acct-row td{padding:10px 12px;color:var(--charcoal);}
tr.acct-row .toggle{display:inline-block;width:14px;color:var(--blue);}
tr.deal-row td:first-child{padding-left:22px;}
a.opp{color:var(--blue);text-decoration:none;font-weight:600;}
a.opp:hover{text-decoration:underline;}
.pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;white-space:nowrap;color:#fff;}
.stage{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.s0,.s1{background:#e3f0ff;color:#1d6fd8;}
.s2,.s3{background:#fff3cf;color:#9a7a10;}
.s4{background:#ece0ff;color:#6100FF;}
.s5{background:#d8f7ef;color:#10897a;}
.fed{background:var(--indigo);color:#fff;padding:1px 7px;border-radius:9px;font-size:10px;font-weight:700;margin-left:5px;}
.badges{display:inline-flex;gap:4px;flex-wrap:wrap;vertical-align:middle;}
.acvc{font-weight:600;white-space:nowrap;}
.sortind{margin-left:4px;font-size:10px;}
.hidden{display:none;}
@media(max-width:1000px){.layout{flex-direction:column;}.sidebar{width:100%;}}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <h1>ni<span>CE</span></h1>
    <p>eHub Pipeline Dashboard</p>
    <input type="password" id="pw" placeholder="Password" autofocus/>
    <button id="pwbtn">Access Dashboard</button>
    <div class="err" id="err"></div>

</div>

<div id="app">
  <header class="top">

    <select id="f-acd"><option value="">All ACDs</option></select>
    <span class="count" id="count"></span>

  <div class="layout">
    <div class="main">
      <table class="deals">
        <thead><tr>
          <th data-k="name">Opportunity</th>
          <th data-k="account">Account</th>
          <th data-k="stage_num">Stage</th>
          <th data-k="close">Close Date</th>
          <th data-k="acv">ACV</th>
          <th data-k="acd">ACD</th>
          <th data-k="region_disp">Region / Territory</th>
          <th data-k="owner">Owner</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="sidebar">
      <div class="panel"><h3>By Stage</h3><table id="by-stage"></table></div>
      <div class="panel"><h3>By ACD</h3><table id="by-acd"></table></div>
      <div class="panel"><h3>By Region</h3><table id="by-region"></table></div>
    </div>
  </div>
</div>

async function checkPw(){
  const val=document.getElementById('pw').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hex===PW_HASH){sessionStorage.setItem('ehub_ok','1');unlock();}
  else{document.getElementById('err').textContent='Incorrect password';}
}
function unlock(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('pwbtn').addEventListener('click',checkPw);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
if(sessionStorage.getItem('ehub_ok')==='1'){unlock();}

const STAGE_LABEL={0:'Prospecting',1:'Identification / Qualification',2:'Determining Problem',3:'Aligning Benefits & Value',4:'Confirm Value & Agreement',5:'Proposal / Negotiation'};
const ACD_COLORS={'NICE CXone Mpower':'#3694fc','Amazon Connect':'#FF9900','Cisco Systems':'#1BA0D7','Genesys':'#FF4F1F','Avaya':'#cc2027','MS Teams':'#6264A7','Unknown':'#999'};
const fmtMoney=v=>'$'+Math.round(v).toLocaleString();
function acdColor(a){return ACD_COLORS[a]||'#7a6fff';}

let sortKey=null, sortDir=1, collapsed={};

function getFiltered(){
  const q=document.getElementById('f-search').value.toLowerCase();
  const st=document.getElementById('f-stage').value;
  const rg=document.getElementById('f-region').value;
  const ad=document.getElementById('f-acd').value;
  return DEALS.filter(d=>{
    if(q && !(d.name+' '+d.account+' '+d.owner).toLowerCase().includes(q))return false;
    if(st!=='' && String(d.stage_num)!==st)return false;
    if(rg && d.region!==rg)return false;
    if(ad && d.acd!==ad)return false;
    return true;
  });
}
function stageBadge(d){return `<span class="stage s${d.stage_num}">${d.stage_num} &middot; ${d.stage_short}</span>`;}
function acdPill(a){return `<span class="pill" style="background:${acdColor(a)}">${a}</span>`;}
function dealCells(d,showAcct){
  return `<td><a class="opp" href="${d.url}" target="_blank">${d.name}</a>${d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':''}</td>`+
    `<td>${showAcct?d.account:''}</td>`+
    `<td>${stageBadge(d)}</td>`+
    `<td>${d.close||'&mdash;'}</td>`+
    `<td class="acvc">${fmtMoney(d.acv)}</td>`+
    `<td>${acdPill(d.acd)}</td>`+
    `<td>${d.region_disp}</td>`+
    `<td>${d.owner}</td>`;
}
function render(){
  const data=getFiltered();
  const tb=document.getElementById('tbody');tb.innerHTML='';
  if(sortKey){
    const s=[...data].sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(typeof x==='string'){x=x.toLowerCase();y=(y||'').toLowerCase();}
      if(x<y)return -1*sortDir;if(x>y)return 1*sortDir;return 0;
    });
    s.forEach(d=>{const tr=document.createElement('tr');tr.className='deal-row';tr.innerHTML=dealCells(d,true);tb.appendChild(tr);});
  }else{
    // group by account, sort accounts by total ACV desc
    const groups={};
    data.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>{
      const ta=groups[a].reduce((s,d)=>s+d.acv,0),tb2=groups[b].reduce((s,d)=>s+d.acv,0);return tb2-ta;});
    order.forEach(acct=>{
      const ds=groups[acct].sort((a,b)=>(a.close||'').localeCompare(b.close||''));
      const tot=ds.reduce((s,d)=>s+d.acv,0);
      const acds=[...new Set(ds.map(d=>d.acd))];
      const isC=collapsed[acct];
      const tr=document.createElement('tr');tr.className='acct-row';
      tr.innerHTML=`<td colspan="4"><span class="toggle">${isC?'&#9656;':'&#9662;'}</span> ${acct} <span style="color:#888;font-weight:400">(${ds.length} deal${ds.length>1?'s':''})</span></td>`+
        `<td class="acvc">${fmtMoney(tot)}</td>`+
        `<td colspan="3"><span class="badges">${acds.map(a=>acdPill(a)).join('')}</span></td>`;
      tr.addEventListener('click',()=>{collapsed[acct]=!collapsed[acct];render();});
      tb.appendChild(tr);
      if(!isC)ds.forEach(d=>{const r=document.createElement('tr');r.className='deal-row';r.innerHTML=dealCells(d,false);tb.appendChild(r);});
    });
  }
  const nAcct=new Set(data.map(d=>d.account)).size;
  document.getElementById('count').textContent=`${data.length} deals &middot; ${nAcct} accounts`.replace('&middot;','·');
  renderSidebar(data);
}
function renderSidebar(data){
  const byS={},byA={},byR={};
  data.forEach(d=>{
    byS[d.stage_num]=byS[d.stage_num]||{c:0,v:0};byS[d.stage_num].c++;byS[d.stage_num].v+=d.acv;
    byA[d.acd]=byA[d.acd]||{c:0,v:0};byA[d.acd].c++;byA[d.acd].v+=d.acv;
    byR[d.region]=(byR[d.region]||0)+1;
  });
  let h='';Object.keys(byS).sort().forEach(k=>{h+=`<tr><td>${k} &middot; ${STAGE_LABEL[k]}</td><td>${byS[k].c} &middot; ${fmtMoney(byS[k].v)}</td></tr>`;});
  document.getElementById('by-stage').innerHTML=h;
  h='';Object.keys(byA).sort((a,b)=>byA[b].v-byA[a].v).forEach(k=>{h+=`<tr><td>${acdPill(k)}</td><td>${byA[k].c} &middot; ${fmtMoney(byA[k].v)}</td></tr>`;});
  document.getElementById('by-acd').innerHTML=h;
  h='';Object.keys(byR).sort((a,b)=>byR[b]-byR[a]).forEach(k=>{h+=`<tr><td>${k}</td><td>${byR[k]}</td></tr>`;});
  document.getElementById('by-region').innerHTML=h;
}
function renderStats(){
  const tot=DEALS.reduce((s,d)=>s+d.acv,0);
  const nAcct=new Set(DEALS.map(d=>d.account)).size;
  const fed=DEALS.filter(d=>d.fedramp==='Yes').length;
  const nAcd=new Set(DEALS.map(d=>d.acd)).size;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="v">${DEALS.length}</div><div class="l">Open Deals</div></div>`+
    `<div class="stat"><div class="v">${nAcct}</div><div class="l">Accounts</div></div>`+
    `<div class="stat"><div class="v">${fmtMoney(tot)}</div><div class="l">Total Pipeline ACV</div></div>`+
    `<div class="stat fed"><div class="v">${fed}</div><div class="l">FedRAMP Deals</div></div>`+
    `<div class="stat acd"><div class="v">${nAcd}</div><div class="l">Distinct ACDs</div></div>`;
}
function initFilters(){
  const stages=[...new Set(DEALS.map(d=>d.stage_num))].sort();
  const fs=document.getElementById('f-stage');stages.forEach(s=>fs.innerHTML+=`<option value="${s}">${s} · ${STAGE_LABEL[s]}</option>`);
  const regs=[...new Set(DEALS.map(d=>d.region))].sort();
  const fr=document.getElementById('f-region');regs.forEach(r=>fr.innerHTML+=`<option value="${r}">${r}</option>`);
  const acds=[...new Set(DEALS.map(d=>d.acd))].sort();
  const fa=document.getElementById('f-acd');acds.forEach(a=>fa.innerHTML+=`<option value="${a}">${a}</option>`);
  ['f-search','f-stage','f-region','f-acd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
}
function initSort(){
  document.querySelectorAll('table.deals thead th').forEach(th=>{
    th.addEventListener('click',()=>{
      const k=th.dataset.k;
      if(sortKey!==k){sortKey=k;sortDir=1;}
      else if(sortDir===1){sortDir=-1;}
      else{sortKey=null;sortDir=1;} // third click -> grouped
      document.querySelectorAll('table.deals thead th .sortind').forEach(e=>e.remove());
      if(sortKey===k){const s=document.createElement('span');s.className='sortind';s.innerHTML=sortDir===1?'&#9650;':'&#9660;';th.appendChild(s);}
      render();
    });
  });
}
let _init=false;
function init(){if(_init)return;_init=true;renderStats();initFilters();initSort();render();}
</script>
