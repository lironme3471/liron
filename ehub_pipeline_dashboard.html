<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>eHub Pipeline Dashboard</title><style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f4f6fa;color:var(--charcoal);font-size:13px}
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000}
#gate .card{background:#fff;padding:40px;border-radius:14px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.4);width:340px}
#gate h1{color:var(--blue);font-size:26px;margin-bottom:6px}#gate p{color:#666;margin-bottom:20px;font-size:13px}
#gate input{width:100%;padding:11px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px;font-size:14px}
#gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
#gate .err{color:#e0245e;font-size:12px;height:16px;margin-bottom:6px}
header{background:var(--charcoal);color:#fff;padding:18px 26px;display:flex;align-items:center;gap:14px}
header .logo{font-size:24px;font-weight:800;color:var(--blue)}header .sub{font-size:13px;color:#aaa}
.wrap{padding:20px 26px;max-width:1500px;margin:0 auto}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:#fff;border-radius:12px;padding:14px 20px;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid var(--blue)}
.stat .n{font-size:24px;font-weight:800}.stat .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.layout{display:flex;gap:18px;align-items:flex-start}.main{flex:1;min-width:0}.side{width:260px;flex-shrink:0}
.side .box{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.side h3{font-size:12px;text-transform:uppercase;color:var(--blue);margin-bottom:10px;letter-spacing:.5px}
.side .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.side .row span:last-child{color:#666}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters input,.filters select{padding:8px 10px;border:1px solid #d0d4dd;border-radius:8px;font-size:13px}
.filters input{flex:1;min-width:180px}.count{font-size:12px;color:#666;margin-bottom:8px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
th{background:#eef1f7;text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;color:#666;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#e2e8f4}th .si{color:var(--blue);font-size:10px}
td{padding:8px 12px;border-top:1px solid #f0f0f0;vertical-align:top}
tr.acct{background:#f8fafd;cursor:pointer;font-weight:700}tr.acct:hover{background:#eef3fb}
tr.acct td{border-top:2px solid #e2e8f2}.deal.grouped td:first-child{padding-left:28px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;color:#fff;font-weight:600;margin:1px}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap}
.badge .num{font-weight:800;margin-right:3px}
.fed{display:inline-block;background:#efe5ff;color:var(--indigo);padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;margin-left:5px}
.s01{background:#e3f0ff;color:#1a6fd4}.s23{background:#fff5d6;color:#9a7b00}.s4{background:#efe5ff;color:#6100FF}.s5{background:#e2f7e8;color:#1f9e4d}
.arrow{display:inline-block;width:14px;transition:transform .15s}tr.collapsed .arrow{transform:rotate(-90deg)}
</style></head><body>

const COLS=[['name','Opportunity'],['acct','Account'],['sn','Stage'],['close','Close Date'],['acv','ACV'],['acd','ACD'],['region','Region / Territory'],['owner','Owner']];
let sortCol=null,sortDir=1; // sortCol null = grouped view
async function checkPw(){const v=document.getElementById('pw').value;
 const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
 const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
 if(hex===HASH){sessionStorage.setItem('ehub_ok','1');show();}else{document.getElementById('ge').textContent='Incorrect password';}}
function show(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
if(sessionStorage.getItem('ehub_ok')==='1'){window.addEventListener('DOMContentLoaded',show);}
function fmt(n){return n?'$'+Math.round(n).toLocaleString():'$0';}
function stageCls(n){if(n<=1)return 's01';if(n<=3)return 's23';if(n===4)return 's4';return 's5';}
function acdColor(a){return ACDC[a]||'#888';}
function esc(s){return(''+(s||'')).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const collapsed={};
function init(){
 const stages=[...new Set(DATA.deals.map(d=>d.stage))].sort();
 const regions=[...new Set(DATA.deals.map(d=>d.region).filter(Boolean))].sort();
 const acds=[...new Set(DATA.deals.map(d=>d.acd))].sort();
 fill('fstage','All Stages',stages);fill('fregion','All Regions',regions);fill('facd','All ACDs',acds);
 render();}
function fill(id,all,arr){document.getElementById(id).innerHTML='<option value="">'+all+'</option>'+arr.map(x=>'<option>'+esc(x)+'</option>').join('');}
function headerRow(){
 document.getElementById('hr').innerHTML=COLS.map(c=>{
  let si='';if(sortCol===c[0])si=' <span class="si">'+(sortDir>0?'▲':'▼')+'</span>';
  return '<th onclick="clickSort(\''+c[0]+'\')">'+c[1]+si+'</th>';}).join('');}
function clickSort(col){
 if(sortCol!==col){sortCol=col;sortDir=1;}
 else if(sortDir===1){sortDir=-1;}
 else{sortCol=null;sortDir=1;} // third click -> grouped
 render();}
function stageBadge(d){return '<span class="badge '+stageCls(d.sn)+'"><span class="num">'+d.sn+'</span>· '+esc(d.sshort)+'</span>';}
function dealCells(d,grouped){
 return '<td><a href="'+SF+d.id+'" target="_blank">'+esc(d.name)+'</a>'+(d.fedramp?'<span class="fed">FedRAMP</span>':'')+'</td>'+
  '<td>'+(grouped?'':esc(d.acct))+'</td><td>'+stageBadge(d)+'</td><td>'+esc(d.close)+'</td><td>'+fmt(d.acv)+'</td>'+
  '<td><span class="pill" style="background:'+acdColor(d.acd)+'">'+esc(d.acd)+'</span></td>'+
  '<td>'+esc(d.region+(d.terr?' / '+d.terr:''))+'</td><td>'+esc(d.owner)+'</td>';}
function render(){
 headerRow();
 const q=document.getElementById('fsearch').value.toLowerCase();
 const fs=document.getElementById('fstage').value,fr=document.getElementById('fregion').value,fa=document.getElementById('facd').value;
 const match=d=>(!fs||d.stage===fs)&&(!fr||d.region===fr)&&(!fa||d.acd===fa)&&(!q||(d.name+d.acct+d.owner).toLowerCase().includes(q));
 const tb=document.getElementById('tb');tb.innerHTML='';
 const fdeals=DATA.deals.filter(match);
 let dealN=fdeals.length,acvSum=0;const accSet=new Set(),fed=new Set(),acdSet=new Set();
 fdeals.forEach(d=>{acvSum+=d.acv;accSet.add(d.acct);acdSet.add(d.acd);if(d.fedramp)fed.add(d.id);});
 if(sortCol){
  const arr=[...fdeals].sort((a,b)=>{let x=a[sortCol],y=b[sortCol];
   if(typeof x==='number'){return (x-y)*sortDir;}
   return (''+x).localeCompare(''+y)*sortDir;});
  for(const d of arr){const r=document.createElement('tr');r.className='deal';r.innerHTML=dealCells(d,false);tb.appendChild(r);}
 }else{
  for(const a of DATA.accounts){
   const ds=fdeals.filter(d=>d.acct===a.name).sort((x,y)=>(x.close||'').localeCompare(y.close||''));
   if(!ds.length)continue;
   const tot=ds.reduce((s,d)=>s+d.acv,0);
   const badges=[...new Set(ds.map(d=>d.acd))].map(x=>'<span class="pill" style="background:'+acdColor(x)+'">'+esc(x)+'</span>').join('');
   const isC=collapsed[a.name];
   const tr=document.createElement('tr');tr.className='acct'+(isC?' collapsed':'');
   tr.innerHTML='<td colspan="4"><span class="arrow">▾</span> '+esc(a.name)+' <span style="color:#888;font-weight:400">('+ds.length+' deal'+(ds.length>1?'s':'')+')</span></td><td>'+fmt(tot)+'</td><td colspan="3">'+badges+'</td>';
   tr.onclick=()=>{collapsed[a.name]=!collapsed[a.name];render();};tb.appendChild(tr);
   if(!isC)for(const d of ds){const r=document.createElement('tr');r.className='deal grouped';r.innerHTML=dealCells(d,true);tb.appendChild(r);}
  }
 }
 document.getElementById('count').textContent=dealN+' deals · '+accSet.size+' accounts'+(sortCol?' · sorted':' · grouped');
 renderStats(dealN,accSet.size,acvSum,fed.size,acdSet.size);renderSide();}
function renderStats(d,a,acv,f,ac){
 const s=[['Open Deals',d],['Accounts',a],['Total Pipeline ACV',fmt(acv)],['FedRAMP',f],['Distinct ACDs',ac]];
 document.getElementById('stats').innerHTML=s.map(x=>'<div class="stat"><div class="n">'+x[1]+'</div><div class="l">'+x[0]+'</div></div>').join('');}
function renderSide(){
 const byStage={},byAcd={},byReg={};
 for(const d of DATA.deals){
  byStage[d.stage]=byStage[d.stage]||{c:0,v:0};byStage[d.stage].c++;byStage[d.stage].v+=d.acv;
  byAcd[d.acd]=byAcd[d.acd]||{c:0,v:0};byAcd[d.acd].c++;byAcd[d.acd].v+=d.acv;
  const rg=d.region||'—';byReg[rg]=(byReg[rg]||0)+1;}
 let h='';
 h+='<div class="box"><h3>By Stage</h3>'+Object.keys(byStage).sort().map(k=>'<div class="row"><span>'+esc(k)+'</span><span>'+byStage[k].c+' · '+fmt(byStage[k].v)+'</span></div>').join('')+'</div>';
 h+='<div class="box"><h3>By ACD</h3>'+Object.keys(byAcd).sort().map(k=>'<div class="row"><span><span class="pill" style="background:'+acdColor(k)+'">'+esc(k)+'</span></span><span>'+byAcd[k].c+' · '+fmt(byAcd[k].v)+'</span></div>').join('')+'</div>';
 h+='<div class="box"><h3>By Region</h3>'+Object.keys(byReg).sort().map(k=>'<div class="row"><span>'+esc(k)+'</span><span>'+byReg[k]+'</span></div>').join('')+'</div>';
 document.getElementById('side').innerHTML=h;}
</script></body></html>
