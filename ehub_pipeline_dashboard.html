*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--charcoal);}
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate .card{background:#fff;padding:40px;border-radius:14px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4);width:340px;}
#gate h1{color:var(--blue);margin:0 0 4px;font-size:26px;letter-spacing:1px;}
#gate p{color:#6b7280;margin:0 0 22px;font-size:13px;}
#gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:15px;margin-bottom:12px;}
#gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#1f7ce0;}
#gate .err{color:var(--coral);font-size:13px;height:16px;margin-top:8px;}
#app{display:none;max-width:1500px;margin:0 auto;padding:20px;}
header.top{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
header.top h1{margin:0;font-size:24px;color:var(--charcoal);} header.top h1 span{color:var(--blue);}
header.top .sub{color:#6b7280;font-size:13px;}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:140px;}
.stat .v{font-size:26px;font-weight:700;color:var(--charcoal);} .stat .l{font-size:12px;color:#6b7280;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.layout{display:flex;gap:18px;align-items:flex-start;}
.main{flex:1;min-width:0;}
.side{width:280px;flex-shrink:0;}
.side .box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.side h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;}
.side .row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f0f2f7;}
.side .row:last-child{border-bottom:none;} .side .row .rl{color:var(--charcoal);} .side .row .rv{color:#6b7280;}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.filters input,.filters select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
.filters input{flex:1;min-width:200px;}
.count{font-size:13px;color:#6b7280;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
th,td{padding:9px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f0f2f7;}
th{background:#fafbfd;color:#6b7280;font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--blue);}
th .ind{color:var(--blue);}
tr.acct{background:#f0f6ff;cursor:pointer;}
tr.acct td{font-weight:700;color:var(--charcoal);border-bottom:1px solid #dce6f5;}
tr.acct .caret{display:inline-block;width:14px;color:var(--blue);}
tr.deal td:first-child{padding-left:26px;}
a{color:var(--blue);text-decoration:none;} a:hover{text-decoration:underline;}
.pill{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.stage{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;}
.fed{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;background:var(--indigo);color:#fff;margin-left:6px;}
.acdbadges{font-weight:400;}
.acv{font-variant-numeric:tabular-nums;white-space:nowrap;}

async function checkPw(val){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex===HASH;
}
async function tryLogin(){
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){ sessionStorage.setItem('ehub_ok','1'); showApp(); }
  else { document.getElementById('err').textContent='Incorrect password'; }
}
document.getElementById('go').addEventListener('click',tryLogin);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
if(sessionStorage.getItem('ehub_ok')==='1') showApp();

const ACD_COLORS={'Amazon Connect':'#ff9900','Cisco Systems':'#1ba0d7','Genesys':'#ff4f1f','Avaya':'#cc0000','MS Teams':'#6264a7','Unknown':'#9aa3b2'};
const STAGE_COLORS={0:'#3694fc',1:'#3694fc',2:'#e0a800',3:'#e0a800',4:'#6100FF',5:'#28a745'};
function acdColor(a){return ACD_COLORS[a]||'#7a869a';}
function fmtACV(v,c){return (c==='USD'?'$':(c+' '))+Math.round(v).toLocaleString();}
function fmtDate(d){return d||'—';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

let sortCol=null, sortDir=1; // dir 1 asc, -1 desc; cycle: asc->desc->none(group)
const collapsed={};

function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}

function getFilters(){
  return {
    q:(document.getElementById('f-q')?.value||'').toLowerCase(),
    stage:document.getElementById('f-stage')?.value||'',
    region:document.getElementById('f-region')?.value||'',
    acd:document.getElementById('f-acd')?.value||'',
  };
}
function applyFilters(list){
  const f=getFilters();
  return list.filter(d=>{
    if(f.stage!==''&&String(d.stageNum)!==f.stage)return false;
    if(f.region&&d.region!==f.region)return false;
    if(f.acd&&d.acd!==f.acd)return false;
    if(f.q){const blob=(d.name+' '+d.account+' '+d.owner+' '+d.acd+' '+d.region).toLowerCase();if(!blob.includes(f.q))return false;}
    return true;
  });
}

function render(){
  const app=document.getElementById('app');
  const filtered=applyFilters(DEALS);
  // stats over filtered
  const totACV=filtered.reduce((s,d)=>s+d.acv,0);
  const accts=new Set(filtered.map(d=>d.account));
  const fed=filtered.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(filtered.map(d=>d.acd));

  // build option lists from full dataset
  const stageOpts=[...new Set(DEALS.map(d=>d.stageNum))].sort((a,b)=>a-b);
  const regionOpts=[...new Set(DEALS.map(d=>d.region))].sort();
  const acdOpts=[...new Set(DEALS.map(d=>d.acd))].sort();

  const f=getFilters();
  const cols=[['name','Opportunity'],['account','Account'],['stageNum','Stage'],['close','Close Date'],['acv','ACV'],['acd','ACD'],['region','Region / Territory'],['owner','Owner']];

  let h='';
  h+=`<header class="top"><h1>Ni<span>CE</span> eHub Pipeline</h1><div class="sub">Open opportunities (stages 0–5) · generated 2026-06-10</div></header>`;
  h+=`<div class="stats">
    <div class="stat"><div class="v">${filtered.length}</div><div class="l">Open Deals</div></div>
    <div class="stat"><div class="v">${accts.size}</div><div class="l">Accounts</div></div>
    <div class="stat"><div class="v">$${Math.round(totACV).toLocaleString()}</div><div class="l">Total Pipeline ACV</div></div>
    <div class="stat"><div class="v">${fed}</div><div class="l">FedRAMP</div></div>
    <div class="stat"><div class="v">${acds.size}</div><div class="l">Distinct ACD</div></div>
  </div>`;
  h+='<div class="layout"><div class="main">';
  h+='<div class="filters">';
  h+=`<input id="f-q" placeholder="Search opportunity, account, owner…" value="${esc(f.q)}">`;
  h+=`<select id="f-stage"><option value="">All Stages</option>${stageOpts.map(s=>`<option value="${s}" ${f.stage==String(s)?'selected':''}>Stage ${s}</option>`).join('')}</select>`;
  h+=`<select id="f-region"><option value="">All Regions</option>${regionOpts.map(r=>`<option ${f.region===r?'selected':''}>${esc(r)}</option>`).join('')}</select>`;
  h+=`<select id="f-acd"><option value="">All ACD</option>${acdOpts.map(a=>`<option ${f.acd===a?'selected':''}>${esc(a)}</option>`).join('')}</select>`;
  h+='</div>';
  h+=`<div class="count">${filtered.length} deals · ${accts.size} accounts</div>`;

  // table head
  h+='<table><thead><tr>';
  for(const [key,label] of cols){
    let ind='';
    if(sortCol===key) ind=` <span class="ind">${sortDir===1?'▲':'▼'}</span>`;
    h+=`<th data-col="${key}">${label}${ind}</th>`;
  }
  h+='</tr></thead><tbody>';

  if(sortCol){
    // flatten globally sorted
    const sorted=[...filtered].sort((a,b)=>cmp(a,b,sortCol)*sortDir);
    for(const d of sorted) h+=dealRow(d,true);
  } else {
    // group by account, sort accounts by total ACV desc
    const groups={};
    for(const d of filtered){(groups[d.account]=groups[d.account]||[]).push(d);}
    const ordered=Object.keys(groups).sort((a,b)=>{
      const sa=groups[a].reduce((s,d)=>s+d.acv,0), sb=groups[b].reduce((s,d)=>s+d.acv,0);
      return sb-sa;
    });
    for(const acct of ordered){
      const ds=groups[acct].slice().sort((a,b)=>(a.close||'').localeCompare(b.close||''));
      const tot=ds.reduce((s,d)=>s+d.acv,0);
      const accAcds=[...new Set(ds.map(d=>d.acd))];
      const badges=accAcds.map(a=>`<span class="pill" style="background:${acdColor(a)}">${esc(a)}</span>`).join(' ');
      const isC=collapsed[acct];
      h+=`<tr class="acct" data-acct="${esc(acct)}"><td colspan="${cols.length}"><span class="caret">${isC?'▸':'▾'}</span> ${esc(acct)} <span style="color:#6b7280;font-weight:400">· ${ds.length} deal${ds.length>1?'s':''}</span> <span class="acdbadges">${badges}</span> <span style="float:right">$${Math.round(tot).toLocaleString()}</span></td></tr>`;
      if(!isC){ for(const d of ds) h+=dealRow(d,false); }
    }
  }
  h+='</tbody></table>';
  h+='</div>'; // main

  // sidebar
  h+='<div class="side">';
  h+=sideBox('By Stage', byStage(filtered));
  h+=sideBox('By ACD', byACD(filtered));
  h+=sideBox('By Region', byRegion(filtered));
  h+='</div></div>';

  app.innerHTML=h;
  wire();
}

function dealRow(d,showAcct){
  const stColor=STAGE_COLORS[d.stageNum]||'#7a869a';
  const fed=d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':'';
  return `<tr class="deal">
    <td><a href="${d.url}" target="_blank">${esc(d.name)}</a></td>
    <td>${showAcct?esc(d.account):''}</td>
    <td><span class="stage" style="background:${stColor}">${d.stageNum} · ${esc(d.stageShort)}</span></td>
    <td>${fmtDate(d.close)}</td>
    <td class="acv">${fmtACV(d.acv,d.cur)}</td>
    <td><span class="pill" style="background:${acdColor(d.acd)}">${esc(d.acd)}</span>${fed}</td>
    <td>${esc(d.region)}</td>
    <td>${esc(d.owner)}</td></tr>`;
}
function cmp(a,b,key){
  let x=a[key],y=b[key];
  if(key==='acv'||key==='stageNum'){return (x||0)-(y||0);}
  return String(x||'').localeCompare(String(y||''));
}
function sideBox(title,rows){
  return `<div class="box"><h3>${title}</h3>${rows.map(r=>`<div class="row"><span class="rl">${esc(r[0])}</span><span class="rv">${r[1]}</span></div>`).join('')}</div>`;
}
function byStage(list){
  const m={};for(const d of list){(m[d.stageNum]=m[d.stageNum]||{c:0,a:0});m[d.stageNum].c++;m[d.stageNum].a+=d.acv;}
  return Object.keys(m).sort((a,b)=>a-b).map(s=>[`Stage ${s}`,`${m[s].c} · $${Math.round(m[s].a).toLocaleString()}`]);
}
function byACD(list){
  const m={};for(const d of list){(m[d.acd]=m[d.acd]||{c:0,a:0});m[d.acd].c++;m[d.acd].a+=d.acv;}
  return Object.keys(m).sort((a,b)=>m[b].a-m[a].a).map(k=>[k,`${m[k].c} · $${Math.round(m[k].a).toLocaleString()}`]);
}
function byRegion(list){
  const m={};for(const d of list){m[d.region]=(m[d.region]||0)+1;}
  return Object.keys(m).sort((a,b)=>m[b]-m[a]).map(k=>[k,String(m[k])]);
}

function wire(){
  ['f-q','f-stage','f-region','f-acd'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const ev=id==='f-q'?'input':'change';
    el.addEventListener(ev,()=>{const a=document.activeElement; render(); const n=document.getElementById(id); if(n){n.focus(); if(id==='f-q'){n.selectionStart=n.selectionEnd=n.value.length;}}});
  });
  document.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const c=th.getAttribute('data-col');
      if(sortCol!==c){sortCol=c;sortDir=1;}
      else if(sortDir===1){sortDir=-1;}
      else {sortCol=null;sortDir=1;} // third click -> grouped
      render();
    });
  });
  document.querySelectorAll('tr.acct').forEach(tr=>{
    tr.addEventListener('click',()=>{const a=tr.getAttribute('data-acct');collapsed[a]=!collapsed[a];render();});
  });
}
</script></body></html>
