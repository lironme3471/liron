<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--bg:#f4f6fb;--line:#e3e7f0;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--charcoal);}
#gate{position:fixed;inset:0;background:var(--charcoal);z-index:1000;display:flex;align-items:center;justify-content:center;}
#gate .card{background:#fff;border-radius:14px;padding:40px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);width:360px;}
#gate .logo{font-size:30px;font-weight:800;color:var(--charcoal);letter-spacing:-1px;}
#gate .logo span{color:var(--blue);}
#gate h2{font-weight:500;font-size:15px;color:#555;margin:6px 0 24px;}
#gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:15px;margin-bottom:14px;}
#gate button{width:100%;padding:12px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#1f7ae8;}
#gate .err{color:#e02d52;font-size:13px;height:16px;margin-top:8px;}
#app{display:none;}
header{background:var(--charcoal);color:#fff;padding:18px 28px;display:flex;align-items:center;gap:14px;}
header .logo{font-size:24px;font-weight:800;letter-spacing:-1px;}
header .logo span{color:var(--blue);}
header .title{font-size:16px;color:#c8ccda;font-weight:500;}
header .upd{margin-left:auto;font-size:12px;color:#8a8fa3;}
.stats{display:flex;gap:14px;padding:18px 28px;flex-wrap:wrap;}
.stat{background:#fff;border-radius:10px;padding:14px 20px;min-width:140px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.stat .n{font-size:24px;font-weight:700;color:var(--charcoal);}
.stat .l{font-size:12px;color:#7a7f92;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.main{display:flex;gap:18px;padding:0 28px 40px;align-items:flex-start;}
.content{flex:1;min-width:0;}
.sidebar{width:280px;flex-shrink:0;}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden;}
.panel h3{margin:0;padding:12px 16px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--charcoal);}
.panel .row{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--line);font-size:13px;}
.panel .row:last-child{border-bottom:0;}
.panel .row .v{font-weight:600;color:#444;}
.panel .row small{color:#8a8fa3;}
.filters{display:flex;gap:10px;padding:0 28px 16px;flex-wrap:wrap;}
.filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
.filters input{flex:1;min-width:200px;}
.count{padding:0 28px 10px;font-size:13px;color:#7a7f92;font-weight:600;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
th{background:var(--charcoal);color:#fff;text-align:left;padding:11px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{background:#2d2d3a;}
td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
tr.acct-head{background:#eef3fc;cursor:pointer;}
tr.acct-head td{font-weight:700;color:var(--charcoal);font-size:13px;}
tr.acct-head:hover{background:#e3ecfb;}
.acct-name .caret{display:inline-block;width:14px;color:var(--blue);}
.deal-row td:first-child{padding-left:30px;}
a.opp{color:var(--blue);text-decoration:none;}
a.opp:hover{text-decoration:underline;}
.pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.stage{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.s0,.s1{background:#e1efff;color:#1f6fd6;}
.s2,.s3{background:#fff3d6;color:#a9760a;}
.s4{background:#ede0ff;color:#6100FF;}
.s5{background:#dff5e6;color:#1f9d52;}
.fed{background:#ede0ff;color:#6100FF;margin-left:6px;}
.acv{font-weight:600;text-align:right;font-variant-numeric:tabular-nums;}
.acd-badges .pill{margin-left:4px;}
.sortind{font-size:10px;margin-left:3px;}
</style></head>
<body>
<div id="gate"><div class="card">
  <div class="logo">ni<span>CE</span></div>
  <h2>eHub Pipeline Dashboard</h2>
  <input type="password" id="pw" placeholder="Password" autofocus>
  <button id="pwbtn">Access Dashboard</button>
  <div class="err" id="err"></div>
</div></div>

<div id="app">
<header>
  <div class="logo">ni<span>CE</span></div>
  <div class="title">eHub Pipeline Dashboard</div>
  <div class="upd" id="upd"></div>
</header>
<div class="stats" id="stats"></div>
<div class="filters">
  <input id="f-search" placeholder="Search opportunity, account, owner...">
  <select id="f-stage"><option value="">All Stages</option></select>
  <select id="f-region"><option value="">All Regions</option></select>
  <select id="f-acd"><option value="">All ACDs</option></select>
</div>
<div class="count" id="count"></div>
<div class="main">
  <div class="content"><table id="tbl"><thead><tr id="hrow"></tr></thead><tbody id="tbody"></tbody></table></div>
  <div class="sidebar">
    <div class="panel"><h3>By Stage</h3><div id="sb-stage"></div></div>
    <div class="panel"><h3>By ACD</h3><div id="sb-acd"></div></div>
    <div class="panel"><h3>By Region</h3><div id="sb-region"></div></div>
  </div>
</div>
</div>

const SF="https://nice.lightning.force.com/lightning/r/Opportunity/";

async function checkPw(val){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex===PWHASH;
}
async function tryAuth(){
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){sessionStorage.setItem('ehub_ok','1');showApp();}
  else{document.getElementById('err').textContent='Incorrect password';}
}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('pwbtn').onclick=tryAuth;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth();});
if(sessionStorage.getItem('ehub_ok')==='1')showApp();

const COLS=[
 {key:'name',label:'Opportunity'},
 {key:'account',label:'Account'},
 {key:'stageNum',label:'Stage'},
 {key:'close',label:'Close Date'},
 {key:'acv',label:'ACV'},
 {key:'acd',label:'ACD'},
 {key:'region',label:'Region / Territory'},
 {key:'owner',label:'Owner'},
];
const ACD_COLORS={'Amazon Connect':['#fff0e0','#c2670a'],'Cisco Systems':['#e0f0ff','#0d6efd'],'Genesys':['#ffe0ec','#c2185b'],'Avaya':['#ffe5e5','#c0392b'],'MS Teams':['#e6e9ff','#4654d6'],'Unknown':['#eee','#777']};
let sortKey=null,sortDir=1,sortClicks=0;

function fmtACV(v,ccy){const s=(v||0).toLocaleString('en-US',{maximumFractionDigits:0});const sym=ccy==='USD'?'$':(ccy==='EUR'?'€':(ccy==='GBP'?'£':''));return sym+s+(sym?'':' '+(ccy||''));}
function regionStr(d){return d.territory?(d.region?d.region+' / '+d.territory:d.territory):(d.region||'—');}
function acdPill(a){const c=ACD_COLORS[a]||ACD_COLORS['Unknown'];return `<span class="pill" style="background:${c[0]};color:${c[1]}">${a}</span>`;}
function stageBadge(d){return `<span class="stage s${d.stageNum}">${d.stageNum} · ${d.stageShort}</span>`;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function getFiltered(){
  const q=document.getElementById('f-search').value.toLowerCase();
  const st=document.getElementById('f-stage').value;
  const rg=document.getElementById('f-region').value;
  const ac=document.getElementById('f-acd').value;
  return DEALS.filter(d=>{
    if(q && !((d.name+d.account+d.owner).toLowerCase().includes(q)))return false;
    if(st!=='' && String(d.stageNum)!==st)return false;
    if(rg && (d.region||'')!==rg)return false;
    if(ac && d.acd!==ac)return false;
    return true;
  });
}

function dealRowHtml(d,showAcct){
  return `<tr class="deal-row">
   <td><a class="opp" href="${SF}${d.id}/view" target="_blank">${esc(d.name)}</a>${d.fedramp==='Yes'?'<span class="pill fed">FedRAMP</span>':''}</td>
   <td>${showAcct?esc(d.account):''}</td>
   <td>${stageBadge(d)}</td>
   <td>${d.close||''}</td>
   <td class="acv">${fmtACV(d.acv,d.ccy)}</td>
   <td>${acdPill(d.acd)}</td>
   <td>${esc(regionStr(d))}</td>
   <td>${esc(d.owner)}</td></tr>`;
}

function render(){
  const data=getFiltered();
  const tbody=document.getElementById('tbody');
  let html='';
  let acctSet=new Set(data.map(d=>d.account));
  if(sortKey){
    const arr=[...data].sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'||sortKey==='stageNum'){x=x||0;y=y||0;return (x-y)*sortDir;}
      return String(x||'').localeCompare(String(y||''))*sortDir;
    });
    arr.forEach(d=>html+=dealRowHtml(d,true));
  }else{
    // group by account, sort accounts by total ACV desc
    const groups={};
    data.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const ordered=Object.keys(groups).sort((a,b)=>{
      const ta=groups[a].reduce((s,x)=>s+(x.acv||0),0);
      const tb=groups[b].reduce((s,x)=>s+(x.acv||0),0);
      return tb-ta;});
    ordered.forEach(acc=>{
      const ds=groups[acc].sort((a,b)=>String(a.close).localeCompare(String(b.close)));
      const tot=ds.reduce((s,x)=>s+(x.acv||0),0);
      const ccy=ds[0].ccy;
      const acds=[...new Set(ds.map(x=>x.acd))];
      html+=`<tr class="acct-head" data-acc="${esc(acc)}">
        <td class="acct-name"><span class="caret">▾</span>${esc(acc)} <small style="color:#7a7f92">(${ds.length})</small></td>
        <td></td><td></td><td></td><td class="acv">${fmtACV(tot,ccy)}</td>
        <td class="acd-badges">${acds.map(acdPill).join('')}</td><td></td><td></td></tr>`;
      ds.forEach(d=>html+=dealRowHtml(d,false).replace('deal-row','deal-row g-'+btoa(unescape(encodeURIComponent(acc))).replace(/[^a-zA-Z0-9]/g,'')));
    });
  }
  tbody.innerHTML=html;
  document.getElementById('count').textContent=`${data.length} deals · ${acctSet.size} accounts`;
  if(!sortKey){
    document.querySelectorAll('.acct-head').forEach(h=>{
      h.onclick=()=>{
        const cls='g-'+btoa(unescape(encodeURIComponent(h.dataset.acc))).replace(/[^a-zA-Z0-9]/g,'');
        const caret=h.querySelector('.caret');
        const open=caret.textContent==='▾';
        caret.textContent=open?'▸':'▾';
        document.querySelectorAll('.'+cls).forEach(r=>r.style.display=open?'none':'');
      };
    });
  }
  // header indicators
  document.querySelectorAll('#hrow th').forEach(th=>{
    const k=th.dataset.key;th.querySelector('.sortind').textContent=(sortKey===k)?(sortDir===1?'▲':'▼'):'';
  });
}

function buildHeader(){
  const hr=document.getElementById('hrow');
  hr.innerHTML=COLS.map(c=>`<th data-key="${c.key}">${c.label}<span class="sortind"></span></th>`).join('');
  hr.querySelectorAll('th').forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.key;
      if(sortKey!==k){sortKey=k;sortDir=1;sortClicks=1;}
      else{sortClicks++;if(sortClicks===2){sortDir=-1;}else{sortKey=null;sortClicks=0;}}
      render();
    };
  });
}

function buildStats(){
  const tot=DEALS.reduce((s,d)=>s+(d.acv||0),0);
  const accts=new Set(DEALS.map(d=>d.account)).size;
  const fed=DEALS.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(DEALS.map(d=>d.acd)).size;
  const S=[['Open Deals',DEALS.length],['Accounts',accts],['Total Pipeline ACV',fmtACV(tot,'USD')],['FedRAMP',fed],['Distinct ACD',acds]];
  document.getElementById('stats').innerHTML=S.map(s=>`<div class="stat"><div class="n">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('');
}

function buildSidebar(){
  // by stage
  const st={};DEALS.forEach(d=>{const k=d.stageNum+' · '+d.stageShort;st[k]=st[k]||{c:0,v:0};st[k].c++;st[k].v+=d.acv||0;});
  document.getElementById('sb-stage').innerHTML=Object.keys(st).sort().map(k=>`<div class="row"><span>${k}</span><span class="v">${st[k].c} <small>${fmtACV(st[k].v,'USD')}</small></span></div>`).join('');
  const ac={};DEALS.forEach(d=>{ac[d.acd]=ac[d.acd]||{c:0,v:0};ac[d.acd].c++;ac[d.acd].v+=d.acv||0;});
  document.getElementById('sb-acd').innerHTML=Object.keys(ac).sort((a,b)=>ac[b].v-ac[a].v).map(k=>`<div class="row"><span>${k}</span><span class="v">${ac[k].c} <small>${fmtACV(ac[k].v,'USD')}</small></span></div>`).join('');
  const rg={};DEALS.forEach(d=>{const k=d.region||'—';rg[k]=(rg[k]||0)+1;});
  document.getElementById('sb-region').innerHTML=Object.keys(rg).sort((a,b)=>rg[b]-rg[a]).map(k=>`<div class="row"><span>${k}</span><span class="v">${rg[k]}</span></div>`).join('');
}

function buildFilters(){
  const stages=[...new Set(DEALS.map(d=>d.stageNum))].sort();
  document.getElementById('f-stage').innerHTML='<option value="">All Stages</option>'+stages.map(s=>{const d=DEALS.find(x=>x.stageNum===s);return `<option value="${s}">${s} · ${d.stageShort}</option>`;}).join('');
  const regions=[...new Set(DEALS.map(d=>d.region).filter(Boolean))].sort();
  document.getElementById('f-region').innerHTML='<option value="">All Regions</option>'+regions.map(r=>`<option>${r}</option>`).join('');
  const acds=[...new Set(DEALS.map(d=>d.acd))].sort();
  document.getElementById('f-acd').innerHTML='<option value="">All ACDs</option>'+acds.map(a=>`<option>${a}</option>`).join('');
  ['f-search','f-stage','f-region','f-acd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
}

function init(){
  document.getElementById('upd').textContent='Updated '+new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  buildStats();buildHeader();buildFilters();buildSidebar();render();
}
</script>
