<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --nice-blue: #3694fc;
    --charcoal: #21212b;
    --indigo: #6100FF;
    --teal: #36EAD0;
    --coral: #FF5B8A;
    --bg: #f4f6fa;
    --card: #ffffff;
    --border: #e3e7ee;
    --text: #21212b;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  /* ---------- Password gate ---------- */
  #gate {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
  }
  #gate .card {
    background: #fff; border-radius: 14px; padding: 40px 36px;
    width: 360px; max-width: 90vw; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  #gate .logo { font-size: 30px; font-weight: 800; letter-spacing: -1px; color: var(--charcoal); margin-bottom: 6px; }
  #gate .logo span { color: var(--nice-blue); }
  #gate .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  #gate input {
    width: 100%; padding: 12px 14px; font-size: 15px;
    border: 1.5px solid var(--border); border-radius: 9px; margin-bottom: 14px; outline: none;
  }
  #gate input:focus { border-color: var(--nice-blue); }
  #gate button {
    width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
    background: var(--nice-blue); color: #fff; border: none; border-radius: 9px; cursor: pointer;
  }
  #gate button:hover { background: #2179d6; }
  #gate .err { color: var(--coral); font-size: 13px; height: 18px; margin-top: 10px; }
  #app { display: none; }

  /* ---------- Header ---------- */
  header {
    background: var(--charcoal); color: #fff;
    padding: 18px 26px; display: flex; align-items: center; justify-content: space-between;
  }
  header .brand { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
  header .brand span { color: var(--nice-blue); }
  header .meta { font-size: 12px; color: #b8bdc9; text-align: right; }

  /* ---------- Stats bar ---------- */
  .stats {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 18px 26px; background: #fff; border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1; min-width: 130px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 11px; padding: 13px 16px;
  }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
  .stat .value { font-size: 22px; font-weight: 700; color: var(--charcoal); }
  .stat.pipeline .value { color: var(--nice-blue); }
  .stat.fedramp .value { color: var(--indigo); }

  /* ---------- Layout ---------- */
  .layout { display: flex; align-items: flex-start; gap: 18px; padding: 18px 26px; }
  .sidebar { width: 260px; flex-shrink: 0; }
  .main { flex: 1; min-width: 0; }

  .panel { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .panel h3 { margin: 0; padding: 12px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--charcoal); border-bottom: 1px solid var(--border); background: #fafbfd; }
  .panel .prow { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; font-size: 13px; border-bottom: 1px solid #f1f3f7; }
  .panel .prow:last-child { border-bottom: none; }
  .panel .prow .k { color: var(--text); display:flex; align-items:center; gap:7px; }
  .panel .prow .v { color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; }
  .panel .prow .v b { color: var(--charcoal); }

  /* ---------- Filters ---------- */
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .filters input, .filters select {
    padding: 9px 12px; font-size: 13px; border: 1.5px solid var(--border); border-radius: 9px; background: #fff; outline: none;
  }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); }
  .filters input[type=text] { flex: 1; min-width: 200px; }
  .countbar { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .countbar b { color: var(--charcoal); }

  /* ---------- Table ---------- */
  .tablewrap { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--muted);
    padding: 11px 14px; border-bottom: 2px solid var(--border); background: #fafbfd; cursor: pointer; white-space: nowrap; user-select: none;
  }
  thead th:hover { color: var(--charcoal); }
  thead th .arrow { color: var(--nice-blue); font-size: 10px; }
  td { padding: 10px 14px; border-bottom: 1px solid #f1f3f7; vertical-align: top; }
  tbody tr:hover { background: #f9fbff; }
  td.acv, th.acv { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .subacv { color: var(--muted); font-size: 11px; }

  a.opp { color: var(--nice-blue); text-decoration: none; font-weight: 600; }
  a.opp:hover { text-decoration: underline; }

  /* account group header rows */
  tr.acct-header { background: #f0f4fb; cursor: pointer; }
  tr.acct-header:hover { background: #e7eefb; }
  tr.acct-header td { font-weight: 700; color: var(--charcoal); border-bottom: 1px solid var(--border); }
  tr.acct-header .caret { display: inline-block; width: 14px; color: var(--nice-blue); transition: transform .15s; }
  tr.acct-header.collapsed .caret { transform: rotate(-90deg); }
  tr.acct-header .acct-count { color: var(--muted); font-weight: 500; font-size: 12px; margin-left: 8px; }
  tr.acct-header .acct-total { font-variant-numeric: tabular-nums; }
  .deal-name-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }

  /* Stage badges */
  .stage-badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .stage-0, .stage-1 { background: #e3f0ff; color: #1f6fd6; }
  .stage-2, .stage-3 { background: #fff4d6; color: #a9791a; }
  .stage-4 { background: #ece1ff; color: #6100FF; }
  .stage-5 { background: #d9f7ef; color: #15876f; }

  /* ACD pills */
  .pill { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }

  /* FedRAMP badge */
  .fr-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; background: #ece1ff; color: #6100FF; letter-spacing:.3px; }

  .acd-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; vertical-align: middle; margin-left: 6px; }
  .acd-badges .pill { font-size: 10px; padding: 2px 7px; }

  .hidden { display: none !important; }
  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 20px; }
  @media (max-width: 860px) { .layout { flex-direction: column; } .sidebar { width: 100%; } }
</style>
</head>

<div id="gate">
  <div class="card">
    <div class="logo">Ni<span>CE</span></div>

    <input type="password" id="pw" placeholder="Password" autocomplete="off" />
    <button id="gateBtn">Access Dashboard</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div id="app">

    <div class="main">

        <select id="fStage"></select>
        <select id="fRegion"></select>
        <select id="fAcd"></select>

      <div class="countbar" id="countBar"></div>
      <div class="tablewrap">
        <table>
          <thead><tr id="headRow"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <footer>NiCE · eHub Pipeline Dashboard · data from Salesforce CPQ · client-side view</footer>
</div>

async function sha256hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const val = document.getElementById('pw').value;
  const err = document.getElementById('gateErr');
  const hex = await sha256hex(val);
  if (hex === STORED_HASH){
    try { sessionStorage.setItem('ehub_ok','1'); } catch(e){}
    unlock();
  } else {
    err.textContent = 'Incorrect password';
    document.getElementById('pw').value = '';
  }
}
function unlock(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render();
}
document.getElementById('gateBtn').addEventListener('click', checkPw);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
try { if (sessionStorage.getItem('ehub_ok') === '1') unlock(); } catch(e){}
window.addEventListener('DOMContentLoaded', () => { document.getElementById('pw').focus(); });

/* ---------------- Helpers ---------------- */
const COLS = [
  {key:'name',    label:'Opportunity'},
  {key:'account', label:'Account'},
  {key:'stageNum',label:'Stage'},
  {key:'closeDate',label:'Close Date'},
  {key:'usdACV',  label:'ACV', cls:'acv'},
  {key:'acd',     label:'ACD'},
  {key:'regionDisp',label:'Region / Territory'},
  {key:'owner',   label:'Owner'},
];

function fmtUSD(n){
  if (n == null) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
}
function fmtUSDk(n){
  if (n == null) return '—';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'k';
  return '$' + Math.round(n);
}
function fmtNative(d){
  if (d.currency === 'USD' || d.nativeACV == null) return '';
  try { return new Intl.NumberFormat('en-US',{style:'currency',currency:d.currency,maximumFractionDigits:0}).format(d.nativeACV); }
  catch(e){ return (Math.round(d.nativeACV)).toLocaleString() + ' ' + d.currency; }
}
function fmtDate(s){
  if (!s) return '—';
  const parts = s.split('-');
  if (parts.length !== 3) return s;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1])-1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}
const ACD_COLORS = {
  'MS Teams':        ['#e5ecff','#3b5bdb'],
  'Cisco Systems':   ['#e0f7f4','#138a73'],
  'Genesys':         ['#ffe6ef','#d6336c'],
  'Amazon Connect':  ['#fff1dd','#b5701a'],
  'Avaya':           ['#ffe3e3','#c92a2a'],
  'Content Guru':    ['#efe1ff','#7048e8'],
  'NICE CXone Mpower':['#e3f0ff','#1f6fd6'],
  'Unspecified':     ['#eceef2','#6b7280'],
};
function acdPill(acd){
  const c = ACD_COLORS[acd] || ['#eceef2','#6b7280'];
  return '<span class="pill" style="background:'+c[0]+';color:'+c[1]+'">'+escapeHtml(acd)+'</span>';
}
function stageBadge(d){
  return '<span class="stage-badge stage-'+d.stageNum+'">'+d.stageNum+' · '+escapeHtml(d.stageShort)+'</span>';
}
function escapeHtml(s){
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------------- State ---------------- */
let sortKey = null;      // null = grouped-by-account
let sortDir = 1;         // 1 asc, -1 desc
let collapsed = {};      // accountName -> true if collapsed

/* ---------------- Filtering ---------------- */
function getFiltered(){
  const q = document.getElementById('fSearch').value.trim().toLowerCase();
  const st = document.getElementById('fStage').value;
  const rg = document.getElementById('fRegion').value;
  const ac = document.getElementById('fAcd').value;
  return allDeals.filter(d => {
    if (st !== '' && String(d.stageNum) !== st) return false;
    if (rg !== '' && (d.region||'') !== rg) return false;
    if (ac !== '' && d.acd !== ac) return false;
    if (q){
      const hay = (d.name+' '+d.account+' '+(d.owner||'')+' '+d.acd+' '+(d.regionDisp||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

/* ---------------- Render ---------------- */
function render(){
  buildControls();
  renderStats();
  renderSidebar();
  renderHead();
  renderTable();
}

let controlsBuilt = false;
function buildControls(){
  if (controlsBuilt) return;
  controlsBuilt = true;
  const stages = [...new Set(allDeals.map(d=>d.stageNum))].sort((a,b)=>a-b);
  const fStage = document.getElementById('fStage');
  fStage.innerHTML = '<option value="">All stages</option>' +
    stages.map(s=>{const lbl=allDeals.find(d=>d.stageNum===s).stageShort; return '<option value="'+s+'">'+s+' · '+escapeHtml(lbl)+'</option>';}).join('');
  const regions = [...new Set(allDeals.map(d=>d.region).filter(Boolean))].sort();
  const fRegion = document.getElementById('fRegion');
  fRegion.innerHTML = '<option value="">All regions</option>' + regions.map(r=>'<option value="'+escapeHtml(r)+'">'+escapeHtml(r)+'</option>').join('');
  const acds = [...new Set(allDeals.map(d=>d.acd))].sort();
  const fAcd = document.getElementById('fAcd');
  fAcd.innerHTML = '<option value="">All ACDs</option>' + acds.map(a=>'<option value="'+escapeHtml(a)+'">'+escapeHtml(a)+'</option>').join('');
  ['fSearch','fStage','fRegion','fAcd'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { renderStats(); renderSidebar(); renderTable(); });
  });
}

function renderStats(){
  const f = getFiltered();
  const accts = new Set(f.map(d=>d.account));
  const total = f.reduce((s,d)=>s+(d.usdACV||0),0);
  const fr = f.filter(d=>d.fedramp==='Yes').length;
  const acds = new Set(f.map(d=>d.acd));
  const stats = [
    {label:'Open Deals', value:f.length},
    {label:'Accounts', value:accts.size},
    {label:'Pipeline ACV (USD)', value:fmtUSD(total), cls:'pipeline'},
    {label:'FedRAMP', value:fr, cls:'fedramp'},
    {label:'Distinct ACDs', value:acds.size},
  ];
  document.getElementById('statsBar').innerHTML = stats.map(s =>
    '<div class="stat '+(s.cls||'')+'"><div class="label">'+s.label+'</div><div class="value">'+s.value+'</div></div>'
  ).join('');
}

function renderSidebar(){
  const f = getFiltered();
  // By stage
  const stMap = {};
  f.forEach(d => { const k=d.stageNum; (stMap[k]=stMap[k]||{c:0,acv:0}); stMap[k].c++; stMap[k].acv+=d.usdACV||0; });
  const stHtml = Object.keys(stMap).sort((a,b)=>a-b).map(k=>{
    const lbl = f.find(d=>d.stageNum==k).stageShort;
    return '<div class="prow"><span class="k"><span class="stage-badge stage-'+k+'" style="padding:1px 7px;font-size:11px">'+k+'</span>'+escapeHtml(lbl)+'</span><span class="v"><b>'+stMap[k].c+'</b> · '+fmtUSDk(stMap[k].acv)+'</span></div>';
  }).join('');
  document.getElementById('byStage').innerHTML = stHtml || '<div class="prow"><span class="k">No data</span></div>';
  // By ACD
  const acMap = {};
  f.forEach(d => { (acMap[d.acd]=acMap[d.acd]||{c:0,acv:0}); acMap[d.acd].c++; acMap[d.acd].acv+=d.usdACV||0; });
  const acHtml = Object.keys(acMap).sort((a,b)=>acMap[b].acv-acMap[a].acv).map(k=>
    '<div class="prow"><span class="k">'+acdPill(k)+'</span><span class="v"><b>'+acMap[k].c+'</b> · '+fmtUSDk(acMap[k].acv)+'</span></div>'
  ).join('');
  document.getElementById('byAcd').innerHTML = acHtml || '<div class="prow"><span class="k">No data</span></div>';
  // By region
  const rgMap = {};
  f.forEach(d => { const k=d.region||'—'; rgMap[k]=(rgMap[k]||0)+1; });
  const rgHtml = Object.keys(rgMap).sort((a,b)=>rgMap[b]-rgMap[a]).map(k=>
    '<div class="prow"><span class="k">'+escapeHtml(k)+'</span><span class="v"><b>'+rgMap[k]+'</b></span></div>'
  ).join('');
  document.getElementById('byRegion').innerHTML = rgHtml || '<div class="prow"><span class="k">No data</span></div>';
}

function renderHead(){
  const tr = document.getElementById('headRow');
  tr.innerHTML = COLS.map(c => {
    let arrow = '';
    if (sortKey === c.key) arrow = ' <span class="arrow">'+(sortDir===1?'▲':'▼')+'</span>';
    return '<th class="'+(c.cls||'')+'" data-key="'+c.key+'">'+c.label+arrow+'</th>';
  }).join('');
  tr.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.getAttribute('data-key');
      if (sortKey !== k){ sortKey = k; sortDir = 1; }
      else if (sortDir === 1){ sortDir = -1; }
      else { sortKey = null; sortDir = 1; }   // third click -> back to grouped
      renderHead(); renderTable();
    });
  });
}

function cmp(a,b,key){
  let x=a[key], y=b[key];
  if (key==='usdACV' || key==='stageNum'){ x=x||0; y=y||0; return x-y; }
  x=(x==null?'':String(x)).toLowerCase(); y=(y==null?'':String(y)).toLowerCase();
  return x<y?-1:(x>y?1:0);
}

function dealRowHtml(d, showAccount){
  const sub = fmtNative(d);
  return '<tr class="deal-row">' +
    '<td><a class="opp" href="'+SF_BASE+escapeHtml(d.id)+'/view" target="_blank" rel="noopener">'+escapeHtml(d.name)+'</a>'+
      (d.fedramp==='Yes' ? ' <span class="fr-badge">FedRAMP</span>' : '')+'</td>' +
    '<td>'+(showAccount ? escapeHtml(d.account) : '')+'</td>' +
    '<td>'+stageBadge(d)+'</td>' +
    '<td>'+fmtDate(d.closeDate)+'</td>' +
    '<td class="acv">'+fmtUSD(d.usdACV)+(sub?'<div class="subacv">'+escapeHtml(sub)+'</div>':'')+'</td>' +
    '<td>'+acdPill(d.acd)+'</td>' +
    '<td>'+escapeHtml(d.regionDisp||'—')+'</td>' +
    '<td>'+escapeHtml(d.owner||'—')+'</td>' +
  '</tr>';
}

function renderTable(){
  const f = getFiltered();
  const tbody = document.getElementById('tbody');
  const ncols = COLS.length;

  if (sortKey){
    // Flat global sorted list, show account cell
    const sorted = f.slice().sort((a,b)=> sortDir*cmp(a,b,sortKey) || cmp(a,b,'closeDate'));
    tbody.innerHTML = sorted.length
      ? sorted.map(d=>dealRowHtml(d, true)).join('')
      : '<tr><td colspan="'+ncols+'" style="text-align:center;color:var(--muted);padding:30px">No matching deals</td></tr>';
    document.getElementById('countBar').innerHTML = '<b>'+f.length+'</b> deals · <b>'+new Set(f.map(d=>d.account)).size+'</b> accounts';
    return;
  }

  // Grouped by account, accounts sorted by total ACV desc
  const groups = {};
  f.forEach(d => { (groups[d.account]=groups[d.account]||[]).push(d); });
  const acctNames = Object.keys(groups).sort((a,b)=>{
    const ta=groups[a].reduce((s,d)=>s+(d.usdACV||0),0);
    const tb=groups[b].reduce((s,d)=>s+(d.usdACV||0),0);
    return tb-ta;
  });

  let html = '';
  acctNames.forEach(acct => {
    const list = groups[acct].slice().sort((a,b)=>cmp(a,b,'closeDate'));
    const total = list.reduce((s,d)=>s+(d.usdACV||0),0);
    const acds = [...new Set(list.map(d=>d.acd))];
    const isColl = !!collapsed[acct];
    const badges = '<span class="acd-badges">'+acds.map(a=>acdPill(a)).join('')+'</span>';
    html += '<tr class="acct-header'+(isColl?' collapsed':'')+'" data-acct="'+escapeHtml(acct)+'">' +
      '<td colspan="'+(ncols-1)+'"><span class="caret">▼</span> '+escapeHtml(acct)+
        '<span class="acct-count">'+list.length+' deal'+(list.length>1?'s':'')+'</span>'+badges+'</td>' +
      '<td class="acv acct-total">'+fmtUSD(total)+'</td>' +
    '</tr>';
    if (!isColl){
      html += list.map(d=>dealRowHtml(d, false)).join('');
    }
  });
  tbody.innerHTML = html || '<tr><td colspan="'+ncols+'" style="text-align:center;color:var(--muted);padding:30px">No matching deals</td></tr>';

  tbody.querySelectorAll('tr.acct-header').forEach(tr => {
    tr.addEventListener('click', () => {
      const a = tr.getAttribute('data-acct');
      collapsed[a] = !collapsed[a];
      try { localStorage.setItem('ehub_collapsed', JSON.stringify(collapsed)); } catch(e){}
      renderTable();
    });
  });
  document.getElementById('countBar').innerHTML = '<b>'+f.length+'</b> deals · <b>'+acctNames.length+'</b> accounts';
}

try { const c = localStorage.getItem('ehub_collapsed'); if (c) collapsed = JSON.parse(c); } catch(e){}
</script>
</body>
</html>
