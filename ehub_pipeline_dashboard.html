<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eHub Pipeline Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#21212b;min-height:100vh}

/* Password overlay */
#pw-overlay{position:fixed;inset:0;background:#21212b;display:flex;align-items:center;justify-content:center;z-index:9999}
#pw-card{background:#fff;border-radius:12px;padding:40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
#pw-card .logo{font-size:28px;font-weight:800;color:#3694fc;letter-spacing:-1px;margin-bottom:4px}
#pw-card .subtitle{color:#666;font-size:14px;margin-bottom:28px}
#pw-input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:border 0.2s}
#pw-input:focus{border-color:#3694fc}
#pw-btn{width:100%;margin-top:14px;padding:13px;background:#3694fc;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s}
#pw-btn:hover{background:#2580e8}
#pw-err{color:#e53e3e;font-size:13px;margin-top:10px;min-height:18px}

/* Main layout */
#app{display:none;min-height:100vh}
header{background:#21212b;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
header .brand{font-size:20px;font-weight:800;color:#3694fc;letter-spacing:-0.5px}
header .hsubtitle{color:#aaa;font-size:13px}
header .updated{margin-left:auto;color:#777;font-size:12px}

.main-wrap{display:flex;gap:0}
.sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #e8eaed;min-height:calc(100vh - 52px);padding:20px 16px}
.sidebar h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#888;margin-bottom:12px;margin-top:20px}
.sidebar h3:first-child{margin-top:0}
.sidebar-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.sidebar-item .label{color:#444}
.sidebar-item .vals{text-align:right;color:#666;font-size:12px}
.sidebar-item .count{font-weight:600;color:#21212b}

.content{flex:1;padding:20px;min-width:0}

/* Stats bar */
.stats-bar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:14px 18px;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.stat-card .sval{font-size:24px;font-weight:800;color:#21212b}
.stat-card .slabel{font-size:12px;color:#888;margin-top:2px}
.stat-card.blue .sval{color:#3694fc}
.stat-card.purple .sval{color:#6100FF}
.stat-card.green .sval{color:#22c55e}

/* Filters */
.filters{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.filters input,.filters select{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.filters input{flex:1;min-width:180px}
.filters input:focus,.filters select:focus{border-color:#3694fc}
.count-label{margin-left:auto;font-size:13px;color:#666;white-space:nowrap}

/* Table */
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#21212b;color:#fff;padding:11px 14px;text-align:left;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:var(--header-h,54px);z-index:10}
thead th:hover{background:#2d2d3a}
thead th .sort-icon{margin-left:4px;opacity:0.5;font-size:11px}
thead th.active-sort .sort-icon{opacity:1;color:#3694fc}

tbody tr{border-bottom:1px solid #f0f2f5}
tbody tr:hover{background:#fafbfc}

/* Account group header */
tr.group-header{background:#f5f7fa;cursor:pointer}
tr.group-header:hover{background:#eef0f5}
tr.group-header td{padding:9px 14px;font-weight:700;font-size:13px;color:#21212b}
.group-header-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toggle-icon{font-size:11px;color:#888;transition:transform 0.15s;display:inline-block}
.collapsed .toggle-icon{transform:rotate(-90deg)}

tr.deal-row td{padding:9px 14px}
tr.deal-row.indented td:first-child{padding-left:34px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.stage-badge{color:#fff}
.fedramp-badge{background:#6100FF;color:#fff;margin-left:5px;font-size:10px;padding:2px 7px}
.acd-pill{border-radius:4px;font-size:11px;font-weight:600;padding:3px 8px;color:#fff}

.opp-link{color:#3694fc;text-decoration:none;font-weight:500}
.opp-link:hover{text-decoration:underline}

.acv-val{font-weight:600;text-align:right}
.no-data{text-align:center;padding:40px;color:#aaa}

/* ACD colors */
.acd-cisco{background:#049fd9}
.acd-avaya{background:#e4003a}
.acd-genesys{background:#ff4f1f}
.acd-amazon{background:#ff9900;color:#21212b!important}
.acd-msteams{background:#5b5ea6}
.acd-nice{background:#3694fc}
.acd-other{background:#888}

@media(max-width:900px){
  .sidebar{display:none}
  .stats-bar .stat-card{min-width:120px}
}
</style>
</head>
<body>

<!-- Password Overlay -->
<div id="pw-overlay">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="subtitle">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password"/>
    <button id="pw-btn">Access Dashboard</button>
    <div id="pw-err"></div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div>
      <div class="brand">NiCE · eHub Pipeline</div>
      <div class="hsubtitle">Engagement Hub Opportunities — Open Stages 0–5</div>
    </div>
    <div class="updated" id="updated-ts"></div>
  </header>
  <div class="main-wrap">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="content">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="filters">
        <input type="text" id="search-input" placeholder="Search opportunity or account…"/>
        <select id="stage-filter"><option value="">All Stages</option></select>
        <select id="region-filter"><option value="">All Regions</option></select>
        <select id="acd-filter"><option value="">All ACDs</option></select>
        <span class="count-label" id="count-label"></span>
      </div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th data-col="name">Opportunity <span class="sort-icon"></span></th>
              <th data-col="account">Account <span class="sort-icon"></span></th>
              <th data-col="stage">Stage <span class="sort-icon"></span></th>
              <th data-col="close_date">Close Date <span class="sort-icon"></span></th>
              <th data-col="acv" style="text-align:right">ACV <span class="sort-icon"></span></th>
              <th data-col="acd">ACD <span class="sort-icon"></span></th>
              <th data-col="region">Region / Territory <span class="sort-icon"></span></th>
              <th data-col="owner">Owner <span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

const STORED_HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(val) {
  const h = await sha256hex(val);
  return h === STORED_HASH;
}

async function initAuth() {
  // Check session
  if (sessionStorage.getItem('ehub_auth') === '1') {
    showApp(); return;
  }
  document.getElementById('pw-btn').addEventListener('click', tryLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') tryLogin(); });
}

async function tryLogin() {
  const val = document.getElementById('pw-input').value;
  const ok = await checkPw(val);
  if (ok) {
    sessionStorage.setItem('ehub_auth','1');
    showApp();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password. Try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function showApp() {
  document.getElementById('pw-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Measure actual header height for sticky th offset
  requestAnimationFrame(() => {
    const h = document.querySelector('header')?.offsetHeight || 54;
    document.documentElement.style.setProperty('--header-h', h + 'px');
  });
  initDashboard();
}

// ─── Dashboard ───────────────────────────────────────────────────────────────
let sortCol = null;
let sortDir = 0; // 0=grouped, 1=asc, -1=desc
let filteredOpps = [];
let collapsedGroups = new Set();

const SF_BASE = 'https://nice.lightning.force.com/lightning/r/Opportunity/';

function stageInfo(stage) {
  return STAGE_MAP[stage] || {num:'?', label: stage, color:'#888'};
}

function acdClass(acd) {
  if (!acd) return 'acd-other';
  const a = acd.toLowerCase();
  if (a.includes('cisco')) return 'acd-cisco';
  if (a.includes('avaya')) return 'acd-avaya';
  if (a.includes('genesys')) return 'acd-genesys';
  if (a.includes('amazon')) return 'acd-amazon';
  if (a.includes('ms teams') || a.includes('teams')) return 'acd-msteams';
  if (a.includes('nice')) return 'acd-nice';
  return 'acd-other';
}

function fmtACV(v, currency) {
  if (v == null) return '—';
  return (currency && currency !== 'USD' ? currency + ' ' : '$') + 
         v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function regionTerritory(o) {
  const r = o.region || '';
  const t = o.territory || '';
  if (r && t) return `${r} / ${t}`;
  return r || t || '—';
}

function initDashboard() {
  document.getElementById('updated-ts').textContent = 'Updated: ' + new Date().toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
  
  // Populate filter dropdowns
  const stages = [...new Set(RAW_OPPS.map(o=>o.stage))].sort((a,b) => stageInfo(a).num - stageInfo(b).num);
  const stageEl = document.getElementById('stage-filter');
  stages.forEach(s => {
    const si = stageInfo(s);
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = `${si.num} · ${si.label}`;
    stageEl.appendChild(opt);
  });
  
  const regions = [...new Set(RAW_OPPS.map(o=>o.region).filter(Boolean))].sort();
  const regEl = document.getElementById('region-filter');
  regions.forEach(r => {
    const opt = document.createElement('option'); opt.value = r; opt.textContent = r; regEl.appendChild(opt);
  });
  
  const acds = [...new Set(RAW_OPPS.map(o=>o.acd).filter(Boolean))].sort();
  const acdEl = document.getElementById('acd-filter');
  acds.forEach(a => {
    const opt = document.createElement('option'); opt.value = a; opt.textContent = a; acdEl.appendChild(opt);
  });

  // Event listeners
  document.getElementById('search-input').addEventListener('input', render);
  document.getElementById('stage-filter').addEventListener('change', render);
  document.getElementById('region-filter').addEventListener('change', render);
  document.getElementById('acd-filter').addEventListener('change', render);
  
  // Sort headers
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        if (sortDir === 1) sortDir = -1;
        else if (sortDir === -1) { sortDir = 0; sortCol = null; }
        else { sortDir = 1; }
      } else {
        sortCol = col; sortDir = 1;
      }
      updateSortHeaders();
      render();
    });
  });

  render();
}

function updateSortHeaders() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('active-sort');
    const icon = th.querySelector('.sort-icon');
    icon.textContent = '';
    if (th.dataset.col === sortCol && sortDir !== 0) {
      th.classList.add('active-sort');
      icon.textContent = sortDir === 1 ? ' ▲' : ' ▼';
    }
  });
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const stage = document.getElementById('stage-filter').value;
  const region = document.getElementById('region-filter').value;
  const acd = document.getElementById('acd-filter').value;
  
  return RAW_OPPS.filter(o => {
    if (stage && o.stage !== stage) return false;
    if (region && o.region !== region) return false;
    if (acd && o.acd !== acd) return false;
    if (search) {
      const hay = (o.name + ' ' + o.account + ' ' + o.owner + ' ' + o.acd).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function sortOpps(opps) {
  if (!sortCol || sortDir === 0) return opps;
  return [...opps].sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'stage') { va = stageInfo(va).num; vb = stageInfo(vb).num; }
    if (sortCol === 'acv') { va = va || 0; vb = vb || 0; }
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'number') return sortDir * (va - vb);
    return sortDir * String(va).localeCompare(String(vb));
  });
}

function render() {
  filteredOpps = applyFilters();
  const sorted = sortOpps(filteredOpps);
  
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  const grouped = (sortDir === 0 || sortCol === null);
  
  if (grouped) {
    // Group by account, sorted by total ACV desc
    const groups = {};
    filteredOpps.forEach(o => {
      const key = o.account || '(Unknown)';
      if (!groups[key]) groups[key] = [];
      groups[key].push(o);
    });
    
    const sortedGroups = Object.entries(groups).sort((a,b) => {
      const acvA = a[1].reduce((s,o) => s + (o.acv||0), 0);
      const acvB = b[1].reduce((s,o) => s + (o.acv||0), 0);
      return acvB - acvA;
    });
    
    let accountCount = 0;
    sortedGroups.forEach(([account, deals]) => {
      accountCount++;
      const totalAcv = deals.reduce((s,o) => s + (o.acv||0), 0);
      const acds = [...new Set(deals.map(d=>d.acd).filter(Boolean))];
      const isCollapsed = collapsedGroups.has(account);
      
      // Group header row
      const hrow = document.createElement('tr');
      hrow.className = 'group-header' + (isCollapsed ? ' collapsed':'');
      hrow.innerHTML = `
        <td colspan="8">
          <div class="group-header-cell">
            <span class="toggle-icon">▼</span>
            <strong>${account}</strong>
            <span style="color:#888;font-weight:400">${deals.length} deal${deals.length!==1?'s':''}</span>
            ${acds.map(a=>`<span class="badge acd-pill ${acdClass(a)}">${a}</span>`).join('')}
            <span style="margin-left:auto;font-weight:600">${fmtACV(totalAcv, 'USD')}</span>
          </div>
        </td>
      `;
      hrow.addEventListener('click', () => {
        if (collapsedGroups.has(account)) collapsedGroups.delete(account);
        else collapsedGroups.add(account);
        render();
      });
      tbody.appendChild(hrow);
      
      if (!isCollapsed) {
        const sortedDeals = [...deals].sort((a,b) => (a.close_date||'').localeCompare(b.close_date||''));
        sortedDeals.forEach(o => {
          tbody.appendChild(buildDealRow(o, true));
        });
      }
    });
    
    const accounts = new Set(filteredOpps.map(o=>o.account));
    document.getElementById('count-label').textContent = `${filteredOpps.length} deal${filteredOpps.length!==1?'s':''} · ${accounts.size} account${accounts.size!==1?'s':''}`;
  } else {
    // Flat sorted view
    sorted.forEach(o => {
      tbody.appendChild(buildDealRow(o, false));
    });
    const accounts = new Set(sorted.map(o=>o.account));
    document.getElementById('count-label').textContent = `${sorted.length} deal${sorted.length!==1?'s':''} · ${accounts.size} account${accounts.size!==1?'s':''}`;
  }
  
  if (tbody.children.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-data">No opportunities match your filters.</td></tr>';
  }
  
  updateStatsBar(filteredOpps);
  updateSidebar(filteredOpps);
}

function buildDealRow(o, indented) {
  const row = document.createElement('tr');
  row.className = 'deal-row' + (indented ? ' indented':'');
  const si = stageInfo(o.stage);
  const stageBadge = `<span class="badge stage-badge" style="background:${si.color}">${si.num} · ${si.label}</span>`;
  const fedrampBadge = o.fedramp ? `<span class="badge fedramp-badge">FedRAMP</span>` : '';
  const acdBadge = o.acd ? `<span class="badge acd-pill ${acdClass(o.acd)}">${o.acd}</span>` : '—';
  const acvStr = o.acv != null ? `<span class="acv-val">${fmtACV(o.acv, o.currency)}</span>` : '—';
  const sfLink = `${SF_BASE}${o.id}/view`;
  
  row.innerHTML = `
    <td><a class="opp-link" href="${sfLink}" target="_blank">${o.name}</a>${fedrampBadge}</td>
    <td>${indented ? '' : (o.account || '—')}</td>
    <td>${stageBadge}</td>
    <td>${fmtDate(o.close_date)}</td>
    <td class="acv-val">${acvStr}</td>
    <td>${acdBadge}</td>
    <td>${regionTerritory(o)}</td>
    <td>${o.owner || '—'}</td>
  `;
  return row;
}

function updateStatsBar(opps) {
  const totalAcv = opps.reduce((s,o) => s+(o.acv||0), 0);
  const accounts = new Set(opps.map(o=>o.account));
  const fedramp = opps.filter(o=>o.fedramp).length;
  const acds = new Set(opps.map(o=>o.acd).filter(Boolean));
  
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card blue"><div class="sval">${opps.length}</div><div class="slabel">Open Deals</div></div>
    <div class="stat-card"><div class="sval">${accounts.size}</div><div class="slabel">Accounts</div></div>
    <div class="stat-card green"><div class="sval">$${(totalAcv/1e6).toFixed(1)}M</div><div class="slabel">Total Pipeline ACV</div></div>
    <div class="stat-card purple"><div class="sval">${fedramp}</div><div class="slabel">FedRAMP</div></div>
    <div class="stat-card"><div class="sval">${acds.size}</div><div class="slabel">Distinct ACDs</div></div>
  `;
}

  });
  
  const regionItems = Object.entries(byRegion).sort((a,b)=>b[1]-a[1]).map(([r,c]) => `
    <div class="sidebar-item">
      <span class="label">${r}</span>
      <span class="count">${c}</span>
    </div>
  `).join('');
  
  sidebar.innerHTML = `
    <h3>By Stage</h3>${stageItems}
    <h3>By ACD</h3>${acdItems}
    <h3>By Region</h3>${regionItems}
  `;
}

// Boot
initAuth();
</script>
</body>
</html>
