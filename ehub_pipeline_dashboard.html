<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --nice-blue: #3694fc;
    --nice-charcoal: #21212b;
    --nice-indigo: #6100FF;
    --nice-coral: #FF5B8A;
    --bg: #f4f6fa;
    --card-bg: #fff;
    --border: #e2e8f0;
    --text: #21212b;
    --text-muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  #pw-gate {
    position: fixed; inset: 0; background: var(--nice-charcoal);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  #pw-card {
    background: #fff; border-radius: 16px; padding: 40px 48px;
    text-align: center; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  #pw-card .logo { font-size: 28px; font-weight: 800; color: var(--nice-blue); margin-bottom: 6px; letter-spacing: -1px; }
  #pw-card .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
  #pw-card input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 8px;
    font-size: 15px; margin-bottom: 14px; outline: none;
  }
  #pw-card button {
    width: 100%; padding: 13px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  #pw-card .err { color: var(--nice-coral); font-size: 13px; margin-top: 10px; min-height: 18px; }
  #app { display: none; }
  header {
    background: var(--nice-charcoal); color: #fff;
    padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  header .brand { font-size: 20px; font-weight: 800; color: var(--nice-blue); }
  header .title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,.85); }
  header .spacer { flex: 1; }
  header .ts { font-size: 12px; color: rgba(255,255,255,.5); }
  .layout { display: flex; height: calc(100vh - 56px); overflow: hidden; }
  #sidebar {
    width: 260px; min-width: 260px; background: var(--card-bg); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 0;
  }
  .sb-section { padding: 0 16px 16px; }
  .sb-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin-bottom: 10px; }
  .sb-row { display: flex; justify-content: space-between; align-items: center;
    padding: 5px 8px; border-radius: 6px; font-size: 13px; }
  .sb-label { flex: 1; }
  .sb-cnt { font-size: 12px; color: var(--text-muted); }
  .sb-acv { font-size: 11px; color: var(--text-muted); text-align: right; }
  .sb-divider { height: 1px; background: var(--border); margin: 8px 16px 16px; }
  #stats-bar {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; gap: 24px; flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat-val.blue { color: var(--nice-blue); }
  .stat-val.indigo { color: var(--nice-indigo); }
  #main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  #filters {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  #filters input, #filters select {
    padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; outline: none; background: var(--bg);
  }
  #filters input { min-width: 220px; }
  #result-count { font-size: 12px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
  #table-wrap { flex: 1; overflow-x: auto; padding: 12px 16px 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 8px 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted); border-bottom: 2px solid var(--border);
    background: var(--card-bg); position: sticky; top: 0; z-index: 5; cursor: pointer;
    white-space: nowrap; user-select: none;
  }
  thead th:hover { color: var(--nice-blue); }
  thead th .sort-ind { margin-left: 4px; opacity: .5; font-size: 10px; }
  thead th.sorted { color: var(--nice-blue); }
  thead th.sorted .sort-ind { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: rgba(54,148,252,.04); }
  tbody td { padding: 8px 10px; vertical-align: middle; }
  tr.acct-header { background: #f8fafc; cursor: pointer; }
  tr.acct-header:hover { background: #f0f4fa; }
  tr.acct-header td { font-weight: 700; font-size: 13px; padding: 10px; }
  tr.acct-header .chevron { display: inline-block; margin-right: 6px; transition: transform .2s; font-size: 11px; color: var(--text-muted); }
  tr.acct-header.collapsed .chevron { transform: rotate(-90deg); }
  tr.deal-row td:first-child { padding-left: 32px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .stage-0 { background: rgba(100,116,139,.15); color: #475569; }
  .stage-1 { background: rgba(54,148,252,.15); color: #1d4ed8; }
  .stage-2 { background: rgba(14,165,233,.15); color: #0369a1; }
  .stage-3 { background: rgba(245,158,11,.15); color: #b45309; }
  .stage-4 { background: rgba(97,0,255,.15); color: #6100FF; }
  .stage-5 { background: rgba(34,197,94,.15); color: #15803d; }
  .acd-pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .acd-cisco    { background: #e0f0ff; color: #1565c0; }
  .acd-avaya    { background: #fff3e0; color: #e65100; }
  .acd-genesys  { background: #f3e5f5; color: #6a1b9a; }
  .acd-amazon   { background: #fff8e1; color: #f57f17; }
  .acd-msteams  { background: #e8eaf6; color: #283593; }
  .acd-nice     { background: #e3f6fc; color: #0277bd; }
  .acd-other    { background: #f5f5f5; color: #616161; }
  .acd-ujet     { background: #fce4ec; color: #880e4f; }
  .fedramp-badge { background: rgba(97,0,255,.15); color: #6100FF; }
  a { color: var(--nice-blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .acv-cell { text-align: right; font-variant-numeric: tabular-nums; }
  .acv-native { font-size: 11px; color: var(--text-muted); display: block; }
</style>
</head>
<body>
<div id="pw-gate">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="sub">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password">
    <button onclick="checkPw()">Access Dashboard</button>
    <div class="err" id="pw-err"></div>
  </div>
</div>
<div id="app">
  <header>
    <span class="brand">NiCE</span>
    <span class="title">eHub Pipeline Dashboard</span>
    <span class="spacer"></span>
    <span class="ts">Built: 2026-07-20 08:22 UTC</span>
  </header>
  <div class="layout">
    <div id="sidebar">
      <div class="sb-section"><div class="sb-title">By Stage</div><div id="sb-stages"></div></div>
      <div class="sb-divider"></div>
      <div class="sb-section"><div class="sb-title">By ACD</div><div id="sb-acds"></div></div>
      <div class="sb-divider"></div>
      <div class="sb-section"><div class="sb-title">By Region</div><div id="sb-regions"></div></div>
    </div>
    <div id="main-content">
      <div id="stats-bar">
        <div class="stat"><div class="stat-val blue" id="st-deals">—</div><div class="stat-lbl">Open Deals</div></div>
        <div class="stat"><div class="stat-val" id="st-accounts">—</div><div class="stat-lbl">Accounts</div></div>
        <div class="stat"><div class="stat-val blue" id="st-acv">—</div><div class="stat-lbl">Total Pipeline ACV (USD)</div></div>
        <div class="stat"><div class="stat-val indigo" id="st-fedramp">—</div><div class="stat-lbl">FedRAMP</div></div>
        <div class="stat"><div class="stat-val" id="st-acds">—</div><div class="stat-lbl">Distinct ACDs</div></div>
      </div>
      <div id="filters">
        <input type="text" id="search" placeholder="Search deals, accounts…" oninput="applyFilters()">
        <select id="f-stage" onchange="applyFilters()">
          <option value="">All Stages</option>
          <option value="0">0 - Prospecting</option>
          <option value="1">1 - Identification / Qualification</option>
          <option value="2">2 - Determining Problem / Impact</option>
          <option value="3">3 - Aligning Benefits &amp; Value</option>
          <option value="4">4 - Confirm Value &amp; Agreement</option>
          <option value="5">5 - Proposal / Negotiation</option>
        </select>
        <select id="f-region" onchange="applyFilters()"></select>
        <select id="f-acd" onchange="applyFilters()"></select>
        <span id="result-count"></span>
      </div>
      <div id="table-wrap">
        <table id="main-table">
          <thead><tr>
            <th onclick="sortBy('name')" data-col="name">Opportunity <span class="sort-ind"></span></th>
            <th onclick="sortBy('account')" data-col="account">Account <span class="sort-ind"></span></th>
            <th onclick="sortBy('stageNum')" data-col="stageNum">Stage <span class="sort-ind"></span></th>
            <th onclick="sortBy('closeDate')" data-col="closeDate">Close Date <span class="sort-ind"></span></th>
            <th onclick="sortBy('acvUSD')" data-col="acvUSD" style="text-align:right">ACV (USD) <span class="sort-ind"></span></th>
            <th onclick="sortBy('acd')" data-col="acd">ACD <span class="sort-ind"></span></th>
            <th onclick="sortBy('region')" data-col="region">Region / Territory <span class="sort-ind"></span></th>
            <th onclick="sortBy('owner')" data-col="owner">Owner <span class="sort-ind"></span></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hex === '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621') {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('pw-gate').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else {
    document.getElementById('pw-err').textContent='Incorrect password.';
  }
}

  const aSel=document.getElementById('f-acd');
  rSel.innerHTML='<option value="">All Regions</option>'+regions.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('');
  aSel.innerHTML='<option value="">All ACDs</option>'+acds.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('');
}
function applyFilters(){
  const search=document.getElementById('search').value.toLowerCase();
  const stage=document.getElementById('f-stage').value;
  const region=document.getElementById('f-region').value;
  const acd=document.getElementById('f-acd').value;
  filtered=ALL_OPPS.filter(o=>{
    if(search&&!o.name.toLowerCase().includes(search)&&!o.account.toLowerCase().includes(search)&&!o.owner.toLowerCase().includes(search))return false;
    if(stage&&o.stageNum!==stage)return false;
    if(region&&!o.region.startsWith(region))return false;
    if(acd&&o.acd!==acd)return false;
    return true;
  });
  renderStats();renderSidebar();renderTable();
}
function fmtACV(v){
  if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';
  if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K';
  return'$'+v.toFixed(0);
}
function fmtACVFull(v){return'$'+v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function renderStats(){
  const accts=new Set(filtered.map(o=>o.account)).size;
  const totalACV=filtered.reduce((s,o)=>s+o.acvUSD,0);
  const fedramp=filtered.filter(o=>o.fedramp==='Yes').length;
  const acdSet=new Set(filtered.map(o=>o.acd).filter(Boolean)).size;
  document.getElementById('st-deals').textContent=filtered.length;
  document.getElementById('st-accounts').textContent=accts;
  document.getElementById('st-acv').textContent=fmtACV(totalACV);
  document.getElementById('st-fedramp').textContent=fedramp;
  document.getElementById('st-acds').textContent=acdSet;
  document.getElementById('result-count').textContent=`${filtered.length} deal${filtered.length===1?'':'s'} · ${accts} account${accts===1?'':'s'}`;
}
function renderSidebar(){
  const stageLabels={'0':'Prospecting','1':'Identification / Qual','2':'Determining Problem','3':'Aligning Benefits','4':'Confirm Value','5':'Proposal/Negotiation'};
  const stageData={};
  filtered.forEach(o=>{if(!stageData[o.stageNum])stageData[o.stageNum]={cnt:0,acv:0};stageData[o.stageNum].cnt++;stageData[o.stageNum].acv+=o.acvUSD;});
  document.getElementById('sb-stages').innerHTML=['0','1','2','3','4','5'].filter(s=>stageData[s]).map(s=>`
    <div class="sb-row"><span class="sb-label"><span class="badge stage-${s}">${s}</span> ${stageLabels[s]}</span>
    <div style="text-align:right"><span class="sb-cnt">${stageData[s].cnt}</span><br><span class="sb-acv">${fmtACV(stageData[s].acv)}</span></div></div>`).join('');
  const acdData={};
  filtered.forEach(o=>{if(!acdData[o.acd])acdData[o.acd]={cnt:0,acv:0};acdData[o.acd].cnt++;acdData[o.acd].acv+=o.acvUSD;});
  document.getElementById('sb-acds').innerHTML=Object.entries(acdData).sort((a,b)=>b[1].acv-a[1].acv).map(([acd,d])=>`
    <div class="sb-row"><span class="sb-label">${acdPill(acd)}</span>
    <div style="text-align:right"><span class="sb-cnt">${d.cnt}</span><br><span class="sb-acv">${fmtACV(d.acv)}</span></div></div>`).join('');
  const regData={};
  filtered.forEach(o=>{const r=o.region.split(' / ')[0]||'Unknown';if(!regData[r])regData[r]={cnt:0,acv:0};regData[r].cnt++;regData[r].acv+=o.acvUSD;});
  document.getElementById('sb-regions').innerHTML=Object.entries(regData).sort((a,b)=>b[1].cnt-a[1].cnt).map(([r,d])=>`
    <div class="sb-row"><span class="sb-label">${esc(r)}</span>
    <div style="text-align:right"><span class="sb-cnt">${d.cnt}</span><br><span class="sb-acv">${fmtACV(d.acv)}</span></div></div>`).join('');
}
function acdClass(acd){
  const a=(acd||'').toLowerCase();
  if(a.includes('cisco'))return'acd-cisco';
  if(a.includes('avaya'))return'acd-avaya';
  if(a.includes('genesys'))return'acd-genesys';
  if(a.includes('amazon'))return'acd-amazon';
  if(a.includes('teams'))return'acd-msteams';
  if(a.includes('nice'))return'acd-nice';
  if(a.includes('ujet'))return'acd-ujet';
  return'acd-other';
}
function acdPill(acd){return`<span class="acd-pill ${acdClass(acd)}">${esc(acd||'—')}</span>`;}
function sortBy(col){
  if(sortCol===col){if(sortDir===1){sortDir=-1;}else{sortCol=null;sortDir=1;grouped=true;}}
  else{sortCol=col;sortDir=1;grouped=false;}
  document.querySelectorAll('thead th').forEach(th=>{th.classList.remove('sorted');th.querySelector('.sort-ind').textContent='';});
  if(sortCol){const th=document.querySelector(`thead th[data-col="${sortCol}"]`);if(th){th.classList.add('sorted');th.querySelector('.sort-ind').textContent=sortDir===1?'▲':'▼';}}
  renderTable();
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderTable(){
  const tbody=document.getElementById('tbody');
  let rows='';
  if(!grouped||sortCol){
    let data=[...filtered];
    if(sortCol){data.sort((a,b)=>{let av=a[sortCol],bv=b[sortCol];if(typeof av==='number')return(av-bv)*sortDir;return String(av||'').localeCompare(String(bv||''))*sortDir;});}
    data.forEach(o=>{rows+=dealRow(o,true);});
  } else {
    const acctMap={};
    filtered.forEach(o=>{if(!acctMap[o.account])acctMap[o.account]=[];acctMap[o.account].push(o);});
    Object.entries(acctMap).map(([name,deals])=>({name,deals,totalACV:deals.reduce((s,d)=>s+d.acvUSD,0)}))
      .sort((a,b)=>b.totalACV-a.totalACV).forEach(({name,deals,totalACV})=>{
        const collapsed=collapsedAccounts.has(name);
        const acdSet=[...new Set(deals.map(d=>d.acd))];
        const ds=[...deals].sort((a,b)=>a.closeDate.localeCompare(b.closeDate));
        rows+=`<tr class="acct-header${collapsed?' collapsed':''}" onclick="toggleAcct('${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
          <td colspan="2"><span class="chevron">▼</span>${esc(name)}</td>
          <td>${ds.length} deal${ds.length!==1?'s':''}</td><td></td>
          <td class="acv-cell">${fmtACVFull(totalACV)}</td>
          <td>${acdSet.map(acdPill).join(' ')}</td><td colspan="2"></td></tr>`;
        if(!collapsed){ds.forEach(o=>{rows+=dealRow(o,false);});}
      });
  }
  tbody.innerHTML=rows;
}
function dealRow(o,showAccount){
  const stageLabel=o.stageNum+' · '+o.stageShort;
  const fedrampBadge=o.fedramp==='Yes'?' <span class="badge fedramp-badge">FedRAMP</span>':'';
  const nativeLabel=(o.currency&&o.currency!=='USD'&&o.acvNative)?`<span class="acv-native">${esc(o.currency)} ${o.acvNative.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</span>`:'';
  return`<tr class="deal-row">
    <td><a href="${esc(o.url)}" target="_blank">${esc(o.name)}</a>${fedrampBadge}</td>
    <td>${showAccount?esc(o.account):''}</td>
    <td><span class="badge stage-${o.stageNum}">${esc(stageLabel)}</span></td>
    <td>${o.closeDate||'—'}</td>
    <td class="acv-cell">${o.acvUSD?fmtACVFull(o.acvUSD):'—'}${nativeLabel}</td>
    <td>${acdPill(o.acd)}</td>
    <td>${esc(o.region)||'—'}</td>
    <td>${esc(o.owner)||'—'}</td></tr>`;
}
function toggleAcct(name){
  if(collapsedAccounts.has(name))collapsedAccounts.delete(name);else collapsedAccounts.add(name);
  renderTable();
}
</script>
</body>
</html>
