<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --nice-blue: #3694fc;
    --nice-charcoal: #21212b;
    --nice-indigo: #6100FF;
    --nice-teal: #36EAD0;
    --nice-coral: #FF5B8A;
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #e0e4ef;
    --text: #21212b;
    --text-muted: #6b7280;
    --stage-0: #6b7280;
    --stage-1: #3694fc;
    --stage-2: #3694fc;
    --stage-3: #f59e0b;
    --stage-4: #6100FF;
    --stage-5: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* Password overlay */
  #pw-overlay {
    position: fixed; inset: 0; background: var(--nice-charcoal);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  #pw-card {
    background: #fff; border-radius: 16px; padding: 40px 48px; text-align: center;
    width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  #pw-card .logo { font-size: 28px; font-weight: 800; color: var(--nice-blue); letter-spacing: -1px; margin-bottom: 4px; }
  #pw-card .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
  #pw-input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 16px;
    transition: border-color .2s;
  }
  #pw-input:focus { border-color: var(--nice-blue); }
  #pw-btn {
    width: 100%; padding: 11px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  #pw-btn:hover { background: #2478d4; }
  #pw-error { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }

  /* Main layout */
  #app { display: none; min-height: 100vh; }
  header {
    background: var(--nice-charcoal); color: #fff; padding: 0 28px;
    display: flex; align-items: center; justify-content: space-between; height: 58px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo { font-size: 22px; font-weight: 800; color: var(--nice-blue); letter-spacing: -0.5px; }
  .header-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
  .header-date { font-size: 12px; color: #94a3b8; }

  .main-wrap { display: flex; gap: 0; }
  .sidebar {
    width: 240px; min-width: 240px; background: var(--card); border-right: 1px solid var(--border);
    padding: 20px 16px; min-height: calc(100vh - 58px); position: sticky; top: 58px; align-self: flex-start;
    max-height: calc(100vh - 58px); overflow-y: auto;
  }
  .sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px; margin-top: 18px; }
  .sidebar h3:first-child { margin-top: 0; }
  .sb-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .sb-row:last-child { border-bottom: none; }
  .sb-label { color: var(--text); }
  .sb-vals { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .sb-count { font-weight: 600; color: var(--text); font-size: 13px; }
  .sb-acv { font-size: 11px; color: var(--text-muted); }

  .content { flex: 1; padding: 20px 24px; overflow: hidden; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card); border-radius: 10px; padding: 14px 18px;
    border: 1px solid var(--border); flex: 1; min-width: 140px;
  }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 800; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Filters */
  .filters {
    background: var(--card); border-radius: 10px; padding: 14px 18px;
    border: 1px solid var(--border); margin-bottom: 16px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .filters input, .filters select {
    padding: 7px 11px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; outline: none; background: #f9fafb; transition: border-color .2s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); background: #fff; }
  .filters input { min-width: 180px; }
  .filter-count { margin-left: auto; font-size: 13px; color: var(--text-muted); white-space: nowrap; }

  /* Table */
  .table-wrap { background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #f8faff; padding: 10px 12px; text-align: left; font-size: 12px;
    font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    color: var(--text-muted); border-bottom: 2px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap; position: relative;
  }
  thead th:hover { background: #eef3ff; color: var(--nice-blue); }
  thead th.sorted { color: var(--nice-blue); }
  .sort-icon { margin-left: 4px; font-size: 10px; }

  tbody tr { transition: background .1s; }
  tbody tr:hover { background: #f8faff; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }

  /* Account header row */
  .acct-row { background: #f1f5f9 !important; cursor: pointer; }
  .acct-row:hover { background: #e8edf7 !important; }
  .acct-row td { padding: 9px 12px; font-weight: 700; font-size: 13px; }
  .acct-toggle { margin-right: 6px; font-size: 12px; color: var(--text-muted); display: inline-block; width: 12px; }
  .acct-name { color: var(--text); }
  .acct-meta { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 8px; }

  /* Deal row indent */
  .deal-row td:first-child { padding-left: 28px; }

  /* Badges / pills */
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 700; white-space: nowrap; gap: 4px;
  }
  .stage-badge { color: #fff; }
  .stage-0 { background: var(--stage-0); }
  .stage-1 { background: var(--stage-1); }
  .stage-2 { background: var(--stage-2); }
  .stage-3 { background: #f59e0b; color: #fff; }
  .stage-4 { background: var(--stage-4); }
  .stage-5 { background: var(--stage-5); }

  .acd-pill {
    display: inline-block; padding: 2px 8px; border-radius: 99px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .fedramp-badge {
    display: inline-block; padding: 2px 7px; border-radius: 99px;
    background: var(--nice-indigo); color: #fff; font-size: 10px; font-weight: 700;
    margin-left: 4px; vertical-align: middle;
  }

  .opp-link { color: var(--nice-blue); text-decoration: none; font-weight: 500; font-size: 13px; }
  .opp-link:hover { text-decoration: underline; }

  .acv-val { font-weight: 600; text-align: right; }
  .acv-muted { color: var(--text-muted); font-size: 12px; }

  .region-cell { font-size: 12px; color: var(--text); }
  .territory-sub { font-size: 11px; color: var(--text-muted); }

  .no-results { text-align: center; padding: 40px; color: var(--text-muted); font-size: 15px; }
</style>
</head>
<body>

<!-- Password Overlay -->
<div id="pw-overlay">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="subtitle">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off"/>
    <button id="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div id="pw-error">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">NiCE</span>
      <span class="header-title">eHub Pipeline Dashboard</span>
    </div>
    <span class="header-date" id="hdr-date"></span>
  </header>

  <div class="main-wrap">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="filters">
        <input type="text" id="f-search" placeholder="🔍 Search opportunity or account…" oninput="applyFilters()"/>
        <select id="f-stage" onchange="applyFilters()"><option value="">All Stages</option></select>
        <select id="f-region" onchange="applyFilters()"><option value="">All Regions</option></select>
        <select id="f-acd" onchange="applyFilters()"><option value="">All ACDs</option></select>
        <span class="filter-count" id="filter-count"></span>
      </div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th onclick="sortBy('Name')" id="th-Name">Opportunity <span class="sort-icon"></span></th>
              <th onclick="sortBy('AccountName')" id="th-AccountName">Account <span class="sort-icon"></span></th>
              <th onclick="sortBy('StageName')" id="th-StageName">Stage <span class="sort-icon"></span></th>
              <th onclick="sortBy('CloseDate')" id="th-CloseDate">Close Date <span class="sort-icon"></span></th>
              <th onclick="sortBy('ACV')" id="th-ACV" style="text-align:right">ACV <span class="sort-icon"></span></th>
              <th onclick="sortBy('ACD')" id="th-ACD">ACD <span class="sort-icon"></span></th>
              <th onclick="sortBy('Region')" id="th-Region">Region / Territory <span class="sort-icon"></span></th>
              <th onclick="sortBy('OwnerName')" id="th-OwnerName">Owner <span class="sort-icon"></span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hex === HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('pw-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ACD color map
const ACD_COLORS = {
  'Genesys': {bg:'#e0f2fe', color:'#0369a1'},
  'Cisco Systems': {bg:'#fef3c7', color:'#92400e'},
  'Avaya': {bg:'#fee2e2', color:'#991b1b'},
  'Amazon Connect': {bg:'#d1fae5', color:'#065f46'},
  'MS Teams': {bg:'#ede9fe', color:'#5b21b6'},
  'NICE CXone': {bg:'#dbeafe', color:'#1e40af'},
  'Eight by Eight': {bg:'#fce7f3', color:'#9d174d'},
  'RingCentral': {bg:'#f3e8ff', color:'#6b21a8'},
};
function acdColor(acd) {
  return ACD_COLORS[acd] || {bg:'#f1f5f9', color:'#475569'};
}

// Stage number extraction
function stageNum(s) {
  const m = s.match(/^(\d)/);
  return m ? parseInt(m[1]) : -1;
}
function stageShort(s) {
  const map = {
    '0 - Prospecting': 'Prospecting',
    '1 - Identification / Qualification': 'Identification',
    '2 - Determining Problem / Impact': 'Determining Problem',
    '3 - Aligning Benefits & Value': 'Aligning Benefits',
    '4 - Confirm Value & Agreement': 'Confirm Value',
    '5 - Proposal / Negotiation': 'Proposal / Neg.',
  };
  return map[s] || s;
}

function fmtACV(v, cur) {
  if (!v && v !== 0) return '—';
  const sym = cur === 'USD' ? '$' : (cur || '');
  if (v >= 1e6) return sym + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return sym + (v/1e3).toFixed(1) + 'K';
  return sym + v.toLocaleString();
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function sfLink(id) {
  return `https://nice.lightning.force.com/lightning/r/Opportunity/${id}/view`;
}

let sortCol = null;
let sortDir = 0; // 0=grouped, 1=asc, 2=desc
let filtered = [];

function applyFilters() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const stage = document.getElementById('f-stage').value;
  const region = document.getElementById('f-region').value;
  const acd = document.getElementById('f-acd').value;

  filtered = RAW_DATA.filter(o => {
    if (search && !o.Name?.toLowerCase().includes(search) && !o.AccountName?.toLowerCase().includes(search) && !o.OwnerName?.toLowerCase().includes(search)) return false;
    if (stage && o.StageName !== stage) return false;
    if (region && o.Region !== region) return false;
    if (acd && o.ACD !== acd) return false;
    return true;
  });

  renderTable();
  updateStats();
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir = (sortDir + 1) % 3;
    if (sortDir === 0) sortCol = null;
  } else {
    sortCol = col;
    sortDir = 1;
  }
  // Update headers
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted');
    th.querySelector('.sort-icon').textContent = '';
  });
  if (sortCol) {
    const th = document.getElementById('th-' + sortCol);
    if (th) {
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = sortDir === 1 ? '▲' : '▼';
    }
  }
  renderTable();
}

let collapsed = {};

function toggleAcct(acctName) {
  collapsed[acctName] = !collapsed[acctName];
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-results">No deals match your filters.</td></tr>';
    updateFilterCount(0, 0);
    return;
  }

  // If sorting active, flatten; otherwise group by account
  if (sortDir > 0 && sortCol) {
    // Flat sorted list
    const sorted = [...filtered].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol === 'ACV') { av = av || 0; bv = bv || 0; return sortDir === 1 ? av - bv : bv - av; }
      if (sortCol === 'CloseDate') { av = av || ''; bv = bv || ''; }
      if (sortCol === 'StageName') { av = stageNum(av||''); bv = stageNum(bv||''); return sortDir === 1 ? av - bv : bv - av; }
      av = (av||'').toLowerCase(); bv = (bv||'').toLowerCase();
      return sortDir === 1 ? av.localeCompare(bv) : bv.localeCompare(av);
    });

    let rows = '';
    sorted.forEach(o => { rows += dealRow(o, true); });
    tbody.innerHTML = rows;
    updateFilterCount(filtered.length, new Set(filtered.map(o=>o.AccountName)).size);
  } else {
    // Grouped by account, sorted by total ACV desc
    const acctMap = {};
    filtered.forEach(o => {
      const a = o.AccountName || 'Unknown';
      if (!acctMap[a]) acctMap[a] = [];
      acctMap[a].push(o);
    });
    const acctList = Object.entries(acctMap).sort((x,y) => {
      const ax = x[1].reduce((s,o)=>s+(o.ACV||0),0);
      const ay = y[1].reduce((s,o)=>s+(o.ACV||0),0);
      return ay - ax;
    });

    let rows = '';
    acctList.forEach(([acct, deals]) => {
      const totalACV = deals.reduce((s,o)=>s+(o.ACV||0),0);
      const acds = [...new Set(deals.map(o=>o.ACD).filter(Boolean))];
      const isCollapsed = !!collapsed[acct];
      const acdPills = acds.map(a => { const c = acdColor(a); return `<span class="acd-pill" style="background:${c.bg};color:${c.color};margin-right:3px">${a}</span>`; }).join('');

      rows += `<tr class="acct-row" onclick="toggleAcct(${JSON.stringify(acct)})">
        <td colspan="4">
          <span class="acct-toggle">${isCollapsed ? '▶' : '▼'}</span>
          <span class="acct-name">${acct}</span>
          <span class="acct-meta">${deals.length} deal${deals.length>1?'s':''} · ${acdPills}</span>
        </td>
        <td class="acv-val">${fmtACV(totalACV)}</td>
        <td colspan="3"></td>
      </tr>`;

      if (!isCollapsed) {
        const sorted = [...deals].sort((a,b) => (a.CloseDate||'').localeCompare(b.CloseDate||''));
        sorted.forEach(o => { rows += dealRow(o, false); });
      }
    });

    tbody.innerHTML = rows;
    updateFilterCount(filtered.length, acctList.length);
  }
}

function dealRow(o, showAcct) {
  const sn = stageNum(o.StageName || '');
  const stageCls = sn >= 0 ? `stage-${sn}` : 'stage-0';
  const shortStage = stageShort(o.StageName || '');
  const acdC = acdColor(o.ACD || '');
  const fedramp = o.FedRAMP === 'Yes' ? '<span class="fedramp-badge">FedRAMP</span>' : '';
  const region = [o.Region, o.Territory].filter(Boolean).join(' / ') || '—';

  const acctCell = showAcct ? `<td>${o.AccountName||'—'}</td>` : `<td></td>`;

  return `<tr class="${showAcct ? '' : 'deal-row'}">
    <td><a class="opp-link" href="${sfLink(o.Id)}" target="_blank">${o.Name||'—'}</a>${fedramp}</td>
    ${acctCell}
    <td><span class="badge stage-badge ${stageCls}">${sn} · ${shortStage}</span></td>
    <td>${fmtDate(o.CloseDate)}</td>
    <td class="acv-val">${fmtACV(o.ACV, o.Currency)}</td>
    <td><span class="acd-pill" style="background:${acdC.bg};color:${acdC.color}">${o.ACD||'—'}</span></td>
    <td class="region-cell">${region}</td>
    <td style="font-size:12px">${o.OwnerName||'—'}</td>
  </tr>`;
}

function updateFilterCount(deals, accounts) {
  document.getElementById('filter-count').textContent = `${deals} deal${deals!==1?'s':''} · ${accounts} account${accounts!==1?'s':''}`;
}

function updateStats() {
  const total = filtered.length;
  const accounts = new Set(filtered.map(o=>o.AccountName)).size;
  const totalACV = filtered.reduce((s,o)=>s+(o.ACV||0),0);
  const fedramp = filtered.filter(o=>o.FedRAMP==='Yes').length;
  const distinctACD = new Set(filtered.map(o=>o.ACD).filter(Boolean)).size;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Open Deals</div>
      <div class="stat-value">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Accounts</div>
      <div class="stat-value">${accounts}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Pipeline ACV</div>
      <div class="stat-value">${fmtACV(totalACV, 'USD')}</div>
      <div class="stat-sub">across filtered deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">FedRAMP Deals</div>
      <div class="stat-value" style="color:var(--nice-indigo)">${fedramp}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Distinct ACDs</div>
      <div class="stat-value">${distinctACD}</div>
    </div>
  `;
}

function renderSidebar() {
  const all = RAW_DATA;
  
  // By Stage
  const stageMap = {};
  all.forEach(o => {
    const k = o.StageName || 'Unknown';
    if (!stageMap[k]) stageMap[k] = {count:0, acv:0};
    stageMap[k].count++;
    stageMap[k].acv += (o.ACV||0);
  });
  const stages = Object.entries(stageMap).sort((a,b) => stageNum(a[0]) - stageNum(b[0]));

  // By ACD
  const acdMap = {};
  all.forEach(o => {
    const k = o.ACD || 'Unknown';
    if (!acdMap[k]) acdMap[k] = {count:0, acv:0};
    acdMap[k].count++;
    acdMap[k].acv += (o.ACV||0);
  });
  const acds = Object.entries(acdMap).sort((a,b)=>b[1].count - a[1].count);

  // By Region
  const regionMap = {};
  all.forEach(o => {
    const k = o.Region || 'Unknown';
    if (!regionMap[k]) regionMap[k] = 0;
    regionMap[k]++;
  });
  const regions = Object.entries(regionMap).sort((a,b)=>b[1]-a[1]);

  let html = '<h3>By Stage</h3>';
  stages.forEach(([s,v]) => {
    const sn = stageNum(s);
    const colors = ['#6b7280','#3694fc','#3694fc','#f59e0b','#6100FF','#16a34a'];
    const col = colors[sn] || '#6b7280';
    html += `<div class="sb-row">
      <span class="sb-label" style="font-size:12px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:6px"></span>${sn} · ${stageShort(s)}</span>
      <div class="sb-vals"><span class="sb-count">${v.count}</span><span class="sb-acv">${fmtACV(v.acv,'USD')}</span></div>
    </div>`;
  });

  html += '<h3>By ACD</h3>';
  acds.forEach(([a,v]) => {
    html += `<div class="sb-row">
      <span class="sb-label" style="font-size:12px">${a}</span>
      <div class="sb-vals"><span class="sb-count">${v.count}</span><span class="sb-acv">${fmtACV(v.acv,'USD')}</span></div>
    </div>`;
  });

  html += '<h3>By Region</h3>';
  regions.forEach(([r,count]) => {
    html += `<div class="sb-row">
      <span class="sb-label" style="font-size:12px">${r}</span>
      <div class="sb-vals"><span class="sb-count">${count}</span></div>
    </div>`;
  });

  document.getElementById('sidebar').innerHTML = html;
}

function populateFilters() {
  const stages = [...new Set(RAW_DATA.map(o=>o.StageName).filter(Boolean))].sort((a,b)=>stageNum(a)-stageNum(b));
  const regions = [...new Set(RAW_DATA.map(o=>o.Region).filter(Boolean))].sort();
  const acds = [...new Set(RAW_DATA.map(o=>o.ACD).filter(Boolean))].sort();

  const sf = document.getElementById('f-stage');
  stages.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o); });

  const rf = document.getElementById('f-region');
  regions.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; rf.appendChild(o); });

  const af = document.getElementById('f-acd');
  acds.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; af.appendChild(o); });
}

function init() {
  document.getElementById('hdr-date').textContent = 'Updated: ' + new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  filtered = [...RAW_DATA];
  populateFilters();
  renderSidebar();
  updateStats();
  renderTable();
}

// Auto-init if already authenticated
if (sessionStorage.getItem('ehub_auth') === '1') {
  document.addEventListener('DOMContentLoaded', init);
}
</script>
</body>
</html>
