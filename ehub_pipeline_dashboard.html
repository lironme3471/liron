<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --nice-blue: #3694fc;
    --charcoal: #21212b;
    --indigo: #6100FF;
    --teal: #36EAD0;
    --coral: #FF5B8A;
    --bg: #f4f6fa;
    --card-bg: #fff;
    --border: #e2e6f0;
    --text: #21212b;
    --text-muted: #6b7280;
    --header-bg: #21212b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  /* PASSWORD GATE */
  #pw-overlay {
    position: fixed; inset: 0; background: var(--charcoal);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #pw-card {
    background: #2a2a38; border-radius: 16px; padding: 48px 40px; width: 380px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #pw-card .logo { font-size: 28px; font-weight: 800; color: var(--nice-blue); margin-bottom: 8px; }
  #pw-card .subtitle { color: #9ca3af; margin-bottom: 32px; font-size: 14px; }
  #pw-card input {
    width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #444;
    background: #1a1a24; color: #fff; font-size: 15px; margin-bottom: 16px; outline: none;
  }
  #pw-card input:focus { border-color: var(--nice-blue); }
  #pw-card button {
    width: 100%; padding: 12px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  #pw-card button:hover { background: #2a7ae0; }
  #pw-error { color: var(--coral); margin-top: 12px; font-size: 13px; }

  /* MAIN LAYOUT */
  #main { display: none; }
  header {
    background: var(--header-bg); color: #fff; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header .brand { font-size: 18px; font-weight: 800; }
  header .brand span { color: var(--nice-blue); }
  header .meta { color: #9ca3af; font-size: 12px; }

  .layout { display: flex; height: calc(100vh - 54px); overflow: hidden; }

  /* SIDEBAR */
  aside {
    width: 240px; min-width: 240px; background: var(--card-bg); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 12px;
  }
  aside h3 { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  aside h3:first-child { margin-top: 0; }
  .sidebar-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px;
    border-radius: 6px; font-size: 12px; }
  .sidebar-row:hover { background: #f0f4ff; }
  .sidebar-row .label { color: var(--text); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-row .val { color: var(--text-muted); font-size: 11px; white-space: nowrap; }
  .sidebar-row .cnt { background: var(--nice-blue); color: #fff; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 600; }

  /* MAIN CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 18px; flex: 1; min-width: 130px;
  }
  .stat-card .val { font-size: 22px; font-weight: 800; color: var(--nice-blue); }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* FILTERS */
  .filters {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
  }
  .filters input, .filters select {
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; background: #fff; color: var(--text); outline: none;
  }
  .filters input { min-width: 200px; }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); }
  .result-count { color: var(--text-muted); font-size: 12px; margin-left: auto; }

  /* TABLE */
  .table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: #f8f9fc; position: sticky; top: 0; z-index: 2; }
  thead th {
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border); cursor: pointer; white-space: nowrap;
    user-select: none;
  }
  thead th:hover { color: var(--nice-blue); }
  thead th.sort-asc::after { content: ' ▲'; color: var(--nice-blue); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--nice-blue); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fbff; }
  td { padding: 9px 12px; vertical-align: middle; }

  /* ACCOUNT HEADER ROW */
  .acct-row { background: #f0f4ff !important; cursor: pointer; }
  .acct-row:hover { background: #e6eeff !important; }
  .acct-row td { font-weight: 700; font-size: 12px; }
  .acct-row .acct-name { color: var(--charcoal); }
  .acct-row .acct-meta { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 8px; }
  .toggle-icon { margin-right: 8px; font-size: 10px; }
  .deal-row td:first-child { padding-left: 28px; }

  /* BADGES */
  .stage-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .stage-0, .stage-1 { background: #dbeafe; color: #1d4ed8; }
  .stage-2, .stage-3 { background: #fef3c7; color: #b45309; }
  .stage-4 { background: #ede9fe; color: #6d28d9; }
  .stage-5 { background: #d1fae5; color: #065f46; }

  .acd-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .acd-ms { background: #dbeafe; color: #1d4ed8; }
  .acd-genesys { background: #fce7f3; color: #9d174d; }
  .acd-cisco { background: #ffedd5; color: #c2410c; }
  .acd-amazon { background: #d1fae5; color: #065f46; }
  .acd-avaya { background: #ede9fe; color: #5b21b6; }
  .acd-nice { background: #e0f2fe; color: #0369a1; }
  .acd-ujet { background: #f0fdf4; color: #166534; }
  .acd-nextiva { background: #fef9c3; color: #854d0e; }
  .acd-other { background: #f3f4f6; color: #374151; }

  .fedramp-badge { background: #ede9fe; color: #6100FF; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 700; }

  .opp-link { color: var(--nice-blue); text-decoration: none; font-weight: 500; }
  .opp-link:hover { text-decoration: underline; }
  .acv-cell { font-weight: 600; text-align: right; white-space: nowrap; }
  .acv-native { font-size: 10px; color: var(--text-muted); font-weight: 400; }

  .acct-badges { display: inline-flex; gap: 4px; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-overlay">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="subtitle">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password" />
    <button onclick="checkPw()">Access Dashboard</button>
    <div id="pw-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main">
  <header>
    <div class="brand"><span>NiCE</span> eHub Pipeline</div>
    <div class="meta">Real-Time Recording · Open Stages 0–5 · Updated: 2026-07-14</div>
  </header>
  <div class="layout">
    <aside id="sidebar"></aside>
    <div class="content">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="filters">
        <input type="text" id="search" placeholder="🔍  Search opportunities, accounts..." oninput="applyFilters()" />
        <select id="stage-filter" onchange="applyFilters()">
          <option value="">All Stages</option>
          <option value="0">0 · Prospecting</option>
          <option value="1">1 · Identification</option>
          <option value="2">2 · Determining Problem</option>
          <option value="3">3 · Aligning Benefits</option>
          <option value="4">4 · Confirm Value</option>
          <option value="5">5 · Proposal</option>
        </select>
        <select id="region-filter" onchange="applyFilters()">
          <option value="">All Regions</option>
        </select>
        <select id="acd-filter" onchange="applyFilters()">
          <option value="">All ACDs</option>
        </select>
        <select id="fedramp-filter" onchange="applyFilters()">
          <option value="">FedRAMP: All</option>
          <option value="Yes">FedRAMP: Yes</option>
        </select>
        <span class="result-count" id="result-count"></span>
      </div>
      <div class="table-wrap">
        <table id="opp-table">
          <thead>
            <tr>
              <th onclick="sortBy('name')" id="th-name">Opportunity</th>
              <th onclick="sortBy('account')" id="th-account">Account</th>
              <th onclick="sortBy('stage_num')" id="th-stage">Stage</th>
              <th onclick="sortBy('close_date')" id="th-close">Close Date</th>
              <th onclick="sortBy('usd_acv')" id="th-acv" style="text-align:right">ACV (USD)</th>
              <th onclick="sortBy('acd')" id="th-acd">ACD</th>
              <th onclick="sortBy('region')" id="th-region">Region / Territory</th>
              <th onclick="sortBy('owner')" id="th-owner">Owner</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hex === HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password. Please try again.';
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });

if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('pw-overlay').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

const SF_BASE = 'https://niceincontact.lightning.force.com/lightning/r/Opportunity';

let sortCol = null;
let sortDir = 0; // 0=grouped, 1=asc, -1=desc
let collapsed = {};
let filteredOpps = [];

function fmt(n) {
  if (!n && n !== 0) return '-';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString();
}

function fmtFull(n) {
  if (!n && n !== 0) return '-';
  return '$' + Math.round(n).toLocaleString();
}

function acdClass(acd) {
  if (!acd) return 'acd-other';
  const a = acd.toLowerCase();
  if (a.includes('ms teams') || a.includes('teams')) return 'acd-ms';
  if (a.includes('genesys')) return 'acd-genesys';
  if (a.includes('cisco')) return 'acd-cisco';
  if (a.includes('amazon')) return 'acd-amazon';
  if (a.includes('avaya')) return 'acd-avaya';
  if (a.includes('nice')) return 'acd-nice';
  if (a.includes('ujet')) return 'acd-ujet';
  if (a.includes('nextiva')) return 'acd-nextiva';
  return 'acd-other';
}

function acdPill(acd) {
  return `<span class="acd-pill ${acdClass(acd)}">${acd || 'Unknown'}</span>`;
}

function stageBadge(o) {
  return `<span class="stage-badge stage-${o.stage_num}">${o.stage_label}</span>`;
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('stage-filter').value;
  const rf = document.getElementById('region-filter').value;
  const af = document.getElementById('acd-filter').value;
  const ff = document.getElementById('fedramp-filter').value;
  return RAW_OPPS.filter(o => {
    if (q && !o.name.toLowerCase().includes(q) && !o.account.toLowerCase().includes(q) && !o.owner.toLowerCase().includes(q)) return false;
    if (sf !== '' && String(o.stage_num) !== sf) return false;
    if (rf && o.region !== rf) return false;
    if (af && o.acd !== af) return false;
    if (ff && o.fedramp !== ff) return false;
    return true;
  });
}

function applyFilters() {
  filteredOpps = getFiltered();
  renderTable();
  renderSidebar();
  renderStats();
}

function sortBy(col) {
  if (sortCol === col) {
    if (sortDir === 1) sortDir = -1;
    else if (sortDir === -1) { sortDir = 0; sortCol = null; }
    else sortDir = 1;
  } else {
    sortCol = col;
    sortDir = 1;
  }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  if (sortCol && sortDir !== 0) {
    const el = document.getElementById('th-' + sortCol.replace('_num','').replace('_date','').replace('usd_acv','acv').replace('stage_num','stage').replace('close_date','close'));
    if (el) el.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const opps = [...filteredOpps];

  let html = '';

  if (sortDir !== 0 && sortCol) {
    // Flat sorted view
    opps.sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return sortDir === 1 ? -1 : 1;
      if (av > bv) return sortDir === 1 ? 1 : -1;
      return 0;
    });
    for (const o of opps) {
      const native = o.currency !== 'USD' ? `<br><span class="acv-native">${o.currency} ${Math.round(o.native_acv).toLocaleString()}</span>` : '';
      const fedramp = o.fedramp === 'Yes' ? ' <span class="fedramp-badge">FedRAMP</span>' : '';
      html += `<tr class="deal-row">
        <td><a class="opp-link" href="${SF_BASE}/${o.id}/view" target="_blank">${o.name}</a>${fedramp}</td>
        <td>${o.account}</td>
        <td>${stageBadge(o)}</td>
        <td style="white-space:nowrap">${o.close_date}</td>
        <td class="acv-cell">${fmtFull(o.usd_acv)}${native}</td>
        <td>${acdPill(o.acd)}</td>
        <td style="white-space:nowrap">${o.region_display}</td>
        <td>${o.owner}</td>
      </tr>`;
    }
  } else {
    // Grouped by account
    const acctMap = {};
    for (const o of opps) {
      if (!acctMap[o.account]) acctMap[o.account] = [];
      acctMap[o.account].push(o);
    }
    const acctsSorted = Object.keys(acctMap).sort((a, b) => {
      const sa = acctMap[a].reduce((s,o) => s + o.usd_acv, 0);
      const sb = acctMap[b].reduce((s,o) => s + o.usd_acv, 0);
      return sb - sa;
    });

    for (const acct of acctsSorted) {
      const deals = acctMap[acct].sort((a,b) => a.close_date.localeCompare(b.close_date));
      const totalAcv = deals.reduce((s,o) => s + o.usd_acv, 0);
      const acds = [...new Set(deals.map(d => d.acd))];
      const isCollapsed = collapsed[acct];
      const icon = isCollapsed ? '▶' : '▼';

      html += `<tr class="acct-row" onclick="toggleAcct('${acct.replace(/'/g, "\\'")}')">
        <td colspan="3"><span class="toggle-icon">${icon}</span><span class="acct-name">${acct}</span>
          <span class="acct-meta">${deals.length} deal${deals.length > 1 ? 's' : ''}</span>
          <span style="margin-left:12px" class="acct-badges">${acds.map(a => acdPill(a)).join(' ')}</span>
        </td>
        <td></td>
        <td class="acv-cell">${fmt(totalAcv)}</td>
        <td></td><td></td><td></td>
      </tr>`;

      if (!isCollapsed) {
        for (const o of deals) {
          const native = o.currency !== 'USD' ? `<br><span class="acv-native">${o.currency} ${Math.round(o.native_acv).toLocaleString()}</span>` : '';
          const fedramp = o.fedramp === 'Yes' ? ' <span class="fedramp-badge">FedRAMP</span>' : '';
          html += `<tr class="deal-row">
            <td><a class="opp-link" href="${SF_BASE}/${o.id}/view" target="_blank">${o.name}</a>${fedramp}</td>
            <td></td>
            <td>${stageBadge(o)}</td>
            <td style="white-space:nowrap">${o.close_date}</td>
            <td class="acv-cell">${fmtFull(o.usd_acv)}${native}</td>
            <td>${acdPill(o.acd)}</td>
            <td style="white-space:nowrap">${o.region_display}</td>
            <td>${o.owner}</td>
          </tr>`;
        }
      }
    }
  }

  tbody.innerHTML = html;
  
  // Update result count
  const accts = new Set(filteredOpps.map(o => o.account));
  document.getElementById('result-count').textContent = `${filteredOpps.length} deals · ${accts.size} accounts`;
}

function toggleAcct(acct) {
  collapsed[acct] = !collapsed[acct];
  renderTable();
}

function renderStats() {
  const opps = filteredOpps;
  const totalAcv = opps.reduce((s,o) => s + o.usd_acv, 0);
  const fedramp = opps.filter(o => o.fedramp === 'Yes').length;
  const acds = new Set(opps.map(o => o.acd));
  const accts = new Set(opps.map(o => o.account));

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="val">${opps.length}</div><div class="lbl">Open Deals</div></div>
    <div class="stat-card"><div class="val">${accts.size}</div><div class="lbl">Accounts</div></div>
    <div class="stat-card"><div class="val">${fmt(totalAcv)}</div><div class="lbl">Total Pipeline ACV (USD)</div></div>
    <div class="stat-card"><div class="val">${fedramp}</div><div class="lbl">FedRAMP</div></div>
    <div class="stat-card"><div class="val">${acds.size}</div><div class="lbl">Distinct ACDs</div></div>
  `;
}

function renderSidebar() {
  const opps = filteredOpps;
  const sidebar = document.getElementById('sidebar');

  // By Stage
  const stageMap = {};
  for (const o of opps) {
    if (!stageMap[o.stage_num]) stageMap[o.stage_num] = {cnt:0, acv:0, label: o.stage_label};
    stageMap[o.stage_num].cnt++;
    stageMap[o.stage_num].acv += o.usd_acv;
  }
  let html = '<h3>By Stage</h3>';
  for (const s of [0,1,2,3,4,5]) {
    const d = stageMap[s];
    if (!d) continue;
    html += `<div class="sidebar-row">
      <span class="label"><span class="stage-badge stage-${s}">${s}</span> ${d.label.replace(/^\d+ · /, '')}</span>
      <span class="val">${d.cnt} · ${fmt(d.acv)}</span>
    </div>`;
  }

  // By ACD
  const acdMap = {};
  for (const o of opps) {
    if (!acdMap[o.acd]) acdMap[o.acd] = {cnt:0, acv:0};
    acdMap[o.acd].cnt++;
    acdMap[o.acd].acv += o.usd_acv;
  }
  const acdsSorted = Object.keys(acdMap).sort((a,b) => acdMap[b].acv - acdMap[a].acv);
  html += '<h3>By ACD</h3>';
  for (const a of acdsSorted) {
    const d = acdMap[a];
    html += `<div class="sidebar-row">
      <span class="label">${acdPill(a)}</span>
      <span class="val">${d.cnt} · ${fmt(d.acv)}</span>
    </div>`;
  }

  // By Region
  const regMap = {};
  for (const o of opps) {
    const r = o.region || 'Unknown';
    if (!regMap[r]) regMap[r] = 0;
    regMap[r]++;
  }
  const regsSorted = Object.keys(regMap).sort((a,b) => regMap[b] - regMap[a]);
  html += '<h3>By Region</h3>';
  for (const r of regsSorted) {
    html += `<div class="sidebar-row">
      <span class="label">${r}</span>
      <span class="cnt">${regMap[r]}</span>
    </div>`;
  }

  sidebar.innerHTML = html;
}

function populateFilters() {
  const regions = [...new Set(RAW_OPPS.map(o => o.region).filter(Boolean))].sort();
  const acds = [...new Set(RAW_OPPS.map(o => o.acd))].sort();
  const regionSel = document.getElementById('region-filter');
  const acdSel = document.getElementById('acd-filter');
  for (const r of regions) {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    regionSel.appendChild(opt);
  }
  for (const a of acds) {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    acdSel.appendChild(opt);
  }
}

function init() {
  populateFilters();
  filteredOpps = [...RAW_OPPS];
  renderStats();
  renderSidebar();
  renderTable();
}

if (sessionStorage.getItem('ehub_auth') === '1') init();
</script>
</body>
</html>
