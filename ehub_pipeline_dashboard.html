<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eHub Pipeline Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --nice-blue: #3694fc;
            --nice-charcoal: #21212b;
            --nice-indigo: #6100FF;
            --text-primary: #1a1a1a;
            --text-secondary: #666;
            --border: #e0e0e0;
            --bg-light: #f9f9f9;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: var(--text-primary); }
        #passwordOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(33, 33, 43, 0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #passwordOverlay.hidden { display: none; }
        .password-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 400px; }
        .password-card h1 { color: var(--nice-blue); margin-bottom: 10px; font-size: 28px; }
        .password-card p { color: var(--text-secondary); margin-bottom: 30px; }
        .password-input, .filter-input, .filter-select { padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 20px; }
        .password-input:focus, .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--nice-blue); }
        .password-btn { width: 100%; padding: 12px 24px; background: var(--nice-blue); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .password-btn:hover { background: #2a7dd6; }
        #errorMsg { color: #FF5B8A; margin-top: 15px; font-size: 14px; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 300px; background: white; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; color: var(--nice-blue); }
        .stats-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat { padding: 12px 16px; background: var(--bg-light); border-radius: 8px; font-size: 14px; }
        .stat-value { font-weight: 600; color: var(--nice-blue); font-size: 16px; }
        .filters { background: white; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); }
        .filter-input, .filter-select { min-width: 150px; }
        .table-container { flex: 1; overflow: auto; padding: 0 30px 30px 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        thead { background: var(--bg-light); position: sticky; top: 0; z-index: 10; }
        th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 13px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
        th:hover { background: #f0f0f0; }
        th.asc::after { content: '▲'; display: inline-block; margin-left: 6px; font-size: 10px; color: var(--nice-blue); }
        th.desc::after { content: '▼'; display: inline-block; margin-left: 6px; font-size: 10px; color: var(--nice-blue); }
        tbody tr { border-bottom: 1px solid var(--border); }
        tbody tr:hover { background: var(--bg-light); }
        td { padding: 12px 16px; font-size: 14px; }
        .account-header { background: var(--bg-light); font-weight: 600; cursor: pointer; user-select: none; }
        .account-header:hover { background: #efefef; }
        .account-toggle { display: inline-block; width: 16px; margin-right: 8px; color: var(--text-secondary); }
        .opp-row { padding-left: 48px; }
        .opp-name { color: var(--nice-blue); text-decoration: none; font-weight: 500; }
        .opp-name:hover { text-decoration: underline; }
        .stage-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; color: white; }
        .stage-0, .stage-1 { background: var(--nice-blue); }
        .stage-2, .stage-3 { background: #ffa500; }
        .stage-4 { background: var(--nice-indigo); }
        .stage-5 { background: #22c55e; }
        .acd-pill { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; color: white; white-space: nowrap; }
        .acd-cisco { background: #FF5B8A; }
        .acd-avaya { background: #8B5CF6; }
        .acd-genesys { background: #EC4899; }
        .acd-amazon { background: #F97316; }
        .acd-teams { background: #0078D4; }
        .acd-nice { background: #06B6D4; }
        .acd-other { background: #6B7280; }
        .sidebar-section { margin-bottom: 30px; }
        .sidebar-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .sidebar-item { padding: 8px 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-count { color: var(--text-secondary); font-size: 12px; font-weight: 600; }
        .sidebar-acv { color: var(--nice-blue); font-weight: 600; font-size: 13px; }
        .currency { font-size: 11px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div id="passwordOverlay">
        <div class="password-card">
            <h1>eHub Dashboard</h1>
            <p>Enter password to access</p>
            <input type="password" id="passwordInput" class="password-input" placeholder="Password">
            <button id="accessBtn" class="password-btn">Access Dashboard</button>
            <div id="errorMsg"></div>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">By Stage</div>
                <div id="byStage"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">By ACD</div>
                <div id="byACD"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">By Region</div>
                <div id="byRegion"></div>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <h1>eHub Pipeline Dashboard</h1>
                <div class="stats-row">
                    <div class="stat">
                        <div class="stat-value" id="dealCount">0</div>
                        <div>Open Deals</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="accountCount">0</div>
                        <div>Accounts</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalACV">$0</div>
                        <div>Pipeline ACV</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="fedRampCount">0</div>
                        <div>FedRAMP</div>
                    </div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">Search</label>
                    <input type="text" id="searchInput" class="filter-input" placeholder="Opportunity or account">
                </div>
                <div class="filter-group">
                    <label class="filter-label">Stage</label>
                    <select id="stageFilter" class="filter-select">
                        <option value="">All Stages</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Region</label>
                    <select id="regionFilter" class="filter-select">
                        <option value="">All Regions</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">ACD</label>
                    <select id="acdFilter" class="filter-select">
                        <option value="">All ACDs</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table id="oppTable">
                    <thead>
                        <tr>
                            <th class="sortable" data-column="opportunityName">Opportunity</th>
                            <th class="sortable" data-column="accountName">Account</th>
                            <th class="sortable" data-column="stage">Stage</th>
                            <th class="sortable" data-column="closeDate">Close Date</th>
                            <th class="sortable" data-column="acv">ACV (USD)</th>
                            <th class="sortable" data-column="acd">ACD</th>
                            <th class="sortable" data-column="region">Region / Territory</th>
                            <th class="sortable" data-column="owner">Owner</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

        async function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = '';

            if (!password) {
                errorMsg.textContent = 'Password required';
                return;
            }

            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                if (hashHex === PASSWORD_HASH) {
                    sessionStorage.setItem('dashboardAccess', 'true');
                    document.getElementById('passwordOverlay').classList.add('hidden');
                    document.getElementById('mainContainer').style.display = 'flex';
                    initializeDashboard();
                } else {
                    errorMsg.textContent = 'Incorrect password';
                }
            } catch (e) {
                errorMsg.textContent = 'Error verifying password';
            }
        }

        document.getElementById('accessBtn').addEventListener('click', verifyPassword);
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyPassword();
        });

            if (sessionStorage.getItem('dashboardAccess') === 'true') {

        function renderUI() {

            document.getElementById('dealCount').textContent = filteredOpps.length;

            const stageHtml = Object.entries(dashboardData.byStage)

                .map(([stage, data]) => `<div class="sidebar-item"><span>${stage.split(' - ')[0]}</span><span class="sidebar-count">${data.count}</span></div>`)

            document.getElementById('byStage').innerHTML = stageHtml;

        }

        function getVisibleAccounts() {
            const filtered = getFilteredOpps();
            return new Set(filtered.map(o => o.parentName));
        }

        function handleSort(column) {
            const th = document.querySelector(`th[data-column="${column}"]`);

            if (state.sortColumn === column) {
                if (state.sortDirection === 'asc') {
                    state.sortDirection = 'desc';
                } else {
                    state.viewMode = 'grouped';
                    state.sortColumn = null;
                    document.querySelectorAll('th').forEach(t => t.classList.remove('asc', 'desc'));
                    renderTable();
                    return;
                }
            } else {
                document.querySelectorAll('th').forEach(t => t.classList.remove('asc', 'desc'));
                state.sortColumn = column;
                state.sortDirection = 'asc';
                state.viewMode = 'sorted';
            }

            th.classList.add(state.sortDirection);
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const filtered = getFilteredOpps();

            if (state.viewMode === 'grouped') {
                renderGroupedView(filtered, tbody);
            } else {
                renderSortedView(filtered, tbody);
            }
        }

        function renderGroupedView(filtered, tbody) {
            const visible = getVisibleAccounts();

            dashboardData.sortedParents.forEach(parentName => {
                if (!visible.has(parentName)) return;

                const parentOpps = filtered.filter(o => o.parentName === parentName);
                if (parentOpps.length === 0) return;

                const isExpanded = state.expanded.has(parentName);
                const totalACV = parentOpps.reduce((s, o) => s + o.acvUSD, 0);
                const acds = new Set(parentOpps.map(o => o.acd));

                const headerRow = document.createElement('tr');
                headerRow.className = 'account-header';
                headerRow.addEventListener('click', () => {
                    if (isExpanded) {
                        state.expanded.delete(parentName);
                    } else {
                        state.expanded.add(parentName);
                    }
                    renderTable();
                });

                const toggle = isExpanded ? '▼' : '▶';
                const acdBadges = Array.from(acds).map(acd => `<span class="acd-pill acd-${getACDClass(acd)}">${acd}</span>`).join(' ');

                headerRow.innerHTML = `
                    <td><span class="account-toggle">${toggle}</span> ${parentName} (${parentOpps.length})</td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>${totalACV.toLocaleString('en-US', {maximumFractionDigits: 0})} USD</td>
                    <td>${acdBadges}</td>
                    <td></td>
                    <td></td>
                `;
                tbody.appendChild(headerRow);

                if (isExpanded) {
                    parentOpps.sort((a, b) => new Date(a.closeDate) - new Date(b.closeDate))
                        .forEach(opp => {
                            const row = renderOppRow(opp);
                            tbody.appendChild(row);
                        });
                }
            });
        }

        function renderSortedView(filtered, tbody) {
            const sorted = [...filtered];

            if (state.sortColumn === 'opportunityName') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            } else if (state.sortColumn === 'accountName') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.accountName.localeCompare(b.accountName) : b.accountName.localeCompare(a.accountName));
            } else if (state.sortColumn === 'stage') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.stageNum - b.stageNum : b.stageNum - a.stageNum);
            } else if (state.sortColumn === 'closeDate') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    new Date(a.closeDate) - new Date(b.closeDate) :
                    new Date(b.closeDate) - new Date(a.closeDate));
            } else if (state.sortColumn === 'acv') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.acvUSD - b.acvUSD : b.acvUSD - a.acvUSD);
            } else if (state.sortColumn === 'acd') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.acd.localeCompare(b.acd) : b.acd.localeCompare(a.acd));
            } else if (state.sortColumn === 'region') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.regionTerritory.localeCompare(b.regionTerritory) :
                    b.regionTerritory.localeCompare(a.regionTerritory));
            } else if (state.sortColumn === 'owner') {
                sorted.sort((a, b) => state.sortDirection === 'asc' ?
                    a.owner.localeCompare(b.owner) : b.owner.localeCompare(a.owner));
            }

            sorted.forEach(opp => {
                const row = renderOppRow(opp);
                tbody.appendChild(row);
            });
        }

        function renderOppRow(opp) {
            const row = document.createElement('tr');
            row.className = 'opp-row';

            const link = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${opp.id}/view`;
            const stageBadge = `<span class="stage-badge stage-${opp.stageNum}">${opp.stageNum} · ${opp.stageLabel}</span>`;
            const acdPill = `<span class="acd-pill acd-${getACDClass(opp.acd)}">${opp.acd}</span>`;
            const acvDisplay = opp.currency !== 'USD' ?
                `${opp.acvUSD.toLocaleString('en-US', {maximumFractionDigits: 0})} <span class="currency">(${opp.acvNative.toLocaleString('en-US', {maximumFractionDigits: 0})} ${opp.currency})</span>` :
                `${opp.acvUSD.toLocaleString('en-US', {maximumFractionDigits: 0})}`;

            row.innerHTML = `
                <td><a href="${link}" target="_blank" class="opp-name">${opp.name}</a></td>
                <td>${state.viewMode === 'sorted' ? opp.accountName : ''}</td>
                <td>${stageBadge}</td>
                <td>${opp.closeDate}</td>
                <td>${acvDisplay}</td>
                <td>${acdPill}</td>
                <td>${opp.regionTerritory}</td>
                <td>${opp.owner}</td>
            `;

            return row;
        }

        function getACDClass(acd) {
            if (!acd) return 'other';
            const lower = acd.toLowerCase();
            if (lower.includes('cisco')) return 'cisco';
            if (lower.includes('avaya')) return 'avaya';
            if (lower.includes('genesys')) return 'genesys';
            if (lower.includes('amazon')) return 'amazon';
            if (lower.includes('teams')) return 'teams';
            if (lower.includes('nice')) return 'nice';
            return 'other';
        }
    </script>
</body>
</html>
