<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--bg:#f4f6fa;--line:#e5e8ef;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--charcoal)}
#gate{position:fixed;inset:0;background:#21212b;display:flex;align-items:center;justify-content:center;z-index:999}
#gate .card{background:#fff;padding:40px;border-radius:14px;text-align:center;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.4)}

#gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;margin:14px 0;font-size:15px}
#gate button{width:100%;padding:11px;background:var(--blue);color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer}
#gate .err{color:#d6336c;font-size:13px;height:16px;margin-top:4px}
#app{display:none;max-width:1500px;margin:0 auto;padding:22px}
header.top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
header.top .logo{font-size:24px;font-weight:800;color:var(--blue)}
header.top .sub{color:#6b7280;font-size:13px}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.stat{background:#fff;border-radius:12px;padding:15px 20px;flex:1;min-width:150px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat .v{font-size:26px;font-weight:800;color:var(--charcoal)}.stat .l{font-size:12px;color:#6b7280;margin-top:3px}
.layout{display:flex;gap:18px;align-items:flex-start}
.main{flex:1;min-width:0}
.side{width:280px;flex-shrink:0}
.side .box{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.side h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;margin-bottom:10px}
.side .row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid #f0f0f5}
.side .row:last-child{border:0}.side .row .r{color:#6b7280}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.filters input,.filters select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
.filters input{flex:1;min-width:200px}
.count{font-size:13px;color:#6b7280;margin-bottom:10px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f0f0f5}
th{background:#fafbfd;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--charcoal)}
tr.acct{background:#f0f5ff;cursor:pointer;font-weight:600}
tr.acct:hover{background:#e3eeff}
tr.acct td{font-size:13px}
.acct .nm{font-weight:700}
.deal td:first-child{padding-left:26px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.stage{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.s01{background:#e3f0ff;color:#1366d6}.s23{background:#fff4d6;color:#9a6b00}.s4{background:#ede0ff;color:#6100FF}.s5{background:#dff7e8;color:#198a4a}
.fed{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:#ede0ff;color:#6100FF;margin-left:6px}
.acdbadges .pill{margin-left:4px}
.num{text-align:right;font-variant-numeric:tabular-nums}
.arrow{font-size:10px;color:#9aa0ab;margin-right:4px}
.foot{color:#9aa0ab;font-size:11px;margin-top:14px;text-align:center}
</style></head><body>

const SFBASE="https://nice.lightning.force.com/lightning/r/Opportunity/";
async function checkPw(val){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex===STORED_HASH;
}
function unlock(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('go').onclick=async()=>{
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){sessionStorage.setItem('ehub_ok','1');unlock();}
  else{document.getElementById('err').textContent='Incorrect password';}
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
if(sessionStorage.getItem('ehub_ok')==='1')unlock();

const ACD_COLORS={'NICE CXone Mpower':'#3694fc','Cisco Systems':'#00bceb','Genesys':'#ff4f1f','Avaya':'#c8102e','Amazon Connect':'#ff9900','MS Teams':'#5059c9','Five9':'#00a0df','Unknown':'#9aa0ab'};
function acdColor(a){return ACD_COLORS[a]||'#6b7280';}
function fmtMoney(v,c){return (c==='USD'?'$':(c+' '))+Math.round(v).toLocaleString('en-US');}
function stageClass(n){return n<=1?'s01':n<=3?'s23':n===4?'s4':'s5';}
const COLS=[{k:'name',t:'Opportunity'},{k:'account',t:'Account'},{k:'stageNum',t:'Stage'},{k:'close',t:'Close Date'},{k:'acv',t:'ACV'},{k:'acd',t:'ACD'},{k:'regdisp',t:'Region / Territory'},{k:'owner',t:'Owner'}];
let sortKey=null,sortDir=1,sortClicks=0;
const collapsed={};

function init(){
  // stats
  const total=DEALS.reduce((a,b)=>a+(b.acv||0),0);
  const accts=new Set(DEALS.map(d=>d.account));
  const fed=DEALS.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(DEALS.map(d=>d.acd));
  document.getElementById('stats').innerHTML=[
    ['Open Deals',DEALS.length],['Accounts',accts.size],['Total Pipeline ACV','$'+Math.round(total).toLocaleString('en-US')],
    ['FedRAMP',fed],['Distinct ACDs',acds.size]
  ].map(s=>`<div class="stat"><div class="v">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('');
  // filter options
  const stageOpts=[...new Set(DEALS.map(d=>d.stageNum))].sort();
  document.getElementById('fStage').innerHTML='<option value="">All stages</option>'+stageOpts.map(n=>`<option value="${n}">${n} &middot; ${DEALS.find(d=>d.stageNum===n).stageShort}</option>`).join('');
  document.getElementById('fRegion').innerHTML='<option value="">All regions</option>'+[...new Set(DEALS.map(d=>d.region))].sort().map(r=>`<option>${r}</option>`).join('');
  document.getElementById('fAcd').innerHTML='<option value="">All ACDs</option>'+[...new Set(DEALS.map(d=>d.acd))].sort().map(a=>`<option>${a}</option>`).join('');
  // head
  document.getElementById('head').innerHTML=COLS.map(c=>`<th data-k="${c.k}">${c.t}<span class="ind"></span></th>`).join('');
  document.querySelectorAll('#head th').forEach(th=>th.onclick=()=>onSort(th.dataset.k));
  ['q','fStage','fRegion','fAcd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  render();
}
function onSort(k){
  if(sortKey===k){sortClicks++;if(sortClicks===1){sortDir=-1;}else{sortKey=null;sortClicks=0;}}
  else{sortKey=k;sortDir=1;sortClicks=0;}
  render();
}
function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const fs=document.getElementById('fStage').value;
  const fr=document.getElementById('fRegion').value;
  const fa=document.getElementById('fAcd').value;
  return DEALS.filter(d=>{
    if(fs!==''&&String(d.stageNum)!==fs)return false;
    if(fr!==''&&d.region!==fr)return false;
    if(fa!==''&&d.acd!==fa)return false;
    if(q){const s=(d.name+' '+d.account+' '+d.owner).toLowerCase();if(!s.includes(q))return false;}
    return true;
  });
}
function dealRow(d,showAcct){
  return `<tr class="deal"><td><a href="${SFBASE}${d.id}/view" target="_blank">${esc(d.name)}</a>${d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':''}</td>`+
    `<td>${showAcct?esc(d.account):''}</td>`+
    `<td><span class="stage ${stageClass(d.stageNum)}">${d.stageNum} &middot; ${esc(d.stageShort)}</span></td>`+
    `<td>${d.close}</td>`+
    `<td class="num">${fmtMoney(d.acv,d.cur)}</td>`+
    `<td><span class="pill" style="background:${acdColor(d.acd)}">${esc(d.acd)}</span></td>`+
    `<td>${esc(d.regdisp)}</td>`+
    `<td>${esc(d.owner)}</td></tr>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function render(){
  // indicators
  document.querySelectorAll('#head th').forEach(th=>{const i=th.querySelector('.ind');i.textContent=(sortKey===th.dataset.k)?(sortDir===1?' ▲':' ▼'):'';});
  const rows=filtered();
  const body=document.getElementById('body');
  let html='';
  if(sortKey){
    const sorted=[...rows].sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(typeof x==='string')x=x.toLowerCase();if(typeof y==='string')y=y.toLowerCase();return (x<y?-1:x>y?1:0)*sortDir;});
    html=sorted.map(d=>dealRow(d,true)).join('');
    document.getElementById('count').textContent=`${rows.length} deals`;
  }else{
    // group by account, sort accounts by total ACV desc
    const groups={};rows.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>groups[b].reduce((s,d)=>s+d.acv,0)-groups[a].reduce((s,d)=>s+d.acv,0));
    order.forEach(acct=>{
      const ds=groups[acct].sort((a,b)=>(a.close<b.close?-1:a.close>b.close?1:0));
      const tot=ds.reduce((s,d)=>s+d.acv,0);
      const acds=[...new Set(ds.map(d=>d.acd))];
      const badges=acds.map(a=>`<span class="pill" style="background:${acdColor(a)}">${esc(a)}</span>`).join('');
      const isC=collapsed[acct];
      html+=`<tr class="acct" data-a="${esc(acct)}"><td colspan="2"><span class="arrow">${isC?'▶':'▼'}</span><span class="nm">${esc(acct)}</span> <span style="color:#9aa0ab;font-weight:400">(${ds.length})</span></td>`+
        `<td colspan="3" class="acdbadges">${badges}</td>`+
        `<td class="num">$${Math.round(tot).toLocaleString('en-US')}</td><td colspan="2"></td></tr>`;
      if(!isC)html+=ds.map(d=>dealRow(d,false)).join('');
    });
    document.getElementById('count').textContent=`${rows.length} deals &middot; ${order.length} accounts`;
    document.getElementById('count').innerHTML=`${rows.length} deals &middot; ${order.length} accounts`;
  }
  body.innerHTML=html;
  document.querySelectorAll('tr.acct').forEach(tr=>tr.onclick=()=>{const a=tr.dataset.a;collapsed[a]=!collapsed[a];render();});
  renderSidebar(rows);
}
function renderSidebar(rows){
  const byS={};rows.forEach(d=>{const k=d.stageNum+' · '+d.stageShort;byS[k]=byS[k]||{c:0,v:0};byS[k].c++;byS[k].v+=d.acv;});
  document.getElementById('byStage').innerHTML=Object.keys(byS).sort().map(k=>`<div class="row"><span>${k}</span><span class="r">${byS[k].c} &middot; $${Math.round(byS[k].v).toLocaleString('en-US')}</span></div>`).join('')||'<div class="row">none</div>';
  const byA={};rows.forEach(d=>{byA[d.acd]=byA[d.acd]||{c:0,v:0};byA[d.acd].c++;byA[d.acd].v+=d.acv;});
  document.getElementById('byAcd').innerHTML=Object.keys(byA).sort((a,b)=>byA[b].v-byA[a].v).map(k=>`<div class="row"><span><span class="pill" style="background:${acdColor(k)}">${esc(k)}</span></span><span class="r">${byA[k].c} &middot; $${Math.round(byA[k].v).toLocaleString('en-US')}</span></div>`).join('');
  const byR={};rows.forEach(d=>{byR[d.region]=(byR[d.region]||0)+1;});
  document.getElementById('byRegion').innerHTML=Object.keys(byR).sort((a,b)=>byR[b]-byR[a]).map(k=>`<div class="row"><span>${esc(k)}</span><span class="r">${byR[k]}</span></div>`).join('');
}
