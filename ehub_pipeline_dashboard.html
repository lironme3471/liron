<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Pipeline Dashboard</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f5f5f7;
  color: #21212b;
}

/* Password gate */
#password-gate {
  position: fixed;
  inset: 0;
  background: #21212b;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}

#password-gate.hidden {
  display: none;
}

.password-card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 400px;
  width: 90%;
}

.password-card h1 {
  color: #3694fc;
  margin-bottom: 24px;
  font-size: 24px;
}

.password-card input {
  width: 100%;
  padding: 12px;
  border: 2px solid #e5e5e7;
  border-radius: 8px;
  font-size: 16px;
  margin-bottom: 16px;
}

.password-card input:focus {
  outline: none;
  border-color: #3694fc;
}

.password-card button {
  width: 100%;
  padding: 12px;
  background: #3694fc;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.password-card button:hover {
  background: #2578db;
}

.error {
  color: #ff5b8a;
  font-size: 14px;
  margin-top: 8px;
}

/* Header */
header {
  background: #21212b;
  color: white;
  padding: 24px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 28px;
  color: #3694fc;
}

.stats-bar {
  display: flex;
  gap: 32px;
  font-size: 14px;
}

.stat {
  text-align: center;
}

.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: #3694fc;
}

.stat-label {
  color: #aaa;
  margin-top: 4px;
}

/* Main layout */
.container {
  display: flex;
  max-width: 1800px;
  margin: 0 auto;
  padding: 32px;
  gap: 32px;
}

main {
  flex: 1;
}

aside {
  width: 280px;
  background: white;
  border-radius: 12px;
  padding: 24px;
  height: fit-content;
  position: sticky;
  top: 32px;
}

aside h2 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  color: #21212b;
}

.sidebar-section {
  margin-bottom: 32px;
}

.sidebar-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  font-size: 14px;
}

.sidebar-item:last-child {
  border-bottom: none;
}

.sidebar-label {
  font-weight: 500;
}

.sidebar-count {
  color: #666;
  font-size: 13px;
}

.sidebar-acv {
  color: #3694fc;
  font-weight: 600;
  font-size: 13px;
}

/* Filters */
.filters {
  background: white;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.filter-group {
  flex: 1;
  min-width: 200px;
}

.filter-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #666;
}

.filter-group input,
.filter-group select {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid #e5e5e7;
  border-radius: 8px;
  font-size: 14px;
}

.filter-group input:focus,
.filter-group select:focus {
  outline: none;
  border-color: #3694fc;
}

.count-display {
  font-size: 14px;
  color: #666;
  font-weight: 500;
  white-space: nowrap;
}

/* Table */
.table-wrapper {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #f8f9fa;
  position: sticky;
  top: 0;
  z-index: 10;
}

th {
  text-align: left;
  padding: 16px;
  font-size: 13px;
  font-weight: 700;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
}

th:hover {
  background: #ececec;
}

th.sorted-asc::after {
  content: " ▲";
  color: #3694fc;
}

th.sorted-desc::after {
  content: " ▼";
  color: #3694fc;
}

.account-header {
  background: #f8f9fa;
  cursor: pointer;
  user-select: none;
}

.account-header:hover {
  background: #ececec;
}

.account-header td {
  padding: 16px;
  font-weight: 700;
  font-size: 15px;
}

.account-name {
  display: flex;
  align-items: center;
  gap: 12px;
}

.expand-icon {
  transition: transform 0.2s;
  font-size: 12px;
  color: #666;
}

.account-header.collapsed .expand-icon {
  transform: rotate(-90deg);
}

.deal-row {
  border-bottom: 1px solid #f0f0f0;
}

.deal-row.hidden {
  display: none;
}

.deal-row td {
  padding: 16px;
  font-size: 14px;
  padding-left: 48px;
}

.deal-row.flat-mode td {
  padding-left: 16px;
}

.deal-row:last-child {
  border-bottom: none;
}

.opp-link {
  color: #3694fc;
  text-decoration: none;
  font-weight: 600;
}

.opp-link:hover {
  text-decoration: underline;
}

.badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}

.stage-badge {
  white-space: nowrap;
}

.stage-0, .stage-1 { background: #d4e8ff; color: #0066cc; }
.stage-2, .stage-3 { background: #fff4d4; color: #cc8800; }
.stage-4 { background: #e8d4ff; color: #6100FF; }
.stage-5 { background: #d4ffd4; color: #00aa00; }

.acd-badge {
  background: #e8d4ff;
  color: #6100FF;
}

.fedramp-badge {
  background: #6100FF;
  color: white;
  margin-left: 8px;
}

.acv-cell {
  font-weight: 600;
  color: #21212b;
}

.account-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.account-acv {
  font-weight: 600;
  color: #3694fc;
  font-size: 15px;
}
</style>
</head>

<script>
const EXPECTED_HASH = 'bfb1b08d11afca1799346e7a54214d735fc2e9971e4836cb70cf5283ba1b0290';

async function checkPassword() {
  const input = document.getElementById('password-input');
  const val = input.value;
  const encoder = new TextEncoder();
  const data = encoder.encode(val);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  if (hashHex === EXPECTED_HASH) {
    sessionStorage.setItem('ehub_auth', 'ok');
    document.getElementById('password-gate').classList.add('hidden');
  } else {
    document.getElementById('error-msg').textContent = 'Incorrect password';
  }
}

document.getElementById('password-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') checkPassword();
});

if (sessionStorage.getItem('ehub_auth') === 'ok') {
  document.getElementById('password-gate').classList.add('hidden');
}

// Render table
function renderTable() {
  const searchTerm = document.getElementById('search').value.toLowerCase();
  const stageFilter = document.getElementById('stage-filter').value;
  const regionFilter = document.getElementById('region-filter').value;
  const acdFilter = document.getElementById('acd-filter').value;

  let filtered = opportunities.filter(o => {
    if (searchTerm && !o.name.toLowerCase().includes(searchTerm) && !o.account.toLowerCase().includes(searchTerm)) return false;
    if (stageFilter && o.stage_num.toString() !== stageFilter) return false;
    if (regionFilter && o.region_base !== regionFilter) return false;
    if (acdFilter && o.acd !== acdFilter) return false;
    return true;
  });

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  if (currentSort) {
    // Flat mode - sorted list
    filtered.sort((a, b) => {
      let valA = a[currentSort];
      let valB = b[currentSort];

      if (currentSort === 'acv') {
        valA = parseFloat(valA) || 0;
        valB = parseFloat(valB) || 0;
      } else if (currentSort === 'stage') {
        valA = a.stage_num;
        valB = b.stage_num;
      }

      if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
      if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
      return 0;
    });

    filtered.forEach(opp => {
      const row = document.createElement('tr');
      row.className = 'deal-row flat-mode';
      row.innerHTML = `
        <td><a href="https://nice.lightning.force.com/lightning/r/Opportunity/${opp.id}/view" target="_blank" class="opp-link">${opp.name}</a></td>
        <td>${opp.account}</td>
        <td><span class="badge stage-badge stage-${opp.stage_num}">${opp.stage_num} · ${opp.stage_label}</span></td>
        <td>${opp.close_date}</td>
        <td class="acv-cell">$${opp.acv.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
        <td>${opp.acd ? \`<span class="badge acd-badge">${opp.acd}</span>\` : ''}</td>
        <td>${opp.region}</td>
        <td>${opp.owner}</td>
      `;
      tbody.appendChild(row);
    });
  } else {
    // Grouped mode
    const grouped = {};
    filtered.forEach(opp => {
      if (!grouped[opp.account]) grouped[opp.account] = [];
      grouped[opp.account].push(opp);
    });

    // Sort accounts by total ACV
    const accounts = Object.keys(grouped).sort((a, b) => {
      const acvA = grouped[a].reduce((sum, o) => sum + o.acv, 0);
      const acvB = grouped[b].reduce((sum, o) => sum + o.acv, 0);
      return acvB - acvA;
    });

    accounts.forEach(account => {
      const deals = grouped[account];
      const totalACV = deals.reduce((sum, o) => sum + o.acv, 0);
      const acdSet = [...new Set(deals.map(o => o.acd).filter(Boolean))];

      // Account header
      const header = document.createElement('tr');
      header.className = 'account-header';
      header.dataset.account = account;
      header.innerHTML = `
        <td colspan="8">
          <div class="account-name">
            <span class="expand-icon">▼</span>
            <strong>${account}</strong>
            <span style="color: #666; font-weight: 400;">(${deals.length} deals)</span>
            <div class="account-badges">
              ${acdSet.map(a => \`<span class="badge acd-badge">${a}</span>\`).join('')}
            </div>
            <span class="account-acv" style="margin-left: auto;">$${totalACV.toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
          </div>
        </td>
      `;
      tbody.appendChild(header);

      // Deal rows
      deals.sort((a, b) => new Date(a.close_date) - new Date(b.close_date)).forEach(opp => {
        const row = document.createElement('tr');
        row.className = 'deal-row';
        row.dataset.account = account;
        row.innerHTML = `
          <td><a href="https://nice.lightning.force.com/lightning/r/Opportunity/${opp.id}/view" target="_blank" class="opp-link">${opp.name}</a>${opp.fedramp === 'Yes' ? '<span class="badge fedramp-badge">FedRAMP</span>' : ''}</td>
          <td></td>
          <td><span class="badge stage-badge stage-${opp.stage_num}">${opp.stage_num} · ${opp.stage_label}</span></td>
          <td>${opp.close_date}</td>
          <td class="acv-cell">$${opp.acv.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
          <td>${opp.acd ? \`<span class="badge acd-badge">${opp.acd}</span>\` : ''}</td>
          <td>${opp.region}</td>
          <td>${opp.owner}</td>
        `;
        tbody.appendChild(row);
      });
    });

    // Collapse handlers
    document.querySelectorAll('.account-header').forEach(header => {
      header.addEventListener('click', () => {
        const account = header.dataset.account;
        const rows = document.querySelectorAll(\`.deal-row[data-account="${account}"]\`);
        const isCollapsed = header.classList.toggle('collapsed');
        rows.forEach(row => row.classList.toggle('hidden', isCollapsed));
      });
    });
  }

  // Update count
  const accountCount = currentSort ? filtered.length : Object.keys(grouped).length;
  document.getElementById('count-display').textContent = `${filtered.length} deals · ${accountCount} accounts`;
}

// Sort handlers
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;

    if (currentSort === col) {
      if (sortDirection === 'desc') {
        // Third click - return to grouped
        currentSort = null;
        sortDirection = 'asc';
        document.querySelectorAll('th').forEach(h => h.className = '');
      } else {
        sortDirection = 'desc';
        th.className = 'sorted-desc';
      }
    } else {
      currentSort = col;
      sortDirection = 'asc';
      document.querySelectorAll('th').forEach(h => h.className = '');
      th.className = 'sorted-asc';
    }

    renderTable();
  });
});

// Filter handlers
document.getElementById('search').addEventListener('input', renderTable);
document.getElementById('stage-filter').addEventListener('change', renderTable);
document.getElementById('region-filter').addEventListener('change', renderTable);
document.getElementById('acd-filter').addEventListener('change', renderTable);

// Initial render
renderTable();
</script>
