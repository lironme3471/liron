<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eHub Pipeline Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Be Vietnam Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #21212b 0%, #0f0f12 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .password-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(33, 33, 43, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            flex-direction: column;
        }
        
        .password-gate.hidden { display: none !important; }
        
        .password-card {
            background: linear-gradient(135deg, #1a1a22 0%, #24242f 100%);
            border: 1px solid rgba(54, 169, 252, 0.2);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .password-card h1 {
            color: #3694fc;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .password-card p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .password-card input {
            width: 280px;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(54, 169, 252, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        
        .password-card input::placeholder { color: #777; }
        .password-card input:focus {
            outline: none;
            border-color: #3694fc;
            background: rgba(54, 169, 252, 0.05);
        }
        
        .password-card button {
            width: 280px;
            padding: 12px;
            background: #3694fc;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .password-card button:hover {
            background: #2875d9;
            box-shadow: 0 4px 16px rgba(54, 169, 252, 0.4);
        }
        
        .password-card .error {
            color: #ff5b8a;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .dashboard {
            width: 100%;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(54, 169, 252, 0.2);
        }
        
        .header h1 {
            font-size: 32px;
            color: #3694fc;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #999;
            font-size: 14px;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(54, 169, 252, 0.1) 0%, rgba(97, 0, 255, 0.05) 100%);
            border: 1px solid rgba(54, 169, 252, 0.2);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card .label {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #3694fc;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .control-group label {
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="text"],
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(54, 169, 252, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
            min-width: 150px;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #3694fc;
            background: rgba(54, 169, 252, 0.1);
        }
        
        .container {
            display: grid;
            grid-template-columns: 1fr 250px;
            gap: 20px;
        }
        
        .main-table {
            min-height: 400px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: linear-gradient(135deg, rgba(26, 26, 34, 0.5) 0%, rgba(36, 36, 47, 0.5) 100%);
            border: 1px solid rgba(54, 169, 252, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        
        thead {
            background: rgba(54, 169, 252, 0.1);
            border-bottom: 1px solid rgba(54, 169, 252, 0.2);
        }
        
        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #3694fc;
            cursor: pointer;
            user-select: none;
        }
        
        th:hover { background: rgba(54, 169, 252, 0.15); }
        
        td {
            padding: 12px;
            font-size: 13px;
            border-bottom: 1px solid rgba(54, 169, 252, 0.05);
        }
        
        tbody tr:hover {
            background: rgba(54, 169, 252, 0.05);
        }
        
        .account-group-header {
            background: rgba(97, 0, 255, 0.1);
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }
        
        .account-group-header:hover {
            background: rgba(97, 0, 255, 0.15);
        }
        
        .toggle-icon { margin-right: 8px; }
        
        .account-group-header td:first-child::before {
            content: "▼ ";
            color: #6100FF;
            margin-right: 5px;
        }
        
        .account-group-header.collapsed td:first-child::before {
            content: "▶ ";
        }
        
        .stage-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
            width: 20px;
            text-align: center;
        }
        
        .stage-0, .stage-1 { background: #3694fc; color: #fff; }
        .stage-2, .stage-3 { background: #ffc107; color: #000; }
        .stage-4 { background: #6100FF; color: #fff; }
        .stage-5 { background: #36EAD0; color: #000; }
        
        .acd-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 11px;
            white-space: nowrap;
        }
        
        .acd-cisco { background: #3694fc; color: #fff; }
        .acd-genesys { background: #6100FF; color: #fff; }
        .acd-avaya { background: #36EAD0; color: #000; }
        .acd-amazon { background: #ff5b8a; color: #fff; }
        .acd-ms { background: #00a4ef; color: #fff; }
        .acd-nice { background: #6100FF; color: #fff; }
        .acd-default { background: #666; color: #fff; }
        
        .fedra mp-badge {
            display: inline-block;
            background: #6100FF;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .sidebar-section {
            background: linear-gradient(135deg, rgba(97, 0, 255, 0.1) 0%, rgba(54, 169, 252, 0.05) 100%);
            border: 1px solid rgba(54, 169, 252, 0.2);
            border-radius: 8px;
            padding: 15px;
        }
        
        .sidebar-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #3694fc;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(54, 169, 252, 0.1);
        }
        
        .sidebar-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(54, 169, 252, 0.05);
        }
        
        .sidebar-item:last-child { border-bottom: none; }
        
        .sidebar-label { color: #aaa; }
        .sidebar-value { color: #3694fc; font-weight: 600; }
        .sidebar-acv { color: #36EAD0; font-size: 11px; }
        
        a.sf-link {
            color: #3694fc;
            text-decoration: none;
            cursor: pointer;
        }
        
        a.sf-link:hover { text-decoration: underline; }
        
        .logo {
            font-size: 14px;
            font-weight: 700;
            color: #3694fc;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .stats-bar { grid-template-columns: 1fr; }
            .sidebar { display: grid; grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="password-gate" id="passwordGate">
        <div class="password-card">
            <div class="logo">NiCE</div>
            <h1>eHub Pipeline</h1>
            <p>Enter access key</p>
            <input type="password" id="passwordInput" placeholder="Access key">
            <button onclick="checkPassword()">Unlock</button>
            <div class="error" id="errorMsg"></div>
        </div>
    </div>
    
    <div class="dashboard" id="dashboard" style="display: none; max-width: 1400px; margin: 0 auto;">
        <div class="header">
            <h1>eHub Real-Time Recording Pipeline</h1>
            <p>Engagement Hub opportunities with Real-Time Recording SKUs</p>
        </div>
        
        <div class="stats-bar">
            <div class="stat-card">
                <div class="label">Open Deals</div>
                <div class="value" id="dealCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Accounts</div>
                <div class="value" id="accountCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total ACV</div>
                <div class="value" id="totalAcv">$0</div>
            </div>
            <div class="stat-card">
                <div class="label">FedRAMP</div>
                <div class="value" id="fedra mpCount">0</div>
            </div>
            <div class="stat-card">
                <div class="label">ACDs</div>
                <div class="value" id="acdCount">0</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label>Search</label>
                <input type="text" id="searchInput" placeholder="Account, opp name...">
            </div>
            <div class="control-group">
                <label>Stage</label>
                <select id="stageFilter">
                    <option value="">All Stages</option>
                    <option value="0">0 - Prospecting</option>
                    <option value="1">1 - Identification</option>
                    <option value="2">2 - Problem Discovery</option>
                    <option value="3">3 - Presenting Solution</option>
                    <option value="4">4 - Evaluating Contract</option>
                    <option value="5">5 - Proposal/Negotiation</option>
                </select>
            </div>
            <div class="control-group">
                <label>Region</label>
                <select id="regionFilter">
                    <option value="">All Regions</option>
                </select>
            </div>
            <div class="control-group">
                <label>ACD</label>
                <select id="acdFilter">
                    <option value="">All ACDs</option>
                </select>
            </div>
        </div>
        
        <div class="container">
            <div class="main-table">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">Opportunity</th>
                            <th onclick="sortTable('account_name')">Account</th>
                            <th onclick="sortTable('stage')">Stage</th>
                            <th onclick="sortTable('close_date')">Close Date</th>
                            <th onclick="sortTable('usd_acv')">ACV</th>
                            <th onclick="sortTable('acd')">ACD</th>
                            <th onclick="sortTable('region')">Region</th>
                            <th onclick="sortTable('owner')">Owner</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="sidebar">
                <div class="sidebar-section">
                    <h3>By Stage</h3>
                    <div id="stageStats"></div>
                </div>
                
                <div class="sidebar-section">
                    <h3>By ACD</h3>
                    <div id="acdStats"></div>
                </div>
                
                <div class="sidebar-section">
                    <h3>By Region</h3>
                    <div id="regionStats"></div>
                </div>
            </div>
        </div>
    </div>

                let bVal = b[sortCol];
                
                if (typeof aVal === 'number') {
                    return sortDesc ? bVal - aVal : aVal - bVal;
                }
                
                aVal = (aVal || '').toString().toLowerCase();
                bVal = (bVal || '').toString().toLowerCase();
                
                if (sortDesc) return bVal.localeCompare(aVal);
                return aVal.localeCompare(bVal);
            });
        }
        
        function sortTable(col) {
            if (sortCol === col) {
                sortDesc = !sortDesc;
            } else {
                sortCol = col;
                sortDesc = true;
            }
            sortData();
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const grouped = {};
            filteredData.forEach(o => {
                if (!grouped[o.account_name]) grouped[o.account_name] = [];
                grouped[o.account_name].push(o);
            });
            
            Object.keys(grouped).sort().forEach(acct => {
                const opps = grouped[acct];
                const acctTotal = opps.reduce((sum, o) => sum + o.usd_acv, 0);
                const acds = [...new Set(opps.map(o => o.acd))];
                const isExpanded = expandedAccounts.has(acct);
                
                // Account header row
                const headerRow = document.createElement('tr');
                headerRow.className = `account-group-header ${isExpanded ? '' : 'collapsed'}`;
                headerRow.onclick = () => toggleAccount(acct, headerRow);
                headerRow.innerHTML = `
                    <td colspan="8">
                        ${acct} (${opps.length} deals) · $${acctTotal.toLocaleString('en-US', {maximumFractionDigits: 0})}
                        ${acds.map(a => a ? `<span class="acd-badge acd-${getAcdClass(a)}">${a}</span>` : '').join('')}
                    </td>
                `;
                tbody.appendChild(headerRow);
                
                // Opportunity rows (hidden by default)
                opps.forEach(o => {
                    const row = document.createElement('tr');
                    row.className = isExpanded ? '' : 'hidden';
                    row.style.display = isExpanded ? '' : 'none';
                    row.innerHTML = `
                        <td>
                            <a class="sf-link" href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${o.id}/view" target="_blank">
                                ${o.name}
                            </a>
                        </td>
                        <td>${o.parent_account || o.account_name}</td>
                        <td><span class="stage-badge stage-${o.stage}">${o.stage}</span></td>
                        <td>${o.close_date}</td>
                        <td>$${o.usd_acv.toLocaleString('en-US', {maximumFractionDigits: 0})}</td>
                        <td><span class="acd-badge acd-${getAcdClass(o.acd)}">${o.acd || 'TBD'}</span>${o.is_fedra_mp ? ' <span class="fedra mp-badge">FEDRA MP</span>' : ''}</td>
                        <td>${o.region}</td>
                        <td>${o.owner}</td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }
        
        function toggleAccount(acct, headerRow) {
            if (expandedAccounts.has(acct)) {
                expandedAccounts.delete(acct);
                headerRow.classList.add('collapsed');
                Array.from(headerRow.parentNode.children).forEach((row, idx) => {
                    if (row === headerRow) return;
                    const nextHeader = row.querySelector('.account-group-header');
                    if (nextHeader && nextHeader !== headerRow) return;
                    row.style.display = 'none';
                });
            } else {
                expandedAccounts.add(acct);
                headerRow.classList.remove('collapsed');
                let show = false;
                Array.from(headerRow.parentNode.children).forEach((row, idx) => {
                    if (row === headerRow) {
                        show = true;
                        return;
                    }
                    if (row.querySelector('.account-group-header') && row !== headerRow) {
                        show = false;
                        return;
                    }
                    if (show) row.style.display = '';
                });
            }
        }
        
        function getAcdClass(acd) {
            if (!acd) return 'default';
            if (acd.includes('Cisco')) return 'cisco';
            if (acd.includes('Genesys')) return 'genesys';
            if (acd.includes('Avaya')) return 'avaya';
            if (acd.includes('Amazon')) return 'amazon';
            if (acd.includes('MS')) return 'ms';
            if (acd.includes('NICE')) return 'nice';
            return 'default';
        }
        
        function updateStats() {
            const stages = {};
            const acds = {};
            const regions = {};
            
            filteredData.forEach(o => {
                stages[o.stage] = (stages[o.stage] || {count: 0, acv: 0});
                stages[o.stage].count++;
                stages[o.stage].acv += o.usd_acv;
                
                if (o.acd) {
                    acds[o.acd] = (acds[o.acd] || {count: 0, acv: 0});
                    acds[o.acd].count++;
                    acds[o.acd].acv += o.usd_acv;
                }
                
                if (o.region) {
                    regions[o.region] = (regions[o.region] || 0);
                    regions[o.region]++;
                }
            });
            
            const acctCount = new Set(filteredData.map(o => o.account_name)).size;
            const totalAcv = filteredData.reduce((sum, o) => sum + o.usd_acv, 0);
            const fedraCount = filteredData.filter(o => o.is_fedra_mp).length;
            const acdCount = new Set(filteredData.map(o => o.acd).filter(Boolean)).size;
            
            document.getElementById('dealCount').textContent = filteredData.length;
            document.getElementById('accountCount').textContent = acctCount;
            document.getElementById('totalAcv').textContent = '$' + totalAcv.toLocaleString('en-US', {maximumFractionDigits: 0});
            document.getElementById('fedra mpCount').textContent = fedraCount;
            document.getElementById('acdCount').textContent = acdCount;
            
            // Stage stats
            const stageStatsHtml = Object.keys(stages).sort((a, b) => a - b).map(s => {
                const data = stages[s];
                return `<div class="sidebar-item"><span class="sidebar-label">Stage ${s}</span><span><span class="sidebar-value">${data.count}</span> / <span class="sidebar-acv">$${(data.acv/1e6).toFixed(1)}M</span></span></div>`;
            }).join('');
            document.getElementById('stageStats').innerHTML = stageStatsHtml;
            
            // ACD stats
            const acdStatsHtml = Object.keys(acds).sort().map(a => {
                const data = acds[a];
                return `<div class="sidebar-item"><span class="sidebar-label">${a}</span><span><span class="sidebar-value">${data.count}</span> / <span class="sidebar-acv">$${(data.acv/1e6).toFixed(1)}M</span></span></div>`;
            }).join('');
            document.getElementById('acdStats').innerHTML = acdStatsHtml;
            
            // Region stats
            const regionStatsHtml = Object.keys(regions).sort().map(r => {
                return `<div class="sidebar-item"><span class="sidebar-label">${r}</span><span class="sidebar-value">${regions[r]}</span></div>`;
            }).join('');
            document.getElementById('regionStats').innerHTML = regionStatsHtml;
        }
        
        // Check if already unlocked
        if (sessionStorage.getItem('dashboardUnlocked')) {
            document.getElementById('passwordGate').classList.add('hidden');
            document.getElementById('dashboard').style.display = 'block';
            initDashboard();
        }
        
        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sessionStorage.getItem('dashboardUnlocked')) {
                checkPassword();
            }
        });
    </script>
</body>
</html>
