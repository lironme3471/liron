<html lang="en">

<meta charset="UTF-8">

<style>
  :root {
    --nice-blue: #3694fc;
    --nice-charcoal: #21212b;
    --nice-indigo: #6100FF;
    --nice-teal: #36EAD0;
    --nice-coral: #FF5B8A;
    --bg: #f4f5f7;
    --card-bg: #fff;
    --border: #e2e5ea;
    --text: #21212b;
    --text-secondary: #5a6170;
    --stage-blue: #3694fc;
    --stage-yellow: #f59e0b;
    --stage-purple: #6100FF;
    --stage-green: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
  
  /* Password overlay */
  #pw-overlay {
    position: fixed; inset: 0; background: var(--nice-charcoal);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #pw-card {
    background: #fff; border-radius: 16px; padding: 48px 40px;
    width: 380px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }
  #pw-card .logo { font-size: 28px; font-weight: 800; color: var(--nice-blue); margin-bottom: 4px; }
  #pw-card .sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }
  #pw-card input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  #pw-card input:focus { border-color: var(--nice-blue); }
  #pw-card button {
    width: 100%; padding: 12px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  #pw-card button:hover { background: #2580e8; }
  #pw-error { color: #ef4444; font-size: 12px; margin-top: 8px; min-height: 18px; }

  /* Layout */
  #app { display: none; }
  .header {
    background: var(--nice-charcoal); color: #fff;
    padding: 0 24px; height: 56px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .header-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--nice-blue); }
  .header-meta { font-size: 12px; color: rgba(255,255,255,0.55); }

  .stats-bar {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; gap: 0; overflow-x: auto;
  }
  .stat-item {
    padding: 12px 20px; border-right: 1px solid var(--border);
    min-width: 120px; text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--nice-blue); }
  .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

  .main-layout { display: flex; height: calc(100vh - 105px); }
  
  .sidebar {
    width: 240px; min-width: 240px; background: var(--card-bg);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 16px;
  }
  .sidebar-section { margin-bottom: 20px; }
  .sidebar-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text-secondary); margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; font-size: 12px; border-bottom: 1px solid #f0f1f3;
  }
  .sidebar-row:last-child { border-bottom: none; }
  .sidebar-row-label { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-row-val { color: var(--text-secondary); font-size: 11px; text-align: right; }
  .sidebar-count { font-weight: 600; color: var(--nice-blue); }

  .content { flex: 1; overflow-y: auto; padding: 16px; }

  .filters {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px; outline: none; background: #f9fafb;
    transition: border-color 0.2s;
  }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); background: #fff; }
  .filters input { min-width: 200px; }
  .filter-count { font-size: 12px; color: var(--text-secondary); margin-left: auto; white-space: nowrap; }

  .table-wrapper { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    background: #f8f9fb; border-bottom: 2px solid var(--border); padding: 9px 10px;
    text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-secondary); cursor: pointer;
    user-select: none; white-space: nowrap; position: sticky; top: 0;
  }
  th:hover { background: #eff1f4; color: var(--text); }
  th.sort-active { color: var(--nice-blue); }
  .sort-icon { margin-left: 4px; opacity: 0.6; }
  
  td { padding: 8px 10px; border-bottom: 1px solid #f0f1f3; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  
  /* Account header rows */
  tr.acct-header td {
    background: #f0f5ff; font-weight: 600; cursor: pointer;
    border-bottom: 1px solid #dce8ff;
    padding: 8px 10px;
  }
  tr.acct-header:hover td { background: #e4effe; }
  tr.acct-header.collapsed + tr.deal-row { display: none; }
  .acct-toggle { margin-right: 6px; font-size: 11px; color: var(--nice-blue); }
  
  /* Deal rows */
  tr.deal-row td:first-child { padding-left: 24px; }
  tr.deal-row:hover td { background: #fafbfc; }

  /* Flat sorted row */
  tr.flat-row td { background: #fff; }
  tr.flat-row:hover td { background: #fafbfc; }

  /* Links */
  a.opp-link { color: var(--nice-blue); text-decoration: none; font-weight: 500; }
  a.opp-link:hover { text-decoration: underline; }

  /* Stage badge */
  .stage-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .stage-num { font-size: 13px; font-weight: 800; }
  .stage-0, .stage-1 { background: #dbeafe; color: #1d4ed8; }
  .stage-2, .stage-3 { background: #fef3c7; color: #92400e; }
  .stage-4 { background: #ede9fe; color: #5b21b6; }
  .stage-5 { background: #d1fae5; color: #065f46; }

  /* ACD pill */
  .acd-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .acd-cisco { background: #e0f2fe; color: #0369a1; }
  .acd-avaya { background: #fce7f3; color: #9d174d; }
  .acd-genesys { background: #f0fdf4; color: #166534; }
  .acd-amazon { background: #fff7ed; color: #c2410c; }
  .acd-msteams { background: #ede9fe; color: #4c1d95; }
  .acd-other { background: #f3f4f6; color: #374151; }

  /* FedRAMP badge */
  .fedramp-badge {
    display: inline-block; padding: 1px 6px; border-radius: 8px;
    background: #f3e8ff; color: #6b21a8; font-size: 10px; font-weight: 700;
    margin-left: 4px; vertical-align: middle;
  }

  /* ACV */
  .acv-val { font-weight: 600; color: var(--text); }
  .acv-val.large { color: #065f46; }

  /* Account header badges */
  .acct-pills { display: inline-flex; gap: 4px; flex-wrap: wrap; }
  .acct-acv { font-weight: 700; color: var(--nice-blue); }

  .no-results { padding: 40px; text-align: center; color: var(--text-secondary); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .filters input { min-width: 140px; }
  }
</style>
</head>
<body>

<!-- Password gate -->
<div id="pw-overlay">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="sub">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Access Dashboard</button>
    <div id="pw-error"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-title"><div class="dot"></div> eHub Pipeline Dashboard</div>
    <div class="header-meta" id="refresh-time"></div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="filters">
        <input type="text" id="f-search" placeholder="🔍 Search opportunities, accounts..." oninput="render()">
        <select id="f-stage" onchange="render()">
          <option value="">All Stages</option>
          <option value="0">0 - Prospecting</option>
          <option value="1">1 - Identification</option>
          <option value="2">2 - Determining Problem</option>
          <option value="3">3 - Aligning Benefits</option>
          <option value="4">4 - Confirm Value</option>
          <option value="5">5 - Proposal / Negotiation</option>
        </select>
        <select id="f-region" onchange="render()"><option value="">All Regions</option></select>
        <select id="f-acd" onchange="render()"><option value="">All ACD</option></select>
        <div class="filter-count" id="filter-count"></div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr id="thead-row"></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ---- Password gate ----
const STORED_HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';
async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hex === STORED_HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('pw-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw-input').value = '';
  }
}
if (sessionStorage.getItem('ehub_auth') === '1') {
  document.getElementById('pw-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  window.addEventListener('DOMContentLoaded', initApp);
}

const STAGE_LABELS = {
  '0 - Prospecting': ['0', 'Prospecting'],
  '1 - Identification / Qualification': ['1', 'Identification'],
  '2 - Determining Problem / Impact': ['2', 'Determining Problem'],
  '3 - Aligning Benefits & Value': ['3', 'Aligning Benefits'],
  '4 - Confirm Value & Agreement': ['4', 'Confirm Value'],
  '5 - Proposal / Negotiation': ['5', 'Proposal / Neg.'],
};

function stageNum(s) { return parseInt((STAGE_LABELS[s] || ['9'])[0]); }

function fmtACV(v, cur) {
  if (!v) return '—';
  const sym = cur === 'USD' ? '$' : (cur === 'EUR' ? '€' : cur + ' ');
  if (v >= 1e6) return sym + (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return sym + Math.round(v/1e3) + 'K';
  return sym + v.toFixed(0);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

function acdClass(acd) {
  if (!acd) return 'acd-other';
  const a = acd.toLowerCase();
  if (a.includes('cisco')) return 'acd-cisco';
  if (a.includes('avaya')) return 'acd-avaya';
  if (a.includes('genesys')) return 'acd-genesys';
  if (a.includes('amazon')) return 'acd-amazon';
  if (a.includes('teams') || a.includes('microsoft')) return 'acd-msteams';
  return 'acd-other';
}

function stageBadge(s) {
  const info = STAGE_LABELS[s];
  if (!info) return s;
  const n = info[0], label = info[1];
  const cls = parseInt(n) <= 1 ? 'stage-0' : parseInt(n) <= 3 ? 'stage-2' : parseInt(n) == 4 ? 'stage-4' : 'stage-5';
  return `<span class="stage-badge ${cls}"><span class="stage-num">${n}</span> · ${label}</span>`;
}

function acdBadge(acd) {
  if (!acd) return '<span class="acd-pill acd-other">—</span>';
  return `<span class="acd-pill ${acdClass(acd)}">${acd}</span>`;
}

function sfUrl(id) {
  return `https://nice.lightning.force.com/lightning/r/Opportunity/${id}/view`;
}

// ---- Sort state ----
let sortCol = null; // null = grouped
let sortDir = 1; // 1=asc, -1=desc
let sortClickCount = 0;

// ---- Init ----
function initApp() {
  document.getElementById('refresh-time').textContent = 'Updated: ' + new Date().toLocaleString();
  
  // Populate filters
  const regions = [...new Set(RAW_DATA.map(d => (d.region||'').split(' / ')[0]).filter(Boolean))].sort();
  const acds = [...new Set(RAW_DATA.map(d => d.acd).filter(Boolean))].sort();
  const rf = document.getElementById('f-region');
  regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; rf.appendChild(o); });
  const af = document.getElementById('f-acd');
  acds.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; af.appendChild(o); });

  // Build header
  const cols = [
    {key:'name', label:'Opportunity'},
    {key:'account', label:'Account'},
    {key:'stage', label:'Stage'},
    {key:'closeDate', label:'Close Date'},
    {key:'acv', label:'ACV'},
    {key:'acd', label:'ACD'},
    {key:'region', label:'Region / Territory'},
    {key:'owner', label:'Owner'},
  ];
  const tr = document.getElementById('thead-row');
  cols.forEach(c => {
    const th = document.createElement('th');
    th.dataset.col = c.key;
    th.innerHTML = c.label + '<span class="sort-icon"></span>';
    th.onclick = () => handleSort(c.key);
    tr.appendChild(th);
  });

  render();
}

function handleSort(col) {
  if (sortCol === col) {
    sortClickCount++;
    if (sortClickCount >= 3) {
      sortCol = null; sortDir = 1; sortClickCount = 0;
    } else {
      sortDir = sortDir === 1 ? -1 : 1;
    }
  } else {
    sortCol = col; sortDir = 1; sortClickCount = 1;
  }
  updateSortHeaders();
  render();
}

function updateSortHeaders() {
  document.querySelectorAll('th').forEach(th => {
    th.classList.remove('sort-active');
    th.querySelector('.sort-icon').textContent = '';
  });
  if (sortCol) {
    const th = document.querySelector(`th[data-col="${sortCol}"]`);
    if (th) {
      th.classList.add('sort-active');
      th.querySelector('.sort-icon').textContent = sortDir === 1 ? ' ▲' : ' ▼';
    }
  }
}

function getFiltered() {
  const search = document.getElementById('f-search').value.toLowerCase();
  const stage = document.getElementById('f-stage').value;
  const region = document.getElementById('f-region').value;
  const acd = document.getElementById('f-acd').value;
  return RAW_DATA.filter(d => {
    if (search && !d.name.toLowerCase().includes(search) && !d.account.toLowerCase().includes(search) && !d.owner.toLowerCase().includes(search)) return false;
    if (stage && !d.stage.startsWith(stage + ' -')) return false;
    if (region && !(d.region||'').startsWith(region)) return false;
    if (acd && d.acd !== acd) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  // Update stats
  renderStats(filtered);
  renderSidebar(filtered);

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-results">No deals match the current filters.</td></tr>';
    document.getElementById('filter-count').textContent = '0 deals · 0 accounts';
    return;
  }

  const accts = [...new Set(filtered.map(d => d.account))];
  document.getElementById('filter-count').textContent = `${filtered.length} deal${filtered.length!==1?'s':''} · ${accts.length} account${accts.length!==1?'s':''}`;

  if (sortCol) {
    // Flat sorted view
    const sorted = [...filtered].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (sortCol === 'stage') { av = stageNum(a.stage); bv = stageNum(b.stage); }
      if (sortCol === 'acv') { av = a.acv || 0; bv = b.acv || 0; }
      if (av < bv) return -1 * sortDir;
      if (av > bv) return 1 * sortDir;
      return 0;
    });
    sorted.forEach(d => {
      tbody.appendChild(dealRow(d, true));
    });
  } else {
    // Grouped by account, sorted by total ACV desc
    const acctMap = {};
    filtered.forEach(d => {
      if (!acctMap[d.account]) acctMap[d.account] = [];
      acctMap[d.account].push(d);
    });
    const acctList = Object.entries(acctMap).sort((a, b) => {
      const sumA = a[1].reduce((s, d) => s + (d.acv||0), 0);
      const sumB = b[1].reduce((s, d) => s + (d.acv||0), 0);
      return sumB - sumA;
    });
    acctList.forEach(([acct, deals]) => {
      // Sort deals by close date ascending
      const sortedDeals = [...deals].sort((a, b) => (a.closeDate||'').localeCompare(b.closeDate||''));
      const totalACV = deals.reduce((s, d) => s + (d.acv||0), 0);
      const uniqueACDs = [...new Set(deals.map(d => d.acd).filter(Boolean))];
      const currency = deals[0].currency || 'USD';
      const hasFed = deals.some(d => d.fedramp === 'Yes');

      // Account header row
      const hr = document.createElement('tr');
      hr.className = 'acct-header';
      hr.dataset.acct = acct;
      hr.innerHTML = `
        <td colspan="4">
          <span class="acct-toggle">▼</span>
          <strong>${acct}</strong>${hasFed ? '<span class="fedramp-badge">FedRAMP</span>' : ''}
          &nbsp;·&nbsp; ${deals.length} deal${deals.length!==1?'s':''}
        </td>
        <td><span class="acct-acv">${fmtACV(totalACV, currency)}</span></td>
        <td colspan="3">
          <span class="acct-pills">${uniqueACDs.map(a => acdBadge(a)).join(' ')}</span>
        </td>
      `;
      hr.onclick = function() {
        this.classList.toggle('collapsed');
        const tog = this.querySelector('.acct-toggle');
        tog.textContent = this.classList.contains('collapsed') ? '▶' : '▼';
        let next = this.nextElementSibling;
        while (next && next.classList.contains('deal-row')) {
          next.style.display = this.classList.contains('collapsed') ? 'none' : '';
          next = next.nextElementSibling;
        }
      };
      tbody.appendChild(hr);

      sortedDeals.forEach(d => {
        const row = dealRow(d, false);
        row.className = 'deal-row';
        tbody.appendChild(row);
      });
    });
  }
}

function dealRow(d, showAcct) {
  const tr = document.createElement('tr');
  tr.className = showAcct ? 'flat-row' : 'deal-row';
  const fedBadge = d.fedramp === 'Yes' ? '<span class="fedramp-badge">FedRAMP</span>' : '';
  const acvClass = (d.acv||0) >= 500000 ? 'acv-val large' : 'acv-val';
  tr.innerHTML = `
    <td><a class="opp-link" href="${sfUrl(d.id)}" target="_blank">${d.name}</a>${fedBadge}</td>
    <td>${showAcct ? d.account : ''}</td>
    <td>${stageBadge(d.stage)}</td>
    <td>${fmtDate(d.closeDate)}</td>
    <td><span class="${acvClass}">${fmtACV(d.acv, d.currency)}</span></td>
    <td>${acdBadge(d.acd)}</td>
    <td style="color:var(--text-secondary)">${d.region||'—'}</td>
    <td style="color:var(--text-secondary)">${d.owner||'—'}</td>
  `;
  return tr;
}

function renderStats(filtered) {
  const totalACV = filtered.reduce((s, d) => s + (d.acv||0), 0);
  const accts = new Set(filtered.map(d => d.account)).size;
  const fedCount = filtered.filter(d => d.fedramp === 'Yes').length;
  const acdCount = new Set(filtered.map(d => d.acd).filter(Boolean)).size;
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <div class="stat-item"><div class="stat-val">${filtered.length}</div><div class="stat-label">Open Deals</div></div>
    <div class="stat-item"><div class="stat-val">${accts}</div><div class="stat-label">Accounts</div></div>
    <div class="stat-item"><div class="stat-val">${fmtACV(totalACV, 'USD')}</div><div class="stat-label">Total Pipeline ACV</div></div>
    <div class="stat-item"><div class="stat-val">${fedCount}</div><div class="stat-label">FedRAMP</div></div>
    <div class="stat-item"><div class="stat-val">${acdCount}</div><div class="stat-label">Distinct ACDs</div></div>
  `;
}

function renderSidebar(filtered) {
  const sidebar = document.getElementById('sidebar');
  
  // By Stage
  const stageMap = {};
  filtered.forEach(d => {
    const sn = stageNum(d.stage);
    if (!stageMap[sn]) stageMap[sn] = {count:0, acv:0, label: d.stage};
    stageMap[sn].count++;
    stageMap[sn].acv += (d.acv||0);
  });
  const stageHTML = Object.entries(stageMap).sort((a,b) => parseInt(a[0])-parseInt(b[0])).map(([n, v]) => {
    const lbl = STAGE_LABELS[v.label];
    const shortLabel = lbl ? lbl[0] + ' · ' + lbl[1] : v.label;
    return `<div class="sidebar-row">
      <span class="sidebar-row-label" title="${v.label}">${shortLabel}</span>
      <span class="sidebar-row-val"><span class="sidebar-count">${v.count}</span><br>${fmtACV(v.acv,'USD')}</span>
    </div>`;
  }).join('');

  // By ACD
  const acdMap = {};
  filtered.forEach(d => {
    const a = d.acd || '(none)';
    if (!acdMap[a]) acdMap[a] = {count:0, acv:0};
    acdMap[a].count++;
    acdMap[a].acv += (d.acv||0);
  });
  const acdHTML = Object.entries(acdMap).sort((a,b) => b[1].count-a[1].count).map(([a, v]) => {
    return `<div class="sidebar-row">
      <span class="sidebar-row-label" title="${a}">${a}</span>
      <span class="sidebar-row-val"><span class="sidebar-count">${v.count}</span><br>${fmtACV(v.acv,'USD')}</span>
    </div>`;
  }).join('');

  // By Region
  const regionMap = {};
  filtered.forEach(d => {
    const r = (d.region||'').split(' / ')[0] || 'Unknown';
    if (!regionMap[r]) regionMap[r] = 0;
    regionMap[r]++;
  });
  const regionHTML = Object.entries(regionMap).sort((a,b) => b[1]-a[1]).map(([r, c]) => {
    return `<div class="sidebar-row">
      <span class="sidebar-row-label">${r}</span>
      <span class="sidebar-row-val"><span class="sidebar-count">${c}</span></span>
    </div>`;
  }).join('');

  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-title">By Stage</div>
      ${stageHTML}
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">By ACD</div>
      ${acdHTML}
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">By Region</div>
      ${regionHTML}
    </div>
  `;
}
</script>
</body>
</html>
