<html lang="en"><head>

<title>eHub Pipeline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--bg:#f4f6fb;--border:#e3e7f0;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--charcoal);}
#gate{position:fixed;inset:0;background:#21212b;display:flex;align-items:center;justify-content:center;z-index:1000;}
#gate .card{background:#fff;border-radius:14px;padding:40px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);width:340px;}
#gate h1{color:var(--blue);margin:0 0 6px;font-size:26px;letter-spacing:.5px;}
#gate p{color:var(--muted);margin:0 0 22px;font-size:13px;}
#gate input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:14px;}
#gate button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#1f7be6;}
#gate .err{color:#e23b5a;font-size:13px;height:16px;margin-top:8px;}
header{background:var(--charcoal);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;}
header .brand{font-size:22px;font-weight:700;}
header .brand span{color:var(--blue);}
header .gen{font-size:12px;color:#a9aebf;}
.stats{display:flex;gap:14px;padding:20px 28px;flex-wrap:wrap;}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 20px;flex:1;min-width:150px;}
.stat .v{font-size:26px;font-weight:700;color:var(--charcoal);}
.stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.layout{display:flex;gap:20px;padding:0 28px 40px;align-items:flex-start;}
.main{flex:1;min-width:0;}
.sidebar{width:280px;flex-shrink:0;}
.panel{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.panel h3{margin:0;padding:12px 16px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;background:#fafbff;border-bottom:1px solid var(--border);color:var(--charcoal);}
.panel .row{display:flex;justify-content:space-between;padding:8px 16px;font-size:13px;border-bottom:1px solid #f3f5fb;}
.panel .row:last-child{border-bottom:none;}
.panel .row .k{color:var(--charcoal);}
.panel .row .v{color:var(--muted);font-variant-numeric:tabular-nums;}
.filters{display:flex;gap:10px;padding:0 0 16px;flex-wrap:wrap;}
.filters input,.filters select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;}
.filters input{flex:1;min-width:200px;}
.count{font-size:13px;color:var(--muted);padding:0 0 12px;}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
th{background:#fafbff;text-align:left;padding:11px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;}
th:hover{background:#eef2fb;}
th .ind{color:var(--blue);}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f3f5fb;vertical-align:top;}
tr.acct{background:#f0f4ff;cursor:pointer;}
tr.acct:hover{background:#e6edff;}
tr.acct td{font-weight:600;}
tr.deal td:first-child{padding-left:24px;}
.acv{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;}
.fed{background:#ede0ff;color:#6100FF;}
.toggle{display:inline-block;width:14px;color:var(--muted);font-size:10px;}
.acd-badges{display:inline-flex;gap:4px;flex-wrap:wrap;margin-left:8px;}
</style></head>

async function checkPw(val){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(val));
  const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex===PW_HASH;
}
async function tryAuth(){
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){sessionStorage.setItem('ehub_ok','1');showApp();}
  else{document.getElementById('err').textContent='Incorrect password';}
}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('go').onclick=tryAuth;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth();});
if(sessionStorage.getItem('ehub_ok')==='1'){showApp();}

// ---- color maps ----
const ACD_COLORS={'Genesys':['#ffe6ec','#d12f5a'],'Cisco Systems':['#e0f0ff','#0a6fc2'],'Avaya':['#ffe9d6','#c2630a'],
 'Amazon Connect':['#fff3d6','#a6790a'],'MS Teams':['#e7e9ff','#3b46d1'],'NICE CXone Mpower':['#e2f7f2','#0a9b85'],
 'Unknown':['#eceef3','#6b7280']};
function acdPill(a){const c=ACD_COLORS[a]||['#eceef3','#6b7280'];return `<span class="pill" style="background:${c[0]};color:${c[1]}">${esc(a)}</span>`;}
function stageBadge(n,short){let bg,fg;
 if(n<=1){bg='#e0f0ff';fg='#0a6fc2';}else if(n<=3){bg='#fff3d6';fg='#a6790a';}else if(n===4){bg='#ede0ff';fg='#6100FF';}else{bg='#e2f7f2';fg='#0a9b85';}
 return `<span class="badge" style="background:${bg};color:${fg}">${n} · ${esc(short)}</span>`;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtACV(v,cur){return (cur||'USD')+' '+Math.round(v).toLocaleString();}

let sortKey=null,sortDir=1; // dir 1 asc, -1 desc; null = grouped
let clickState={}; // per column click count

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const fs=document.getElementById('fstage').value;
  const fr=document.getElementById('fregion').value;
  const fa=document.getElementById('facd').value;
  return DEALS.filter(d=>{
    if(fs!==''&&String(d.stage_num)!==fs)return false;
    if(fr!==''&&d.region!==fr)return false;
    if(fa!==''&&d.acd!==fa)return false;
    if(q){const hay=(d.name+' '+d.account+' '+d.owner+' '+d.group).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
}

function render(){
  const rows=getFiltered();
  const tb=document.getElementById('tbody');tb.innerHTML='';
  // count
  const accts=new Set(rows.map(d=>d.group));
  document.getElementById('count').textContent=`${rows.length} deals · ${accts.size} accounts`;

  if(sortKey){ // flat sorted
    const sorted=[...rows].sort((a,b)=>cmp(a,b));
    for(const d of sorted)tb.appendChild(dealRow(d,true));
  }else{ // grouped by account, sorted by total ACV desc
    const groups={};
    for(const d of rows){(groups[d.group]=groups[d.group]||[]).push(d);}
    const gnames=Object.keys(groups).sort((a,b)=>sum(groups[b])-sum(groups[a]));
    for(const g of gnames){
      const ds=groups[g].sort((a,b)=>(a.close||'').localeCompare(b.close||''));
      tb.appendChild(acctRow(g,ds));
      for(const d of ds)tb.appendChild(dealRow(d,false));
    }
  }
  renderSidebar(rows);
  updateInd();
}
function sum(ds){return ds.reduce((s,d)=>s+(+d.acv||0),0);}
function cmp(a,b){let x=a[sortKey],y=b[sortKey];
  if(sortKey==='acv'||sortKey==='stage_num'){x=+x;y=+y;return (x-y)*sortDir;}
  return String(x).localeCompare(String(y))*sortDir;}

function acctRow(g,ds){
  const tr=document.createElement('tr');tr.className='acct';
  const acds=[...new Set(ds.map(d=>d.acd))];
  const badges=acds.map(acdPill).join(' ');
  tr.innerHTML=`<td colspan="4"><span class="toggle">▼</span> ${esc(g)} <span style="color:var(--muted);font-weight:400">(${ds.length})</span><span class="acd-badges">${badges}</span></td>
    <td class="acv">${fmtACV(sum(ds),ds[0].cur)}</td><td colspan="3"></td>`;
  tr.onclick=()=>{let n=tr.nextElementSibling;while(n&&n.classList.contains('deal')){n.style.display=n.style.display==='none'?'':'none';n=n.nextElementSibling;}
    const t=tr.querySelector('.toggle');t.textContent=t.textContent==='▼'?'▶':'▼';};
  return tr;
}
function dealRow(d,showAcct){
  const tr=document.createElement('tr');tr.className='deal';
  tr.innerHTML=`<td><a href="${esc(d.url)}" target="_blank">${esc(d.name)}</a>${d.fedramp==='Yes'?' <span class="badge fed">FedRAMP</span>':''}</td>
    <td>${showAcct?esc(d.account):''}</td>
    <td>${stageBadge(d.stage_num,d.stage_short)}</td>
    <td>${esc(d.close)}</td>
    <td class="acv">${fmtACV(d.acv,d.cur)}</td>
    <td>${acdPill(d.acd)}</td>
    <td>${esc(d.region)}</td>
    <td>${esc(d.owner)}</td>`;
  return tr;
}
function renderSidebar(rows){
  const byS={},byA={},byR={};
  for(const d of rows){
    const sk=d.stage_num+' · '+d.stage_short;
    byS[sk]=byS[sk]||{c:0,v:0};byS[sk].c++;byS[sk].v+=+d.acv||0;
    byA[d.acd]=byA[d.acd]||{c:0,v:0};byA[d.acd].c++;byA[d.acd].v+=+d.acv||0;
    byR[d.region]=(byR[d.region]||0)+1;
  }
  const cur=rows[0]?rows[0].cur:'USD';
  document.getElementById('byStage').innerHTML=Object.keys(byS).sort().map(k=>panelRow(k,`${byS[k].c} · ${fmtACV(byS[k].v,cur)}`)).join('');
  document.getElementById('byAcd').innerHTML=Object.keys(byA).sort((a,b)=>byA[b].v-byA[a].v).map(k=>panelRow(k,`${byA[k].c} · ${fmtACV(byA[k].v,cur)}`)).join('');
  document.getElementById('byRegion').innerHTML=Object.keys(byR).sort((a,b)=>byR[b]-byR[a]).map(k=>panelRow(k,byR[k])).join('');
}
function panelRow(k,v){return `<div class="row"><span class="k">${esc(k)}</span><span class="v">${esc(v)}</span></div>`;}

function renderStats(){
  const cur=DEALS[0]?DEALS[0].cur:'USD';
  const total=sum(DEALS);
  const accts=new Set(DEALS.map(d=>d.group)).size;
  const fed=DEALS.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(DEALS.map(d=>d.acd)).size;
  document.getElementById('stats').innerHTML=[
    ['Open Deals',DEALS.length],['Accounts',accts],['Total Pipeline ACV',fmtACV(total,cur)],
    ['FedRAMP',fed],['Distinct ACD',acds]
  ].map(s=>`<div class="stat"><div class="v">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('');
}
function updateInd(){
  document.querySelectorAll('th .ind').forEach(e=>e.textContent='');
  if(sortKey){const th=document.querySelector(`th[data-k="${sortKey}"] .ind`);if(th)th.textContent=sortDir>0?'▲':'▼';}
}
function init(){

  const fa=document.getElementById('facd');
  [...new Set(DEALS.map(d=>d.acd))].sort().forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;fa.appendChild(o);});

  ['search','fstage','fregion','facd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  document.querySelectorAll('th').forEach(th=>{th.onclick=()=>{
    const k=th.dataset.k;
    clickState[k]=(clickState[k]||0)+1;
    // reset others
    Object.keys(clickState).forEach(o=>{if(o!==k)clickState[o]=0;});
    const c=clickState[k];
    if(c===1){sortKey=k;sortDir=1;}
    else if(c===2){sortKey=k;sortDir=-1;}
    else{sortKey=null;clickState[k]=0;} // third click -> grouped
    render();
  };});
  renderStats();render();
}
</script>
</body></html>
