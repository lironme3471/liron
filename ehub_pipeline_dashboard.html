<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eHub Pipeline Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #21212b;
        }

        /* Password Gate */
        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(33, 33, 43, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #passwordOverlay.hidden {
            display: none;
        }

        .password-card {
            background: white;
            border-radius: 8px;
            padding: 48px;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .password-card h1 {
            color: #3694fc;
            margin-bottom: 12px;
            font-size: 28px;
        }

        .password-card p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .password-button {
            width: 100%;
            padding: 12px;
            background: #3694fc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .password-button:hover {
            background: #2580e8;
        }

        .password-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Main Layout */
        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #eee;
            overflow-y: auto;
            padding: 20px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 20px;
        }

        .header h1 {
            color: #3694fc;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 600;
            color: #21212b;
        }

        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
        }

        .search-box, .filter-select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .filter-select {
            min-width: 120px;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Sidebar Sections */
        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 700;
            color: #6100ff;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .sidebar-item {
            font-size: 12px;
            padding: 6px 0;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        .sidebar-count {
            font-weight: 600;
            color: #21212b;
        }

        .sidebar-acv {
            font-size: 11px;
            color: #999;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        thead {
            background: #f9f9f9;
            border-bottom: 2px solid #eee;
        }

        th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #21212b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #f0f0f0;
        }

        th.sortable::after {
            content: '';
            display: inline-block;
            width: 0;
            height: 0;
            margin-left: 6px;
            opacity: 0.3;
        }

        th.sort-asc::after {
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 6px solid #21212b;
            opacity: 1;
        }

        th.sort-desc::after {
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid #21212b;
            opacity: 1;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .account-header {
            background: #f0f0f0;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        .account-header:hover {
            background: #e8e8e8;
        }

        .account-header td:first-child::before {
            content: '▼';
            display: inline-block;
            margin-right: 8px;
            transition: transform 0.2s;
            font-size: 10px;
        }

        .account-header.collapsed td:first-child::before {
            transform: rotate(-90deg);
        }

        .deal-row {
            background: white;
            display: none;
        }

        .account-header.expanded ~ .deal-row:not(.account-header) {
            display: table-row;
        }

        .deal-row td:first-child {
            padding-left: 32px;
        }

        .opp-link {
            color: #3694fc;
            text-decoration: none;
        }

        .opp-link:hover {
            text-decoration: underline;
        }

        .stage-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .stage-0, .stage-1 { background: #3694fc; }
        .stage-2, .stage-3 { background: #f59e0b; }
        .stage-4 { background: #6100ff; }
        .stage-5 { background: #10b981; }

        .acd-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            background: #8b5cf6;
        }

        .acd-cisco { background: #0ea5e9; }
        .acd-avaya { background: #ec4899; }
        .acd-genesys { background: #f59e0b; }
        .acd-amazon { background: #ff9800; }
        .acd-nice { background: #10b981; }
        .acd-aws { background: #ff6b6b; }
        .acd-other { background: #6b7280; }
        .acd-unknown { background: #9ca3af; }

        .fedramp-badge {
            background: #6100ff !important;
        }

        .acv-amount {
            font-weight: 600;
            color: #21212b;
            white-space: nowrap;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Password Gate -->
    <div id="passwordOverlay">
        <div class="password-card">
            <h1>eHub Pipeline</h1>
            <p>Enter password to access the dashboard</p>
            <input type="password" id="passwordInput" class="password-input" placeholder="Password" />
            <button id="passwordButton" class="password-button">Access Dashboard</button>
        </div>
    </div>

    <div class="container hidden" id="mainContainer">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 style="color: #3694fc; font-size: 16px; margin-bottom: 20px;">Dashboard</h2>

            <div class="sidebar-section">
                <h3>By Stage</h3>
                <div id="stageBreakdown"></div>
            </div>

            <div class="sidebar-section">
                <h3>By ACD</h3>
                <div id="acdBreakdown"></div>
            </div>

            <div class="sidebar-section">
                <h3>By Region</h3>
                <div id="regionBreakdown"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div class="header">
                <h1>Engagement Hub Pipeline</h1>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-label">Opportunities:</span>
                        <span class="stat-value" id="totalOpps">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Accounts:</span>
                        <span class="stat-value" id="totalAccounts">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total Pipeline:</span>
                        <span class="stat-value" id="totalACV">$0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">FedRAMP:</span>
                        <span class="stat-value" id="fedrampCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Distinct ACDs:</span>
                        <span class="stat-value" id="distinctACDs">0</span>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filters">
                    <input type="text" id="searchInput" class="search-box" placeholder="Search by opportunity or account...">
                    <select id="stageFilter" class="filter-select">
                        <option value="">All Stages</option>
                        <option value="0">0 - Prospecting</option>
                        <option value="1">1 - Identification</option>
                        <option value="2">2 - Determining Problem</option>
                        <option value="3">3 - Aligning Benefits</option>
                        <option value="4">4 - Confirm Value</option>
                        <option value="5">5 - Proposal</option>
                    </select>
                    <select id="regionFilter" class="filter-select">
                        <option value="">All Regions</option>
                    </select>
                    <select id="acdFilter" class="filter-select">
                        <option value="">All ACDs</option>
                    </select>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <table id="oppTable">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="account">Account</th>
                            <th class="sortable" data-sort="opp">Opportunity</th>
                            <th class="sortable" data-sort="stage">Stage</th>
                            <th class="sortable" data-sort="closeDate">Close Date</th>
                            <th class="sortable" data-sort="acv">ACV</th>
                            <th class="sortable" data-sort="acd">ACD</th>
                            <th class="sortable" data-sort="region">Region / Territory</th>
                            <th class="sortable" data-sort="owner">Owner</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Embedded opportunity data
        const DASHBOARD_DATA = {
            "opportunities": {},
            "accounts": {}
        };

        // Password verification
        const PASSWORD_HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

        async function checkPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex === PASSWORD_HASH;
        }

        async function handlePasswordSubmit() {
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('passwordButton');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            const isValid = await checkPassword(password);
            if (isValid) {
                sessionStorage.setItem('dashboardAuth', 'true');
                document.getElementById('passwordOverlay').classList.add('hidden');
                document.getElementById('mainContainer').classList.remove('hidden');
                initDashboard();
            } else {
                alert('Incorrect password');
                btn.disabled = false;
                btn.textContent = 'Access Dashboard';
            }
        }

        document.getElementById('passwordButton').addEventListener('click', handlePasswordSubmit);
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handlePasswordSubmit();
        });

        // Check if already authenticated
        if (sessionStorage.getItem('dashboardAuth') === 'true') {
            document.getElementById('passwordOverlay').classList.add('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
        }

        function initDashboard() {
            // Load the embedded data
            loadDashboardData();
            renderDashboard();
        }

        function loadDashboardData() {
            // This will be populated by server-side data
            // For now, we'll use the data passed in via the global DASHBOARD_DATA object
            if (typeof window.DASHBOARD_DATA !== 'undefined') {
                Object.assign(DASHBOARD_DATA, window.DASHBOARD_DATA);
            }
        }

        function renderDashboard() {
            const opps = Object.values(DASHBOARD_DATA.opportunities || {});

            // Update stats
            const totalACV = opps.reduce((sum, o) => sum + (o.usd_acv || 0), 0);
            const uniqueAccounts = new Set(opps.map(o => o.parent_account || o.account_name)).size;
            const fedrampCount = opps.filter(o => o.fedramp).length;
            const distinctACDs = new Set(opps.map(o => o.acd)).size;

            document.getElementById('totalOpps').textContent = opps.length;
            document.getElementById('totalAccounts').textContent = uniqueAccounts;
            document.getElementById('totalACV').textContent = formatCurrency(totalACV);
            document.getElementById('fedrampCount').textContent = fedrampCount;
            document.getElementById('distinctACDs').textContent = distinctACDs;

            // Populate filter dropdowns
            const regions = [...new Set(opps.map(o => o.region).filter(Boolean))].sort();
            const acds = [...new Set(opps.map(o => o.acd).filter(Boolean))].sort();

            const regionSelect = document.getElementById('regionFilter');
            regions.forEach(region => {
                const opt = document.createElement('option');
                opt.value = region;
                opt.textContent = region;
                regionSelect.appendChild(opt);
            });

            const acdSelect = document.getElementById('acdFilter');
            acds.forEach(acd => {
                const opt = document.createElement('option');
                opt.value = acd;
                opt.textContent = acd;
                acdSelect.appendChild(opt);
            });

            // Render breakdowns
            renderSidebars(opps);

            // Render table
            renderTable(opps);

            // Attach event listeners
            attachEventListeners(opps);
        }

        function renderSidebars(opps) {
            // Stage breakdown
            const stageBreakdown = {};
            opps.forEach(o => {
                if (!stageBreakdown[o.stage]) {
                    stageBreakdown[o.stage] = { count: 0, acv: 0 };
                }
                stageBreakdown[o.stage].count++;
                stageBreakdown[o.stage].acv += o.usd_acv || 0;
            });

            let stageHTML = '';
            Object.keys(stageBreakdown).sort().forEach(stage => {
                const data = stageBreakdown[stage];
                stageHTML += `<div class="sidebar-item">
                    <span>Stage ${stage}</span>
                    <div>
                        <div class="sidebar-count">${data.count}</div>
                        <div class="sidebar-acv">${formatCurrency(data.acv)}</div>
                    </div>
                </div>`;
            });
            document.getElementById('stageBreakdown').innerHTML = stageHTML;

            // ACD breakdown
            const acdBreakdown = {};
            opps.forEach(o => {
                if (!acdBreakdown[o.acd]) {
                    acdBreakdown[o.acd] = { count: 0, acv: 0 };
                }
                acdBreakdown[o.acd].count++;
                acdBreakdown[o.acd].acv += o.usd_acv || 0;
            });

            let acdHTML = '';
            Object.keys(acdBreakdown).sort().forEach(acd => {
                const data = acdBreakdown[acd];
                acdHTML += `<div class="sidebar-item">
                    <span>${acd}</span>
                    <div>
                        <div class="sidebar-count">${data.count}</div>
                        <div class="sidebar-acv">${formatCurrency(data.acv)}</div>
                    </div>
                </div>`;
            });
            document.getElementById('acdBreakdown').innerHTML = acdHTML;

            // Region breakdown
            const regionBreakdown = {};
            opps.forEach(o => {
                const region = o.region || 'Unknown';
                if (!regionBreakdown[region]) {
                    regionBreakdown[region] = { count: 0, acv: 0 };
                }
                regionBreakdown[region].count++;
                regionBreakdown[region].acv += o.usd_acv || 0;
            });

            let regionHTML = '';
            Object.keys(regionBreakdown).sort().forEach(region => {
                const data = regionBreakdown[region];
                regionHTML += `<div class="sidebar-item">
                    <span>${region}</span>
                    <div>
                        <div class="sidebar-count">${data.count}</div>
                        <div class="sidebar-acv">${formatCurrency(data.acv)}</div>
                    </div>
                </div>`;
            });
            document.getElementById('regionBreakdown').innerHTML = regionHTML;
        }

        function renderTable(opps) {
            // Group by account
            const byAccount = {};
            opps.forEach(o => {
                const acct = o.parent_account || o.account_name;
                if (!byAccount[acct]) {
                    byAccount[acct] = [];
                }
                byAccount[acct].push(o);
            });

            // Sort accounts by ACV
            const sortedAccounts = Object.entries(byAccount)
                .map(([name, deals]) => ({
                    name,
                    deals: deals.sort((a, b) => new Date(a.close_date) - new Date(b.close_date)),
                    totalACV: deals.reduce((sum, d) => sum + (d.usd_acv || 0), 0)
                }))
                .sort((a, b) => b.totalACV - a.totalACV);

            let html = '';
            sortedAccounts.forEach((account, idx) => {
                html += `
                    <tr class="account-header expanded" data-account="${account.name}">
                        <td colspan="8">
                            <strong>${account.name}</strong>
                            <span style="color: #999; margin-left: 12px; font-size: 12px;">
                                ${account.deals.length} deal${account.deals.length !== 1 ? 's' : ''} · ${formatCurrency(account.totalACV)}
                            </span>
                        </td>
                    </tr>
                `;

                account.deals.forEach(deal => {
                    const stageLabel = {
                        '0': 'Prospecting',
                        '1': 'Identification / Qualification',
                        '2': 'Determining Problem / Impact',
                        '3': 'Aligning Benefits & Value',
                        '4': 'Confirm Value & Agreement',
                        '5': 'Proposal / Negotiation'
                    }[deal.stage] || deal.stage;

                    const acdClass = `acd-${deal.acd.toLowerCase().replace(/\s+/g, '')}`;
                    html += `
                        <tr class="deal-row">
                            <td></td>
                            <td><a href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${deal.id}/view" target="_blank" class="opp-link">${deal.name}</a></td>
                            <td><span class="stage-badge stage-${deal.stage}">${deal.stage} · ${stageLabel.split(' / ')[0]}</span></td>
                            <td>${deal.close_date}</td>
                            <td><span class="acv-amount">${formatCurrency(deal.usd_acv)}</span></td>
                            <td><span class="acd-badge ${acdClass}${deal.fedramp ? ' fedramp-badge' : ''}">${deal.acd}${deal.fedramp ? ' (FedRAMP)' : ''}</span></td>
                            <td>${deal.region}${deal.territory ? ' / ' + deal.territory : ''}</td>
                            <td>${deal.owner}</td>
                        </tr>
                    `;
                });
            });

            document.getElementById('tableBody').innerHTML = html;
        }

        function attachEventListeners(opps) {
            // Account header toggle
            document.querySelectorAll('.account-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.classList.toggle('expanded');
                });
            });

            // Sorting
            document.querySelectorAll('th.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const sortField = th.dataset.sort;
                    // Toggle sort direction
                    if (th.classList.contains('sort-asc')) {
                        th.classList.remove('sort-asc');
                        th.classList.add('sort-desc');
                    } else if (th.classList.contains('sort-desc')) {
                        th.classList.remove('sort-desc');
                        // Reset to grouped view
                        document.querySelectorAll('th.sortable').forEach(h => {
                            h.classList.remove('sort-asc', 'sort-desc');
                        });
                        renderTable(opps);
                        return;
                    } else {
                        document.querySelectorAll('th.sortable').forEach(h => {
                            h.classList.remove('sort-asc', 'sort-desc');
                        });
                        th.classList.add('sort-asc');
                    }
                    // Sort and flatten
                    const sorted = [...opps].sort((a, b) => {
                        let aVal = a[sortField];
                        let bVal = b[sortField];
                        if (aVal === null || aVal === undefined) aVal = '';
                        if (bVal === null || bVal === undefined) bVal = '';
                        return aVal < bVal ? -1 : aVal > bVal ? 1 : 0;
                    });
                    if (th.classList.contains('sort-desc')) {
                        sorted.reverse();
                    }
                    renderFlatTable(sorted);
                });
            });

            // Filters
            document.getElementById('searchInput').addEventListener('keyup', applyFilters);
            document.getElementById('stageFilter').addEventListener('change', applyFilters);
            document.getElementById('regionFilter').addEventListener('change', applyFilters);
            document.getElementById('acdFilter').addEventListener('change', applyFilters);

            function applyFilters() {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const stage = document.getElementById('stageFilter').value;
                const region = document.getElementById('regionFilter').value;
                const acd = document.getElementById('acdFilter').value;

                let filtered = opps.filter(o => {
                    if (search && !o.name.toLowerCase().includes(search) && !(o.parent_account || o.account_name).toLowerCase().includes(search)) return false;
                    if (stage && o.stage !== stage) return false;
                    if (region && o.region !== region) return false;
                    if (acd && o.acd !== acd) return false;
                    return true;
                });

                if (filtered.length === 0) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No opportunities match the filters</td></tr>';
                } else {
                    renderTable(filtered);
                    attachEventListeners(filtered);
                }
            }
        }

        function renderFlatTable(opps) {
            let html = '';
            opps.forEach(deal => {
                const stageLabel = {
                    '0': 'Prospecting',
                    '1': 'Identification / Qualification',
                    '2': 'Determining Problem / Impact',
                    '3': 'Aligning Benefits & Value',
                    '4': 'Confirm Value & Agreement',
                    '5': 'Proposal / Negotiation'
                }[deal.stage] || deal.stage;

                const acdClass = `acd-${deal.acd.toLowerCase().replace(/\s+/g, '')}`;
                html += `
                    <tr>
                        <td>${deal.parent_account || deal.account_name}</td>
                        <td><a href="https://niceincontact.lightning.force.com/lightning/r/Opportunity/${deal.id}/view" target="_blank" class="opp-link">${deal.name}</a></td>
                        <td><span class="stage-badge stage-${deal.stage}">${deal.stage} · ${stageLabel.split(' / ')[0]}</span></td>
                        <td>${deal.close_date}</td>
                        <td><span class="acv-amount">${formatCurrency(deal.usd_acv)}</span></td>
                        <td><span class="acd-badge ${acdClass}${deal.fedramp ? ' fedramp-badge' : ''}">${deal.acd}${deal.fedramp ? ' (FedRAMP)' : ''}</span></td>
                        <td>${deal.region}${deal.territory ? ' / ' + deal.territory : ''}</td>
                        <td>${deal.owner}</td>
                    </tr>
                `;
            });
            document.getElementById('tableBody').innerHTML = html;
        }

        function formatCurrency(val) {
            if (!val || val === 0) return '$0';
            return '$' + val.toLocaleString('en-US', { maximumFractionDigits: 0 });
