<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --blue: #3694fc;
    --charcoal: #21212b;
    --indigo: #6100FF;
    --teal: #36EAD0;
    --coral: #FF5B8A;
    --bg: #16161f;
    --card: #21212b;
    --card2: #2a2a38;
    --border: #3a3a4e;
    --text: #e8e8f0;
    --muted: #8888aa;
    --green: #22c55e;
    --yellow: #f59e0b;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  #pw-gate {
    position: fixed; inset: 0; background: var(--charcoal); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
  }
  .pw-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 48px; text-align: center; max-width: 420px; width: 90%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .pw-logo { font-size: 28px; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; margin-bottom: 8px; }
  .pw-subtitle { color: var(--muted); margin-bottom: 32px; font-size: 13px; }
  .pw-card h2 { font-size: 18px; margin-bottom: 20px; color: var(--text); }
  .pw-input {
    width: 100%; padding: 12px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 15px; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: var(--blue); }
  .pw-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: var(--blue); color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .pw-btn:hover { opacity: 0.88; }
  .pw-error { color: var(--coral); font-size: 13px; margin-top: 10px; min-height: 18px; }

  #app { display: none; min-height: 100vh; }
  .topbar {
    background: var(--charcoal); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-size: 20px; font-weight: 800; color: var(--blue); }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-built { margin-left: auto; font-size: 11px; color: var(--muted); }

  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 12px;
    padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--card2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 20px; display: flex; flex-direction: column; gap: 2px; min-width: 140px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--blue); }

  .main-layout { display: flex; }
  .sidebar {
    width: 260px; min-width: 260px; background: var(--card); border-right: 1px solid var(--border);
    padding: 20px; position: sticky; top: 57px; height: calc(100vh - 57px); overflow-y: auto;
  }
  .sidebar h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
  .sidebar h3:first-child { margin-top: 0; }
  .sb-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
  .sb-row:hover { background: var(--card2); }
  .sb-label { font-size: 13px; flex: 1; }
  .sb-meta { font-size: 11px; color: var(--muted); text-align: right; }
  .sb-count { font-weight: 600; color: var(--text); }
  .sb-acv { color: var(--muted); font-size: 11px; }

  .content { flex: 1; padding: 20px 24px; overflow-x: auto; }

  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
  .filters input, .filters select {
    padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px; outline: none;
  }
  .filters input { min-width: 220px; }
  .filters input:focus, .filters select:focus { border-color: var(--blue); }
  .filter-count { margin-left: auto; font-size: 13px; color: var(--muted); }

  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--card); padding: 10px 12px; text-align: left;
    border-bottom: 2px solid var(--border); font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.4px; color: var(--muted); white-space: nowrap; cursor: pointer;
    user-select: none; position: sticky; top: 57px;
  }
  th:hover { color: var(--text); }
  th.sort-asc::after { content: ' ▲'; color: var(--blue); }
  th.sort-desc::after { content: ' ▼'; color: var(--blue); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: rgba(54,148,252,0.04); }

  .acct-row { background: var(--card2) !important; cursor: pointer; }
  .acct-name { font-weight: 700; font-size: 13px; }
  .acct-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toggle-icon { margin-right: 8px; color: var(--muted); font-size: 11px; }
  .deal-row td:first-child { padding-left: 32px; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .stage-0, .stage-1 { background: rgba(54,148,252,0.18); color: var(--blue); }
  .stage-2, .stage-3 { background: rgba(245,158,11,0.18); color: #f59e0b; }
  .stage-4 { background: rgba(97,0,255,0.18); color: #a855f7; }
  .stage-5 { background: rgba(34,197,94,0.18); color: var(--green); }
  .fedramp-yes { background: rgba(168,85,247,0.2); color: #c084fc; }

  .acd-pill { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .acd-genesys { background: rgba(255,91,138,0.18); color: #ff8fab; }
  .acd-cisco { background: rgba(54,148,252,0.18); color: var(--blue); }
  .acd-avaya { background: rgba(54,234,208,0.18); color: var(--teal); }
  .acd-amazon { background: rgba(245,158,11,0.18); color: #fbbf24; }
  .acd-msteams { background: rgba(97,0,255,0.2); color: #a78bfa; }
  .acd-nice { background: rgba(34,197,94,0.18); color: var(--green); }
  .acd-other { background: rgba(136,136,170,0.18); color: var(--muted); }

  a.opp-link { color: var(--text); text-decoration: none; }
  a.opp-link:hover { color: var(--blue); text-decoration: underline; }
  .acv-cell { text-align: right; font-weight: 600; white-space: nowrap; }
  .acct-acv { font-weight: 700; color: var(--blue); }
  .acv-native { font-size: 10px; color: var(--muted); font-weight: 400; }
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-card">
    <div class="pw-logo">NiCE</div>
    <div class="pw-subtitle">CXone | eHub Pipeline Intelligence</div>
    <h2>Enter Dashboard Password</h2>
    <input type="password" id="pw-input" class="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">NiCE</div>
    <div class="topbar-title">eHub Pipeline Dashboard — Real-Time Recording</div>
    <div class="topbar-built">Built 2026-07-07 09:51 UTC</div>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="filters">
        <input type="text" id="search" placeholder="Search opportunity or account..." oninput="applyFilters()">
        <select id="f-stage" onchange="applyFilters()">
          <option value="">All Stages</option>
          <option value="0">0 · Prospecting</option>
          <option value="1">1 · Identification / Qualification</option>
          <option value="2">2 · Determining Problem</option>
          <option value="3">3 · Aligning Benefits</option>
          <option value="4">4 · Confirm Value</option>
          <option value="5">5 · Proposal / Negotiation</option>
        </select>
        <select id="f-region" onchange="applyFilters()"></select>
        <select id="f-acd" onchange="applyFilters()"></select>
        <span class="filter-count" id="filter-count"></span>
      </div>
      <div class="tbl-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th onclick="sortBy('name')" id="th-name">Opportunity</th>
              <th onclick="sortBy('account')" id="th-account">Account</th>
              <th onclick="sortBy('stage')" id="th-stage">Stage</th>
              <th onclick="sortBy('closeDate')" id="th-closeDate">Close Date</th>
              <th onclick="sortBy('acv')" id="th-acv" style="text-align:right">ACV (USD)</th>
              <th onclick="sortBy('acd')" id="th-acd">ACD</th>
              <th onclick="sortBy('region')" id="th-region">Region / Territory</th>
              <th onclick="sortBy('owner')" id="th-owner">Owner</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

const SF_BASE = 'https://niceincontact.lightning.force.com/lightning/r/Opportunity';

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  if (hex === HASH) {
    sessionStorage.setItem('ehub_auth','1');
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password. Try again.';
    document.getElementById('pw-input').value = '';
  }
}

window.onload = () => {
  if (sessionStorage.getItem('ehub_auth') === '1') {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
};

let sortField = null;
let sortDir = 0;
let collapsed = new Set();

function fmt(n) {
  if (!n) return '$0';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function fmtFull(n) {
  if (!n) return '$0';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function acdClass(acd) {
  if (!acd) return 'acd-other';
  const a = acd.toLowerCase();
  if (a.includes('genesys')) return 'acd-genesys';
  if (a.includes('cisco')) return 'acd-cisco';
  if (a.includes('avaya')) return 'acd-avaya';
  if (a.includes('amazon')) return 'acd-amazon';
  if (a.includes('teams')) return 'acd-msteams';
  if (a.includes('nice')) return 'acd-nice';
  return 'acd-other';
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('f-stage').value;
  const fr = document.getElementById('f-region').value;
  const fa = document.getElementById('f-acd').value;
  return ALL_OPPS.filter(o => {
    if (q && !o.name.toLowerCase().includes(q) && !o.account.toLowerCase().includes(q)) return false;
    if (fs && o.stage !== fs) return false;
    if (fr && !o.region.startsWith(fr)) return false;
    if (fa && o.acd !== fa) return false;
    return true;
  });
}

function populateFilters() {
  const regions = [...new Set(ALL_OPPS.map(o => o.region.split(' / ')[0]))].sort();
  const acds = [...new Set(ALL_OPPS.map(o => o.acd))].sort();
  const rs = document.getElementById('f-region');
  const opt0 = document.createElement('option'); opt0.value=''; opt0.textContent='All Regions'; rs.appendChild(opt0);
  regions.forEach(r => { const op = document.createElement('option'); op.value=r; op.textContent=r; rs.appendChild(op); });
  const as = document.getElementById('f-acd');
  const opt1 = document.createElement('option'); opt1.value=''; opt1.textContent='All ACDs'; as.appendChild(opt1);
  acds.forEach(a => { const op = document.createElement('option'); op.value=a; op.textContent=a; as.appendChild(op); });
}

function renderStats(opps) {
  const totalACV = opps.reduce((s,o) => s+o.acv, 0);
  const accts = new Set(opps.map(o=>o.account)).size;
  const fedramp = opps.filter(o=>o.fedramp==='Yes').length;
  const acdSet = new Set(opps.map(o=>o.acd));
  document.getElementById('stats-bar').innerHTML =
    '<div class="stat-card"><div class="stat-label">Open Deals</div><div class="stat-value">'+opps.length+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Accounts</div><div class="stat-value">'+accts+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Total Pipeline (USD)</div><div class="stat-value">'+fmt(totalACV)+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">FedRAMP</div><div class="stat-value">'+fedramp+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Distinct ACDs</div><div class="stat-value">'+acdSet.size+'</div></div>';
}

function renderSidebar(opps) {
  const stageMap = {};
  opps.forEach(o => {
    if (!stageMap[o.stage]) stageMap[o.stage] = {count:0, acv:0};
    stageMap[o.stage].count++;
    stageMap[o.stage].acv += o.acv;
  });
  const stageNames = {'0':'Prospecting','1':'Identification','2':'Determining Problem','3':'Aligning Benefits','4':'Confirm Value','5':'Proposal / Negotiation'};
  let sHtml = '<h3>By Stage</h3>';
  [0,1,2,3,4,5].forEach(s => {
    const d = stageMap[String(s)];
    if (!d) return;
    sHtml += '<div class="sb-row" onclick="filterStage(\''+s+'\')"><div class="sb-label">'+s+' · '+stageNames[s]+'</div><div class="sb-meta"><span class="sb-count">'+d.count+'</span><br><span class="sb-acv">'+fmt(d.acv)+'</span></div></div>';
  });

  const acdMap = {};
  opps.forEach(o => {
    if (!acdMap[o.acd]) acdMap[o.acd] = {count:0, acv:0};
    acdMap[o.acd].count++;
    acdMap[o.acd].acv += o.acv;
  });
  const sortedAcds = Object.entries(acdMap).sort((a,b) => b[1].acv - a[1].acv);
  let aHtml = '<h3>By ACD</h3>';
  sortedAcds.forEach(([acd, d]) => {
    aHtml += '<div class="sb-row" onclick="filterAcd(\''+acd.replace(/'/g,"\\'")+'\')" ><div class="sb-label">'+acd+'</div><div class="sb-meta"><span class="sb-count">'+d.count+'</span><br><span class="sb-acv">'+fmt(d.acv)+'</span></div></div>';
  });

  const regMap = {};
  opps.forEach(o => {
    const r = o.region.split(' / ')[0];
    if (!regMap[r]) regMap[r] = 0;
    regMap[r]++;
  });
  const sortedRegs = Object.entries(regMap).sort((a,b) => b[1]-a[1]);
  let rHtml = '<h3>By Region</h3>';
  sortedRegs.forEach(([r, cnt]) => {
    rHtml += '<div class="sb-row" onclick="filterRegion(\''+r.replace(/'/g,"\\'")+'\')" ><div class="sb-label">'+r+'</div><div class="sb-meta"><span class="sb-count">'+cnt+'</span></div></div>';
  });

  document.getElementById('sidebar').innerHTML = sHtml + aHtml + rHtml;
}

function dealRow(o, showAcct) {
  const fedrampBadge = o.fedramp === 'Yes' ? ' <span class="badge fedramp-yes">FedRAMP</span>' : '';
  const nativeLabel = (o.currency !== 'USD' && o.nativeAcv) ? '<div class="acv-native">'+o.currency+' '+Number(o.nativeAcv).toLocaleString('en-US',{maximumFractionDigits:0})+'</div>' : '';
  return '<tr class="deal-row">' +
    '<td><a class="opp-link" href="'+SF_BASE+'/'+o.id+'/view" target="_blank">'+o.name+'</a>'+fedrampBadge+'</td>' +
    '<td>'+(showAcct ? o.account : '')+'</td>' +
    '<td><span class="badge stage-'+o.stage+'">'+o.stage+' · '+o.stageShort+'</span></td>' +
    '<td>'+o.closeDate+'</td>' +
    '<td class="acv-cell">'+fmtFull(o.acv)+nativeLabel+'</td>' +
    '<td><span class="acd-pill '+acdClass(o.acd)+'">'+o.acd+'</span></td>' +
    '<td>'+o.region+'</td>' +
    '<td>'+o.owner+'</td>' +
    '</tr>';
}

function renderTable(opps) {
  const tbody = document.getElementById('table-body');
  if (sortField && sortDir > 0) {
    const sorted = [...opps].sort((a,b) => {
      let av = a[sortField], bv = b[sortField];
      if (sortField === 'acv') { av = Number(av); bv = Number(bv); }
      if (av < bv) return sortDir===1 ? -1 : 1;
      if (av > bv) return sortDir===1 ? 1 : -1;
      return 0;
    });
    tbody.innerHTML = sorted.map(o => dealRow(o, true)).join('');
  } else {
    const acctMap = {};
    opps.forEach(o => {
      if (!acctMap[o.account]) acctMap[o.account] = [];
      acctMap[o.account].push(o);
    });
    const sortedAccts = Object.entries(acctMap)
      .map(([acct, deals]) => ({acct, deals, totalACV: deals.reduce((s,d)=>s+d.acv,0)}))
      .sort((a,b) => b.totalACV - a.totalACV);

    let rows = '';
    sortedAccts.forEach(({acct, deals, totalACV}) => {
      const isCollapsed = collapsed.has(acct);
      const acdBadges = [...new Set(deals.map(d=>d.acd))].map(a => '<span class="acd-pill '+acdClass(a)+'">'+a+'</span>').join(' ');
      const safeAcct = acct.replace(/'/g, "\\'");
      rows += '<tr class="acct-row" onclick="toggleAcct(\''+safeAcct+'\')">' +
        '<td colspan="4"><span class="toggle-icon">'+(isCollapsed?'▶':'▼')+'</span><span class="acct-name">'+acct+'</span><div class="acct-meta">'+deals.length+' deal'+(deals.length!==1?'s:':':')+' '+acdBadges+'</div></td>' +
        '<td class="acv-cell acct-acv">'+fmtFull(totalACV)+'</td>' +
        '<td colspan="3"></td></tr>';
      if (!isCollapsed) {
        deals.sort((a,b) => (a.closeDate||'').localeCompare(b.closeDate||''));
        rows += deals.map(o => dealRow(o, false)).join('');
      }
    });
    tbody.innerHTML = rows;
  }
  const acctCount = new Set(opps.map(o=>o.account)).size;
  document.getElementById('filter-count').textContent = opps.length+' deal'+(opps.length!==1?'s':'')+' · '+acctCount+' account'+(acctCount!==1?'s':'');
}

function toggleAcct(acct) {
  if (collapsed.has(acct)) collapsed.delete(acct);
  else collapsed.add(acct);
  applyFilters();
}

function sortBy(field) {
  const hdrs = ['name','account','stage','closeDate','acv','acd','region','owner'];
  hdrs.forEach(h => { document.getElementById('th-'+h).className = ''; });
  if (sortField === field) {
    sortDir = (sortDir + 1) % 3;
    if (sortDir === 0) sortField = null;
  } else {
    sortField = field;
    sortDir = 1;
  }
  if (sortField) {
    document.getElementById('th-'+sortField).className = sortDir===1?'sort-asc':'sort-desc';
  }
  applyFilters();
}

function filterStage(s) { document.getElementById('f-stage').value = s; applyFilters(); }
function filterAcd(a) { document.getElementById('f-acd').value = a; applyFilters(); }
function filterRegion(r) { document.getElementById('f-region').value = r; applyFilters(); }

function applyFilters() {
  const filtered = getFiltered();
  renderStats(filtered);
  renderSidebar(filtered);
  renderTable(filtered);
}

function init() {
  populateFilters();
  applyFilters();
}
</script>
