<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;--bg:#f4f6fb;--card:#fff;--line:#e6e9f0;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Be Vietnam Pro',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--charcoal);}
/* password gate */
#gate{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:9999;}
#gate .card{background:#fff;border-radius:16px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
#gate h1{color:var(--blue);font-size:26px;margin:0 0 4px;font-weight:800;letter-spacing:-.5px;}
#gate p{color:var(--muted);font-size:13px;margin:0 0 22px;}
#gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:14px;}
#gate button{width:100%;padding:12px;background:var(--blue);color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#1f7ef0;}
#gate .err{color:#e11d48;font-size:13px;height:16px;margin-top:8px;}
.hidden{display:none!important;}
header{background:var(--charcoal);color:#fff;padding:18px 28px;display:flex;align-items:center;gap:14px;}
header .logo{font-size:22px;font-weight:800;color:var(--blue);letter-spacing:-.5px;}
header .title{font-size:16px;font-weight:600;}
header .built{margin-left:auto;font-size:12px;color:#9aa0ad;}
.wrap{padding:22px 28px;max-width:1500px;margin:0 auto;}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1;min-width:150px;}
.stat .v{font-size:24px;font-weight:800;color:var(--charcoal);}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.layout{display:flex;gap:18px;align-items:flex-start;}
.main{flex:1;min-width:0;}
.side{width:280px;flex-shrink:0;}
.side .box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.side h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.side .row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f2f7;}
.side .row:last-child{border:0;}
.side .row .n{font-weight:600;}
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;}
.filters input{flex:1;min-width:200px;}
.count{font-size:13px;color:var(--muted);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid #f0f2f7;}
th{background:#fafbfe;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--charcoal);}
tr.acc{background:#f4f7fd;cursor:pointer;}
tr.acc td{font-weight:700;color:var(--charcoal);}
tr.acc:hover{background:#eaf1fc;}
.acc-name .caret{display:inline-block;width:14px;color:var(--blue);}
td.deal-opp{padding-left:24px;}
td a{color:var(--blue);text-decoration:none;}
td a:hover{text-decoration:underline;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.acd{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.fed{background:var(--indigo);color:#fff;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;margin-left:6px;}
.acd-badges{display:inline-flex;gap:4px;margin-left:8px;}
.right{text-align:right;}
.acv{font-weight:700;}
</style></head><body>

<div id="gate"><div class="card">
  <h1>NiCE</h1><p>eHub Pipeline Dashboard</p>
  <input id="pw" type="password" placeholder="Password" autofocus>
  <button id="gobtn">Access Dashboard</button>
  <div class="err" id="err"></div>
</div></div>

<div id="app" class="hidden">
<header>
  <span class="logo">NiCE</span>

        <th data-k="region">Region / Territory</th>
        <th data-k="owner">Owner</th>
      </tr></thead><tbody id="tb"></tbody></table>

    <div class="side">

      <div class="box"><h3>By ACD</h3><div id="s-acd"></div></div>
      <div class="box"><h3>By Region</h3><div id="s-region"></div></div>
    </div>
  </div>
</div>
</div>

const STORED_HASH="0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621";
const SF="https://nice.lightning.force.com/lightning/r/Opportunity/";
const STAGE_FULL={'0':'Prospecting','1':'Identification / Qualification','2':'Determining Problem / Impact','3':'Aligning Benefits & Value','4':'Confirm Value & Agreement','5':'Proposal / Negotiation'};

async function checkPw(val){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  return hex===STORED_HASH;
}
function unlock(){document.getElementById('gate').classList.add('hidden');document.getElementById('app').classList.remove('hidden');render();}
async function attempt(){
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){sessionStorage.setItem('ehub_ok','1');unlock();}
  else{document.getElementById('err').textContent='Incorrect password';}
}
document.getElementById('gobtn').addEventListener('click',attempt);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
if(sessionStorage.getItem('ehub_ok')==='1'){unlock();}

// ---- formatting ----
const fmtACV=v=>'$'+Math.round(v).toLocaleString();
function acdColor(a){const m={'Amazon Connect':'#ff9900','Cisco Systems':'#1ba0d7','Genesys':'#ff4f1f','Avaya':'#cc0000','MS Teams':'#5b5fc7'};return m[a]||'#6b7280';}
function stageColor(s){if(s<='1')return '#3694fc';if(s<='3')return '#eab308';if(s=='4')return '#6100FF';return '#16a34a';}
function regTerr(d){return d.territory?(d.region?d.region+' / '+d.territory:d.territory):(d.region||'—');}

let sortKey=null,sortDir=1; // null = grouped view
const els=k=>document.getElementById(k);

function buildFilters(){
  [...new Set(DEALS.map(d=>d.stage))].sort().forEach(s=>{
    els('f-stage').insertAdjacentHTML('beforeend',`<option value="${s}">${s} · ${STAGE_FULL[s]}</option>`);});
  [...new Set(DEALS.map(d=>d.region).filter(Boolean))].sort().forEach(r=>{
    els('f-region').insertAdjacentHTML('beforeend',`<option value="${r}">${r}</option>`);});
  [...new Set(DEALS.map(d=>d.acd))].sort().forEach(a=>{
    els('f-acd').insertAdjacentHTML('beforeend',`<option value="${a}">${a}</option>`);});
  ['f-search','f-stage','f-region','f-acd'].forEach(id=>els(id).addEventListener('input',render));
}

function applyFilters(){
  const q=els('f-search').value.toLowerCase(),st=els('f-stage').value,rg=els('f-region').value,ac=els('f-acd').value;
  return DEALS.filter(d=>{
    if(st&&d.stage!=st)return false;
    if(rg&&d.region!=rg)return false;
    if(ac&&d.acd!=ac)return false;
    if(q&&!(`${d.name} ${d.account} ${d.owner}`.toLowerCase().includes(q)))return false;
    return true;});
}

function dealRowHtml(d,showAcc){
  const fed=d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':'';
  return `<tr class="deal">
    <td class="deal-opp"><a href="${SF}${d.id}/view" target="_blank">${esc(d.name)}</a>${fed}</td>
    <td>${showAcc?esc(d.account):''}</td>
    <td><span class="badge" style="background:${stageColor(d.stage)}22;color:${stageColor(d.stage)}">${d.stage} · ${esc(d.stageLabel)}</span></td>
    <td>${d.close||'—'}</td>
    <td class="right acv">${fmtACV(d.acv)}</td>
    <td><span class="acd" style="background:${acdColor(d.acd)}">${esc(d.acd)}</span></td>
    <td>${esc(regTerr(d))}</td>
    <td>${esc(d.owner)||'—'}</td></tr>`;
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const collapsed={};
function render(){
  const rows=applyFilters();
  // stats
  const totACV=rows.reduce((a,d)=>a+d.acv,0);
  const accCount=new Set(rows.map(d=>d.account)).size;
  const fed=rows.filter(d=>d.fedramp==='Yes').length;
  const acdN=new Set(rows.map(d=>d.acd)).size;
  els('stats').innerHTML=[
    [rows.length,'Open Deals'],[accCount,'Accounts'],[fmtACV(totACV),'Total Pipeline ACV'],
    [fed,'FedRAMP'],[acdN,'Distinct ACD']
  ].map(([v,l])=>`<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join('');

  const tb=els('tb');tb.innerHTML='';
  if(sortKey){
    const sorted=[...rows].sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'){x=+x;y=+y;}else{x=String(x).toLowerCase();y=String(y).toLowerCase();}
      return x<y?-1*sortDir:x>y?1*sortDir:0;});
    tb.innerHTML=sorted.map(d=>dealRowHtml(d,true)).join('');
    els('count').textContent=`${rows.length} deals`;
  }else{
    // grouped by account, sorted by total ACV desc
    const groups={};
    rows.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>
      groups[b].reduce((s,d)=>s+d.acv,0)-groups[a].reduce((s,d)=>s+d.acv,0));
    let htm='';
    order.forEach(acc=>{
      const g=groups[acc].sort((a,b)=>(a.close||'').localeCompare(b.close||''));
      const tot=g.reduce((s,d)=>s+d.acv,0);
      const acds=[...new Set(g.map(d=>d.acd))];
      const badges=acds.map(a=>`<span class="acd" style="background:${acdColor(a)}">${esc(a)}</span>`).join(' ');
      const open=!collapsed[acc];
      htm+=`<tr class="acc" data-acc="${esc(acc)}">
        <td class="acc-name" colspan="4"><span class="caret">${open?'▾':'▸'}</span>${esc(acc)}
          <span style="color:var(--muted);font-weight:500"> &middot; ${g.length} deal${g.length>1?'s':''}</span>
          <span class="acd-badges">${badges}</span></td>
        <td class="right acv">${fmtACV(tot)}</td><td colspan="3"></td></tr>`;
      if(open) htm+=g.map(d=>dealRowHtml(d,false)).join('');
    });
    tb.innerHTML=htm;
    tb.querySelectorAll('tr.acc').forEach(tr=>tr.addEventListener('click',()=>{
      const a=tr.getAttribute('data-acc');collapsed[a]=!collapsed[a];render();}));
    els('count').textContent=`${rows.length} deals · ${order.length} accounts`;
  }
  renderSidebar(rows);
  // sort indicators
  document.querySelectorAll('th').forEach(th=>{
    const k=th.getAttribute('data-k');
    th.textContent=th.textContent.replace(/[ ▲▼]+$/,'');
    if(sortKey===k)th.textContent+=' '+(sortDir>0?'▲':'▼');});
}

function renderSidebar(rows){
  const byStage={},byAcd={},byReg={};
  rows.forEach(d=>{
    byStage[d.stage]=byStage[d.stage]||{n:0,acv:0};byStage[d.stage].n++;byStage[d.stage].acv+=d.acv;
    byAcd[d.acd]=byAcd[d.acd]||{n:0,acv:0};byAcd[d.acd].n++;byAcd[d.acd].acv+=d.acv;
    const r=d.region||'Unknown';byReg[r]=(byReg[r]||0)+1;});
  els('s-stage').innerHTML=Object.keys(byStage).sort().map(s=>
    `<div class="row"><span>${s} · ${STAGE_FULL[s]}</span><span class="n">${byStage[s].n} · ${fmtACV(byStage[s].acv)}</span></div>`).join('');
  els('s-acd').innerHTML=Object.keys(byAcd).sort((a,b)=>byAcd[b].acv-byAcd[a].acv).map(a=>
    `<div class="row"><span>${esc(a)}</span><span class="n">${byAcd[a].n} · ${fmtACV(byAcd[a].acv)}</span></div>`).join('');
  els('s-region').innerHTML=Object.keys(byReg).sort((a,b)=>byReg[b]-byReg[a]).map(r=>
    `<div class="row"><span>${esc(r)}</span><span class="n">${byReg[r]}</span></div>`).join('');
}

document.querySelectorAll('th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.getAttribute('data-k');
  if(sortKey!==k){sortKey=k;sortDir=1;}        // 1st click asc
  else if(sortDir===1){sortDir=-1;}            // 2nd desc
  else{sortKey=null;sortDir=1;}                // 3rd back to grouped
  render();}));

buildFilters();
</script>
