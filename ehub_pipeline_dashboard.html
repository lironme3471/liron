<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>eHub Pipeline Dashboard</title>
<style>
  :root{
    --nice-blue:#3694fc; --charcoal:#21212b; --indigo:#6100FF;
    --teal:#36EAD0; --coral:#FF5B8A;
    --bg:#f4f6fa; --card:#ffffff; --line:#e6e9f0; --muted:#6b7280; --text:#21212b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Be Vietnam Pro','Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;}
  a{color:var(--nice-blue);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* ---- Password gate ---- */
  #gate{position:fixed;inset:0;background:var(--charcoal);z-index:1000;
    display:flex;align-items:center;justify-content:center;}
  #gate .card{background:#fff;border-radius:16px;padding:40px 36px;width:340px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;}
  #gate .logo{font-weight:800;font-size:26px;letter-spacing:-1px;color:var(--charcoal);}
  #gate .logo span{color:var(--nice-blue);}
  #gate .sub{color:var(--muted);font-size:13px;margin:6px 0 22px;}
  #gate input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;
    font-size:15px;margin-bottom:14px;outline:none;}
  #gate input:focus{border-color:var(--nice-blue);}
  #gate button{width:100%;padding:12px;background:var(--nice-blue);color:#fff;border:none;
    border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
  #gate button:hover{background:#2076d6;}
  #gate .err{color:var(--coral);font-size:13px;min-height:18px;margin-top:10px;}

  #app{display:none;}

  /* ---- Header ---- */
  header{background:var(--charcoal);color:#fff;padding:18px 28px;display:flex;
    align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header .brand{font-weight:800;font-size:22px;letter-spacing:-.5px;}
  header .brand span{color:var(--nice-blue);}
  header .title{font-size:15px;color:#c9ccd6;font-weight:500;}
  header .gen{font-size:12px;color:#8b8f9c;}

  .wrap{max-width:1500px;margin:0 auto;padding:22px 28px 60px;}

  /* ---- Stats bar ---- */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .stat .v{font-size:26px;font-weight:800;color:var(--charcoal);line-height:1.1;}
  .stat .l{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px;}
  .stat.acv .v{color:var(--nice-blue);}
  .stat.fed .v{color:var(--indigo);}

  .layout{display:grid;grid-template-columns:1fr 280px;gap:22px;align-items:start;}

  /* ---- Filters ---- */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .filters input,.filters select{padding:9px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:13px;background:#fff;outline:none;}
  .filters input{flex:1;min-width:220px;}
  .filters input:focus,.filters select:focus{border-color:var(--nice-blue);}
  .count{font-size:13px;color:var(--muted);margin-left:auto;font-weight:600;white-space:nowrap;}

  /* ---- Table ---- */
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:#fafbfd;text-align:left;padding:11px 12px;font-size:12px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);
    cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:2;}
  thead th:hover{color:var(--charcoal);background:#f0f3f8;}
  thead th .ind{color:var(--nice-blue);font-size:11px;margin-left:3px;}
  tbody td{padding:10px 12px;border-bottom:1px solid #f0f2f7;vertical-align:middle;}
  tbody tr.deal:hover{background:#f8fafd;}
  tbody tr.deal td.opp{max-width:330px;}
  tbody tr.deal td.opp a{font-weight:600;color:var(--charcoal);}
  tbody tr.deal td.opp a:hover{color:var(--nice-blue);}

  /* account header row */
  tr.acct{background:#eef3fb;cursor:pointer;}
  tr.acct:hover{background:#e4edfa;}
  tr.acct td{padding:11px 12px;font-weight:700;color:var(--charcoal);border-bottom:1px solid #dde6f4;}
  tr.acct .arrow{display:inline-block;width:14px;color:var(--nice-blue);transition:transform .15s;}
  tr.acct.collapsed .arrow{transform:rotate(-90deg);}
  tr.acct .acctname{font-size:14px;}
  tr.acct .dcount{font-weight:500;color:var(--muted);font-size:12px;margin-left:8px;}
  tr.acct .acdbadges{font-weight:400;margin-left:10px;}
  tr.acct .acttotal{float:right;color:var(--nice-blue);font-weight:800;}
  td.indent{padding-left:30px !important;}

  /* badges & pills */
  .stage{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
  .stage .num{font-weight:800;margin-right:2px;}
  .s0,.s1{background:#e3f0ff;color:#1a6fd0;}
  .s2,.s3{background:#fff5d6;color:#9a7400;}
  .s4{background:#efe3ff;color:#6100FF;}
  .s5{background:#ddf7ee;color:#0a8f63;}

  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .fed{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10.5px;font-weight:700;
    background:var(--indigo);color:#fff;margin-left:6px;vertical-align:middle;}

  .acv{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .cur{color:var(--muted);font-weight:500;font-size:11px;}
  .owner,.region{color:#3a3a45;}
  td.close{font-variant-numeric:tabular-nums;white-space:nowrap;}

  /* ---- Sidebar ---- */
  aside .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  aside h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f2f4f8;font-size:13px;}
  .srow:last-child{border-bottom:none;}
  .srow .lab{display:flex;align-items:center;gap:7px;}
  .srow .cnt{font-weight:700;}
  .srow .amt{color:var(--muted);font-size:11.5px;margin-left:6px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

  .note{font-size:11.5px;color:var(--muted);margin-top:6px;padding:0 2px;}
  @media(max-width:1100px){.layout{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<!-- Password gate -->
<div id="gate">
  <div class="card">
    <div class="logo">Ni<span>CE</span></div>
    <div class="sub">eHub Pipeline Dashboard</div>
    <input id="pw" type="password" placeholder="Password" autocomplete="off"
       onkeydown="if(event.key==='Enter')checkPw()"/>
    <button onclick="checkPw()">Access Dashboard</button>
    <div class="err" id="pwerr"></div>
  </div>
</div>

<div id="app">
  <header>
    <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;">
      <div class="brand">Ni<span>CE</span></div>
      <div class="title">Engagement Hub — Pipeline Dashboard</div>
    </div>
    <div class="gen">Generated 2026-06-25 10:11</div>
  </header>

  <div class="wrap">
    <div class="stats" id="stats"></div>

    <div class="layout">
      <main>
        <div class="filters">
          <input id="search" placeholder="Search opportunity, account, owner…" oninput="render()"/>
          <select id="fStage" onchange="render()"><option value="">All stages</option></select>
          <select id="fRegion" onchange="render()"><option value="">All regions</option></select>
          <select id="fAcd" onchange="render()"><option value="">All ACDs</option></select>
          <span class="count" id="count"></span>
        </div>
        <div class="tablecard">
          <table>
            <thead><tr id="head"></tr></thead>
            <tbody id="body"></tbody>
          </table>
        </div>
        <div class="note" id="curnote"></div>
      </main>

      <aside>
        <div class="box"><h3>By Stage</h3><div id="byStage"></div></div>
        <div class="box"><h3>By ACD</h3><div id="byAcd"></div></div>
        <div class="box"><h3>By Region</h3><div id="byRegion"></div></div>
      </aside>
    </div>
  </div>
</div>

/* ---------- Password gate (SHA-256 via Web Crypto) ---------- */
async function sha256hex(val){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const val=document.getElementById('pw').value;
  const h=await sha256hex(val);
  if(h===PW_HASH){
    sessionStorage.setItem('ehub_ok','1');
    unlock();
  }else{
    document.getElementById('pwerr').textContent='Incorrect password';
    document.getElementById('pw').select();
  }
}
function unlock(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}
if(sessionStorage.getItem('ehub_ok')==='1'){ window.addEventListener('DOMContentLoaded',unlock); }
else { window.addEventListener('DOMContentLoaded',()=>document.getElementById('pw').focus()); }

/* ---------- Helpers ---------- */
const STAGE_CLASS={0:'s0',1:'s1',2:'s2',3:'s3',4:'s4',5:'s5'};
const ACD_COLORS={
  'Cisco Systems':'#0d6efd','Genesys':'#ff5b8a','Avaya':'#d6336c',
  'Amazon Connect':'#ff9900','MS Teams':'#6264a7','NICE CXone Mpower':'#3694fc',
  'Content Guru':'#36ead0','Other':'#9aa0ad','Unknown':'#c2c6d0'
};
function acdColor(a){return ACD_COLORS[a]||'#7a8190';}
function fmtMoney(v,cur){
  const n=Math.round(v||0);
  const s=n.toLocaleString('en-US');
  return `<span class="acv">${s} <span class="cur">${cur||''}</span></span>`;
}
function fmtMoneyPlain(v){return Math.round(v||0).toLocaleString('en-US');}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const COLS=[
  {key:'name',    label:'Opportunity'},
  {key:'account', label:'Account'},
  {key:'stageNum',label:'Stage'},
  {key:'closeDate',label:'Close Date'},
  {key:'acv',     label:'ACV'},
  {key:'acd',     label:'ACD'},
  {key:'regionDisplay',label:'Region / Territory'},
  {key:'owner',   label:'Owner'},
];

let sortKey=null, sortDir=1; // dir 1 asc, -1 desc; null=grouped

/* ---------- Init: populate filters + stats + sidebar ---------- */
function init(){
  // filter dropdowns
  const stages=[...new Set(DEALS.map(d=>d.stageNum))].sort((a,b)=>a-b);
  const fStage=document.getElementById('fStage');
  stages.forEach(s=>{
    const lbl=DEALS.find(d=>d.stageNum===s).stageShort;
    fStage.insertAdjacentHTML('beforeend',`<option value="${s}">${s} · ${esc(lbl)}</option>`);
  });
  const regions=[...new Set(DEALS.map(d=>d.region).filter(Boolean))].sort();
  const fRegion=document.getElementById('fRegion');
  regions.forEach(r=>fRegion.insertAdjacentHTML('beforeend',`<option value="${esc(r)}">${esc(r)}</option>`));
  const acds=[...new Set(DEALS.map(d=>d.acd))].sort();
  const fAcd=document.getElementById('fAcd');
  acds.forEach(a=>fAcd.insertAdjacentHTML('beforeend',`<option value="${esc(a)}">${esc(a)}</option>`));

  // restore saved filter/sort prefs
  try{
    const p=JSON.parse(localStorage.getItem('ehub_prefs')||'{}');
    if(p.search!==undefined)document.getElementById('search').value=p.search;
    if(p.fStage!==undefined)fStage.value=p.fStage;
    if(p.fRegion!==undefined)fRegion.value=p.fRegion;
    if(p.fAcd!==undefined)fAcd.value=p.fAcd;
    if(p.sortKey!==undefined){sortKey=p.sortKey;sortDir=p.sortDir;}
  }catch(e){}

  buildStats();
  buildSidebar();
  buildHead();
  render();
}

function savePrefs(){
  localStorage.setItem('ehub_prefs',JSON.stringify({
    search:document.getElementById('search').value,
    fStage:document.getElementById('fStage').value,
    fRegion:document.getElementById('fRegion').value,
    fAcd:document.getElementById('fAcd').value,
    sortKey, sortDir
  }));
}

function buildStats(){
  const acv=DEALS.reduce((s,d)=>s+(d.acv||0),0);
  const accts=new Set(DEALS.map(d=>d.account)).size;
  const fed=DEALS.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(DEALS.map(d=>d.acd)).size;
  const cards=[
    {v:DEALS.length,l:'Open Deals'},
    {v:accts,l:'Accounts'},
    {v:fmtMoneyPlain(acv),l:'Total Pipeline ACV',cls:'acv'},
    {v:fed,l:'FedRAMP',cls:'fed'},
    {v:acds,l:'Distinct ACDs'},
  ];
  document.getElementById('stats').innerHTML=cards.map(c=>
    `<div class="stat ${c.cls||''}"><div class="v">${c.v}</div><div class="l">${c.l}</div></div>`).join('');
}

function buildSidebar(){
  // By Stage
  const sg={};
  DEALS.forEach(d=>{(sg[d.stageNum]=sg[d.stageNum]||{c:0,a:0,lbl:d.stageShort}); sg[d.stageNum].c++; sg[d.stageNum].a+=d.acv||0;});
  document.getElementById('byStage').innerHTML=Object.keys(sg).sort((a,b)=>a-b).map(k=>{
    const o=sg[k];const cls=STAGE_CLASS[k];
    return `<div class="srow"><span class="lab"><span class="stage ${cls}"><span class="num">${k}</span></span>${esc(o.lbl)}</span><span><span class="cnt">${o.c}</span><span class="amt">${fmtMoneyPlain(o.a)}</span></span></div>`;
  }).join('');
  // By ACD
  const ag={};
  DEALS.forEach(d=>{(ag[d.acd]=ag[d.acd]||{c:0,a:0}); ag[d.acd].c++; ag[d.acd].a+=d.acv||0;});
  document.getElementById('byAcd').innerHTML=Object.entries(ag).sort((a,b)=>b[1].c-a[1].c).map(([k,o])=>
    `<div class="srow"><span class="lab"><span class="dot" style="background:${acdColor(k)}"></span>${esc(k)}</span><span><span class="cnt">${o.c}</span><span class="amt">${fmtMoneyPlain(o.a)}</span></span></div>`).join('');
  // By Region
  const rg={};
  DEALS.forEach(d=>{const r=d.region||'—';rg[r]=(rg[r]||0)+1;});
  document.getElementById('byRegion').innerHTML=Object.entries(rg).sort((a,b)=>b[1]-a[1]).map(([k,c])=>
    `<div class="srow"><span class="lab">${esc(k)}</span><span class="cnt">${c}</span></div>`).join('');
}

function buildHead(){
  document.getElementById('head').innerHTML=COLS.map(c=>{
    let ind='';
    if(sortKey===c.key) ind=`<span class="ind">${sortDir===1?'▲':'▼'}</span>`;
    return `<th onclick="onSort('${c.key}')">${c.label}${ind}</th>`;
  }).join('');
}

function onSort(key){
  if(sortKey!==key){ sortKey=key; sortDir=1; }      // 1st click: asc
  else if(sortDir===1){ sortDir=-1; }               // 2nd click: desc
  else { sortKey=null; sortDir=1; }                 // 3rd click: back to grouped
  buildHead(); savePrefs(); render();
}

/* ---------- Filtering ---------- */
function passesFilter(d){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const fs=document.getElementById('fStage').value;
  const fr=document.getElementById('fRegion').value;
  const fa=document.getElementById('fAcd').value;
  if(q){
    const hay=(d.name+' '+d.account+' '+d.accountRaw+' '+d.owner+' '+d.acd+' '+d.regionDisplay).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  if(fs!==''&&String(d.stageNum)!==fs) return false;
  if(fr!==''&&d.region!==fr) return false;
  if(fa!==''&&d.acd!==fa) return false;
  return true;
}

function dealRow(d, showAccount){
  const cls=STAGE_CLASS[d.stageNum];
  const fed=d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':'';
  const acctCell=showAccount?`<td class="region">${esc(d.account)}</td>`:`<td></td>`;
  return `<tr class="deal">
    <td class="opp"><a href="${SF_BASE}${d.oppId}/view" target="_blank">${esc(d.name)}</a>${fed}</td>
    ${acctCell}
    <td><span class="stage ${cls}"><span class="num">${d.stageNum}</span> · ${esc(d.stageShort)}</span></td>
    <td class="close">${esc(d.closeDate)}</td>
    <td>${fmtMoney(d.acv,d.currency)}</td>
    <td><span class="pill" style="background:${acdColor(d.acd)}22;color:${acdColor(d.acd)}">${esc(d.acd)}</span></td>
    <td class="region">${esc(d.regionDisplay)}</td>
    <td class="owner">${esc(d.owner)}</td>
  </tr>`;
}

const collapsed={};

function render(){
  savePrefs();
  const rows=DEALS.filter(passesFilter);
  const body=document.getElementById('body');

  if(sortKey){
    // FLAT sorted view (no grouping; show account on each row)
    rows.sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='acv'||sortKey==='stageNum'){x=+x||0;y=+y||0;}
      else {x=(x||'').toString().toLowerCase();y=(y||'').toString().toLowerCase();}
      if(x<y)return -1*sortDir; if(x>y)return 1*sortDir; return 0;
    });
    body.innerHTML=rows.map(d=>dealRow(d,true)).join('')||emptyRow();
    document.getElementById('count').textContent=`${rows.length} deals`;
  }else{
    // GROUPED by account, accounts sorted by total ACV desc, deals by close date asc
    const groups={};
    rows.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>{
      const ta=groups[a].reduce((s,d)=>s+(d.acv||0),0);
      const tb=groups[b].reduce((s,d)=>s+(d.acv||0),0);
      return tb-ta;
    });
    let html='';
    order.forEach((acct,i)=>{
      const list=groups[acct].slice().sort((a,b)=>(a.closeDate||'').localeCompare(b.closeDate||''));
      const total=list.reduce((s,d)=>s+(d.acv||0),0);
      const acds=[...new Set(list.map(d=>d.acd))];
      const badges=acds.map(a=>`<span class="pill" style="background:${acdColor(a)}22;color:${acdColor(a)};font-size:10.5px;padding:2px 7px;">${esc(a)}</span>`).join(' ');
      const gid='g'+i;
      const isColl=collapsed[acct]?'collapsed':'';
      const hasFed=list.some(d=>d.fedramp==='Yes');
      html+=`<tr class="acct ${isColl}" data-g="${gid}" onclick="toggle('${acct.replace(/'/g,"\\'")}','${gid}')">
        <td colspan="8">
          <span class="arrow">▼</span>
          <span class="acctname">${esc(acct)}</span>
          <span class="dcount">${list.length} deal${list.length>1?'s':''}</span>
          <span class="acdbadges">${badges}</span>
          ${hasFed?'<span class="fed">FedRAMP</span>':''}
          <span class="acttotal">${fmtMoneyPlain(total)}</span>
        </td></tr>`;
      list.forEach(d=>{
        const r=dealRow(d,false);
        html+=r.replace('<tr class="deal">',`<tr class="deal" data-g="${gid}" style="${isColl?'display:none':''}">`)
               .replace('<td class="opp">','<td class="opp indent">');
      });
    });
    body.innerHTML=html||emptyRow();
    document.getElementById('count').textContent=`${rows.length} deals · ${order.length} accounts`;
  }
}
function emptyRow(){return '<tr><td colspan="8" style="padding:30px;text-align:center;color:#9aa0ad;">No deals match the current filters.</td></tr>';}

function toggle(acct,gid){
  collapsed[acct]=!collapsed[acct];
  document.querySelectorAll(`tr.acct[data-g="${gid}"]`).forEach(r=>r.classList.toggle('collapsed'));
  document.querySelectorAll(`tr.deal[data-g="${gid}"]`).forEach(r=>{
    r.style.display = collapsed[acct]?'none':'';
  });
}
</script>
