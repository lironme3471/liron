<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
:root{--blue:#3694fc;--charcoal:#21212b;--indigo:#6100FF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#f4f6fa;color:#21212b;}
#gate{position:fixed;inset:0;background:#21212b;display:flex;align-items:center;justify-content:center;z-index:1000;}
#gate .card{background:#fff;border-radius:14px;padding:42px 38px;width:340px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4);}
#gate h1{color:#3694fc;font-size:22px;margin-bottom:6px;letter-spacing:.5px;}
#gate p{color:#6b6b78;font-size:13px;margin-bottom:22px;}
#gate input{width:100%;padding:12px 14px;border:1px solid #d4d8e0;border-radius:8px;font-size:15px;margin-bottom:14px;}
#gate input:focus{outline:none;border-color:#3694fc;}
#gate button{width:100%;padding:12px;background:#6100FF;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
#gate button:hover{background:#4d00cc;}
#gate .err{color:#e23;font-size:12px;height:16px;margin-bottom:8px;}
#app{display:none;}
header{background:#21212b;color:#fff;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;}
header .logo{font-size:20px;font-weight:700;}
header .logo span{color:#3694fc;}
header .sub{font-size:12px;color:#9a9aa8;}
.stats{display:flex;gap:14px;padding:18px 26px;flex-wrap:wrap;}
.stat{background:#fff;border-radius:10px;padding:14px 20px;min-width:130px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex:1;}
.stat .v{font-size:24px;font-weight:700;color:#21212b;}
.stat .l{font-size:11px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.main{display:flex;gap:18px;padding:0 26px 30px;align-items:flex-start;}
.content{flex:1;min-width:0;}
.sidebar{width:280px;flex-shrink:0;}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden;}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;padding:12px 16px;background:#f0f2f7;color:#555;}
.panel .row{display:flex;justify-content:space-between;padding:7px 16px;font-size:13px;border-top:1px solid #f0f0f4;}
.panel .row .rl{color:#333;}
.panel .row .rr{color:#666;font-variant-numeric:tabular-nums;}
.filters{display:flex;gap:10px;padding:14px 0;flex-wrap:wrap;align-items:center;}
.filters input,.filters select{padding:9px 12px;border:1px solid #d4d8e0;border-radius:7px;font-size:13px;background:#fff;}
.filters input[type=text]{flex:1;min-width:200px;}
.count{font-size:13px;color:#666;padding:4px 0 10px;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
th{background:#21212b;color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:11px 12px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{background:#32323f;}
td{padding:10px 12px;font-size:13px;border-top:1px solid #eef0f4;vertical-align:top;}
tr.acct-header{background:#eaf2fe;cursor:pointer;}
tr.acct-header td{font-weight:600;color:#21212b;border-top:2px solid #cdddf5;}
tr.acct-header:hover{background:#dde9fc;}
.acct-toggle{display:inline-block;width:14px;color:#3694fc;}
.deal-row td:first-child{padding-left:26px;}
a{color:#3694fc;text-decoration:none;}
a:hover{text-decoration:underline;}
.pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.stage{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
.fed{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;background:#6100FF;color:#fff;margin-left:5px;}
.acdbadges .pill{margin-left:4px;}
.acv{font-variant-numeric:tabular-nums;white-space:nowrap;}
.muted{color:#999;}
</style></head>

<div id="gate"><div class="card">

</div></div>

<div id="app">
<header>

</div>
</div>

const SF_BASE="https://nice.lightning.force.com/lightning/r/Opportunity/";
const PWHASH="0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621";

async function sha256hex(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(val){return (await sha256hex(val))===PWHASH;}
async function tryAuth(){
  const v=document.getElementById('pw').value;
  if(await checkPw(v)){sessionStorage.setItem('ehub_auth','1');showApp();}
  else{document.getElementById('pwerr').textContent='Incorrect password';}
}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';init();}
document.getElementById('pwbtn').onclick=tryAuth;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryAuth();});
if(sessionStorage.getItem('ehub_auth')==='1'){showApp();}

const ACD_COLORS={'Cisco Systems':'#1ba0d7','Avaya':'#d9442b','Genesys':'#e8731a','Amazon Connect':'#ec912d',
 'NICE CXone Mpower':'#3694fc','MS Teams':'#5059c9','Five9':'#7d3fb8','TalkDesk':'#00b39b','Mitel':'#6b6f7a',
 'UJET':'#e2497a','Other':'#888','Not Known':'#aaa','NA / Not Known':'#aaa','Other / Not Known':'#aaa'};
function acdColor(a){return ACD_COLORS[a]||'#777';}
function stageColor(n){if(n<=1)return'#3694fc';if(n<=3)return'#e0a800';if(n===4)return'#6100FF';return'#28a745';}
function fmtACV(v,cur){const n=Math.round(v||0);const s=n.toLocaleString('en-US');return (cur&&cur!=='USD'?cur+' ':'$')+s;}
function fmtDate(d){if(!d)return'<span class="muted">—</span>';const p=d.split('-');const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[+p[1]-1]+' '+(+p[2])+', '+p[0];}

let sortKey=null,sortDir=1,sortClicks=0;

function uniq(arr){return [...new Set(arr)].filter(x=>x!=='').sort();}

function init(){
  document.getElementById('stats').innerHTML='';
  // filters
  fillSelect('f-stage','All Stages',uniq(DEALS.map(d=>d.snum+' · '+d.slabel)));
  fillSelect('f-region','All Regions',uniq(DEALS.map(d=>d.region)));
  fillSelect('f-acd','All ACDs',uniq(DEALS.map(d=>d.acd)));
  ['f-search','f-stage','f-region','f-acd'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  document.querySelectorAll('th').forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(sortKey===k){sortClicks++;if(sortClicks===1){sortDir=-1;}else{sortKey=null;sortClicks=0;}}
    else{sortKey=k;sortDir=1;sortClicks=0;}
    render();
  });
  render();
}
function fillSelect(id,allLabel,vals){
  const s=document.getElementById(id);s.innerHTML='<option value="">'+allLabel+'</option>';
  vals.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
}
function filtered(){
  const q=document.getElementById('f-search').value.toLowerCase();
  const st=document.getElementById('f-stage').value;
  const rg=document.getElementById('f-region').value;
  const ac=document.getElementById('f-acd').value;
  return DEALS.filter(d=>{
    if(q&&!((d.name+' '+d.account+' '+d.owner).toLowerCase().includes(q)))return false;
    if(st&&(d.snum+' · '+d.slabel)!==st)return false;
    if(rg&&d.region!==rg)return false;
    if(ac&&d.acd!==ac)return false;
    return true;
  });
}
function dealCell(d,showAcct){
  return '<tr class="deal-row">'+
    '<td><a href="'+SF_BASE+d.id+'/view" target="_blank">'+esc(d.name)+'</a>'+(d.fedramp==='Yes'?'<span class="fed">FedRAMP</span>':'')+'</td>'+
    '<td>'+(showAcct?esc(d.account):'')+'</td>'+
    '<td><span class="stage" style="background:'+stageColor(d.snum)+'">'+d.snum+' · '+esc(d.slabel)+'</span></td>'+
    '<td>'+fmtDate(d.close)+'</td>'+
    '<td class="acv">'+fmtACV(d.acv,d.cur)+'</td>'+
    '<td><span class="pill" style="background:'+acdColor(d.acd)+'">'+esc(d.acd)+'</span></td>'+
    '<td>'+esc(d.regdisp)+'</td>'+
    '<td>'+esc(d.owner)+'</td></tr>';
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const collapsed={};
function render(){
  const data=filtered();
  const tb=document.getElementById('tbody');tb.innerHTML='';
  // stats
  const acvTot=data.reduce((a,d)=>a+(d.acv||0),0);
  const accts=new Set(data.map(d=>d.account));
  const fed=data.filter(d=>d.fedramp==='Yes').length;
  const acds=new Set(data.map(d=>d.acd));
  document.getElementById('stats').innerHTML=
    statBox(data.length,'Open Deals')+statBox(accts.size,'Accounts')+
    statBox(fmtACV(acvTot,'USD'),'Total Pipeline ACV')+statBox(fed,'FedRAMP Deals')+statBox(acds.size,'Distinct ACDs');

  if(sortKey){
    const arr=[...data].sort((a,b)=>{
      let x=a[sortKey],y=b[sortKey];
      if(sortKey==='acv'||sortKey==='snum'){x=+x;y=+y;}
      else{x=(x||'').toString().toLowerCase();y=(y||'').toString().toLowerCase();}
      return (x<y?-1:x>y?1:0)*sortDir;
    });
    arr.forEach(d=>tb.insertAdjacentHTML('beforeend',dealCell(d,true)));
    document.getElementById('count').textContent=data.length+' deals · '+accts.size+' accounts';
  }else{
    // group by account, sort accounts by total ACV desc
    const groups={};
    data.forEach(d=>{(groups[d.account]=groups[d.account]||[]).push(d);});
    const order=Object.keys(groups).sort((a,b)=>
      groups[b].reduce((s,d)=>s+(d.acv||0),0)-groups[a].reduce((s,d)=>s+(d.acv||0),0));
    order.forEach(acct=>{
      const ds=groups[acct].sort((a,b)=>(a.close||'zz').localeCompare(b.close||'zz'));
      const tot=ds.reduce((s,d)=>s+(d.acv||0),0);
      const acdSet=[...new Set(ds.map(d=>d.acd))];
      const badges=acdSet.map(a=>'<span class="pill" style="background:'+acdColor(a)+'">'+esc(a)+'</span>').join('');
      const isC=collapsed[acct];
      tb.insertAdjacentHTML('beforeend',
        '<tr class="acct-header" data-a="'+esc(acct)+'"><td colspan="4"><span class="acct-toggle">'+(isC?'▶':'▼')+'</span> '+
        esc(acct)+' <span class="muted">('+ds.length+' deal'+(ds.length>1?'s':'')+')</span></td>'+
        '<td class="acv">'+fmtACV(tot,'USD')+'</td><td colspan="3" class="acdbadges">'+badges+'</td></tr>');
      if(!isC)ds.forEach(d=>tb.insertAdjacentHTML('beforeend',dealCell(d,false)));
    });
    document.querySelectorAll('tr.acct-header').forEach(tr=>tr.onclick=()=>{const a=tr.dataset.a;collapsed[a]=!collapsed[a];render();});
    document.getElementById('count').textContent=data.length+' deals · '+order.length+' accounts';
  }
  updHdr();
  sidebar(data);
}
function statBox(v,l){return '<div class="stat"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
function updHdr(){
  document.querySelectorAll('th').forEach(th=>{
    th.textContent=th.textContent.replace(/[ ▲▼]+$/,'');
    if(th.dataset.k===sortKey)th.textContent+=(sortDir===1?' ▲':' ▼');
  });
}
function sidebar(data){
  // by stage
  const byS={};data.forEach(d=>{const k=d.snum+' · '+d.slabel;(byS[k]=byS[k]||{c:0,v:0});byS[k].c++;byS[k].v+=d.acv||0;});
  document.getElementById('s-stage').innerHTML=Object.keys(byS).sort().map(k=>
    rowHTML(k,byS[k].c+' · '+fmtACV(byS[k].v,'USD'))).join('');
  const byA={};data.forEach(d=>{(byA[d.acd]=byA[d.acd]||{c:0,v:0});byA[d.acd].c++;byA[d.acd].v+=d.acv||0;});
  document.getElementById('s-acd').innerHTML=Object.keys(byA).sort((a,b)=>byA[b].v-byA[a].v).map(k=>
    rowHTML('<span class="pill" style="background:'+acdColor(k)+'">'+esc(k)+'</span>',byA[k].c+' · '+fmtACV(byA[k].v,'USD'))).join('');
  const byR={};data.forEach(d=>{const k=d.region||'(none)';byR[k]=(byR[k]||0)+1;});
  document.getElementById('s-region').innerHTML=Object.keys(byR).sort((a,b)=>byR[b]-byR[a]).map(k=>
    rowHTML(esc(k),byR[k])).join('');
}
function rowHTML(l,r){return '<div class="row"><span class="rl">'+l+'</span><span class="rr">'+r+'</span></div>';}
