<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eHub Pipeline Dashboard</title>
<style>
  :root{
    --blue:#3694fc; --charcoal:#21212b; --indigo:#6100FF;
    --teal:#36EAD0; --coral:#FF5B8A;
    --bg:#f4f6fb; --card:#ffffff; --line:#e4e8f0; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--charcoal);font-size:14px;}
  a{color:var(--blue);text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* ---- Password overlay ---- */
  #gate{position:fixed;inset:0;background:var(--charcoal);z-index:1000;
        display:flex;align-items:center;justify-content:center;}
  #gate .card{background:#fff;border-radius:14px;padding:40px 36px;width:340px;text-align:center;
        box-shadow:0 20px 60px rgba(0,0,0,.4);}
  #gate .logo{font-weight:800;font-size:26px;letter-spacing:.5px;color:var(--charcoal);}
  #gate .logo span{color:var(--blue);}
  #gate .sub{color:var(--muted);font-size:13px;margin:6px 0 22px;}
  #gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-size:15px;
        outline:none;margin-bottom:12px;}
  #gate input:focus{border-color:var(--blue);}
  #gate button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;
        font-size:15px;font-weight:600;cursor:pointer;}
  #gate button:hover{background:#2179e0;}
  #gate .err{color:var(--coral);font-size:12px;height:16px;margin-top:8px;}

  /* ---- App ---- */
  #app{display:none;}
  header.top{background:var(--charcoal);color:#fff;padding:18px 26px;display:flex;align-items:center;
        justify-content:space-between;flex-wrap:wrap;gap:10px;}
  header.top .logo{font-weight:800;font-size:22px;}
  header.top .logo span{color:var(--blue);}
  header.top .title{font-size:15px;color:#c9cdd6;font-weight:500;}
  header.top .gen{font-size:12px;color:#9aa0ad;}

  .stats{display:flex;gap:14px;padding:18px 26px 4px;flex-wrap:wrap;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
        min-width:150px;flex:1;}
  .stat .n{font-size:24px;font-weight:800;color:var(--charcoal);}
  .stat .l{font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
  .stat.acv .n{color:var(--blue);}
  .stat.fed .n{color:var(--indigo);}

  .layout{display:flex;gap:18px;padding:18px 26px 40px;align-items:flex-start;}
  .main{flex:1;min-width:0;}
  .sidebar{width:300px;flex-shrink:0;}

  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .toolbar input[type=text]{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;min-width:220px;flex:1;}
  .toolbar select{padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .toolbar .count{margin-left:auto;color:var(--muted);font-size:13px;font-weight:600;}

  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{background:#fafbfd;text-align:left;padding:11px 12px;font-size:11px;letter-spacing:.4px;
     text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);cursor:pointer;
     user-select:none;white-space:nowrap;}
  th:hover{background:#f0f3f9;}
  th .ind{color:var(--blue);font-size:10px;margin-left:3px;}
  td{padding:10px 12px;border-bottom:1px solid #f1f3f8;vertical-align:top;}
  tr:last-child td{border-bottom:none;}

  tr.acct-row{background:#f7f9fd;cursor:pointer;}
  tr.acct-row:hover{background:#eef3fb;}
  tr.acct-row td{font-weight:700;color:var(--charcoal);border-bottom:1px solid var(--line);}
  .acct-name .arrow{display:inline-block;width:14px;color:var(--blue);transition:transform .15s;}
  tr.acct-row.collapsed .arrow{transform:rotate(-90deg);}
  .acct-meta{font-weight:500;color:var(--muted);font-size:12px;margin-left:8px;}
  .acct-acv{float:right;font-weight:800;color:var(--blue);}

  tr.deal-row td:first-child{padding-left:26px;}
  tr.deal-row:hover{background:#fcfdff;}
  .oppname{font-weight:600;max-width:320px;display:inline-block;line-height:1.3;}
  .muted{color:var(--muted);}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .stage-01{background:#e3f0ff;color:#1565c0;}
  .stage-23{background:#fff5d6;color:#9a7400;}
  .stage-4{background:#efe5ff;color:var(--indigo);}
  .stage-5{background:#e2f7ec;color:#1b8a52;}

  .pill{display:inline-block;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;color:#fff;}
  .fed{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;
       background:var(--indigo);color:#fff;margin-left:6px;vertical-align:middle;}

  .acct-pills{display:inline-flex;gap:4px;flex-wrap:wrap;margin-left:10px;vertical-align:middle;}
  .acct-pills .pill{font-size:10px;padding:2px 7px;}

  /* sidebar cards */
  .scard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
  .scard h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
  .srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f1f3f8;font-size:13px;}
  .srow:last-child{border-bottom:none;}
  .srow .lbl{display:flex;align-items:center;gap:8px;}
  .srow .v{font-weight:700;}
  .srow .v small{color:var(--muted);font-weight:500;margin-left:6px;}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block;}

  .hidden{display:none!important;}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:0 0 30px;}
  @media(max-width:1000px){.layout{flex-direction:column;}.sidebar{width:100%;}}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div class="logo">Ni<span>CE</span></div>
    <div class="sub">eHub Pipeline Dashboard</div>
    <input id="pw" type="password" placeholder="Password" autofocus>
    <button id="pwbtn">Access Dashboard</button>
    <div class="err" id="pwerr"></div>
  </div>
</div>

<div id="app">
  <header class="top">
    <div>
      <div class="logo">Ni<span>CE</span> &nbsp;<span class="title">Engagement Hub — Pipeline</span></div>
    </div>
    <div class="gen" id="genstamp"></div>
  </header>

  <div class="stats" id="statsbar"></div>

  <div class="layout">
    <div class="main">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search opportunity, account, owner…">
        <select id="fStage"></select>
        <select id="fRegion"></select>
        <select id="fAcd"></select>
        <span class="count" id="count"></span>
      </div>
      <div class="tablewrap">
        <table>
          <thead><tr id="headrow"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="sidebar" id="sidebar"></div>
  </div>
  <footer>Client-side view · data from Salesforce CPQ · open stages 0–5 only</footer>
</div>

// ---------- Password gate ----------
async function sha256hex(val){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const val = document.getElementById('pw').value;
  const h = await sha256hex(val);
  if(h === PW_HASH){
    sessionStorage.setItem('ehub_ok','1');
    showApp();
  } else {
    document.getElementById('pwerr').textContent = 'Incorrect password';
  }
}
function showApp(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  render();
}
document.getElementById('pwbtn').addEventListener('click', checkPw);
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPw(); });
if(sessionStorage.getItem('ehub_ok')==='1'){ showApp(); }

// ---------- Helpers ----------
const STAGE_NAMES = {
  '0':'Prospecting','1':'Identification / Qualification','2':'Determining Problem',
  '3':'Aligning Benefits & Value','4':'Confirm Value & Agreement','5':'Proposal / Negotiation'
};
const ACD_COLORS = {
  'Amazon Connect':'#ff9900','Cisco Systems':'#1ba0d7','Genesys':'#ff4f1f',
  'Avaya':'#cc0000','MS Teams':'#5059c9','NICE CXone Mpower':'#3694fc',
  'NICE CXone':'#3694fc','Other':'#8a90a0','Unknown':'#b0b6c2'
};
function acdColor(a){ return ACD_COLORS[a] || '#6100FF'; }
function fmtACV(v,curr){
  const n = Number(v)||0;
  let s;
  if(n>=1e6) s = (n/1e6).toFixed(2).replace(/\.00$/,'')+'M';
  else if(n>=1e3) s = Math.round(n/1e3)+'K';
  else s = String(n);
  return (curr && curr!=='USD' ? curr+' ' : '$') + s;
}
function fmtDate(d){
  if(!d) return '<span class="muted">—</span>';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function stageClass(n){
  if(n==='0'||n==='1') return 'stage-01';
  if(n==='2'||n==='3') return 'stage-23';
  if(n==='4') return 'stage-4';
  return 'stage-5';
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------- State ----------
let sortKey = null;     // null => grouped by account
let sortDir = 1;        // 1 asc, -1 desc
const COLUMNS = [
  {key:'name',   label:'Opportunity'},
  {key:'account',label:'Account'},
  {key:'stage_num',label:'Stage'},
  {key:'close',  label:'Close Date'},
  {key:'acv',    label:'ACV'},
  {key:'acd',    label:'ACD'},
  {key:'region', label:'Region / Territory'},
  {key:'owner',  label:'Owner'},
];

// ---------- Build filters & stats ----------
function buildStatsBar(){
  const s = DATA.stats;
  const items = [
    {n:s.deals, l:'Open Deals', c:''},
    {n:s.accounts, l:'Accounts', c:''},
    {n:fmtACV(s.acv,'USD'), l:'Total Pipeline ACV', c:'acv'},
    {n:s.fedramp, l:'FedRAMP', c:'fed'},
    {n:s.distinct_acd, l:'Distinct ACD', c:''},
  ];
  document.getElementById('statsbar').innerHTML = items.map(i=>
    `<div class="stat ${i.c}"><div class="n">${i.n}</div><div class="l">${i.l}</div></div>`).join('');
  document.getElementById('genstamp').textContent = 'Updated '+DATA.generated;
}
function buildFilters(){
  const stages = [...new Set(DATA.deals.map(d=>d.stage_num))].sort();
  const regions = [...new Set(DATA.deals.map(d=>d.region_filter))].sort();
  const acds = [...new Set(DATA.deals.map(d=>d.acd))].sort();
  const fS=document.getElementById('fStage'), fR=document.getElementById('fRegion'), fA=document.getElementById('fAcd');
  fS.innerHTML = '<option value="">All Stages</option>'+stages.map(s=>`<option value="${s}">${s} · ${esc(STAGE_NAMES[s])}</option>`).join('');
  fR.innerHTML = '<option value="">All Regions</option>'+regions.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('');
  fA.innerHTML = '<option value="">All ACDs</option>'+acds.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join('');
  [fS,fR,fA].forEach(el=>el.addEventListener('change',render));
  document.getElementById('search').addEventListener('input',render);
}
function buildHead(){
  const hr = document.getElementById('headrow');
  hr.innerHTML = COLUMNS.map(c=>{
    let ind='';
    if(sortKey===c.key) ind = `<span class="ind">${sortDir===1?'▲':'▼'}</span>`;
    return `<th data-key="${c.key}">${c.label}${ind}</th>`;
  }).join('');
  hr.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click',()=>{
      const k = th.dataset.key;
      if(sortKey!==k){ sortKey=k; sortDir=1; }
      else if(sortDir===1){ sortDir=-1; }
      else { sortKey=null; sortDir=1; }   // third click -> back to grouped
      buildHead(); render();
    });
  });
}

// ---------- Filtering ----------
function passesFilters(d){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const fs = document.getElementById('fStage').value;
  const fr = document.getElementById('fRegion').value;
  const fa = document.getElementById('fAcd').value;
  if(fs && d.stage_num!==fs) return false;
  if(fr && d.region_filter!==fr) return false;
  if(fa && d.acd!==fa) return false;
  if(q){
    const hay = (d.name+' '+d.account+' '+d.owner+' '+d.acd+' '+d.region).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function dealCells(d, showAccount){
  const fed = d.fedramp==='Yes' ? '<span class="fed">FedRAMP</span>' : '';
  return `
    <td><a class="oppname" href="${d.url}" target="_blank">${esc(d.name)}</a>${fed}</td>
    <td>${showAccount ? esc(d.account) : ''}</td>
    <td><span class="badge ${stageClass(d.stage_num)}">${d.stage_num} · ${esc(d.stage_short)}</span></td>
    <td>${fmtDate(d.close)}</td>
    <td><b>${fmtACV(d.acv,d.curr)}</b></td>
    <td><span class="pill" style="background:${acdColor(d.acd)}">${esc(d.acd)}</span></td>
    <td>${esc(d.region)}</td>
    <td>${esc(d.owner)||'<span class="muted">—</span>'}</td>`;
}

  if(sortKey){

    const sorted = [...visible].sort((a,b)=>{
      let x=a[sortKey], y=b[sortKey];
      if(sortKey==='acv'){ x=Number(x); y=Number(y); return (x-y)*sortDir; }
      x=(x||'').toString().toLowerCase(); y=(y||'').toString().toLowerCase();
      if(x<y) return -1*sortDir; if(x>y) return 1*sortDir; return 0;
    });
    html = sorted.map(d=>`<tr class="deal-row">${dealCells(d,true)}</tr>`).join('');
    document.getElementById('count').textContent = `${visible.length} deals`;
  } else {
    // grouped by account, accounts sorted by total ACV desc
    const groups = {};
    visible.forEach(d=>{ (groups[d.account] = groups[d.account]||[]).push(d); });
    const accNames = Object.keys(groups).sort((a,b)=>{
      const sa=groups[a].reduce((s,d)=>s+Number(d.acv),0);
      const sb=groups[b].reduce((s,d)=>s+Number(d.acv),0);
      return sb-sa;
    });
    accNames.forEach((acc,i)=>{
      const deals = groups[acc].slice().sort((a,b)=>(a.close||'').localeCompare(b.close||''));
      const tot = deals.reduce((s,d)=>s+Number(d.acv),0);
      const acds = [...new Set(deals.map(d=>d.acd))];
      const pills = acds.map(a=>`<span class="pill" style="background:${acdColor(a)}">${esc(a)}</span>`).join('');
      const gid='g'+i;
      html += `<tr class="acct-row" data-g="${gid}">
        <td colspan="8">
          <span class="acct-name"><span class="arrow">▾</span>${esc(acc)}</span>
          <span class="acct-meta">${deals.length} deal${deals.length>1?'s':''}</span>
          <span class="acct-pills">${pills}</span>
          <span class="acct-acv">${fmtACV(tot,'USD')}</span>
        </td></tr>`;
      deals.forEach(d=>{
        html += `<tr class="deal-row" data-parent="${gid}">${dealCells(d,false)}</tr>`;
      });
    });
    document.getElementById('count').textContent = `${visible.length} deals · ${accNames.length} accounts`;
  }

  tbody.innerHTML = html || '<tr><td colspan="8" style="padding:30px;text-align:center;color:#999">No deals match your filters.</td></tr>';

  // collapse handlers
  if(!sortKey){
    tbody.querySelectorAll('tr.acct-row').forEach(r=>{
      r.addEventListener('click',()=>{
        const gid=r.dataset.g;
        r.classList.toggle('collapsed');
        const hide=r.classList.contains('collapsed');
        tbody.querySelectorAll(`tr.deal-row[data-parent="${gid}"]`).forEach(d=>d.classList.toggle('hidden',hide));
      });
    });
  }
  buildSidebar(visible);
}

function buildSidebar(visible){
  // recompute from visible set so sidebar reflects filters
  const byStage={}, byAcd={}, byRegion={};
  visible.forEach(d=>{
    let s=byStage[d.stage_num]=byStage[d.stage_num]||{c:0,a:0}; s.c++; s.a+=Number(d.acv);
    let x=byAcd[d.acd]=byAcd[d.acd]||{c:0,a:0}; x.c++; x.a+=Number(d.acv);
    byRegion[d.region_filter]=(byRegion[d.region_filter]||0)+1;
  });
  const stageRows = Object.keys(byStage).sort().map(k=>
    `<div class="srow"><span class="lbl"><span class="dot" style="background:${stageColorDot(k)}"></span>${k} · ${esc(STAGE_NAMES[k])}</span>
     <span class="v">${byStage[k].c}<small>${fmtACV(byStage[k].a,'USD')}</small></span></div>`).join('');
  const acdRows = Object.keys(byAcd).sort((a,b)=>byAcd[b].c-byAcd[a].c).map(k=>
    `<div class="srow"><span class="lbl"><span class="dot" style="background:${acdColor(k)}"></span>${esc(k)}</span>
     <span class="v">${byAcd[k].c}<small>${fmtACV(byAcd[k].a,'USD')}</small></span></div>`).join('');
  const regRows = Object.keys(byRegion).sort((a,b)=>byRegion[b]-byRegion[a]).map(k=>
    `<div class="srow"><span class="lbl">${esc(k)}</span><span class="v">${byRegion[k]}</span></div>`).join('');

  document.getElementById('sidebar').innerHTML =
    `<div class="scard"><h3>By Stage</h3>${stageRows||'<div class="srow">—</div>'}</div>
     <div class="scard"><h3>By ACD</h3>${acdRows||'<div class="srow">—</div>'}</div>
     <div class="scard"><h3>By Region</h3>${regRows||'<div class="srow">—</div>'}</div>`;
}
function stageColorDot(n){
  if(n==='0'||n==='1') return '#3694fc';
  if(n==='2'||n==='3') return '#f0b400';
  if(n==='4') return '#6100FF';
  return '#1b8a52';
}

// ---------- init ----------
function init(){
  buildStatsBar(); buildFilters(); buildHead();
}
init();
function render_first_guard(){ if(document.getElementById('app').style.display==='block') render(); }
render_first_guard();
</script>
