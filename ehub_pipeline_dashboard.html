<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eHub Pipeline Dashboard</title>
<style>
  :root {
    --nice-blue: #3694FC;
    --nice-charcoal: #21212B;
    --nice-indigo: #6100FF;
    --nice-teal: #36EAD0;
    --nice-coral: #FF5B8A;
    --bg: #f4f6fa;
    --card-bg: #fff;
    --border: #e2e6ed;
    --text: #21212B;
    --text-muted: #6b7280;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

  /* Password gate */
  #pw-gate {
    position: fixed; inset: 0; background: var(--nice-charcoal);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  #pw-card {
    background: #fff; border-radius: 16px; padding: 40px 48px; text-align: center;
    min-width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  #pw-card .logo { font-size: 28px; font-weight: 800; color: var(--nice-blue); letter-spacing: -1px; margin-bottom: 8px; }
  #pw-card .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
  #pw-card input {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 15px; margin-bottom: 14px; outline: none;
    transition: border-color .2s;
  }
  #pw-card input:focus { border-color: var(--nice-blue); }
  #pw-card button {
    width: 100%; padding: 13px; background: var(--nice-blue); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  #pw-card button:hover { background: #1a7ef0; }
  #pw-error { color: var(--nice-coral); font-size: 13px; margin-top: 10px; display: none; }

  /* App layout */
  #app { display: none; }
  .header {
    background: var(--nice-charcoal); color: #fff; padding: 0 24px;
    height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .header .logo { font-size: 18px; font-weight: 800; color: var(--nice-blue); letter-spacing: -0.5px; }
  .header .title { font-size: 14px; color: #aaa; margin-left: 12px; }
  .header .updated { font-size: 12px; color: #888; }
  .header-left { display: flex; align-items: center; gap: 8px; }

  .layout { display: flex; min-height: calc(100vh - 56px); }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w); background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 20px 16px; position: sticky; top: 56px; height: calc(100vh - 56px);
    overflow-y: auto; flex-shrink: 0;
  }
  .sidebar h3 {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px;
    color: var(--text-muted); margin-bottom: 10px; margin-top: 18px;
  }
  .sidebar h3:first-child { margin-top: 0; }
  .sidebar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-radius: 6px; margin-bottom: 3px;
    font-size: 12px;
  }
  .sidebar-item:hover { background: var(--bg); }
  .sidebar-item .label { color: var(--text); font-weight: 500; }
  .sidebar-item .meta { color: var(--text-muted); font-size: 11px; text-align: right; }
  .sidebar-item .count { font-weight: 700; color: var(--nice-blue); margin-right: 4px; }
  .stage-dot {
    width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0;
  }

  /* Main content */
  .main { flex: 1; padding: 20px 24px; min-width: 0; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card-bg); border-radius: 10px; padding: 14px 18px;
    border: 1px solid var(--border); flex: 1; min-width: 140px;
  }
  .stat-card .val {
    font-size: 24px; font-weight: 800; color: var(--nice-charcoal); line-height: 1;
  }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* Filters */
  .filters {
    display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
  }
  .filters input, .filters select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 12px; outline: none; background: var(--card-bg);
    transition: border-color .15s;
  }
  .filters input { min-width: 200px; }
  .filters input:focus, .filters select:focus { border-color: var(--nice-blue); }
  .result-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--card-bg); }
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted);
    background: #f8f9fb; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  th:hover { color: var(--nice-blue); }
  th.sorted { color: var(--nice-blue); }
  th .sort-icon { margin-left: 4px; opacity: .5; }
  th.sorted .sort-icon { opacity: 1; }

  tr.account-row { background: #f0f4ff; cursor: pointer; }
  tr.account-row:hover { background: #e5eeff; }
  tr.account-row td {
    padding: 9px 12px; font-weight: 700; font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  tr.account-row td:first-child {
    padding-left: 14px;
  }
  tr.deal-row td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle; font-size: 12px;
  }
  tr.deal-row:last-child td { border-bottom: none; }
  tr.deal-row:hover { background: #f8f9fb; }

  .deal-name a { color: var(--nice-charcoal); text-decoration: none; font-weight: 500; }
  .deal-name a:hover { color: var(--nice-blue); text-decoration: underline; }
  .acv-val { font-weight: 600; color: var(--nice-charcoal); white-space: nowrap; }
  .acv-native { font-size: 10px; color: var(--text-muted); }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px;
    font-size: 10px; font-weight: 700; letter-spacing: .3px; white-space: nowrap;
  }
  .stage-badge-0 { background: #dbeafe; color: #1d4ed8; }
  .stage-badge-1 { background: #bfdbfe; color: #1e40af; }
  .stage-badge-2 { background: #fef3c7; color: #92400e; }
  .stage-badge-3 { background: #fde68a; color: #78350f; }
  .stage-badge-4 { background: #ede9fe; color: #5b21b6; }
  .stage-badge-5 { background: #d1fae5; color: #065f46; }

  .fedramp-badge { background: #ede9fe; color: #6100FF; }

  .acd-badge { color: #fff; }
  .acd-genesys { background: #0070ba; }
  .acd-cisco { background: #049fd9; }
  .acd-avaya { background: #e4002b; }
  .acd-amazon { background: #ff9900; color: #111; }
  .acd-msteams { background: #464EB8; }
  .acd-ujet { background: #00c4b4; }
  .acd-nice { background: var(--nice-blue); }
  .acd-unknown { background: #9ca3af; }

  .collapse-icon { margin-right: 6px; font-size: 11px; }
  .account-acv { color: var(--nice-blue); font-weight: 700; }
  .deal-count { background: var(--nice-blue); color: #fff; padding: 1px 7px; border-radius: 100px; font-size: 10px; font-weight: 700; margin-left: 6px; }

  .close-date { white-space: nowrap; }
  .close-date.past { color: var(--nice-coral); font-weight: 600; }

  /* Flat row (when sorting) */
  tr.flat-row td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle; font-size: 12px;
  }
  tr.flat-row:hover { background: #f8f9fb; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .header-left .logo { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Password Gate -->
<div id="pw-gate">
  <div id="pw-card">
    <div class="logo">NiCE</div>
    <div class="subtitle">eHub Pipeline Dashboard</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Access Dashboard</button>
    <div id="pw-error">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <span class="logo">NiCE</span>
      <span class="title">eHub Pipeline Dashboard</span>
    </div>
    <span class="updated" id="updated-label"></span>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="filters">
        <input type="text" id="search" placeholder="🔍  Search name, account..." oninput="applyFilters()">
        <select id="stage-filter" onchange="applyFilters()"><option value="">All Stages</option></select>
        <select id="region-filter" onchange="applyFilters()"><option value="">All Regions</option></select>
        <select id="acd-filter" onchange="applyFilters()"><option value="">All ACD</option></select>
        <span class="result-count" id="result-count"></span>
      </div>
      <div class="table-wrap">
        <table id="main-table">
          <thead>
            <tr>
              <th onclick="sortBy('name')">Opportunity <span class="sort-icon" id="sort-name">↕</span></th>
              <th onclick="sortBy('account_name')">Account <span class="sort-icon" id="sort-account_name">↕</span></th>
              <th onclick="sortBy('stage_num')">Stage <span class="sort-icon" id="sort-stage_num">↕</span></th>
              <th onclick="sortBy('close_date')">Close Date <span class="sort-icon" id="sort-close_date">↕</span></th>
              <th onclick="sortBy('usd_acv')">ACV (USD) <span class="sort-icon" id="sort-usd_acv">↕</span></th>
              <th onclick="sortBy('acd')">ACD <span class="sort-icon" id="sort-acd">↕</span></th>
              <th onclick="sortBy('region_display')">Region / Territory <span class="sort-icon" id="sort-region_display">↕</span></th>
              <th onclick="sortBy('owner')">Owner <span class="sort-icon" id="sort-owner">↕</span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const STORED_HASH = '0bfb1dbb009f33393aaecf5d1200f0d385131857335eea846225358486b37621';

async function checkPw() {
  const val = document.getElementById('pw-input').value;
  const encoded = new TextEncoder().encode(val);
  const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
  const hashArr = Array.from(new Uint8Array(hashBuf));
  const hashHex = hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
  if (hashHex === STORED_HASH) {
    sessionStorage.setItem('ehub_auth', '1');
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

// Check session storage on load
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('ehub_auth') === '1') {
    document.getElementById('pw-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
});

const STAGE_LABELS = {0:'Prospecting',1:'Identification / Qual',2:'Determining Problem',3:'Aligning Benefits',4:'Confirm Value',5:'Proposal / Negotiation'};
const STAGE_COLORS = ['stage-badge-0','stage-badge-1','stage-badge-2','stage-badge-3','stage-badge-4','stage-badge-5'];
const STAGE_DOT_COLORS = ['#3b82f6','#2563eb','#f59e0b','#d97706','#8b5cf6','#10b981'];

function acdClass(acd) {
  if (!acd) return 'acd-unknown';
  const a = acd.toLowerCase();
  if (a.includes('genesys')) return 'acd-genesys';
  if (a.includes('cisco')) return 'acd-cisco';
  if (a.includes('avaya')) return 'acd-avaya';
  if (a.includes('amazon')) return 'acd-amazon';
  if (a.includes('ms teams') || a.includes('microsoft')) return 'acd-msteams';
  if (a.includes('ujet')) return 'acd-ujet';
  if (a.includes('nice')) return 'acd-nice';
  return 'acd-unknown';
}

function fmtACV(val) {
  if (!val) return '$0';
  if (val >= 1000000) return '$' + (val/1000000).toFixed(2) + 'M';
  if (val >= 1000) return '$' + Math.round(val/1000) + 'K';
  return '$' + Math.round(val).toLocaleString();
}

function fmtACVFull(val) {
  if (!val) return '$0';
  return '$' + Math.round(val).toLocaleString();
}

let currentSort = null;
let sortDir = 'asc';
let collapsed = {};

function init() {
  document.getElementById('updated-label').textContent = 'Updated: ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  
  // Populate filters
  const regions = [...new Set(RAW_DATA.map(d => d.region).filter(Boolean))].sort();
  const acds = [...new Set(RAW_DATA.map(d => d.acd).filter(Boolean))].sort();
  const stages = [...new Set(RAW_DATA.map(d => d.stage_num))].sort((a,b)=>a-b);
  
  const rf = document.getElementById('region-filter');
  regions.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; rf.appendChild(o); });
  
  const af = document.getElementById('acd-filter');
  acds.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; af.appendChild(o); });
  
  const sf = document.getElementById('stage-filter');
  stages.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s + ' · ' + STAGE_LABELS[s]; sf.appendChild(o); });
  
  applyFilters();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const stage = document.getElementById('stage-filter').value;
  const region = document.getElementById('region-filter').value;
  const acd = document.getElementById('acd-filter').value;
  
  return RAW_DATA.filter(d => {
    if (search && !d.name.toLowerCase().includes(search) && !d.account_name.toLowerCase().includes(search) && !(d.top_parent || '').toLowerCase().includes(search)) return false;
    if (stage !== '' && d.stage_num !== parseInt(stage)) return false;
    if (region && d.region !== region) return false;
    if (acd && d.acd !== acd) return false;
    return true;
  });
}

function applyFilters() {
  const filtered = getFiltered();
  renderStats(filtered);
  renderSidebar(filtered);
  renderTable(filtered);
}

function sortBy(col) {
  if (currentSort === col) {
    if (sortDir === 'asc') sortDir = 'desc';
    else if (sortDir === 'desc') { currentSort = null; sortDir = 'asc'; }
    else sortDir = 'asc';
  } else {
    currentSort = col;
    sortDir = 'asc';
  }
  // Update header icons
  document.querySelectorAll('th').forEach(th => {
    const col2 = th.getAttribute('onclick')?.match(/sortBy\'(.*?)\'/)?.[1];
    const icon = th.querySelector('.sort-icon');
    if (!icon) return;
    if (col2 === currentSort) {
      th.classList.add('sorted');
      icon.textContent = sortDir === 'asc' ? '▲' : '▼';
    } else {
      th.classList.remove('sorted');
      icon.textContent = '↕';
    }
  });
  applyFilters();
}

function renderStats(filtered) {
  const totalACV = filtered.reduce((s,d) => s + (d.usd_acv||0), 0);
  const accounts = new Set(filtered.map(d => d.account_name)).size;
  const fedramp = filtered.filter(d => d.fedramp === 'Yes').length;
  const acds = new Set(filtered.map(d => d.acd)).size;
  
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="val">${filtered.length}</div><div class="lbl">Open Deals</div></div>
    <div class="stat-card"><div class="val">${accounts}</div><div class="lbl">Accounts</div></div>
    <div class="stat-card"><div class="val" style="font-size:20px">${fmtACV(totalACV)}</div><div class="lbl">Total Pipeline ACV</div></div>
    <div class="stat-card"><div class="val">${fedramp}</div><div class="lbl">FedRAMP</div></div>
    <div class="stat-card"><div class="val">${acds}</div><div class="lbl">Distinct ACDs</div></div>
  `;
  
  const total = filtered.length;
  const acctCount = new Set(filtered.map(d => d.account_name)).size;
  document.getElementById('result-count').textContent = `${total} deal${total!==1?'s':''} · ${acctCount} account${acctCount!==1?'s':''}`;
}

function renderSidebar(filtered) {
  // By stage
  const byStage = {};
  filtered.forEach(d => {
    if (!byStage[d.stage_num]) byStage[d.stage_num] = {count:0, acv:0};
    byStage[d.stage_num].count++;
    byStage[d.stage_num].acv += d.usd_acv||0;
  });
  
  // By ACD
  const byACD = {};
  filtered.forEach(d => {
    const a = d.acd || 'Unknown';
    if (!byACD[a]) byACD[a] = {count:0, acv:0};
    byACD[a].count++;
    byACD[a].acv += d.usd_acv||0;
  });
  
  // By Region
  const byRegion = {};
  filtered.forEach(d => {
    const r = d.region || 'Unknown';
    if (!byRegion[r]) byRegion[r] = 0;
    byRegion[r]++;
  });
  
  let html = '<h3>By Stage</h3>';
  Object.keys(byStage).sort((a,b)=>a-b).forEach(s => {
    const {count, acv} = byStage[s];
    html += `<div class="sidebar-item">
      <div style="display:flex;align-items:center">
        <div class="stage-dot" style="background:${STAGE_DOT_COLORS[s]}"></div>
        <span class="label">${s} · ${STAGE_LABELS[s]}</span>
      </div>
      <div class="meta"><span class="count">${count}</span>${fmtACV(acv)}</div>
    </div>`;
  });
  
  html += '<h3>By ACD</h3>';
  Object.entries(byACD).sort((a,b)=>b[1].acv-a[1].acv).forEach(([a, {count, acv}]) => {
    html += `<div class="sidebar-item">
      <div style="display:flex;align-items:center">
        <span class="badge acd-badge ${acdClass(a)}" style="margin-right:6px;font-size:9px">${a}</span>
      </div>
      <div class="meta"><span class="count">${count}</span>${fmtACV(acv)}</div>
    </div>`;
  });
  
  html += '<h3>By Region</h3>';
  Object.entries(byRegion).sort((a,b)=>b[1]-a[1]).forEach(([r, count]) => {
    html += `<div class="sidebar-item">
      <span class="label">${r}</span>
      <span class="count">${count}</span>
    </div>`;
  });
  
  document.getElementById('sidebar').innerHTML = html;
}

function toggleAccount(key) {
  collapsed[key] = !collapsed[key];
  applyFilters();
}

function renderTable(filtered) {
  const tbody = document.getElementById('table-body');
  const today = new Date().toISOString().split('T')[0];
  
  if (currentSort) {
    // Flat sorted view
    const sorted = [...filtered].sort((a,b) => {
      let av = a[currentSort], bv = b[currentSort];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    
    tbody.innerHTML = sorted.map(d => renderFlatRow(d, today)).join('');
  } else {
    // Grouped by account
    const byAccount = {};
    filtered.forEach(d => {
      const key = d.account_name;
      if (!byAccount[key]) byAccount[key] = [];
      byAccount[key].push(d);
    });
    
    // Sort accounts by total ACV desc
    const accountsSorted = Object.entries(byAccount).sort((a,b) => {
      const acvA = a[1].reduce((s,d)=>s+(d.usd_acv||0),0);
      const acvB = b[1].reduce((s,d)=>s+(d.usd_acv||0),0);
      return acvB - acvA;
    });
    
    let rows = '';
    accountsSorted.forEach(([acctName, deals]) => {
      const key = acctName;
      const totalACV = deals.reduce((s,d)=>s+(d.usd_acv||0),0);
      const isCollapsed = collapsed[key];
      const acds = [...new Set(deals.map(d=>d.acd))];
      const acdBadges = acds.slice(0,3).map(a => `<span class="badge acd-badge ${acdClass(a)}" style="font-size:9px">${a}</span>`).join(' ');
      
      rows += `<tr class="account-row" onclick="toggleAccount('${key.replace(/'/g,"\'")}')">
        <td colspan="2">
          <span class="collapse-icon">${isCollapsed ? '▶' : '▼'}</span>
          <strong>${acctName}</strong>
          <span class="deal-count">${deals.length}</span>
          &nbsp; ${acdBadges}
        </td>
        <td colspan="2"></td>
        <td class="account-acv">${fmtACV(totalACV)}</td>
        <td colspan="3"></td>
      </tr>`;
      
      if (!isCollapsed) {
        const dealsSorted = [...deals].sort((a,b)=>a.close_date.localeCompare(b.close_date));
        rows += dealsSorted.map(d => {
          const isPast = d.close_date < today;
          const sfUrl = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
          return `<tr class="deal-row">
            <td class="deal-name" style="padding-left:32px">
              <a href="${sfUrl}" target="_blank">${escHtml(d.name)}</a>
              ${d.fedramp==='Yes'?'<span class="badge fedramp-badge" style="margin-left:4px;font-size:9px">FedRAMP</span>':''}
            </td>
            <td></td>
            <td><span class="badge ${STAGE_COLORS[d.stage_num]}">${d.stage_num} · ${STAGE_LABELS[d.stage_num]}</span></td>
            <td class="close-date ${isPast?'past':''}">${d.close_date}</td>
            <td class="acv-val">
              ${fmtACVFull(d.usd_acv)}
              ${d.currency !== 'USD' && d.native_acv ? `<div class="acv-native">${d.currency} ${Math.round(d.native_acv).toLocaleString()}</div>` : ''}
            </td>
            <td><span class="badge acd-badge ${acdClass(d.acd)}">${escHtml(d.acd)}</span></td>
            <td>${escHtml(d.region_display)}</td>
            <td>${escHtml(d.owner)}</td>
          </tr>`;
        }).join('');
      }
    });
    
    tbody.innerHTML = rows;
  }
}

function renderFlatRow(d, today) {
  const isPast = d.close_date < today;
  const sfUrl = `https://niceincontact.lightning.force.com/lightning/r/Opportunity/${d.id}/view`;
  return `<tr class="flat-row">
    <td class="deal-name">
      <a href="${sfUrl}" target="_blank">${escHtml(d.name)}</a>
      ${d.fedramp==='Yes'?'<span class="badge fedramp-badge" style="margin-left:4px;font-size:9px">FedRAMP</span>':''}
    </td>
    <td>${escHtml(d.account_name)}</td>
    <td><span class="badge ${STAGE_COLORS[d.stage_num]}">${d.stage_num} · ${STAGE_LABELS[d.stage_num]}</span></td>
    <td class="close-date ${isPast?'past':''}">${d.close_date}</td>
    <td class="acv-val">
      ${fmtACVFull(d.usd_acv)}
      ${d.currency !== 'USD' && d.native_acv ? `<div class="acv-native">${d.currency} ${Math.round(d.native_acv).toLocaleString()}</div>` : ''}
    </td>
    <td><span class="badge acd-badge ${acdClass(d.acd)}">${escHtml(d.acd)}</span></td>
    <td>${escHtml(d.region_display)}</td>
    <td>${escHtml(d.owner)}</td>
  </tr>`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
